<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/meta.css" rel="stylesheet">
    <script src="/meta.js"></script>
    <title>numberline - 0nefinity</title>
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        .numberline-page {
            width: 100%;
            max-width: none;
            min-height: 100dvh;
            height: 100dvh;
            padding: 1rem 0;
            overflow: hidden;
        }

        .numberline-page h1 {
            margin: 0;
        }

        .numberline-page .meta-stack {
            flex: 1;
            justify-content: space-evenly;
            gap: 0.75rem;
            width: 100%;
            max-width: 100%;
        }

        .numberline-page .meta-card {
            width: min(32rem, calc(100vw - 2rem));
            padding: 1rem;
        }

        .numberline-page .meta-form-grid {
            gap: 0.5rem 0.75rem;
        }

        #factorDisplay {
            width: 100vw;
            max-width: 100vw;
            min-height: 4.5rem;
            padding: 0.75rem 1rem;
            margin-inline: calc(50% - 50vw);
            border: none;
            border-radius: 0;
            background: transparent;
            font-family: "Courier New", monospace;
            font-size: 24px;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        #factorDisplay span {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="_018 numberline-page">
        <h1>numberline</h1>

        <div class="meta-stack">
            <div id="factorDisplay" aria-live="polite"><span>1</span></div>

            <div class="meta-card">
                <div class="meta-form-grid">
                    <label class="meta-label" for="minValue">min</label>
                    <input id="minValue" class="meta-input" type="number" value="1">

                    <label class="meta-label" for="maxValue">max</label>
                    <input id="maxValue" class="meta-input" type="number" value="1e308">

                    <label class="meta-label" for="pressTime">s↑</label>
                    <input id="pressTime" class="meta-input" type="number" value="3">

                    <label class="meta-label" for="releaseTime">s↓</label>
                    <input id="releaseTime" class="meta-input" type="number" value="1">

                    <label class="meta-label" for="infinitySize">∞ size</label>
                    <input id="infinitySize" class="meta-input" type="number" value="250">
                </div>
            </div>

            <div class="meta-actions">
                <button id="button" type="button">Drücken und halten</button>
            </div>
        </div>
    </div>

    <script>
        const factorDisplay = document.getElementById('factorDisplay');
        const factorDisplayText = factorDisplay.querySelector('span');
        const button = document.getElementById('button');
        const minValueInput = document.getElementById('minValue');
        const maxValueInput = document.getElementById('maxValue');
        const pressTimeInput = document.getElementById('pressTime');
        const releaseTimeInput = document.getElementById('releaseTime');
        const infinitySizeInput = document.getElementById('infinitySize');

        let factor = 1;
        let interval;
        let startTime;
        let increasing = true;
        let factorStart = 1;
        let factorEnd = 1000;
        let timeToMaxFactor = 10 * 1000;
        let timeToMinFactor = 2 * 1000;

        function getNumberValue(input, fallback) {
            const value = Number(input.value);
            return Number.isFinite(value) ? value : fallback;
        }

        function formatLargeNumber(number) {
            return BigInt(Math.floor(number)).toString();
        }

        function updateFactorDisplay() {
            const maxValue = getNumberValue(maxValueInput, 1e308);
            const infinitySize = getNumberValue(infinitySizeInput, 250);
            const displayValue = factor >= maxValue ? '∞' : formatLargeNumber(factor);

            factorDisplayText.textContent = displayValue;
            factorDisplay.style.fontSize = `${displayValue === '∞' ? infinitySize : 24}px`;

            let fontSize = parseFloat(factorDisplay.style.fontSize);
            while (factorDisplay.scrollWidth > factorDisplay.clientWidth && fontSize > 1) {
                fontSize -= 0.5;
                factorDisplay.style.fontSize = `${fontSize}px`;
            }

            factorDisplayText.style.transform = displayValue === '∞'
                ? 'translate(-50%, calc(-50% + 10px))'
                : 'translate(-50%, -50%)';
        }

        function changeFactor() {
            const elapsedTime = Date.now() - startTime;
            const targetTime = increasing ? timeToMaxFactor : timeToMinFactor;
            const progress = elapsedTime / targetTime;

            if (increasing) {
                factor = factorStart * Math.pow(factorEnd / factorStart, progress);
            } else {
                factor = factorStart / Math.pow(factorStart / factorEnd, progress);
            }

            updateFactorDisplay();

            if (progress >= 1) {
                clearInterval(interval);
                factor = factorEnd;
                updateFactorDisplay();
            }
        }

        function startIncreasingFactor() {
            increasing = true;
            clearInterval(interval);
            factorStart = factor;
            factorEnd = getNumberValue(maxValueInput, 1e308);
            timeToMaxFactor = getNumberValue(pressTimeInput, 3) * 1000;
            startTime = Date.now();
            interval = setInterval(changeFactor, 100);
        }

        function startDecreasingFactor() {
            increasing = false;
            clearInterval(interval);
            factorStart = factor;
            factorEnd = getNumberValue(minValueInput, 1);
            timeToMinFactor = getNumberValue(releaseTimeInput, 1) * 1000;
            startTime = Date.now();
            interval = setInterval(changeFactor, 100);
        }

        function resizeFactorDisplay() {
            updateFactorDisplay();
        }

        button.addEventListener('mousedown', startIncreasingFactor);
        button.addEventListener('mouseup', startDecreasingFactor);
        button.addEventListener('mouseleave', startDecreasingFactor);
        button.addEventListener('touchstart', event => {
            event.preventDefault();
            startIncreasingFactor();
        }, { passive: false });
        button.addEventListener('touchend', event => {
            event.preventDefault();
            startDecreasingFactor();
        }, { passive: false });
        button.addEventListener('touchcancel', event => {
            event.preventDefault();
            startDecreasingFactor();
        }, { passive: false });

        [minValueInput, maxValueInput, infinitySizeInput].forEach(input => {
            input.addEventListener('input', updateFactorDisplay);
        });

        window.addEventListener('resize', resizeFactorDisplay);
        resizeFactorDisplay();
    </script>
</body>
</html>
