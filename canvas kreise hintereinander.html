<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growing Circles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            position: absolute;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #f0f0f0;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }
        label {
            margin-bottom: 10px;
            display: block;
        }
        input[type="number"] {
            width: 60px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div id="controls">
        <label>
            Number of Circles: <input type="range" id="circleCount" min="1" max="10000" value="1000">
            <input type="number" id="circleCountNumber" min="1" max="10000" value="1000">
        </label>
        <label>
            Radius Growth Factor: <input type="number" id="growthFactor" min="0.1" max="10" value="1.1" step="0.1">
        </label>
        <label>
            Initial Radius: <input type="number" id="initialRadius" min="1" max="1000" value="5">
        </label>
    </div>
    <canvas id="circleCanvas"></canvas>
    <script>
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const circleCountInput = document.getElementById('circleCount');
        const circleCountNumber = document.getElementById('circleCountNumber');
        const growthFactorInput = document.getElementById('growthFactor');
        const initialRadiusInput = document.getElementById('initialRadius');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawCircles();
        }

        function drawCircles() {
            const numberOfCircles = parseInt(circleCountInput.value);
            const growthFactor = parseFloat(growthFactorInput.value);
            const initialRadius = parseFloat(initialRadiusInput.value);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            let currentRadius = initialRadius;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            for (let i = 0; i < numberOfCircles; i++) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = i % 2 === 0 ? 'white' : 'black';
                ctx.fill();
                ctx.closePath();

                currentRadius *= growthFactor;
            }
        }

        function syncInputs(rangeInput, numberInput) {
            rangeInput.addEventListener('input', () => {
                numberInput.value = rangeInput.value;
                drawCircles();
            });

            numberInput.addEventListener('input', () => {
                rangeInput.value = numberInput.value;
                drawCircles();
            });
        }

        syncInputs(circleCountInput, circleCountNumber);
        growthFactorInput.addEventListener('input', drawCircles);
        initialRadiusInput.addEventListener('input', drawCircles);

        window.addEventListener('resize', resizeCanvas);

        // Initial setup
        window.onload = resizeCanvas;
    </script>
</body>
</html>
