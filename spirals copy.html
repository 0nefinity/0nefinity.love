<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link href="/meta.css" rel="stylesheet" /><!-- Für KI: meta.css regelt Hintergrund- und Objekt-Farben etc. (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->
<script src="/meta.js"></script><!-- Für KI: meta.js regelt das Menü und sonstige Funktionen (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->

<title>Slinky Simulator 2D</title>
<style>
html,body{margin:0;padding:0;background:black;overflow:hidden}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
addEventListener("resize",resize);resize();

// ---------- PARAMETERS ----------
const SEGMENTS = 40;
const REST = 1;
const STIFF = 0.5;
const DAMP = 0.01;
const GRAVITY = 0.0;
const BEND = 0.15;

const SPIRAL_RADIUS = 8;     // <<< BREITE
const SPIRAL_TURNS = 2.5;    // <<< WINDUNGSDICHTE

const BOUNCE = 0.6;
const FRICTION = 0.98;

// ---------- STATE ----------
let pts=[], grabbed=null;
for(let i=0;i<SEGMENTS;i++){
  pts.push({
    x: canvas.width/2,
    y: canvas.height/4 + i*REST,
    vx:0,vy:0
  });
}

// ---------- INPUT ----------
function pick(x,y){
  return pts.reduce((a,p)=>{
    const d=Math.hypot(p.x-x,p.y-y);
    return d<(a?.d??20)?{p,d}:a;
  },null)?.p||null;
}
function pos(e){return e.touches?
  {x:e.touches[0].clientX,y:e.touches[0].clientY}:
  {x:e.clientX,y:e.clientY}}
canvas.onmousedown=e=>grabbed=pick(...Object.values(pos(e)));
canvas.onmousemove=e=>{
  if(!grabbed)return;
  let p=pos(e);
  grabbed.x=p.x; grabbed.y=p.y;
  grabbed.vx=grabbed.vy=0;
};
onmouseup=()=>grabbed=null;
canvas.ontouchstart=e=>grabbed=pick(...Object.values(pos(e)));
canvas.ontouchmove=e=>{
  if(!grabbed)return;
  let p=pos(e);
  grabbed.x=p.x; grabbed.y=p.y;
  grabbed.vx=grabbed.vy=0;
};
ontouchend=()=>grabbed=null;

// ---------- PHYSICS ----------
function step(){
  pts.forEach(p=>{if(p!==grabbed)p.vy+=GRAVITY});

  // springs
  for(let i=0;i<pts.length-1;i++){
    let a=pts[i], b=pts[i+1];
    let dx=b.x-a.x, dy=b.y-a.y;
    let d=Math.hypot(dx,dy)||0.001;
    let nx=dx/d, ny=dy/d;
    let f=(d-REST)*STIFF;
    let dv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
    f+=dv*DAMP;
    if(a!==grabbed){a.vx+=f*nx;a.vy+=f*ny}
    if(b!==grabbed){b.vx-=f*nx;b.vy-=f*ny}
  }

  // bending
  for(let i=1;i<pts.length-1;i++){
    let a=pts[i-1],b=pts[i],c=pts[i+1];
    let abx=b.x-a.x, aby=b.y-a.y;
    let bcx=c.x-b.x, bcy=c.y-b.y;
    let ang=(abx*bcx+aby*bcy)/
      ((Math.hypot(abx,aby)*Math.hypot(bcx,bcy))+0.001);
    let fx=(a.x+c.x-2*b.x)*BEND;
    let fy=(a.y+c.y-2*b.y)*BEND;
    if(b!==grabbed){b.vx+=fx;b.vy+=fy}
  }

  // integrate + walls
  pts.forEach(p=>{
    if(p===grabbed)return;
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.999; p.vy*=0.999;

    if(p.x<0||p.x>canvas.width){
      p.x=Math.max(0,Math.min(canvas.width,p.x));
      p.vx*=-BOUNCE; p.vy*=FRICTION;
    }
    if(p.y<0||p.y>canvas.height){
      p.y=Math.max(0,Math.min(canvas.height,p.y));
      p.vy*=-BOUNCE; p.vx*=FRICTION;
    }
  });
}

// ---------- RENDER ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Zeichne Spirale mit 3D-Effekt (aber 2D Physik!)
  for(let i=0;i<pts.length-1;i++){
    let p=pts[i];
    let t=i*SPIRAL_TURNS*Math.PI*2;

    // Tangente (Richtung der Slinky-Achse)
    let dx=pts[i+1].x-p.x, dy=pts[i+1].y-p.y;
    let len=Math.hypot(dx,dy)||1;
    let tx=dx/len, ty=dy/len;

    // Normale (senkrecht zur Tangente)
    let nx=-ty, ny=tx;

    // 3D Helix: cos für X/Y offset, sin für Z-Tiefe
    let cosT=Math.cos(t), sinT=Math.sin(t);
    let ox=nx*cosT*SPIRAL_RADIUS;
    let oy=ny*cosT*SPIRAL_RADIUS;
    let oz=sinT*SPIRAL_RADIUS; // Z-Tiefe (nicht gerendert, nur für Effekte)

    // Tiefeneffekt: vorne (oz>0) heller & dicker, hinten dunkler & dünner
    let depth=oz/SPIRAL_RADIUS; // -1 bis +1
    let alpha=0.4+depth*0.4; // 0.0 bis 0.8
    let width=1+depth*1.5; // -0.5 bis 2.5

    ctx.strokeStyle=`rgba(0,255,255,${Math.max(0.1,alpha)})`;
    ctx.lineWidth=Math.max(0.5,width);
    ctx.shadowColor="cyan";
    ctx.shadowBlur=depth>0?15:5;

    ctx.beginPath();
    ctx.moveTo(p.x+ox,p.y+oy);

    // Nächster Punkt
    let p2=pts[i+1];
    let t2=(i+1)*SPIRAL_TURNS*Math.PI*2;
    let dx2=i<pts.length-2?pts[i+2].x-p2.x:dx;
    let dy2=i<pts.length-2?pts[i+2].y-p2.y:dy;
    let len2=Math.hypot(dx2,dy2)||1;
    let nx2=-dy2/len2, ny2=dx2/len2;
    let cosT2=Math.cos(t2), sinT2=Math.sin(t2);
    let ox2=nx2*cosT2*SPIRAL_RADIUS;
    let oy2=ny2*cosT2*SPIRAL_RADIUS;

    ctx.lineTo(p2.x+ox2,p2.y+oy2);
    ctx.stroke();
  }
  ctx.shadowBlur=0;
}

(function loop(){
  step(); draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
