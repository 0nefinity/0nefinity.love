<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Punktbasierter Textgenerator</title>
    <style>
        /* Basisstile für Body und HTML, um volle Höhe und Breite zu nutzen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* Stil für die Steuerungselemente */
        .controls {
            padding: 20px;
            text-align: center;
            background-color: #111;
            width: 100%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .controls label {
            margin-right: 10px;
        }
        .controls input {
            margin-right: 20px;
            padding: 5px;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: white;
            width: 150px;
        }
        .controls button {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            background-color: #555;
            color: white;
            cursor: pointer;
        }
        .controls button:hover {
            background-color: #666;
        }

        /* Container für Canvas */
        .canvas-container {
            position: relative;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        /* Canvas-Stil ohne Rahmen und volle Größe */
        canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

    </style>
</head>
<body>
    <div class="controls">
        <label for="textInput">Text:</label>
        <input type="text" id="textInput" value="ABCDEFGH">
        
        <label for="pointCount">Punktanzahl pro Zeichen:</label>
        <input type="number" id="pointCount" value="100" min="0" max="1000000000">
        
        <label for="pointSize">Punktgröße:</label>
        <input type="number" id="pointSize" value="2" min="0" max="1000" step="0.1">
        
        <button id="copyButton">Text kopieren</button>
    </div>
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <!-- Unsichtbares Textarea zum Kopieren -->
    <textarea id="hiddenTextArea" style="position: absolute; left: -9999px; top: -9999px;"></textarea>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const textInput = document.getElementById('textInput');
        const pointCountInput = document.getElementById('pointCount');
        const pointSizeInput = document.getElementById('pointSize');
        const hiddenTextArea = document.getElementById('hiddenTextArea');
        const copyButton = document.getElementById('copyButton');

        // Funktion zur Anpassung der Canvas-Größe an den Container
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            renderPoints();
        }

        // Event Listener für Fenstergrößenänderungen
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function renderPoints() {
            const text = textInput.value;
            const pointCount = parseInt(pointCountInput.value);
            const pointSize = parseFloat(pointSizeInput.value);

            // Validierung der Punktgröße
            if (isNaN(pointSize) || pointSize < 0) {
                alert('Bitte eine gültige Punktgröße eingeben (0 bis 1000).');
                return;
            }

            // Speichere den Text im unsichtbaren Textarea
            hiddenTextArea.value = text;

            // Zeichne den Text auf das Canvas, um Pixel-Daten zu erhalten
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            ctx.font = 'bold 150px Arial';
            ctx.textBaseline = 'top';

            // Zentriere den Text
            const textMetrics = ctx.measureText(text);
            const textWidth = textMetrics.width;
            const x = (canvas.width - textWidth) / 2;
            const y = (canvas.height - 150) / 2;

            ctx.fillText(text, x, y);

            // Extrahiere Pixel-Daten
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;

            // Sammle Positionen der weißen Pixel
            const pixels = [];
            for (let i = 0; i < data.length; i += 4) {
                const alpha = data[i + 3];
                const red = data[i];
                const green = data[i + 1];
                const blue = data[i + 2];
                if (alpha > 128 && red > 200 && green > 200 && blue > 200) {
                    const index = i / 4;
                    const px = index % canvas.width;
                    const py = Math.floor(index / canvas.width);
                    pixels.push({x: px, y: py});
                }
            }

            // Bestimme Punkte pro Zeichen
            const chars = text.length;
            if (chars === 0) return; // Verhindere Division durch Null
            const pointsPerChar = Math.floor(pointCount / chars);

            // Zeichne die Punkte auf das Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';

            let currentX = x;
            for (let c = 0; c < chars; c++) {
                const char = text[c];
                const charWidth = ctx.measureText(char).width;
                const charPixels = pixels.filter(p => p.x >= currentX && p.x < currentX + charWidth);
                if (charPixels.length === 0) continue;

                // Zufällige Auswahl der Punkte
                for (let i = charPixels.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [charPixels[i], charPixels[j]] = [charPixels[j], charPixels[i]];
                }

                const selectedPoints = charPixels.slice(0, pointsPerChar);
                selectedPoints.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, pointSize, 0, Math.PI * 2);
                    ctx.fill();
                });

                currentX += charWidth;
            }
        }

        // Initiale Darstellung
        renderPoints();

        // Event Listener für Eingabefelder
        textInput.addEventListener('input', renderPoints);
        pointCountInput.addEventListener('input', renderPoints);
        pointSizeInput.addEventListener('input', renderPoints);

        // Event Listener für den Kopier-Button
        copyButton.addEventListener('click', () => {
            hiddenTextArea.select();
            document.execCommand('copy');
            alert('Text kopiert!');
        });
    </script>
</body>
</html>
