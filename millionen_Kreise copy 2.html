<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konzentrische Kreise mit Zoom</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            display: block;
        }
        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
            display: none;
        }
        #downloadButton {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px;
            background-color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="circleCanvas"></canvas>
    <div id="tooltip"></div>
    <button id="downloadButton">Bild herunterladen</button>
    <script>
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const downloadButton = document.getElementById('downloadButton');
        let circles = [];
        let zoomLevel = 1;
        let offsetX = 0;
        let offsetY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawCircles();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawCircles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circles = [];
            let initialRadius = 1;
            let spacingFactor = 1.01;
            let lineWidth = 0.6;
            let numberOfCircles = 100000;

            ctx.strokeStyle = 'white';
            ctx.lineWidth = lineWidth;

            let radius = initialRadius;
            for (let i = 0; i < numberOfCircles; i++) {
                if ((radius * zoomLevel) > (Math.sqrt(Math.pow(canvas.width, 2) + Math.pow(canvas.height, 2)) / 2 + Math.max(Math.abs(offsetX), Math.abs(offsetY)))) {
                    break;
                }
                ctx.beginPath();
                ctx.arc(canvas.width / 2 + offsetX, canvas.height / 2 + offsetY, radius * zoomLevel, 0, Math.PI * 2);
                ctx.stroke();
                circles.push({ radius: radius, index: i + 1 });
                radius *= spacingFactor;
            }
        }

        let hoverTimeout;
        canvas.addEventListener('mousemove', (event) => {
            clearTimeout(hoverTimeout);
            tooltip.style.display = 'none';

            const mouseX = (event.clientX - offsetX - canvas.width / 2) / zoomLevel;
            const mouseY = (event.clientY - offsetY - canvas.height / 2) / zoomLevel;
            const distance = Math.sqrt(Math.pow(mouseX, 2) + Math.pow(mouseY, 2));

            for (let i = 0; i < circles.length; i++) {
                if (Math.abs(distance - circles[i].radius) < 5 / zoomLevel) {
                    hoverTimeout = setTimeout(() => {
                        tooltip.style.left = `${event.clientX + 10}px`;
                        tooltip.style.top = `${event.clientY + 10}px`;
                        tooltip.innerText = `Kreis Nummer: ${circles[i].index}`;
                        tooltip.style.display = 'block';
                    }, 1000);
                    break;
                }
            }
        });

        canvas.addEventListener('mouseout', () => {
            clearTimeout(hoverTimeout);
            tooltip.style.display = 'none';
        });

        canvas.addEventListener('wheel', (event) => {
            event.preventDefault();
            const zoomFactor = 1.05;
            if (event.deltaY < 0) {
                zoomLevel *= zoomFactor;
            } else {
                zoomLevel /= zoomFactor;
            }
            drawCircles();
        });

        canvas.addEventListener('mousedown', (event) => {
            let startX = event.clientX;
            let startY = event.clientY;
            const startOffsetX = offsetX;
            const startOffsetY = offsetY;

            function onMouseMove(e) {
                offsetX = startOffsetX + (e.clientX - startX);
                offsetY = startOffsetY + (e.clientY - startY);
                drawCircles();
            }

            function onMouseUp() {
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            }

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });

        downloadButton.addEventListener('click', () => {
            const width = prompt('Geben Sie die Breite des Bildes in Pixel ein:', window.innerWidth);
            const height = prompt('Geben Sie die Höhe des Bildes in Pixel ein:', window.innerHeight);

            if (width && height) {
                const downloadCanvas = document.createElement('canvas');
                downloadCanvas.width = width;
                downloadCanvas.height = height;
                const downloadCtx = downloadCanvas.getContext('2d');

                downloadCtx.fillStyle = 'black';
                downloadCtx.fillRect(0, 0, width, height);
                downloadCtx.strokeStyle = 'white';
                downloadCtx.lineWidth = 0.6 * (width / canvas.width);

                let radius = 1;
                let spacingFactor = 1.01;
                while (radius * zoomLevel < Math.sqrt(Math.pow(width, 2) + Math.pow(height, 2)) / 2) {
                    downloadCtx.beginPath();
                    downloadCtx.arc(width / 2 + offsetX * (width / canvas.width), height / 2 + offsetY * (height / canvas.height), radius * zoomLevel * (width / canvas.width), 0, Math.PI * 2);
                    downloadCtx.stroke();
                    radius *= spacingFactor;
                }

                const link = document.createElement('a');
                link.href = downloadCanvas.toDataURL('image/png');
                link.download = 'konzentrische_kreise.png';
                link.click();
            }
        });
    </script>
</body>
</html>
