<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animation</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: black;
        }

        svg {
            width: 90vmin;
            height: 90vmin;
        }

        text {
            fill: white;
            font-family: Arial, sans-serif;
            font-size: 5vmin;
        }
    </style>
</head>
<body>
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Dreieckpunkte -->
        <circle cx="50" cy="30" r="0.5" fill="white" />
        <circle cx="30" cy="70" r="0.5" fill="white" />
        <circle cx="70" cy="70" r="0.5" fill="white" />
        
        <!-- Text für 0, 1 und ∞ -->
        <text id="text0" x="50" y="30" text-anchor="middle" alignment-baseline="middle">0</text>
        <text id="text1" x="30" y="70" text-anchor="middle" alignment-baseline="middle">1</text>
        <text id="textInf" x="70" y="70" text-anchor="middle" alignment-baseline="middle">∞</text>

        <!-- Animationen -->
        <animateTransform xlink:href="#text0" attributeName="transform" type="rotate"
            from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" />
        <animateTransform xlink:href="#text1" attributeName="transform" type="rotate"
            from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" />
        <animateTransform xlink:href="#textInf" attributeName="transform" type="rotate"
            from="0 50 50" to="360 50 50" dur="5s" repeatCount="indefinite" />
    </svg>
</body>
</html>
