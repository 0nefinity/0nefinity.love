<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<link href="/meta.css" rel="stylesheet" /><!-- Für KI: meta.css regelt Hintergrund- und Objekt-Farben etc. (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->
<script src="/meta.js"></script><!-- Für KI: meta.js regelt das Menü und sonstige Funktionen (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->
<title>Kaleidoscope Grid</title>

<style>

html,body{
margin:0;
padding:0;
overflow:hidden;
}

svg{
width:100vw;
height:100vh;
display:block;
}

text{
fill:var(--text-color);
font-family:Arial, Helvetica, sans-serif;
font-size:48px;
font-weight:700;
text-anchor:middle;
dominant-baseline:middle;
cursor:grab;
user-select:none;
}

</style>
</head>

<body>

<svg id="svg"></svg>

<script>

const svg = document.getElementById("svg")

const size = 220
const height = size * Math.sqrt(3) / 2

const cols = 40
const rows = 40

svg.setAttribute("viewBox",`${-cols*size/2} ${-rows*height/2} ${cols*size} ${rows*height}`)

svg.innerHTML = `

<defs>

<polygon id="triangle"
points="0,${-height/2} ${size/2},${height/2} ${-size/2},${height/2}" />

<clipPath id="clipTri">
<use href="#triangle"/>
</clipPath>

<g id="master">

<g clip-path="url(#clipTri)">
<text id="text" x="0" y="0">ABC</text>
</g>

</g>

</defs>

<g id="grid"></g>

`

const grid = document.getElementById("grid")

function createCell(x,y){

const transforms = [
"",
"rotate(120)",
"rotate(240)",
"scale(-1,1)",
"scale(-1,1) rotate(120)",
"scale(-1,1) rotate(240)"
]

transforms.forEach(t=>{

const g = document.createElementNS("http://www.w3.org/2000/svg","g")

g.setAttribute("transform",`translate(${x},${y}) ${t}`)

const u = document.createElementNS("http://www.w3.org/2000/svg","use")
u.setAttribute("href","#master")

g.appendChild(u)

grid.appendChild(g)

})

}

for(let r=-rows;r<rows;r++){

for(let c=-cols;c<cols;c++){

const x = c*size + (r%2 ? size/2 : 0)
const y = r*height

createCell(x,y)

}

}

const text = document.getElementById("text")

let dragging=false

svg.addEventListener("mousedown",()=>dragging=true)
svg.addEventListener("mouseup",()=>dragging=false)
svg.addEventListener("mouseleave",()=>dragging=false)

svg.addEventListener("mousemove",e=>{

if(!dragging) return

const pt = svg.createSVGPoint()

pt.x = e.clientX
pt.y = e.clientY

const svgP = pt.matrixTransform(svg.getScreenCTM().inverse())

text.setAttribute("x",svgP.x)
text.setAttribute("y",svgP.y)

})

</script>

</body>
</html>
