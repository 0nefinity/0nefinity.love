<html lang="de">
<head>
    <meta charset="UTF-8">

    <link href="/meta.css" rel="stylesheet" /><!-- meta.css regelt Hintergrund- und Objekt-Farben etc. (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

	        /* Settings Panel - oben */
	        .settings {
	            position: fixed;
	            top: 4.375rem;
	            left: 50%;
	            transform: translateX(-50%);
	            padding: 0.75rem 1rem;
	            background: rgba(0, 0, 0, 0.85);
	            border-radius: 12px;
	            backdrop-filter: blur(10px);
	            z-index: 100;
	            font-size: 14px;
	            color: var(--text-color, white);
	            display: flex;
	            flex-direction: column;
	        }

	        .settings-body {
	            overflow-y: auto; /* nur der Inhalt scrollt, Header bleibt statisch */
	        }

        .settings.dragging {
            opacity: 0.9;
        }

        /* Drag-Handle Bereich oben */
        .settings-header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            cursor: grab;
        }

        .settings-header:active {
            cursor: grabbing;
        }

        .drag-indicator {
            width: 40px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
        }

        .settings .row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            min-height: 32px;
        }

        .settings .row:last-child {
            margin-bottom: 0;
        }

	        .settings .value-display {
	            font-variant-numeric: tabular-nums;
	            font-size: 13px;
	            opacity: 0.9;
	            margin-left: auto;
	        }

        .settings label {
            flex: 0 0 60px;
            font-size: 13px;
            opacity: 0.8;
        }

        .settings select {
            flex: 1;
            height: 32px;
            background: var(--bg-color, #111);
            color: var(--text-color, white);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            padding: 0 0.5rem;
            font-size: 13px;
            cursor: pointer;
        }

        .settings .stepper-container {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .settings .value-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: var(--text-color, white);
            font-size: 14px;
            font-variant-numeric: tabular-nums;
            text-align: right;
            width: 4em;
            padding: 0.2em 0.1em;
            outline: none;
        }

        .settings .value-input:focus {
            border-bottom-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.05);
        }

        .settings .stepper-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-color, white);
            font-size: 1.3rem;
            font-weight: 300;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.7;
            transition: opacity 0.15s ease, transform 0.1s ease;
            user-select: none;
        }

        .settings .stepper-btn:hover {
            opacity: 1;
        }

        .settings .stepper-btn:active {
            transform: scale(0.85);
        }

        .settings input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .settings input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--text-color, white);
            border-radius: 50%;
            cursor: pointer;
        }

        .settings .slider-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Slider-Bereich */
        .sliders-area {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 4rem;
            align-items: center;
        }

        /* Toggle Button */
        .toggle-btn {
            padding: 0.3rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: var(--text-color, white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .toggle-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: rgba(255,255,255,0.6);
        }

	        /* Slider Container */
	        .slider-container {
	            position: relative;
	            width: min(600px, 90vw);
	            display: flex;
	            align-items: center;
	            justify-content: center;
		            cursor: pointer;
		            z-index: 1; /* vor der Fullscreen-Schlange */
		        }

	        /* Schlange als Fullscreen-Overlay hinter allen anderen Objekten */
	        .slider-value-display {
	            position: fixed;
	            inset: 0;               /* top:0; right:0; bottom:0; left:0; */
	            margin: 0;
	            width: 100vw;
	            height: 100vh;
	            display: flex;
	            justify-content: center;
		            align-items: center;
	            font-size: 1.6rem;
	            font-variant-numeric: tabular-nums;
	            color: var(--text-color, white);
	            pointer-events: none;   /* UI bleibt klickbar, Schlange reagiert über globale Events */
	            overflow: visible;
	            z-index: 0;             /* hinter Settings (z-index:100) und Slider, vor Hintergrund */
	        }

	        .slider-value-display-inner {
	            position: relative;
	            width: 100%;
	            height: 100%;
	        }

	        .slider-value-display-inner span {
	            position: absolute;
		            transform-origin: 50% 50%;
	            white-space: nowrap;
	        }

	        /* Mobile Layout: Settings wie bei shadows als Bottom-Sheet */
	        @media (max-width: 768px) {
	            .settings {
	                top: auto;
	                bottom: 0;
	                left: 0;
	                right: 0;
	                transform: none;
	                max-width: 100%;
	                width: 100%;
	                border-radius: 20px 20px 0 0;
	                padding: 0;
	                max-height: 50vh;
	                font-size: 14px;
	            }

	            .settings-header {
	                display: flex;
	                justify-content: center;
	                align-items: center;
	                padding: 12px;
	                cursor: grab;
	                touch-action: none;
	                border-bottom: 1px solid rgba(255, 255, 255, 0.15);
	                margin-bottom: 0;
	            }

	            .settings-body {
	                max-height: calc(50vh - 56px);
	                overflow-y: auto;
	                overflow-x: hidden;
	                padding: 0 1rem 1.5rem;
	                -webkit-overflow-scrolling: touch;
	            }

	            .sliders-area {
	                position: fixed;
	                top: 50%;
	                left: 50%;
	                transform: translate(-50%, -55%);
	                padding: 0 1rem;
	            }
	        }

        /* Track (Outline) - jetzt als Bild */
        .track-outline {
            position: absolute;
            pointer-events: none;
            /* Bild wird per JS gesetzt */
            background-size: 100% 100%;
            background-repeat: no-repeat;
            /* Zentrierung: left/top zeigt auf Container-Mitte, transform verschiebt um halbe Eigengröße */
            transform-origin: center center;
            /* Smooth scaling für beste Qualität */
            image-rendering: auto;
            -webkit-font-smoothing: antialiased;
        }

        /* Track (gefüllt, wird geclippt) - jetzt als Bild */
        .track-fill {
            position: absolute;
            pointer-events: none;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            transform-origin: center center;
            clip-path: inset(0 50% 0 0);
            image-rendering: auto;
        }

        /* Thumb - jetzt als Bild */
        .thumb {
            position: absolute;
	            cursor: pointer;
            user-select: none;
            background-size: 100% 100%;
            background-repeat: no-repeat;
            /* Zentrierung: left/top ist das Zentrum, transform verschiebt */
            transform: translate(-50%, -50%);
            image-rendering: auto;
            touch-action: none; /* Wichtig für Touch-Drag */
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        .thumb:hover {
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.4));
        }

	        .thumb:active,
	        .thumb.dragging {
	            cursor: pointer;
	            filter: drop-shadow(0 0 30px rgba(255,255,255,0.6));
	        }

        /* Debug-Elemente (standardmäßig versteckt) */
        .debug-line, .debug-crosshair {
            display: none;
            position: absolute;
            pointer-events: none;
            z-index: 1000;
        }

        .debug-mode .debug-line,
        .debug-mode .debug-crosshair {
            display: block;
        }

        .debug-line {
            background: rgba(255, 0, 0, 0.7);
            transform-origin: center center;
        }

        /* Fadenkreuz */
        .debug-crosshair {
            width: 40px;
            height: 40px;
            z-index: 1001;
        }
        .debug-crosshair {
            --line-width: 2px;
        }
        .debug-crosshair::before,
        .debug-crosshair::after {
            content: '';
            position: absolute;
            background: currentColor;
        }
        .debug-crosshair::before {
            width: 100%;
            height: var(--line-width);
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }
        .debug-crosshair::after {
            width: var(--line-width);
            height: 100%;
            left: 50%;
            top: 0;
            transform: translateX(-50%);
        }

        .debug-crosshair.track-center {
            color: rgba(0, 255, 0, 0.8);
        }
        .debug-crosshair.thumb-center {
            color: rgba(0, 150, 255, 0.8);
        }
	        .debug-crosshair.fill-origin {
	            color: rgba(255, 0, 200, 0.9);
	        }

        /* Debug-Anzeige */
        .debug {
            position: fixed;
            bottom: 1rem;
            left: 50%;
            transform: translateX(-50%);
            font-family: monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>

	    <script>
        // === PARAMS CONFIG (wie in shadows.html) ===
		        const PARAMS_CONFIG = {
			 size:           { id: 'sizeInput',           min: 16,  max: 3000, step: 4,   default: 150, decimals: 0 },
			 length:         { id: 'lengthInput',         min: 1,   max: 20,  step: 1,   default: 5,   decimals: 0 },
				// Rotation 0° soll optisch eine "normale" aufrechte Glyphe bedeuten
				// Wir starten im 90°-Slide-Modus, daher Default = 90°
				rotation:       { id: 'rotationInput',       min: 0,   max: 360, step: 5,   default: 90,  decimals: 0 },
			 debugLineWidth: { id: 'debugLineWidthInput', min: 0.5, max: 10,  step: 0.5, default: 2,   decimals: 1 },
			 // Auflösung der 0..1-Anzeige: wie viele Schritte/Zwischenstufen (≈ max. Anzahl x)
			 resolutionSteps: { id: 'resolutionStepsInput', min: 0, max: 100000, step: 1, default: 9, decimals: 0 }
		        };

        // Aktuelle Parameter-Werte
        const params = {};
        Object.keys(PARAMS_CONFIG).forEach(key => {
            params[key] = PARAMS_CONFIG[key].default;
        });

		        // Toggle: wechselt zwischen Breiten- und Längen-Modus
		        // false = Breite (Rotation 0°)
		        // true  = Länge  (Rotation 90°)
		        // Standardmäßig im 90°-Slide (Längen-Modus) starten

        // DOM Elemente
        const fontSelect = document.getElementById('fontSelect');
        const trackCharInput = document.getElementById('trackCharInput');
        const thumbCharInput = document.getElementById('thumbCharInput');
        const verticalToggle = document.getElementById('verticalToggle');
        const debugToggle = document.getElementById('debugToggle');
        const debug = document.getElementById('debug');
	        	const slider1ValueDisplay = document.getElementById('slider1ValueDisplay');
	        	const xValueInput = document.getElementById('xValueInput');

        let isDebugMode = false;

	        // Slider
	        const slider1 = {
	            container: document.getElementById('slider1'),
	            trackOutline: document.getElementById('track1Outline'),
	            trackFill: document.getElementById('track1Fill'),
	            thumb: document.getElementById('thumb1'),
	            debugLine: document.getElementById('debugLine1'),
	            trackCenterCross: document.getElementById('trackCenter1'),
	            thumbCenterCross: document.getElementById('thumbCenter1'),
		            fillOriginCross: document.getElementById('fillOrigin1'),
	            trackChar: '1',
	            thumbChar: '0',
	            // Wertebereich 0..1 mit 3 Nachkommastellen (wie HTML-Range, aber fein)
	            min: 0,
	            max: 1,

	            currentValue: 0.5, // normalisiert [0,1], passend zu value
	            bounds: null,
	            isDragging: false,

	            dragStartNorm: 0.5
	        };

        const sliders = [slider1];

	        // Globaler Pointer-Zustand f␀fcr die Schlange (Maus + Touch)
	        const snakePointer = {
	            active: false,
	            x: 0,
	            y: 0
	        };

		    // === ORIENTIERUNGSHILFEN (aus Rotation abgeleitet) ===
		    function getOrientation(rotationDeg) {
		        if (typeof rotationDeg !== 'number' || !isFinite(rotationDeg)) return 'horizontal';
		        const r = ((rotationDeg % 360) + 360) % 360; // 0..360
		        const distTo90 = Math.min(Math.abs(r - 90), Math.abs(r - 270));
		        const distTo0  = Math.min(Math.abs(r), Math.abs(r - 180));
		        return distTo90 > distTo0 ? 'horizontal' : 'vertical';
		    }

		    function isVerticalMode() {
		        return getOrientation(params.rotation) === 'vertical';
		    }

		    function updateVerticalToggleUI() {
		        if (!verticalToggle) return;
		        const vertical = isVerticalMode();
		        verticalToggle.textContent = vertical ? 'An' : 'Aus';
		        verticalToggle.classList.toggle('active', vertical);
		        verticalToggle.setAttribute('aria-pressed', vertical ? 'true' : 'false');
		    }

		    // === ERZEUGE NORMALISIERTES GLYPH-BILD (HiDPI, optional gestreckt) ===
		    // Rendert Text DIREKT mit moderater Skalierung, damit die Canvas-Größe nicht explodiert
		    function createGlyphImage(text, fontFamily, fontSize, color = 'white', strokeOnly = false, stretchY = 1) {
		        // Moderate HiDPI-Skalierung (max. 2x) für Schärfe ohne riesige Canvas
		        const dpr = window.devicePixelRatio || 1;
		        const scale = Math.min(2, Math.max(1, dpr));
		        const scaledFontSize = fontSize * scale;
		
		        // Canvas-Größe: proportional zur Fontgröße und Streckung, aber kompakt
		        const canvas = document.createElement('canvas');
		        const safeStretch = Math.max(1, stretchY);
		        const padding = Math.ceil(scaledFontSize * 0.5);
		        const textLen = text && text.length ? text.length : 1;
		        const canvasWidth = Math.ceil(scaledFontSize * textLen) + padding * 2;
		        const canvasHeight = Math.ceil(scaledFontSize * safeStretch) + padding * 2;
            canvas.width = canvasWidth;
            canvas.height = canvasHeight;
            const ctx = canvas.getContext('2d');

            // Text DIREKT mit Skalierung rendern (nicht nachträglich strecken!)
            ctx.save();
            ctx.translate(padding, padding);
            ctx.scale(1, stretchY); // Vertikale Streckung VOR dem Zeichnen

            ctx.font = `${scaledFontSize}px ${fontFamily}`;
            ctx.textBaseline = 'top';
            ctx.textAlign = 'left';

            if (strokeOnly) {
                ctx.strokeStyle = color;
                ctx.lineWidth = scale;
                ctx.strokeText(text, 0, 0);
            } else {
                ctx.fillStyle = color;
                ctx.fillText(text, 0, 0);
            }
            ctx.restore();

            // Pixel scannen um Grenzen zu finden
            const imageData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
            const data = imageData.data;

            let minX = canvasWidth, maxX = 0, minY = canvasHeight, maxY = 0;

            for (let y = 0; y < canvasHeight; y++) {
                for (let x = 0; x < canvasWidth; x++) {
                    if (data[(y * canvasWidth + x) * 4 + 3] > 0) {
                        minX = Math.min(minX, x);
                        maxX = Math.max(maxX, x);
                        minY = Math.min(minY, y);
                        maxY = Math.max(maxY, y);
                    }
                }
            }

            // Falls keine Pixel gefunden (leerer Text)
            if (minX > maxX || minY > maxY) {
                return { dataUrl: '', width: 0, height: 0, scale };
            }

            // Gecropte Größe (bereits gestreckt!)
            const cropWidth = maxX - minX + 1;
            const cropHeight = maxY - minY + 1;

            const croppedCanvas = document.createElement('canvas');
            croppedCanvas.width = cropWidth;
            croppedCanvas.height = cropHeight;
            const croppedCtx = croppedCanvas.getContext('2d');

            // Einfach kopieren - keine Streckung mehr nötig
            croppedCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

            return {
                dataUrl: croppedCanvas.toDataURL('image/png'),
                // CSS-Größe = Canvas-Größe / scale
                width: cropWidth / scale,
                height: cropHeight / scale,
                scale
            };
        }

	        // === WERT-HELPER (HTML-Range-ähnliches Modell: min/max/step, value) ===
	        function getSliderRange(slider) {
	            let min = typeof slider.min === 'number' ? slider.min : 0;

			                // Abstand vom Track-Zentrum
			                const dx = px - slider.bounds.centerX;
			                const dy = py - slider.bounds.centerY;
			
			                // Auf die Slider-Achse (rote Linie) projizieren, egal wie rotiert
			                const rotRad = slider.bounds.slideRotation * Math.PI / 180;
			                const proj = dx * Math.cos(rotRad) + dy * Math.sin(rotRad);
				
			                const halfRange = slider.bounds.halfRange;
			                const fullRange = halfRange * 2;
			                if (fullRange <= 0) return;
				
			                // proj liefert eine Geo-Norm (0..1 entlang der Achse). Für den Benutzer
			                // soll 0 links und 1 rechts sein, daher invertieren wir auf userNorm.
			                let geoNorm = 0.5 + (proj / fullRange); // 0..1 entlang der Bahn
			                geoNorm = Math.max(0, Math.min(1, geoNorm));
			                const userNorm = 1 - geoNorm;
				
			                const newValue = normalizedToValue(slider, userNorm);
			                setSliderValue(slider, newValue, { fromUser: true });
			
			                // Direktes Drag-Verhalten wie beim nativen Slider:
			                // Wir starten jetzt einen Drag an genau dieser Position.
			                slider.isDragging = true;
			                slider.dragStartPos = { x: e.clientX, y: e.clientY };
			                slider.dragStartValue = newValue;
			                slider.dragStartNorm = slider.currentValue ?? userNorm;
			
			                e.preventDefault();
			            });

		            // Touch auf Bahn/Container: wie Maus-Klick plus anschließender Drag
		            slider.container.addEventListener('touchstart', (e) => {
		                const t = e.touches && e.touches[0];
		                if (!t) return;
		                if (t.target === slider.thumb) return;
		                if (!slider.bounds) return;
		
		                const rect = slider.container.getBoundingClientRect();
		                const px = t.clientX - rect.left;
		                const py = t.clientY - rect.top;
		
		                const dx = px - slider.bounds.centerX;
		                const dy = py - slider.bounds.centerY;
		                const rotRad = slider.bounds.slideRotation * Math.PI / 180;
		                const proj = dx * Math.cos(rotRad) + dy * Math.sin(rotRad);
		                const halfRange = slider.bounds.halfRange;
		                const fullRange = halfRange * 2;
		                if (fullRange <= 0) return;
		
		                let geoNorm = 0.5 + (proj / fullRange);
		                geoNorm = Math.max(0, Math.min(1, geoNorm));
		                const userNorm = 1 - geoNorm;
		                const newValue = normalizedToValue(slider, userNorm);
		                setSliderValue(slider, newValue, { fromUser: true });
		
		                slider.isDragging = true;
		                slider.dragStartPos = { x: t.clientX, y: t.clientY };
		                slider.dragStartValue = newValue;
		                slider.dragStartNorm = slider.currentValue ?? userNorm;
		
		                e.preventDefault();
		            }, { passive: false });
        });

        document.addEventListener('mousemove', (e) => {
            sliders.forEach(slider => {
                if (!slider.isDragging || !slider.dragStartPos) return;
                if (!slider.bounds) return;

                const dx = e.clientX - slider.dragStartPos.x;
                const dy = e.clientY - slider.dragStartPos.y;

                const slideRot = slider.bounds.slideRotation;
                const rotRad = slideRot * Math.PI / 180;
	
		                const movement = dx * Math.cos(rotRad) + dy * Math.sin(rotRad);
		                const fullRange = slider.bounds.halfRange * 2;
		                const deltaGeo = fullRange > 0 ? movement / fullRange : 0;
		
		                // dragStartNorm und currentValue speichern die Benutzer-Norm (0 = links, 1 = rechts).
		                // Die Geometrie-Norm l␀ufuht umgekehrt, daher ␀e4ndert sich User-Norm mit -deltaGeo.
		                const startUserNorm = typeof slider.dragStartNorm === 'number'
		                    ? slider.dragStartNorm
		                    : (slider.currentValue ?? 0.5);
		                const newUserNorm = startUserNorm - deltaGeo;
		                const newValue = normalizedToValue(slider, newUserNorm);
		
		                setSliderValue(slider, newValue, { fromUser: true });
            });
        });

	        // Touch-Move: gleiche Logik wie Mouse-Move, nur mit Touch-Koordinaten
	        document.addEventListener('touchmove', (e) => {
	            const t = e.touches && e.touches[0];
	            if (!t) return;
	            sliders.forEach(slider => {
	                if (!slider.isDragging || !slider.dragStartPos) return;
	                if (!slider.bounds) return;
	
	                const dx = t.clientX - slider.dragStartPos.x;
	                const dy = t.clientY - slider.dragStartPos.y;
	                const slideRot = slider.bounds.slideRotation;
	                const rotRad = slideRot * Math.PI / 180;
	                const movement = dx * Math.cos(rotRad) + dy * Math.sin(rotRad);
	                const fullRange = slider.bounds.halfRange * 2;
	                const deltaGeo = fullRange > 0 ? movement / fullRange : 0;
	
	                const startUserNorm = typeof slider.dragStartNorm === 'number'
	                    ? slider.dragStartNorm
	                    : (slider.currentValue ?? 0.5);
	                const newUserNorm = startUserNorm - deltaGeo;
	                const newValue = normalizedToValue(slider, newUserNorm);
	                setSliderValue(slider, newValue, { fromUser: true });
	            });
	            e.preventDefault();
	        }, { passive: false });

        document.addEventListener('mouseup', () => {
            sliders.forEach(slider => {
                slider.isDragging = false;
                slider.dragStartPos = null;
            });
        });

	        document.addEventListener('touchend', () => {
	            sliders.forEach(slider => {
	                slider.isDragging = false;
	                slider.dragStartPos = null;
	            });
	        });

	        document.addEventListener('touchcancel', () => {
	            sliders.forEach(slider => {
	                slider.isDragging = false;
	                slider.dragStartPos = null;
	            });
	        });

	        // === GLOBALE MAUS-/TOUCH-EINGABE FÜR DIE SCHLANGE ===
	        function updateSnakePointerFromEvent(clientX, clientY, active) {
	            if (!snakePointer) return;
	            snakePointer.active = active;
	            snakePointer.x = clientX;
	            snakePointer.y = clientY;
	            if (active) {
	                // Ein bisschen Energie in die Schlange pumpen, auch wenn der Slider stillsteht
	                slider1._energy = Math.min(1, (slider1._energy || 0) + 0.03);
	            }
	        }

	        // Maus-Ereignisse: bewegen und klicken lassen die Schlange reagieren
	        window.addEventListener('mousemove', (e) => {
	            updateSnakePointerFromEvent(e.clientX, e.clientY, true);
	        });

	        window.addEventListener('mousedown', (e) => {
	            updateSnakePointerFromEvent(e.clientX, e.clientY, true);
	        });

	        window.addEventListener('mouseup', () => {
	            if (!snakePointer) return;
	            snakePointer.active = false;
	        });

	        window.addEventListener('mouseleave', () => {
	            if (!snakePointer) return;
	            snakePointer.active = false;
	        });

	        // Touch-Ereignisse: volle Mobil-Unterstützung
	        window.addEventListener('touchstart', (e) => {
	            const t = e.touches && e.touches[0];
	            if (!t) return;
	            updateSnakePointerFromEvent(t.clientX, t.clientY, true);
	        }, { passive: true });

	        window.addEventListener('touchmove', (e) => {
	            const t = e.touches && e.touches[0];
	            if (!t) return;
	            updateSnakePointerFromEvent(t.clientX, t.clientY, true);
	        }, { passive: true });

	        window.addEventListener('touchend', () => {
	            if (!snakePointer) return;
	            snakePointer.active = false;
	        });

	        window.addEventListener('touchcancel', () => {
	            if (!snakePointer) return;
	            snakePointer.active = false;
	        });

        // === UPDATE STYLES ===
        function updateStyles() {
            sliders.forEach(slider => {
                // Rendere alle Slider-Elemente als Bilder
                renderSliderImages(slider);

                // Debug: Linienstärke
                const lineW = params.debugLineWidth;
                const crossSize = 20 + lineW * 2;

                // Debug: Track-Fadenkreuz positionieren (im Track-Zentrum)
                slider.trackCenterCross.style.width = crossSize + 'px';
                slider.trackCenterCross.style.height = crossSize + 'px';
                slider.trackCenterCross.style.left = (slider.bounds.centerX - crossSize / 2) + 'px';
                slider.trackCenterCross.style.top = (slider.bounds.centerY - crossSize / 2) + 'px';
                slider.trackCenterCross.style.setProperty('--line-width', lineW + 'px');

                // Debug: Thumb-Fadenkreuz Linienstärke
                slider.thumbCenterCross.style.width = crossSize + 'px';
                slider.thumbCenterCross.style.height = crossSize + 'px';
                slider.thumbCenterCross.style.setProperty('--line-width', lineW + 'px');

                // Debug-Linie aktualisieren - volle Track-Länge
                const slideRot = slider.bounds.slideRotation;
                const lineLength = slider.bounds.trackLength;
                slider.debugLine.style.width = lineLength + 'px';
                slider.debugLine.style.height = lineW + 'px';
                slider.debugLine.style.left = (slider.bounds.centerX - lineLength / 2) + 'px';
                slider.debugLine.style.top = (slider.bounds.centerY - lineW / 2) + 'px';
                slider.debugLine.style.transform = `rotate(${slideRot}deg)`;
            });
        }

        // Debug Toggle Event
        debugToggle.addEventListener('click', () => {
            isDebugMode = !isDebugMode;
            debugToggle.textContent = isDebugMode ? 'An' : 'Aus';
            debugToggle.classList.toggle('active', isDebugMode);
            sliders.forEach(slider => {
                slider.container.classList.toggle('debug-mode', isDebugMode);
            });
        });

		        // Toggle Event: zwischen Breite (0°) und Länge (90°) umschalten
		        verticalToggle.addEventListener('click', () => {
		            const currentlyVertical = isVerticalMode();
		            // Breite-Modus  -> Rotation = 0°
		            // Länge-Modus   -> Rotation = 90°
		            const newRotation = currentlyVertical ? 0 : 90;
		            params.rotation = newRotation;
		            const rotCfg = PARAMS_CONFIG.rotation;
		            const rotInput = document.getElementById(rotCfg.id);
		            if (rotInput) rotInput.value = newRotation;
		
		            updateStyles();
		            updateVerticalToggleUI();
		        });

	        // Init: Input-Felder mit Defaults füllen
	        Object.entries(PARAMS_CONFIG).forEach(([key, cfg]) => {
	            const el = document.getElementById(cfg.id);
		            if (el) el.value = params[key];
	        });
	
	        updateStyles();
		        updateVerticalToggleUI();
	        // Start der kontinuierlichen Anzeige-Animation für den Slider-Wert (0.xxxx mit Wobble)
	        requestAnimationFrame(animationLoop);

        // === DRAGGABLE SETTINGS PANEL (nur über Header) ===
	    const settingsPanel = document.getElementById('settingsPanel');
	    const dragHandle = document.querySelector('.settings-header');
	    const settingsBody = document.querySelector('.settings-body');
	    let isPanelDragging = false;
	    let panelDragStart = { x: 0, y: 0 };
	    let panelStartPos = { x: 0, y: 0 };

	    function updateSettingsBodyHeight() {
	        if (!settingsPanel || !settingsBody) return;
	        const rect = settingsPanel.getBoundingClientRect();
	        const headerHeight = (dragHandle && dragHandle.offsetHeight) || 40;
	        const availableHeight = window.innerHeight - rect.top - headerHeight - 8;
	        if (availableHeight > 0) {
	            settingsBody.style.maxHeight = availableHeight + 'px';
	        }
	    }

	    dragHandle.addEventListener('mousedown', (e) => {
	        isPanelDragging = true;
	        settingsPanel.classList.add('dragging');

	        const rect = settingsPanel.getBoundingClientRect();
	        panelDragStart = { x: e.clientX, y: e.clientY };
	        panelStartPos = { x: rect.left, y: rect.top };

	        // Transform entfernen für absolute Positionierung
	        settingsPanel.style.transform = 'none';
	        settingsPanel.style.left = rect.left + 'px';
	        settingsPanel.style.top = rect.top + 'px';

	        e.preventDefault();
	    });

	    document.addEventListener('mousemove', (e) => {
	        if (!isPanelDragging) return;

	        const dx = e.clientX - panelDragStart.x;
	        const dy = e.clientY - panelDragStart.y;
	        let newLeft = panelStartPos.x + dx;
	        let newTop = panelStartPos.y + dy;

	        // Begrenzen:
	        // - horizontal komplett im Viewport lassen
	        // - vertikal: Panel immer voll im Viewport halten,
	        //   Hhe dynamisch begrenzen und innen scrollen
	        const maxLeft = Math.max(0, window.innerWidth - settingsPanel.offsetWidth);
	        const minLeft = 0;
	        newLeft = Math.max(minLeft, Math.min(maxLeft, newLeft));

	        const minTop = 0; // nicht nach oben raus
	        const headerHeight = (dragHandle && dragHandle.offsetHeight) || 40;
	        const maxTop = Math.max(0, window.innerHeight - headerHeight - 8);
	        newTop = Math.max(minTop, Math.min(maxTop, newTop));

	        // Sichtbare H6he des scrollbaren Inhalts anpassen,
	        // damit der Inhalt scrollbar bleibt, wenn wenig Platz ist
	        const availableHeight = window.innerHeight - newTop - headerHeight - 8;
	        if (settingsBody && availableHeight > 0) {
	            settingsBody.style.maxHeight = availableHeight + 'px';
	        }

	        settingsPanel.style.left = newLeft + 'px';
	        settingsPanel.style.top = newTop + 'px';
	    });

	    // Initial & bei Resize: H␀0fhe des scrollbaren Bereichs anpassen
	    updateSettingsBodyHeight();
	    window.addEventListener('resize', updateSettingsBodyHeight);

	    document.addEventListener('mouseup', () => {
	        if (isPanelDragging) {
	            isPanelDragging = false;
	            settingsPanel.classList.remove('dragging');
	        }
	    });
    </script>
</body>
