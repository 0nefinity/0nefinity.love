<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="/meta.css" rel="stylesheet" /><!-- Für KI: meta.css regelt Hintergrund- und Objekt-Farben etc. (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->
  <script src="/meta.js"></script><!-- Für KI: meta.js regelt das Menü und sonstige Funktionen (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->

  <title>Sand Prototype</title>

  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; z-index: 1; image-rendering: pixelated; }
    .hint {
      position: fixed;
      left: 1rem;
      top: 1rem;
      z-index: 2;
      font: 12px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      opacity: 0.75;
      user-select: none;
      pointer-events: none;
      max-width: min(60ch, calc(100vw - 2rem));
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="hint">
    Click to stamp text as sand. Shift+Click = erase. UI panels block sand.
  </div>

  <script>
    // --- Canvas + grid simulation (CPU prototype) ---
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });
    ctx.imageSmoothingEnabled = false;

    const Material = { EMPTY: 0, SAND: 1, OBSTACLE: 2 };

	    let cellSize = 10;     // px per cell (bigger = visible glyphs, less CPU)
    let W = 0, H = 0;
    let grid = null;      // Uint8Array W*H
	    let viewW = 0, viewH = 0; // canvas pixel size

	    // Glyph sprite (draw each sand grain as a "0")
	    const glyphCanvas = document.createElement('canvas');
	    const glyphCtx = glyphCanvas.getContext('2d');
	    let glyphKey = '';

    // UI params
    let paused = false;
    let stampTextValue = '0';
	    let stampFontPx = 18; // in grid-cells (not screen pixels)
    let brushRadius = 6;  // in grid-cells

    // Offscreen for text rasterization
    const stampCanvas = document.createElement('canvas');
    const stampCtx = stampCanvas.getContext('2d');

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

	    function rebuildGlyphSprite(fgCss) {
	      // Re-render the "0" sprite whenever scale/theme changes.
	      glyphCanvas.width = Math.max(1, cellSize);
	      glyphCanvas.height = Math.max(1, cellSize);
	      glyphCtx.clearRect(0, 0, cellSize, cellSize);
	      glyphCtx.fillStyle = fgCss;
	      glyphCtx.textAlign = 'center';
	      glyphCtx.textBaseline = 'middle';
	      glyphCtx.font = `700 ${Math.max(8, Math.floor(cellSize * 1.05))}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
	      // Slight nudge to look visually centered across fonts
	      glyphCtx.fillText('0', cellSize * 0.5, cellSize * 0.52);
	    }

    function resize() {
      const ww = Math.max(1, window.innerWidth | 0);
      const hh = Math.max(1, window.innerHeight | 0);

	      // Canvas in screen pixels (so we can draw glyphs per cell)
	      viewW = ww;
	      viewH = hh;
	      canvas.width = viewW;
	      canvas.height = viewH;

	      W = Math.max(40, Math.floor(viewW / cellSize));
	      H = Math.max(40, Math.floor(viewH / cellSize));
      grid = new Uint8Array(W * H);

      // Floor boundary
      for (let x = 0; x < W; x++) grid[(H - 1) * W + x] = Material.OBSTACLE;
    }

    function isUiElement(el) {
      return !!(el && (el.closest('.menu') || el.closest('.ctrl-panel') || el.closest('.settings-panel') || el.closest('.settings-button') || el.closest('.back-button')));
    }

    function applyUiObstacles() {
      if (!grid) return;

      // Clear previous UI obstacles (keep floor)
      for (let i = 0; i < grid.length; i++) {
        if (grid[i] === Material.OBSTACLE) grid[i] = Material.EMPTY;
      }
      for (let x = 0; x < W; x++) grid[(H - 1) * W + x] = Material.OBSTACLE;

      const selectors = ['.menu', '.ctrl-panel', '.settings-panel', '.settings-button', '.back-button'];
      const els = selectors.flatMap(sel => Array.from(document.querySelectorAll(sel)));

      for (const el of els) {
        const r = el.getBoundingClientRect();
        if (r.width <= 0 || r.height <= 0) continue;

        const x0 = clamp(Math.floor(r.left / cellSize), 0, W - 1);
        const y0 = clamp(Math.floor(r.top / cellSize), 0, H - 1);
        const x1 = clamp(Math.ceil(r.right / cellSize), 0, W);
        const y1 = clamp(Math.ceil(r.bottom / cellSize), 0, H);

        for (let y = y0; y < y1; y++) {
          let idx = y * W + x0;
          for (let x = x0; x < x1; x++, idx++) {
            grid[idx] = Material.OBSTACLE;
          }
        }
      }
    }

    function stampCircle(gx, gy, radius, value) {
      const r2 = radius * radius;
      const x0 = clamp(gx - radius, 0, W - 1);
      const x1 = clamp(gx + radius, 0, W - 1);
      const y0 = clamp(gy - radius, 0, H - 2);
      const y1 = clamp(gy + radius, 0, H - 2);
      for (let y = y0; y <= y1; y++) {
        for (let x = x0; x <= x1; x++) {
          const dx = x - gx, dy = y - gy;
          if (dx * dx + dy * dy > r2) continue;
          const i = y * W + x;
          if (grid[i] === Material.OBSTACLE) continue;
          grid[i] = value;
        }
      }
    }

    function stampTextAt(text, gx, gy, fontPx) {
      const t = (text || '0').slice(0, 64);
      const pad = 6;
      const w = Math.ceil(fontPx * Math.max(1, t.length) * 0.7) + pad * 2;
      const h = Math.ceil(fontPx * 1.2) + pad * 2;

      stampCanvas.width = w;
      stampCanvas.height = h;
	      // IMPORTANT: keep background transparent, otherwise alpha is 255 everywhere
	      // and we'd stamp a filled rectangle.
	      stampCtx.clearRect(0, 0, w, h);
      stampCtx.font = `700 ${fontPx}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace`;
      stampCtx.textAlign = 'center';
      stampCtx.textBaseline = 'middle';
      stampCtx.fillStyle = 'white';
      stampCtx.fillText(t, w / 2, h / 2);

      const img = stampCtx.getImageData(0, 0, w, h).data;
      const ox = gx - (w >> 1);
      const oy = gy - (h >> 1);
      for (let py = 0; py < h; py++) {
        for (let px = 0; px < w; px++) {
          const a = img[(py * w + px) * 4 + 3];
          if (a < 10) continue;
          const x = ox + px;
          const y = oy + py;
          if (x < 0 || x >= W || y < 0 || y >= H - 1) continue;
          const i = y * W + x;
          if (grid[i] === Material.OBSTACLE) continue;
          grid[i] = Material.SAND;
        }
      }
    }

    let dirFlip = false;
    function stepSand() {
      // Update UI obstacle mask every frame (prototype: simple + robust)
      applyUiObstacles();

      const leftFirst = dirFlip;
      dirFlip = !dirFlip;

      for (let y = H - 2; y >= 0; y--) {
        if (leftFirst) {
          for (let x = 0; x < W; x++) updateCell(x, y);
        } else {
          for (let x = W - 1; x >= 0; x--) updateCell(x, y);
        }
      }
    }

    function updateCell(x, y) {
      const i = y * W + x;
      if (grid[i] !== Material.SAND) return;

      const below = i + W;
      if (grid[below] === Material.EMPTY) {
        grid[below] = Material.SAND;
        grid[i] = Material.EMPTY;
        return;
      }

      const rnd = (x * 73856093 ^ y * 19349663 ^ (performance.now() | 0)) & 1;
      const dxA = rnd ? -1 : 1;
      const dxB = -dxA;

      const xA = x + dxA;
      if (xA >= 0 && xA < W) {
        const ia = below + dxA;
        if (grid[ia] === Material.EMPTY) {
          grid[ia] = Material.SAND;
          grid[i] = Material.EMPTY;
          return;
        }
      }
      const xB = x + dxB;
      if (xB >= 0 && xB < W) {
        const ib = below + dxB;
        if (grid[ib] === Material.EMPTY) {
          grid[ib] = Material.SAND;
          grid[i] = Material.EMPTY;
          return;
        }
      }
    }

    function draw() {
	      const styles = getComputedStyle(document.body);
	      const bgCss = (styles.getPropertyValue('--bg-color') || '#000').trim();
	      const fgCss = (styles.getPropertyValue('--text-color') || '#fff').trim();
	      const key = `${cellSize}|${fgCss}`;
	      if (key !== glyphKey) {
	        glyphKey = key;
	        rebuildGlyphSprite(fgCss);
	      }

	      // Clear background
	      ctx.fillStyle = bgCss;
	      ctx.fillRect(0, 0, viewW, viewH);

	      // Draw each sand cell as a "0" glyph
	      for (let y = 0; y < H; y++) {
	        let idx = y * W;
	        const py = y * cellSize;
	        for (let x = 0; x < W; x++, idx++) {
	          if (grid[idx] !== Material.SAND) continue;
	          ctx.drawImage(glyphCanvas, x * cellSize, py);
	        }
	      }
    }

    function loop() {
      if (!paused) stepSand();
      draw();
      requestAnimationFrame(loop);
    }

    // --- Interaction ---
    let pointerDown = false;
    canvas.addEventListener('pointerdown', (e) => {
      const hovered = document.elementFromPoint(e.clientX, e.clientY);
      if (isUiElement(hovered)) return;
      pointerDown = true;
      canvas.setPointerCapture(e.pointerId);
      onPointer(e);
    });
    canvas.addEventListener('pointermove', (e) => {
      if (!pointerDown) return;
      onPointer(e);
    });
    canvas.addEventListener('pointerup', () => { pointerDown = false; });
    canvas.addEventListener('pointercancel', () => { pointerDown = false; });

    function onPointer(e) {
      const rect = canvas.getBoundingClientRect();
	      const gx = clamp(Math.floor((e.clientX - rect.left) / cellSize), 0, W - 1);
	      const gy = clamp(Math.floor((e.clientY - rect.top) / cellSize), 0, H - 2);
      if (e.shiftKey) {
        stampCircle(gx, gy, brushRadius, Material.EMPTY);
      } else {
        stampTextAt(stampTextValue, gx, gy, stampFontPx);
      }
    }

    // --- Controls panel ---
    const panel = (window.Controls && Controls.createPanel)
      ? Controls.createPanel({ position: 'left' })
      : null;

    if (panel) {
      panel.addToggle('pause', {
        label: 'Pause', value: paused,
        labelOn: 'An', labelOff: 'Aus',
        onChange: v => paused = v
      });
	      // controls.js exposes addText() (textarea)
	      panel.addText('text', {
        label: 'Text',
        value: stampTextValue,
        placeholder: 'z.B. 0 oder 018',
        onChange: v => stampTextValue = (v || '0').split('\n')[0]
      });
      panel.addStepper('font', {
        label: 'Font',
        min: 10, max: 90, step: 2, value: stampFontPx, decimals: 0,
        onChange: v => stampFontPx = v | 0
      });
      panel.addStepper('brush', {
        label: 'Brush',
        min: 2, max: 40, step: 1, value: brushRadius, decimals: 0,
        onChange: v => brushRadius = v | 0
      });
      panel.addStepper('cell', {
        label: 'Scale',
	        min: 6, max: 28, step: 1, value: cellSize, decimals: 0,
        onChange: v => { cellSize = v | 0; resize(); }
      });

      // Clear button (custom row, styled like ctrl-toggle)
      const row = document.createElement('div');
      row.className = 'ctrl-row';
      row.innerHTML = '<label class="ctrl-label">Reset</label><button class="ctrl-toggle">Clear</button>';
      row.querySelector('button').addEventListener('click', () => {
        grid.fill(Material.EMPTY);
        for (let x = 0; x < W; x++) grid[(H - 1) * W + x] = Material.OBSTACLE;
	        applyUiObstacles();
      });
      panel.bodyEl.appendChild(row);
    }

    // Init
    window.addEventListener('resize', resize);
    resize();
    loop();
  </script>
</body>
</html>
