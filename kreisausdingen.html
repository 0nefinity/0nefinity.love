    <script>
        // ============================================
        // PI CALCULATION MODULE (Chudnovsky Algorithm)
        // ============================================

        // Pi cache: Speichert berechnete Pi-Stellen
        let piCache = "3."; // Startet mit "3."
        let isCalculating = false;

        // Berechne Pi mit dem Chudnovsky-Algorithmus
        // Basierend auf: https://www.i4cy.com/pi/
        function calculatePi(digits) {
            if (typeof Decimal === 'undefined') {
                console.error('Decimal.js ist nicht geladen!');
                return null;
            }

            console.log(`Berechne Pi mit ${digits} Stellen...`);
            const startTime = performance.now();

            // Setze Präzision (mit Puffer)
            Decimal.set({ precision: digits + 10 });

            let pi = new Decimal(0);
            const digitsPerIteration = 14; // Chudnovsky konvergiert mit ~14 Stellen pro Iteration
            const iterations = Math.ceil(digits / digitsPerIteration) + 1;

            let C, Mk, Lk, Xk;

            for (let k = 0; k < iterations; k++) {
                // Mk = (6k)! / ((3k)! * (k!)^3)
                Mk = factorial(6 * k).div(factorial(3 * k).mul(factorial(k).pow(3)));

                // Lk = 545140134k + 13591409
                Lk = new Decimal(545140134).mul(k).add(13591409);

                // Xk = (-262537412640768000)^k
                Xk = new Decimal(-262537412640768000).pow(k);

                // Summiere: Mk * Lk / Xk
                pi = pi.add(Mk.mul(Lk).div(Xk));
            }

            // C = 426880 * sqrt(10005)
            C = new Decimal(426880).mul(new Decimal(10005).sqrt());

            // Pi = C / Summe
            pi = C.div(pi);

            const endTime = performance.now();
            const timeMs = (endTime - startTime).toFixed(2);
            console.log(`✓ Pi berechnet in ${timeMs}ms (${(timeMs / digits).toFixed(4)}ms pro Stelle)`);

            return pi.toFixed(digits);
        }

        // Hilfsfunktion: Fakultät (optimiert für große Zahlen)
        function factorial(n) {
            let result = new Decimal(1);
            for (let i = 2; i <= n; i++) {
                result = result.mul(i);
            }
            return result;
        }

        // Prüfe ob ein String mit Pi übereinstimmt
        function isPiPrefix(str) {
            if (!str || str.length === 0) return false;
            if (typeof Decimal === 'undefined') return false; // Decimal.js nicht geladen

            // Normalisiere: Ersetze Komma durch Punkt, entferne alle anderen Nicht-Ziffern
            let cleanStr = str.replace(/,/g, '.'); // Komma → Punkt
            cleanStr = cleanStr.replace(/[^0-9.]/g, ''); // Nur Ziffern und Punkt behalten

            // Stelle sicher, dass wir genug Pi-Stellen haben
            const neededLength = cleanStr.length;

            // Erweitere Cache falls nötig (KEIN while! Nur einmal versuchen)
            if (piCache.length < neededLength + 1 && !isCalculating) {
                const digitsNeeded = neededLength + 1000;
                isCalculating = true;
                const piString = calculatePi(digitsNeeded);
                if (piString) {
                    piCache = piString;
                } else {
                    isCalculating = false;
                    return false; // Berechnung fehlgeschlagen
                }
                isCalculating = false;
            }

            // Vergleiche
            return piCache.startsWith(cleanStr);
        }

        // Hole die nächste Pi-Ziffer nach einem gegebenen String
        function getNextPiDigit(currentStr) {
            if (!currentStr || currentStr.length === 0) {
                return '3'; // Starte mit '3'
            }

            if (typeof Decimal === 'undefined') return null; // Decimal.js nicht geladen

            // Prüfe ob aktueller String mit Pi übereinstimmt
            if (!isPiPrefix(currentStr)) {
                return null; // Kein Pi-Präfix
            }

            // Normalisiere für Index-Berechnung (Komma → Punkt)
            const normalizedStr = currentStr.replace(/,/g, '.');
            const nextIndex = normalizedStr.length;

            // Stelle sicher, dass wir genug Stellen haben (KEIN while! Nur einmal)
            if (piCache.length <= nextIndex && !isCalculating) {
                const digitsNeeded = nextIndex + 1000;
                isCalculating = true;
                const piString = calculatePi(digitsNeeded);
                if (piString) {
                    piCache = piString;
                } else {
                    isCalculating = false;
                    return null; // Berechnung fehlgeschlagen
                }
                isCalculating = false;
            }

            return nextIndex < piCache.length ? piCache[nextIndex] : null;
        }

        // ============================================
        // ORIGINAL CODE STARTS HERE
        // ============================================

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const countNumber = document.getElementById('countNumber');
        const countUp = document.getElementById('countUp');
        const countDown = document.getElementById('countDown');
        const radiusNumber = document.getElementById('radiusNumber');
        const radiusUp = document.getElementById('radiusUp');
        const radiusDown = document.getElementById('radiusDown');
        const characterInput = document.getElementById('character');
        const charAdd = document.getElementById('charAdd');
        const charRemove = document.getElementById('charRemove');

        // Zwei separate Systeme:
        // 1. radiusPercent: Nur Radius-Größe (über Buttons steuerbar)
        // 2. zoomFactor: Zoom für BEIDE Radius UND Schriftgröße (über Mausrad/Pinch)
        let radiusPercent = 80;  // Basis-Radius in Prozent
        let zoomFactor = 1.0;     // Zoom-Multiplikator

        // Basis-Schriftgröße und Innenabstand relativ zur kürzeren Seite des Canvas
        const baseFontFactor = 0.028;       // ~2.8% der kürzeren Seite
        const radiusMarginFactor = 0.05;    // ~5% Innenabstand vom Rand

        // Synchronisiere radiusPercent mit dem Input-Feld
        function syncRadiusToInput() {
            radiusNumber.value = Math.round(radiusPercent);
        }

        // Pan/Drag-Steuerung
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let panX = 0;
        let panY = 0;

        // Deklarativer Modus: Speichert aktuellen Modus und Parameter
        let currentMode = null; // { type: 'double', param: 4 } oder { type: 'ten', param: -2 } etc.

        // Input-History für Count-Sequenz-Erkennung
        let inputHistory = [];

        // Prüfe ob Count-Sequenz vorliegt (0 → löschen → 1 → löschen → 2)
        function isCountSequence() {
            const len = inputHistory.length;
            if (len < 5) return false;

            return (
                inputHistory[len - 5] === '0' &&
                inputHistory[len - 4] === '' &&
                inputHistory[len - 3] === '1' &&
                inputHistory[len - 2] === '' &&
                inputHistory[len - 1] === '2'
            );
        }

        // Parse Modus aus String (z.B. "double(4)" → { type: 'double', param: 4 })
        function parseModeString(str) {
            if (!str) return null;

            // double(4), ten(-2), count(5), etc.
            const match = str.match(/^(double|ten|count)\((-?\d+)\)$/);
            if (match) {
                return { type: match[1], param: parseInt(match[2]) };
            }

            // numbernumber(5), numberspacenumber(7)
            const matchNumber = str.match(/^(numbernumber|numberspacenumber)\((-?\d+)\)$/);
            if (matchNumber) {
                return { type: matchNumber[1], param: parseInt(matchNumber[2]) };
            }

            // random(7)
            const matchRandom = str.match(/^random\((\d+)\)$/);
            if (matchRandom) {
                return { type: 'random', param: parseInt(matchRandom[1]) };
            }

            // 018(3), 01(5)
            const match018 = str.match(/^(018|01)\((-?\d+)\)$/);
            if (match018) {
                return { type: match018[1], param: parseInt(match018[2]) };
            }

            // Binary pattern wie 011001010(3)
            const matchBinary = str.match(/^([01]+)\((-?\d+)\)$/);
            if (matchBinary && matchBinary[1].length > 2) {
                return { type: 'binary', param: parseInt(matchBinary[2]), pattern: matchBinary[1] };
            }

            // 00(2) oder 00(-3)
            const match00 = str.match(/^(00)\((-?\d+)\)$/);
            if (match00) {
                return { type: '00', param: parseInt(match00[2]) };
            }

            // 0(-3)
            const match0 = str.match(/^(0)\((-?\d+)\)$/);
            if (match0) {
                return { type: '0', param: parseInt(match0[2]) };
            }

            // 11(2) oder 11(-3)
            const match11 = str.match(/^(11)\((-?\d+)\)$/);
            if (match11) {
                return { type: '11', param: parseInt(match11[2]) };
            }

            // 1(5) oder 1(-3)
            const match1 = str.match(/^(1)\((-?\d+)\)$/);
            if (match1) {
                return { type: '1', param: parseInt(match1[2]) };
            }

            // infinite(8) oder infinite(∞)
            const matchInfinite = str.match(/^infinite\((.)\)$/);
            if (matchInfinite) {
                return { type: 'infinite', char: matchInfinite[1] };
            }

            return null;
        }

        // Berechne Display-String aus Modus
        function calculateDisplay(mode) {
            if (!mode) return '';

            switch (mode.type) {
                case 'double':
                    // double(4) = 2^4 = 16
                    if (typeof Decimal !== 'undefined') {
                        const result = Decimal.pow(2, mode.param);
                        if (result.isInteger()) {
                            return result.toFixed(0);
                        } else {
                            const decimalPlaces = Math.max(1, Math.abs(Math.min(0, result.e)) + 10);
                            const output = result.toFixed(decimalPlaces);
                            return output.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
                        }
                    } else {
                        return Math.pow(2, mode.param).toString();
                    }

                case 'ten':
                    // ten(3) = 10^3 = 1000
                    if (typeof Decimal !== 'undefined') {
                        const result = Decimal.pow(10, mode.param);
                        if (result.isInteger()) {
                            return result.toFixed(0);
                        } else {
                            const decimalPlaces = Math.max(1, Math.abs(Math.min(0, result.e)) + 10);
                            const output = result.toFixed(decimalPlaces);
                            return output.replace(/(\.\d*?)0+$/, '$1').replace(/\.$/, '');
                        }
                    } else {
                        return Math.pow(10, mode.param).toString();
                    }

                case '018':
                    // 018(3) = "018018018"
                    return '018'.repeat(Math.max(0, mode.param));

                case '00':
                    // 00(2) = "00000000" (2^2 * 2 = 8 Nullen)
                    // 00(-2) = "-0000" (2^2 = 4 Nullen mit Minus)
                    if (mode.param >= 0) {
                        const count = 2 * Math.pow(2, mode.param);
                        return '0'.repeat(count);
                    } else {
                        const count = 2 * Math.pow(2, Math.abs(mode.param));
                        return '-' + '0'.repeat(count);
                    }

                case '0':
                    // 0(0) = "" (leer)
                    // 0(3) = "000" (3 Nullen)
                    // 0(-3) = "-000" (3 Nullen mit Minus)
                    if (mode.param === 0) {
                        return '';
                    } else if (mode.param > 0) {
                        return '0'.repeat(mode.param);
                    } else {
                        return '-' + '0'.repeat(Math.abs(mode.param));
                    }

                case '11':
                    // 11(2) = "11111111" (2^2 * 2 = 8 Einsen)
                    // 11(-2) = "-1111" (2^2 = 4 Einsen mit Minus)
                    if (mode.param >= 0) {
                        const count = 2 * Math.pow(2, mode.param);
                        return '1'.repeat(count);
                    } else {
                        const count = 2 * Math.pow(2, Math.abs(mode.param));
                        return '-' + '1'.repeat(count);
                    }

                case '1':
                    // 1(0) = "" (leer)
                    // 1(5) = "11111" (5 Einsen)
                    // 1(-3) = "-111" (3 Einsen mit Minus)
                    if (mode.param === 0) {
                        return '';
                    } else if (mode.param > 0) {
                        return '1'.repeat(mode.param);
                    } else {
                        return '-' + '1'.repeat(Math.abs(mode.param));
                    }

                case 'count':
                    // count(3) = "3"
                    // count(-5) = "-5"
                    return mode.param.toString();

                case 'numbernumber':
                    // numbernumber(3) = "0123"
                    // numbernumber(0) = "0"
                    // numbernumber(-1) = "10-"
                    // numbernumber(-2) = "210-"
                    // numbernumber(-3) = "3210-"
                    if (mode.param >= 0) {
                        let result = '';
                        for (let i = 0; i <= mode.param; i++) {
                            result += i;
                        }
                        return result;
                    } else {
                        // Negativ: Von abs(param) bis 0 rückwärts, Minus rechts
                        const absParam = Math.abs(mode.param);
                        let result = '';
                        for (let i = absParam; i >= 0; i--) {
                            result += i;
                        }
                        return result + '-';
                    }

                case 'numberspacenumber':
                    // numberspacenumber(3) = "0 1 2 3"
                    // numberspacenumber(0) = "0"
                    // numberspacenumber(-1) = "-1 0"
                    // numberspacenumber(-3) = "-3 -2 -1 0"
                    if (mode.param >= 0) {
                        let result = [];
                        for (let i = 0; i <= mode.param; i++) {
                            result.push(i);
                        }
                        return result.join(' ');
                    } else {
                        // Negativ: Von -param bis 0, links anfügen
                        let result = [];
                        for (let i = Math.abs(mode.param); i >= 0; i--) {
                            result.push('-' + i);
                        }
                        return result.join(' ');
                    }

                case '01':
                    // 01 = Binär-Zähl-Modus
                    // 01(1) = "01" (binär 1)
                    // 01(2) = "10" (binär 2)
                    // 01(3) = "11" (binär 3)
                    // 01(4) = "100" (binär 4)
                    // 01(-1) = "-1" (binär -1)
                    // 01(-2) = "-10" (binär -2)
                    if (mode.param >= 0) {
                        return mode.param.toString(2);
                    } else {
                        return '-' + Math.abs(mode.param).toString(2);
                    }

                case 'binary':
                    // 011001010(3) = "011001010011001010011001010"
                    // 011001010(-2) = "-011001010011001010"
                    if (mode.param >= 0) {
                        return mode.pattern.repeat(mode.param);
                    } else {
                        return '-' + mode.pattern.repeat(Math.abs(mode.param));
                    }

                case 'random':
                    // random(7) = 7 zufällige ASCII-Zeichen
                    let result = '';
                    for (let i = 0; i < mode.param; i++) {
                        result += getRandomASCII();
                    }
                    return result;

                case 'infinite':
                    // infinite mit Zeichen '8' oder '∞'
                    // Gibt eine Platzhalter-Zeichenkette zurück (wird in draw() durch richtige Länge ersetzt)
                    // Nutze eine moderate Länge als Platzhalter (z.B. 100 Zeichen)
                    return (mode.char || '8').repeat(1000);

                default:
                    return '';
            }
        }

        // Erstelle URL-String aus Modus
        function modeToURLString(mode) {
            if (!mode) return '';
            if (mode.type === 'binary') {
                return `${mode.pattern}(${mode.param})`;
            }
            if (mode.type === 'infinite') {
                return `infinite(${mode.char})`;
            }
            return `${mode.type}(${mode.param})`;
        }

        // URL-Parameter auslesen
        const urlParams = new URLSearchParams(window.location.search);
        const anzahlParam = urlParams.get('anzahl');
        const zeichenParam = urlParams.get('zeichen');
        const radiusParam = urlParams.get('radius');
        const zoomParam = urlParams.get('zoom');
        const panXParam = urlParams.get('panX');
        const panYParam = urlParams.get('panY');

        // Wenn URL-Parameter vorhanden sind, setze die Werte
        if (anzahlParam !== null) {
            const anzahl = parseInt(anzahlParam);
            if (!isNaN(anzahl)) {
                countNumber.value = anzahl;
            }
        }
        if (zeichenParam !== null) {
            // Prüfe ob es pi(x) Format ist
            const piMatch = zeichenParam.match(/^pi\((\d+)\)$/);
            if (piMatch) {
                // Extrahiere Anzahl der Stellen
                const digits = parseInt(piMatch[1]);

                // Berechne Pi mit dieser Anzahl Stellen
                if (digits > 0 && typeof Decimal !== 'undefined') {
                    // Stelle sicher, dass wir genug Pi-Stellen haben
                    if (piCache.length < digits && !isCalculating) {
                        isCalculating = true;
                        console.log(`Lade Pi mit ${digits} Stellen aus URL...`);
                        const piString = calculatePi(digits + 100);
                        if (piString) {
                            piCache = piString;
                            console.log(`✓ Pi geladen: ${piCache.length - 2} Stellen verfügbar`);
                        } else {
                            console.error('❌ Pi-Berechnung fehlgeschlagen!');
                        }
                        isCalculating = false;
                    }

                    // Setze die ersten x Stellen von Pi
                    if (piCache.length >= digits) {
                        characterInput.value = piCache.substring(0, digits);
                    } else {
                        console.error(`❌ Nicht genug Pi-Stellen im Cache: ${piCache.length} < ${digits}`);
                        characterInput.value = piCache; // Setze was wir haben
                    }
                } else if (typeof Decimal === 'undefined') {
                    console.error('❌ Decimal.js ist nicht geladen!');
                    characterInput.value = '3.14159'; // Fallback
                }
            } else {
                // Prüfe ob es ein Modus-Format ist (double(4), ten(-2), etc.)
                const parsedMode = parseModeString(zeichenParam);
                if (parsedMode) {
                    currentMode = parsedMode;
                    characterInput.value = calculateDisplay(currentMode);
                } else {
                    // Normaler String
                    characterInput.value = zeichenParam;
                }
            }
        }
        if (radiusParam !== null) {
            const radius = parseFloat(radiusParam);
            if (!isNaN(radius)) {
                radiusPercent = radius;
                syncRadiusToInput();
            }
        }
        if (zoomParam !== null) {
            const zoom = parseFloat(zoomParam);
            if (!isNaN(zoom)) {
                // Clamp Zoomfaktor aus der URL auf denselben Bereich wie im Wheel/Pinch-Handler
                zoomFactor = Math.max(0.001, Math.min(100, zoom));
            }
        }
        if (panXParam !== null) {
            const px = parseFloat(panXParam);
            if (!isNaN(px)) {
                panX = px;
            }
        }
        if (panYParam !== null) {
            const py = parseFloat(panYParam);
            if (!isNaN(py)) {
                panY = py;
            }
        }

        // Canvas Größe an Bildschirm anpassen
        function resizeCanvas() {
            // Nutze die tatsächliche Größe des Canvas-Elements (wichtig für Firefox Mobile)
            const rect = canvas.getBoundingClientRect();

            // Setze Canvas-Pixel-Größe auf die tatsächliche Display-Größe
            canvas.width = rect.width;
            canvas.height = rect.height;

            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100);
        });
        resizeCanvas();

        function draw() {
            let count = parseInt(countNumber.value) || 0;
            let character = characterInput.value || " "; // Standard ist ein Leerzeichen

            // Kürzere Seite des Canvas als Basis für alle Proportionen
            const shorterSide = Math.min(canvas.width, canvas.height);

            // Mittelpunkt berechnen (mit Pan-Offset)
            const centerX = canvas.width / 2 + panX;
            const centerY = canvas.height / 2 + panY;
            const maxRadius = shorterSide / 2 - shorterSide * radiusMarginFactor;

            // Logischer Radius: abhängig nur von radiusPercent (Zoom kommt über scale)
            const radius = maxRadius * (radiusPercent / 100);

            // Canvas löschen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Schriftgröße relativ zur kürzeren Seite (Zoom wirkt zusätzlich über Canvas-Skalierung)
            const fontSize = shorterSide * baseFontFactor;

            // Zeichen
            ctx.font = `${fontSize}px Arial`;
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            // Infinite-Modus: Cache für die "unendliche" Zeichenkette
            // Der Text muss nur neu berechnet werden, wenn sich Zoom, Canvasgröße
            // oder das verwendete Zeichen geändert haben.
            if (!window._infiniteCache) {
                window._infiniteCache = {
                    char: null,
                    zoom: null,
                    width: 0,
                    height: 0,
                    centerX: 0,
                    centerY: 0,
                    radius: 0,
                    text: ''
                };
            }

            function getInfiniteText() {
                const ch = (currentMode && currentMode.char) ? currentMode.char : '8';

                // Wenn sich nichts Relevantes geändert hat, benutze den Cache
                if (
                    window._infiniteCache.char === ch &&
                    window._infiniteCache.zoom === zoomFactor &&
                    window._infiniteCache.width === canvas.width &&
                    window._infiniteCache.height === canvas.height &&
                    window._infiniteCache.centerX === centerX &&
                    window._infiniteCache.centerY === centerY
                ) {
                    return window._infiniteCache.text;
                }

                // Schätze Breite und Höhe eines Zeichens (niemals 0 wegen "|| 1")
                const fontSizeSafe = fontSize || 1;
                const charWidth = ctx.measureText(ch).width || 1;
                const charHeight = fontSizeSafe;

                // Berücksichtige die Verschiebung des Kreismittelpunkts: wir wollen
                // in JEDE Richtung (links/rechts/oben/unten) über den sichtbaren
                // Bereich hinausreichen, egal wo der Mittelpunkt liegt.
                const leftExtent = Math.abs(centerX) + canvas.width;
                const rightExtent = Math.abs(canvas.width - centerX) + canvas.width;
                const topExtent = Math.abs(centerY) + canvas.height;
                const bottomExtent = Math.abs(canvas.height - centerY) + canvas.height;

                // Größte Ausdehnung in irgendeine Richtung relativ zum sichtbaren Bereich
                const maxExtentScreen = Math.max(leftExtent, rightExtent, topExtent, bottomExtent);

                // Durch die Canvas-Skalierung mit zoomFactor wird jedes Zeichen auf dem
                // Bildschirm um diesen Faktor kleiner/größer. In Weltkoordinaten ist
                // der sichtbare Bereich daher maxExtentScreen / zoomFactor groß.
                const maxExtentWorld = maxExtentScreen / Math.max(zoomFactor, 0.001);

                // Wie viele Zeichen werden in Weltkoordinaten benötigt, um diese
                // Ausdehnung zu füllen?
                const neededCount = Math.ceil(
                    maxExtentWorld / Math.min(charWidth, charHeight)
                ) * 2;

                const text = ch.repeat(neededCount);

                window._infiniteCache = {
                    char: ch,
                    zoom: zoomFactor,
                    width: canvas.width,
                    height: canvas.height,
                    centerX: centerX,
                    centerY: centerY,
                    radius: radius,
                    text
                };

                return text;
            }

            // Infinite-Modus: Erzeuge die passende "unendliche" Zeichenkette
            if (currentMode && currentMode.type === 'infinite') {
                character = getInfiniteText();
                // count bleibt unverändert (kommt vom anzahl-Input!)
            }

            // Zeichne Zeichen auf dem Kreis
            ctx.save();
            // Mittelpunkt (inkl. Pan) in den Ursprung holen
            ctx.translate(centerX, centerY);
            // Zoom wird ausschließlich über Skalierung erledigt
            ctx.scale(zoomFactor, zoomFactor);

            for (let i = 0; i < count; i++) {
                const angle = (i / count) * 2 * Math.PI - Math.PI / 2;

                // Position relativ zum (0, 0)-Mittelpunkt in Weltkoordinaten
                const x = radius * Math.cos(angle);
                const y = radius * Math.sin(angle);

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2);
                ctx.fillText(character, 0, 0);
                ctx.restore();
            }

            ctx.restore();
        }

        // URL aktualisieren
        function updateURL() {
            const anzahl = countNumber.value;
            const radius = radiusPercent;
            const zoom = zoomFactor.toFixed(2); // 2 Dezimalstellen für Zoom
            const px = panX.toFixed(2); // 2 Dezimalstellen für panX
            const py = panY.toFixed(2); // 2 Dezimalstellen für panY
            let zeichen = characterInput.value;

            // Wenn wir in einem Modus sind, verwende Modus-Format
            if (currentMode) {
                zeichen = modeToURLString(currentMode);
            }
            // Wenn zeichen ein Pi-Präfix ist UND mindestens 4 Zeichen lang (z.B. "3.14"), verwende pi(x) Format
            else if (zeichen.length >= 4 && isPiPrefix(zeichen)) {
                zeichen = `pi(${zeichen.length})`;
            }
            // infinite(8) bleibt wie es ist (wird direkt in URL übernommen)

            // Reihenfolge: anzahl → radius → zoom → panX → panY → zeichen (zeichen als letztes)
            const newURL = `${window.location.pathname}?anzahl=${encodeURIComponent(anzahl)}&radius=${encodeURIComponent(radius)}&zoom=${encodeURIComponent(zoom)}&panX=${encodeURIComponent(px)}&panY=${encodeURIComponent(py)}&zeichen=${encodeURIComponent(zeichen)}`;
            window.history.replaceState({}, '', newURL);
        }

        // Hilfsfunktion: Zufälliges druckbares ASCII-Zeichen (32-126)
        function getRandomASCII() {
            return String.fromCharCode(Math.floor(Math.random() * (126 - 32 + 1)) + 32);
        }

        // Gedrückt-Halten Logik
        let holdInterval = null;
        let holdTimeout = null;

        function startHold(action, initialDelay = 500, repeatDelay = 100) {
            action(); // Sofort einmal ausführen
            holdTimeout = setTimeout(() => {
                holdInterval = setInterval(action, repeatDelay);
            }, initialDelay);
        }

        function stopHold() {
            if (holdTimeout) clearTimeout(holdTimeout);
            if (holdInterval) clearInterval(holdInterval);
            holdTimeout = null;
            holdInterval = null;
        }

        // Anzahl erhöhen
        function incrementCount() {
            countNumber.value = parseInt(countNumber.value) + 1;
            draw();
            updateURL();
        }

        // Anzahl verringern
        function decrementCount() {
            const newValue = parseInt(countNumber.value) - 1;
            if (newValue >= 0) {
                countNumber.value = newValue;
                draw();
                updateURL();
            }
        }

        // Zeichen hinzufügen
        function addCharacter() {
            const currentValue = characterInput.value;

            // Wenn wir bereits in einem Modus sind, Parameter erhöhen
            if (currentMode) {
                currentMode.param++;
                characterInput.value = calculateDisplay(currentMode);
                draw();
                updateURL();
                return;
            }

            // Erkenne Modus basierend auf Eingabe
            if (currentValue === '') {
                // Leer → Random mit 1 Zeichen
                currentMode = { type: 'random', param: 1 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '0') {
                // 0 → Nichts passiert
                return;
            } else if (currentValue === '2' && isCountSequence()) {
                // 2 nach 0→1 Sequenz → Count-Modus
                currentMode = { type: 'count', param: 3 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '2') {
                // 2 → Starte double-Modus bei double(2) = 4
                currentMode = { type: 'double', param: 2 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '10') {
                // 10 → Starte ten-Modus bei ten(2) = 100
                currentMode = { type: 'ten', param: 2 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '012') {
                // 012 → NumberNumber-Modus
                currentMode = { type: 'numbernumber', param: 3 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '0 1 2') {
                // 0 1 2 → NumberSpaceNumber-Modus
                currentMode = { type: 'numberspacenumber', param: 3 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '018') {
                // 018 → Starte 018-Modus bei 018(2) = 018018
                currentMode = { type: '018', param: 2 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '01') {
                // 01 → Binär-Zähl-Modus (startet bei 1, nächster Wert ist 2 = "10")
                currentMode = { type: '01', param: 2 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue.match(/^[01]+$/) && currentValue.length > 2) {
                // Beliebiges Binary-Pattern (nur 0 und 1, länger als 2)
                currentMode = { type: 'binary', param: 2, pattern: currentValue };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '00') {
                // 00 → Starte 00-Modus bei 00(1) = 0000
                currentMode = { type: '00', param: 1 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '11') {
                // 11 → Starte 11-Modus bei 11(1) = 1111
                currentMode = { type: '11', param: 1 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '1') {
                // 1 → Starte 1-Modus bei 1(2) = 11
                currentMode = { type: '1', param: 2 };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '8') {
                // 8 → infinite(8) Modus
                currentMode = { type: 'infinite', char: '8' };
                characterInput.value = calculateDisplay(currentMode);
            } else if (currentValue === '∞') {
                // ∞ → infinite(∞) Modus
                currentMode = { type: 'infinite', char: '∞' };
                characterInput.value = calculateDisplay(currentMode);
            } else {
                // Pi-Modus oder Random
                let nextPiDigit = null;
                if (currentValue.length >= 4) {
                    nextPiDigit = getNextPiDigit(currentValue);
                }

                if (nextPiDigit !== null) {
                    characterInput.value += nextPiDigit;
                    console.log(`✓ Pi-Modus: Nächste Ziffer ist '${nextPiDigit}'`);
                } else {
                    // Fallback: Random-Modus
                    currentMode = { type: 'random', param: currentValue.length + 1 };
                    characterInput.value = calculateDisplay(currentMode);
                }
            }

            draw();
            updateURL();
        }

        // Zeichen entfernen
        function removeCharacter() {
            const currentValue = characterInput.value;

            if (currentValue.length > 0) {
                // Wenn wir in einem Modus sind, Parameter verringern
                if (currentMode) {
                    // Infinite-Modus: Verlasse den Modus
                    if (currentMode.type === 'infinite') {
                        characterInput.value = currentMode.char;
                        currentMode = null;
                    } else {
                        currentMode.param--;

                        // Alle Modi gehen unbegrenzt ins Negative!
                        // Berechne neuen Display-Wert
                        characterInput.value = calculateDisplay(currentMode);
                    }

                    draw();
                    updateURL();
                    return;
                }

                // Ohne Modus: Spezialfälle
                if (currentValue === '0') {
                    return;
                } else {
                    // Normal: Entferne 1 Zeichen
                    characterInput.value = currentValue.slice(0, -1);
                }

                draw();
                updateURL();
            }
        }

        // Radius erhöhen (nur Radius, nicht Schriftgröße!)
        function incrementRadius() {
            radiusPercent = Math.min(1000, radiusPercent + 1);
            syncRadiusToInput();
            draw();
            updateURL();
        }

        // Radius verringern (nur Radius, nicht Schriftgröße! Kann negativ werden!)
        function decrementRadius() {
            radiusPercent = Math.max(-1000, radiusPercent - 1);
            syncRadiusToInput();
            draw();
            updateURL();
        }

        // Event-Listener für Anzahl-Buttons (Desktop)
        countUp.addEventListener('mousedown', () => startHold(incrementCount));
        countUp.addEventListener('mouseup', stopHold);
        countUp.addEventListener('mouseleave', stopHold);

        countDown.addEventListener('mousedown', () => startHold(decrementCount));
        countDown.addEventListener('mouseup', stopHold);
        countDown.addEventListener('mouseleave', stopHold);

        // Event-Listener für Anzahl-Buttons (Mobile)
        countUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(incrementCount);
        });
        countUp.addEventListener('touchend', stopHold);
        countUp.addEventListener('touchcancel', stopHold);

        countDown.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(decrementCount);
        });
        countDown.addEventListener('touchend', stopHold);
        countDown.addEventListener('touchcancel', stopHold);

        // Event-Listener für Radius-Buttons (Desktop)
        radiusUp.addEventListener('mousedown', () => startHold(incrementRadius));
        radiusUp.addEventListener('mouseup', stopHold);
        radiusUp.addEventListener('mouseleave', stopHold);

        radiusDown.addEventListener('mousedown', () => startHold(decrementRadius));
        radiusDown.addEventListener('mouseup', stopHold);
        radiusDown.addEventListener('mouseleave', stopHold);

        // Event-Listener für Radius-Buttons (Mobile)
        radiusUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(incrementRadius);
        });
        radiusUp.addEventListener('touchend', stopHold);
        radiusUp.addEventListener('touchcancel', stopHold);

        radiusDown.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(decrementRadius);
        });
        radiusDown.addEventListener('touchend', stopHold);
        radiusDown.addEventListener('touchcancel', stopHold);

        // Event-Listener für Zeichen-Buttons (Desktop)
        charAdd.addEventListener('mousedown', () => startHold(addCharacter, 500, 150));
        charAdd.addEventListener('mouseup', stopHold);
        charAdd.addEventListener('mouseleave', stopHold);

        charRemove.addEventListener('mousedown', () => startHold(removeCharacter, 500, 150));
        charRemove.addEventListener('mouseup', stopHold);
        charRemove.addEventListener('mouseleave', stopHold);

        // Event-Listener für Zeichen-Buttons (Mobile)
        charAdd.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(addCharacter, 500, 150);
        });
        charAdd.addEventListener('touchend', stopHold);
        charAdd.addEventListener('touchcancel', stopHold);

        charRemove.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(removeCharacter, 500, 150);
        });
        charRemove.addEventListener('touchend', stopHold);
        charRemove.addEventListener('touchcancel', stopHold);

        // Manuelle Eingabe der Anzahl
        countNumber.addEventListener('input', () => {
            draw();
            updateURL();
        });

        // Manuelle Eingabe des Radius (kann negativ sein!)
        radiusNumber.addEventListener('input', () => {
            const value = parseFloat(radiusNumber.value);
            if (!isNaN(value)) {
                radiusPercent = Math.max(-1000, Math.min(1000, value));
                draw();
                updateURL();
            }
        });

        // Manuelle Eingabe der Zeichen → Modus zurücksetzen + History tracken
        characterInput.addEventListener('input', () => {
            const currentValue = characterInput.value;

            // Füge zur History hinzu
            inputHistory.push(currentValue);

            // Behalte nur die letzten 10 Einträge
            if (inputHistory.length > 10) {
                inputHistory.shift();
            }

            currentMode = null; // Modus zurücksetzen bei manueller Eingabe
            draw();
            updateURL();
        });

        // Drag/Pan-Funktionalität (Desktop)
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        // mousemove auf document statt canvas - funktioniert auch außerhalb
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - lastX;
                const deltaY = e.clientY - lastY;

                panX += deltaX;
                panY += deltaY;

                lastX = e.clientX;
                lastY = e.clientY;

                draw();
            }
        });

        // mouseup auf document statt canvas - fängt mouseup auch außerhalb ab
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Zoom-Steuerung durch Scrollen (ändert Radius UND Schriftgröße!)
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();

            // Mausrad → Zoom (beeinflusst BEIDE: Radius und Schriftgröße)
            const zoomIntensity = 0.001;
            const deltaScale = 1 + e.deltaY * -zoomIntensity;
            const newZoomFactor = Math.max(0.001, Math.min(100, zoomFactor * deltaScale));

            zoomFactor = newZoomFactor;

            draw();
            updateURL();
        }, { passive: false });

        // Touch-Drag für Mobile (1 Finger)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchPanX = 0;
        let touchPanY = 0;

        // Touch-Pinch für Mobile (2 Finger)
        let initialDistance = null;
        let initialZoom = zoomFactor;
        let wasPinching = false; // Flag um Sprung nach Pinch zu verhindern

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1 && !wasPinching) {
                // Single touch - Pan (nur wenn nicht gerade gepincht wurde)
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchPanX = panX;
                touchPanY = panY;
            } else if (e.touches.length === 2) {
                // Two fingers - Pinch zoom (ändert Radius UND Schriftgröße!)
                e.preventDefault();
                wasPinching = true;
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                initialDistance = Math.hypot(
                    touch2.clientX - touch1.clientX,
                    touch2.clientY - touch1.clientY
                );
                initialZoom = zoomFactor;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && !wasPinching) {
                // Single touch - Pan (nur wenn nicht gerade gepincht wurde)
                const deltaX = e.touches[0].clientX - touchStartX;
                const deltaY = e.touches[0].clientY - touchStartY;

                panX = touchPanX + deltaX;
                panY = touchPanY + deltaY;

                draw();
            } else if (e.touches.length === 2 && initialDistance !== null) {
                // Two fingers - Pinch zoom (ändert Radius UND Schriftgröße!)
                e.preventDefault();
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];
                const currentDistance = Math.hypot(
                    touch2.clientX - touch1.clientX,
                    touch2.clientY - touch1.clientY
                );

                const scale = currentDistance / initialDistance;
                zoomFactor = Math.max(0.001, Math.min(100, initialZoom * scale));

                draw();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialDistance = null;
                updateURL();
            }

            // Reset wasPinching Flag wenn alle Finger weg sind
            if (e.touches.length === 0) {
                wasPinching = false;
            }
        });

        // Keyboard-Steuerung: + und - Tasten
        document.addEventListener('keydown', (e) => {
            // Prüfe ob ein Input-Feld fokussiert ist
            const activeElement = document.activeElement;
            const isInputFocused = activeElement && (
                activeElement.tagName === 'INPUT' ||
                activeElement.tagName === 'TEXTAREA' ||
                activeElement.isContentEditable
            );

            // Nur wenn KEIN Input fokussiert ist
            if (!isInputFocused) {
                if (e.key === '+' || e.key === '=') {
                    // + Taste → Zeichen hinzufügen
                    e.preventDefault();
                    addCharacter();
                } else if (e.key === '-' || e.key === '_') {
                    // - Taste → Zeichen entfernen
                    e.preventDefault();
                    removeCharacter();
                }
            }
        });
    </script>
</body>
