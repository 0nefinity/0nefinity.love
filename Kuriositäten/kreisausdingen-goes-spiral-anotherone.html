<!-- kreisausdingen.html -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kreis aus Dingen mit Musterpotenzial</title>

    <!-- Die Eingabe von sehr vielen Zeichen macht das ganze ziemlich verrückt. Und dann die Leertaste ‒ crazy -->

    
    <link href="/meta.css" rel="stylesheet" /> 
    <!-- meta.css regelt Hintergrund- und Objekt-Farben etc.. Sonstiges CSS wird häufig nicht benötigt, es sei denn es wird doch benötigt -->
    <script src="/meta.js"></script>
    <!-- meta.js regelt das Menü und den Zurückbutton und evt. sonstige zukünftige Metafunktionen -->


    <style>
        :root {
            --vh: 1vh;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none; /* Verhindert Browser-Zoom */
            background: var(--bg-color, black);
        }

        body {
            overflow: hidden; /* Verhindert Scrollen */
            overscroll-behavior: none;
            opacity: 1 !important; /* Keine Opacity-Effekte */
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            touch-action: none; /* Verhindert Browser-Zoom */
            background: var(--bg-color, black);
        }
        canvas {
            display: block;
            cursor: grab;
            opacity: 1 !important;
            touch-action: none; /* Verhindert Browser-Gesten */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color, black);
        }
        canvas:active {
            cursor: grabbing;
        }
        #controls {
            position: fixed;
            top: 4.375rem; /* Direkt unter den meta.js buttons (70px) */
            left: 0;
            right: 0;
            background: transparent;
            padding: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            box-sizing: border-box;
            height: 3rem; /* Etwas kompakter */
            touch-action: none; /* Verhindert Browser-Zoom auf Controls */
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 8px;
            height: 100%;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 4px;
            height: 100%;
        }
        .control-group.anzahl {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .control-group.zeichen {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        input[type="number"] {
            width: 60px;
            height: 100%;
            text-align: center;
            font-size: 14px;
            padding: 0 4px;
            background: var(--bg-color);
            color: var(--text-color);
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
            opacity: 1 !important;
        }
        input[type="text"] {
            width: 200px;
            height: 100%;
            font-size: 14px;
            padding: 0 8px;
            background: var(--bg-color);
            color: var(--text-color);
            border: 2px solid var(--text-color);
            border-radius: 4px;
            box-sizing: border-box;
            opacity: 1 !important;
        }
        .control-btn {
            background: transparent;
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            width: 30px;
            height: 100%;
            flex-shrink: 0;
            font-family: Arial, sans-serif;
            opacity: 1 !important;
        }
        #controls {
            opacity: 1 !important;
        }


        /* Mobile Optimierung - High-Res Displays */
        @media (max-width: 768px) and (min-resolution: 2dppx) {
            #controls {
                top: 5.5rem; /* Unter den größeren meta.js buttons auf Mobile */
                padding: 0 8px;
            }
            .controls-row {
                gap: 5px;
            }
            .control-group {
                gap: 3px;
            }
            input[type="number"] {
                width: 50px;
                font-size: 16px;
            }
            input[type="text"] {
                width: 150px;
                font-size: 14px;
            }
            .control-btn {
                font-size: 22px;
                width: 30px;
            }
        }

        /* Mobile Optimierung - Standard */
        @media (max-width: 768px) and (max-resolution: 1.99dppx) {
            #controls {
                padding: 0 8px;
            }
            .controls-row {
                gap: 5px;
            }
            .control-group {
                gap: 3px;
            }
            input[type="number"] {
                width: 50px;
                font-size: 14px;
            }
            input[type="text"] {
                width: 140px;
                font-size: 13px;
            }
            .control-btn {
                font-size: 18px;
                width: 28px;
            }
        }
    </style>
</head>
<body>
    <div id="controls">
        <div class="controls-row">
            <div class="control-group anzahl">
                <button class="control-btn" id="countDown">▼</button>
                <input type="number" id="countNumber" min="0" max="20000" value="50">
                <button class="control-btn" id="countUp">▲</button>
            </div>
            <div class="control-group zeichen">
                <button class="control-btn" id="charRemove">−</button>
                <input type="text" id="character" value="1">
                <button class="control-btn" id="charAdd">+</button>
            </div>
        </div>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const countNumber = document.getElementById('countNumber');
        const countUp = document.getElementById('countUp');
        const countDown = document.getElementById('countDown');
        const characterInput = document.getElementById('character');
        const charAdd = document.getElementById('charAdd');
        const charRemove = document.getElementById('charRemove');

        // Radius-Steuerung (Prozent des maximal möglichen Radius)
        let radiusPercent = 80;

        // Krümmungs-Steuerung (wie stark die Baseline der Zeichen gebogen ist)
        let curvatureFactor = 0; // 0 = keine Krümmung, positiv = nach innen, negativ = nach außen

        // Pan/Drag-Steuerung
        let isDragging = false;
        let lastX = 0;
        let lastY = 0;
        let panX = 0;
        let panY = 0;

        // URL-Parameter auslesen (ohne radius)
        const urlParams = new URLSearchParams(window.location.search);
        const anzahlParam = urlParams.get('anzahl');
        const zeichenParam = urlParams.get('zeichen');

        // Wenn URL-Parameter vorhanden sind, setze die Werte
        if (anzahlParam !== null) {
            const anzahl = parseInt(anzahlParam);
            if (!isNaN(anzahl)) {
                countNumber.value = anzahl;
            }
        }
        if (zeichenParam !== null) {
            characterInput.value = zeichenParam;
        }

        // Canvas Größe an Bildschirm anpassen
        function resizeCanvas() {
            // Nutze die tatsächliche Größe des Canvas-Elements (wichtig für Firefox Mobile)
            const rect = canvas.getBoundingClientRect();

            // Setze Canvas-Pixel-Größe auf die tatsächliche Display-Größe
            canvas.width = rect.width;
            canvas.height = rect.height;

            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100);
        });
        resizeCanvas();

        function draw() {
            const count = parseInt(countNumber.value) || 0;
            const character = characterInput.value || " "; // Standard ist ein Leerzeichen

            // Mittelpunkt berechnen (mit Pan-Offset)
            const centerX = canvas.width / 2 + panX;
            const centerY = canvas.height / 2 + panY;
            const maxRadius = Math.min(canvas.width, canvas.height) / 2 - 50;
            const radius = maxRadius * (radiusPercent / 100);

            // Canvas löschen
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Schriftgröße proportional zum Radius
            const fontSize = (radius / 400) * 30;

            // Zeichen
            ctx.font = `${fontSize}px Arial`;
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < count; i++) {
                // Gleichmäßige Verteilung auf dem Kreis (wie bisher)
                const angle = (i / count) * 2 * Math.PI - Math.PI / 2;

                // Position auf dem Kreis
                const x = centerX + radius * Math.cos(angle);
                const y = centerY + radius * Math.sin(angle);

                // Normale tangentiale Rotation
                const baseRotation = angle + Math.PI / 2;

                // Zusätzliche Rotation für Baseline-Krümmung
                // (i / count - 0.5) gibt Werte von -0.5 bis +0.5
                // Zeichen in der Mitte (i/count = 0.5) haben keine Extra-Rotation
                // Zeichen am Anfang/Ende bekommen mehr Rotation
                const normalizedPosition = i / count - 0.5; // -0.5 bis +0.5
                const curvatureRotation = curvatureFactor * normalizedPosition;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(baseRotation + curvatureRotation);
                ctx.fillText(character, 0, 0);
                ctx.restore();
            }
        }

        // URL aktualisieren (ohne radius)
        function updateURL() {
            const anzahl = countNumber.value;
            const zeichen = characterInput.value;
            const newURL = `${window.location.pathname}?anzahl=${encodeURIComponent(anzahl)}&zeichen=${encodeURIComponent(zeichen)}`;
            window.history.replaceState({}, '', newURL);
        }

        // Hilfsfunktion: Zufälliges druckbares ASCII-Zeichen (32-126)
        function getRandomASCII() {
            return String.fromCharCode(Math.floor(Math.random() * (126 - 32 + 1)) + 32);
        }

        // Gedrückt-Halten Logik
        let holdInterval = null;
        let holdTimeout = null;

        function startHold(action, initialDelay = 500, repeatDelay = 100) {
            action(); // Sofort einmal ausführen
            holdTimeout = setTimeout(() => {
                holdInterval = setInterval(action, repeatDelay);
            }, initialDelay);
        }

        function stopHold() {
            if (holdTimeout) clearTimeout(holdTimeout);
            if (holdInterval) clearInterval(holdInterval);
            holdTimeout = null;
            holdInterval = null;
        }

        // Anzahl erhöhen
        function incrementCount() {
            countNumber.value = parseInt(countNumber.value) + 1;
            draw();
            updateURL();
        }

        // Anzahl verringern
        function decrementCount() {
            const newValue = parseInt(countNumber.value) - 1;
            if (newValue >= 0) {
                countNumber.value = newValue;
                draw();
                updateURL();
            }
        }

        // Zeichen hinzufügen
        function addCharacter() {
            characterInput.value += getRandomASCII();
            draw();
            updateURL();
        }

        // Zeichen entfernen
        function removeCharacter() {
            if (characterInput.value.length > 0) {
                characterInput.value = characterInput.value.slice(0, -1);
                draw();
                updateURL();
            }
        }

        // Event-Listener für Anzahl-Buttons (Desktop)
        countUp.addEventListener('mousedown', () => startHold(incrementCount));
        countUp.addEventListener('mouseup', stopHold);
        countUp.addEventListener('mouseleave', stopHold);

        countDown.addEventListener('mousedown', () => startHold(decrementCount));
        countDown.addEventListener('mouseup', stopHold);
        countDown.addEventListener('mouseleave', stopHold);

        // Event-Listener für Anzahl-Buttons (Mobile)
        countUp.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(incrementCount);
        });
        countUp.addEventListener('touchend', stopHold);
        countUp.addEventListener('touchcancel', stopHold);

        countDown.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(decrementCount);
        });
        countDown.addEventListener('touchend', stopHold);
        countDown.addEventListener('touchcancel', stopHold);

        // Event-Listener für Zeichen-Buttons (Desktop)
        charAdd.addEventListener('mousedown', () => startHold(addCharacter, 500, 150));
        charAdd.addEventListener('mouseup', stopHold);
        charAdd.addEventListener('mouseleave', stopHold);

        charRemove.addEventListener('mousedown', () => startHold(removeCharacter, 500, 150));
        charRemove.addEventListener('mouseup', stopHold);
        charRemove.addEventListener('mouseleave', stopHold);

        // Event-Listener für Zeichen-Buttons (Mobile)
        charAdd.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(addCharacter, 500, 150);
        });
        charAdd.addEventListener('touchend', stopHold);
        charAdd.addEventListener('touchcancel', stopHold);

        charRemove.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startHold(removeCharacter, 500, 150);
        });
        charRemove.addEventListener('touchend', stopHold);
        charRemove.addEventListener('touchcancel', stopHold);

        // Manuelle Eingabe der Anzahl
        countNumber.addEventListener('input', () => {
            draw();
            updateURL();
        });

        // Zeichen-Eingabe
        characterInput.addEventListener('input', () => {
            draw();
            updateURL();
        });

        // Drag/Pan-Funktionalität (Desktop)
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });

        // mousemove auf document statt canvas - funktioniert auch außerhalb
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - lastX;
                const deltaY = e.clientY - lastY;

                panX += deltaX;
                panY += deltaY;

                lastX = e.clientX;
                lastY = e.clientY;

                draw();
            }
        });

        // mouseup auf document statt canvas - fängt mouseup auch außerhalb ab
        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        // Krümmungs-Steuerung durch Scrollen
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();

            if (e.shiftKey) {
                // Shift + Scroll → Baseline-Krümmung ändern
                const curvatureIntensity = 0.01; // Sensitivity
                curvatureFactor += e.deltaY * curvatureIntensity;

                // Limits (kann positiv und negativ sein)
                curvatureFactor = Math.max(-10, Math.min(10, curvatureFactor));
            } else {
                // Normal Scroll → Radius-Zoom
                const zoomIntensity = 0.001;
                const deltaScale = 1 + e.deltaY * -zoomIntensity;
                const newRadiusPercent = Math.min(Math.max(0, radiusPercent * deltaScale), 1000);

                radiusPercent = newRadiusPercent;
                updateURL();
            }

            draw();
        }, { passive: false });

        // Touch-Drag für Mobile (1 Finger)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchPanX = 0;
        let touchPanY = 0;

        // Touch-Pinch & Rotation für Mobile (2 Finger)
        let initialDistance = null;
        let initialRadius = radiusPercent;
        let initialAngle = null;
        let wasPinching = false; // Flag um Sprung nach Pinch zu verhindern

        // Hilfsfunktion: Winkel zwischen zwei Touch-Punkten berechnen
        function getAngleBetweenTouches(touch1, touch2) {
            const dx = touch2.clientX - touch1.clientX;
            const dy = touch2.clientY - touch1.clientY;
            return Math.atan2(dy, dx) * (180 / Math.PI);
        }

        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1 && !wasPinching) {
                // Single touch - Pan (nur wenn nicht gerade gepincht wurde)
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchPanX = panX;
                touchPanY = panY;
            } else if (e.touches.length === 2) {
                // Two fingers - Pinch zoom + Rotation
                e.preventDefault();
                wasPinching = true;
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];

                // Pinch: Abstand speichern
                initialDistance = Math.hypot(
                    touch2.clientX - touch1.clientX,
                    touch2.clientY - touch1.clientY
                );
                initialRadius = radiusPercent;

                // Rotation: Winkel speichern
                initialAngle = getAngleBetweenTouches(touch1, touch2);
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1 && !wasPinching) {
                // Single touch - Pan (nur wenn nicht gerade gepincht wurde)
                const deltaX = e.touches[0].clientX - touchStartX;
                const deltaY = e.touches[0].clientY - touchStartY;

                panX = touchPanX + deltaX;
                panY = touchPanY + deltaY;

                draw();
            } else if (e.touches.length === 2 && initialDistance !== null && initialAngle !== null) {
                // Two fingers - Rotation für Baseline-Krümmung
                e.preventDefault();
                const touch1 = e.touches[0];
                const touch2 = e.touches[1];

                // Rotation: Winkel-Differenz berechnen
                const currentAngle = getAngleBetweenTouches(touch1, touch2);
                let deltaAngle = currentAngle - initialAngle;

                // Normalisiere Winkel-Differenz auf -180 bis +180
                if (deltaAngle > 180) deltaAngle -= 360;
                if (deltaAngle < -180) deltaAngle += 360;

                // Baseline-Krümmung anpassen (Sensitivity: 1° = 0.02 Krümmung)
                const curvatureSensitivity = 0.02;
                curvatureFactor += deltaAngle * curvatureSensitivity;

                // Limits
                curvatureFactor = Math.max(-10, Math.min(10, curvatureFactor));

                // Update initialAngle für nächstes Frame
                initialAngle = currentAngle;

                draw();
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length < 2) {
                initialDistance = null;
                initialAngle = null;
                updateURL();
            }

            // Reset wasPinching Flag wenn alle Finger weg sind
            if (e.touches.length === 0) {
                wasPinching = false;
            }
        });
    </script>
</body>
</html>
