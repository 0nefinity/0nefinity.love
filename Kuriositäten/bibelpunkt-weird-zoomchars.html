<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bibelpunkt</title>

  <link href="/meta.css" rel="stylesheet" />
  <script src="/meta.js" defer></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      overflow: hidden;
      touch-action: none;
      background: #000;
    }
    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      cursor: grab;
      background: #000;
    }
    #container.dragging { cursor: grabbing; }
    .texture-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      will-change: transform;
    }
    #base-layer {
      z-index: 1;
    }
    #native-layer {
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="base-layer" class="texture-layer"></canvas>
    <canvas id="native-layer" class="texture-layer"></canvas>
  </div>

  <script>
    // ============================================================
    // CONFIGURATION - Alle Magic Numbers an einem Ort
    // ============================================================
    const CONFIG = {
      // Zoom Einstellungen
      ZOOM: {
        min: 0.0001,
        max: 200,
        speed: 0.03,
        initial: 0.01  // Weit rausgezoomt beim Start
      },

      // Text-Rendering
      TARGET_FONT_SIZE: 12,   // Lesbare Schriftgröße im Kreis
      LINE_HEIGHT_FACTOR: 1.2,
      FONT_FAMILY: 'monospace',

      // Basis-Textur (einmal gerendert, dann CSS-skaliert)
      BASE_TEXTURE: {
        maxSize: 16384,
        scale: 0.15
      },

      // Ab dieser Screen-Font-Größe wird auf natives Rendering umgeschaltet
      NATIVE_RENDER_THRESHOLD: 6  // px
    };

    // ============================================================
    // STATE - Sauberer Zustand
    // ============================================================
    const state = {
      textData: '',
      circleRadius: 0,
      baseFontSize: 0,
      baseCharWidth: 0,
      lineHeight: 0,

      // Pre-computed: Zeilen-Layout
      lines: [],  // Array von { y, startIndex, charCount, rowWidth }

      // Transform
      pan: { x: 0, y: 0 },
      scale: CONFIG.ZOOM.initial,

      // Render-Modus: 'texture' (CSS-skaliert) oder 'native' (viewport-scharf)
      renderMode: 'texture',

      // Vorgehaltene Texturen (immer bereit, kein Neuaufbau nötig)
      textures: {
        // Basis-Textur (der ganze Kreis, klein)
        base: {
          canvas: null,
          size: 0
        },
        // Native-Textur (scharfer Ausschnitt)
        native: {
          canvas: null,
          centerX: 0,
          centerY: 0,
          scale: 0,
          width: 0,
          height: 0
        }
      },
      renderTimeout: null,

      // Drag
      drag: {
        active: false,
        lastX: 0,
        lastY: 0,
        lastPinchDist: 0
      }
    };

    // ============================================================
    // DOM ELEMENTS
    // ============================================================
    const elements = {
      container: document.getElementById('container'),
      baseCanvas: document.getElementById('base-layer'),
      nativeCanvas: document.getElementById('native-layer'),
      get baseCtx() { return this.baseCanvas.getContext('2d'); },
      get nativeCtx() { return this.nativeCanvas.getContext('2d'); }
    };

    // ============================================================
    // LOGGING
    // ============================================================
    const LOG = {
      enabled: true,

      init(msg, data) {
        if (!this.enabled) return;
        console.log(`%c[INIT] ${msg}`, 'color: #0f0', data || '');
      },

      layout(msg, data) {
        if (!this.enabled) return;
        console.log(`%c[LAYOUT] ${msg}`, 'color: #0ff', data || '');
      },

      render(msg, data) {
        if (!this.enabled) return;
        console.log(`%c[RENDER] ${msg}`, 'color: #ff0', data || '');
      },

      transform(msg, data) {
        if (!this.enabled) return;
        console.log(`%c[TRANSFORM] ${msg}`, 'color: #f0f', data || '');
      },

      state() {
        if (!this.enabled) return;
        console.table({
          circleRadius: state.circleRadius,
          baseFontSize: state.baseFontSize,
          baseCharWidth: state.baseCharWidth,
          lineHeight: state.lineHeight,
          linesCount: state.lines.length,
          scale: state.scale,
          panX: state.pan.x,
          panY: state.pan.y
        });
      }
    };

    // ============================================================
    // UTILITIES
    // ============================================================
    function clamp(value, min, max) {
      return Math.min(Math.max(min, value), max);
    }

    // ============================================================
    // LAYOUT BERECHNUNG
    // ============================================================

    // Berechnet den benötigten Radius für gegebene Textlänge und Font-Größe
    function calculateRadiusForText(textLength, fontSize) {
      const ctx = document.createElement('canvas').getContext('2d');
      ctx.font = `${fontSize}px ${CONFIG.FONT_FAMILY}`;
      const charWidth = ctx.measureText('M').width;
      const lineHeight = fontSize * CONFIG.LINE_HEIGHT_FACTOR;

      // Binary search für den minimalen Radius
      let low = 100, high = 1000000;

      for (let i = 0; i < 40; i++) {
        const mid = (low + high) / 2;
        let capacity = 0;

        for (let y = -mid + lineHeight / 2; y <= mid - lineHeight / 2; y += lineHeight) {
          const rowWidth = 2 * Math.sqrt(Math.max(0, mid * mid - y * y));
          capacity += Math.floor(rowWidth / charWidth);
        }

        if (capacity >= textLength) {
          high = mid;
        } else {
          low = mid;
        }
      }

      return Math.ceil(high);
    }

    // Pre-compute alle Zeilen für schnelles Lookup
    function computeLineLayout() {
      state.lines = [];
      let textIndex = 0;
      const lh = state.lineHeight;
      const r = state.circleRadius;
      const cw = state.baseCharWidth;

      LOG.layout('Computing layout', { radius: r, lineHeight: lh, charWidth: cw });

      for (let y = -r + lh / 2; y <= r - lh / 2; y += lh) {
        const rowWidth = 2 * Math.sqrt(Math.max(0, r * r - y * y));
        const charCount = Math.min(
          Math.floor(rowWidth / cw),
          state.textData.length - textIndex
        );

        if (charCount > 0) {
          state.lines.push({
            y: y,
            startIndex: textIndex,
            charCount: charCount,
            rowWidth: rowWidth  // Für Debugging
          });
          textIndex += charCount;
        }

        if (textIndex >= state.textData.length) break;
      }

      LOG.layout(`${state.lines.length} Zeilen berechnet, ${textIndex} Zeichen verteilt`);
      if (state.lines.length > 0) {
        LOG.layout('Erste Zeile', state.lines[0]);
        LOG.layout('Mittlere Zeile', state.lines[Math.floor(state.lines.length / 2)]);
        LOG.layout('Letzte Zeile', state.lines[state.lines.length - 1]);
      }
    }

    // ============================================================
    // BASIS-TEXTUR (einmal rendern, permanent vorhalten)
    // ============================================================
    function renderBaseTexture() {
      const scale = CONFIG.BASE_TEXTURE.scale;
      const size = Math.ceil(state.circleRadius * 2 * scale);

      LOG.render('Rendering base texture', { scale, size });

      // Permanenter Canvas für Basis-Textur
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d', { alpha: false });

      // Schwarzer Hintergrund
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, size, size);

      // Kreis-Clip anwenden
      ctx.save();
      ctx.beginPath();
      ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
      ctx.clip();

      const fontSize = Math.max(state.baseFontSize * scale, 1);
      ctx.fillStyle = '#fff';
      ctx.font = `${fontSize}px ${CONFIG.FONT_FAMILY}`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';

      for (const line of state.lines) {
        ctx.fillText(
          state.textData.substr(line.startIndex, line.charCount),
          size / 2,
          size / 2 + line.y * scale
        );
      }
      ctx.restore();

      // Permanent speichern
      state.textures.base.canvas = canvas;
      state.textures.base.size = size;

      LOG.render(`Base texture done: ${size}px`);
    }

    // ============================================================
    // BINARY SEARCH - Erste sichtbare Zeile finden
    // ============================================================
    function findFirstVisibleLine(topWorldY) {
      let lo = 0, hi = state.lines.length - 1;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (state.lines[mid].y < topWorldY) lo = mid + 1;
        else hi = mid;
      }
      return Math.max(0, lo - 1);
    }

    // ============================================================
    // NATIVES RENDERING - Rendert scharfe Textur für aktuellen Viewport
    // ============================================================
    function renderNativeTexture() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const dpr = window.devicePixelRatio || 1;
      const scale = state.scale;
      const r = state.circleRadius;

      // Viewport-Zentrum in Welt-Koordinaten
      const centerWorldX = -state.pan.x / scale;
      const centerWorldY = -state.pan.y / scale;

      // Cache-Canvas mit Margin für Bewegungsspielraum
      const margin = 2.0;
      const cacheW = Math.round(w * margin * dpr);
      const cacheH = Math.round(h * margin * dpr);

      // Canvas erstellen/wiederverwenden
      if (!state.textures.native.canvas) {
        state.textures.native.canvas = document.createElement('canvas');
      }
      const cacheCanvas = state.textures.native.canvas;
      cacheCanvas.width = cacheW;
      cacheCanvas.height = cacheH;
      const ctx = cacheCanvas.getContext('2d', { alpha: false });

      // Schwarzer Hintergrund
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cacheW, cacheH);

      // Sichtbarer Bereich in Welt-Koordinaten
      const halfW = (w * margin / 2) / scale;
      const halfH = (h * margin / 2) / scale;
      const topWorldY = centerWorldY - halfH;
      const bottomWorldY = centerWorldY + halfH;

      // Font setzen
      const screenFontSize = state.baseFontSize * scale * dpr;
      ctx.fillStyle = '#fff';
      ctx.font = `${screenFontSize}px ${CONFIG.FONT_FAMILY}`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';

      // Nur sichtbare Zeilen rendern
      const startIdx = findFirstVisibleLine(topWorldY);
      for (let i = startIdx; i < state.lines.length; i++) {
        const line = state.lines[i];
        if (line.y > bottomWorldY) break;

        const screenX = cacheW / 2 + (0 - centerWorldX) * scale * dpr;
        const screenY = cacheH / 2 + (line.y - centerWorldY) * scale * dpr;

        ctx.fillText(
          state.textData.substr(line.startIndex, line.charCount),
          Math.round(screenX),
          Math.round(screenY)
        );
      }

      // Kreis-Maske
      const screenRadius = r * scale * dpr;
      const cx = cacheW / 2 + (0 - centerWorldX) * scale * dpr;
      const cy = cacheH / 2 + (0 - centerWorldY) * scale * dpr;

      ctx.save();
      ctx.globalCompositeOperation = 'destination-in';
      ctx.beginPath();
      ctx.arc(cx, cy, screenRadius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Cache-Metadaten speichern
      state.textures.native.centerX = centerWorldX;
      state.textures.native.centerY = centerWorldY;
      state.textures.native.scale = scale;
      state.textures.native.width = w * margin;
      state.textures.native.height = h * margin;
    }

    // ============================================================
    // LAYER-MANAGEMENT: Basis immer sichtbar, Native als Overlay
    // ============================================================
    function initBaseLayer() {
      const { baseCanvas } = elements;
      const base = state.textures.base;

      if (!base.canvas) {
        LOG.render('ERROR: Base texture not ready!');
        return;
      }

      // Basis-Layer einmalig initialisieren
      baseCanvas.width = base.size;
      baseCanvas.height = base.size;
      elements.baseCtx.drawImage(base.canvas, 0, 0);

      LOG.render('initBaseLayer', { size: base.size });
    }

    function updateBaseTransform() {
      const effectiveScale = state.scale / CONFIG.BASE_TEXTURE.scale;
      elements.baseCanvas.style.transform =
        `translate(-50%, -50%) translate(${state.pan.x}px, ${state.pan.y}px) scale(${effectiveScale})`;
    }

    function showNativeOverlay() {
      const { nativeCanvas } = elements;
      const native = state.textures.native;

      if (!native.canvas) {
        LOG.render('ERROR: Native texture not ready!');
        return;
      }

      nativeCanvas.width = native.canvas.width;
      nativeCanvas.height = native.canvas.height;
      elements.nativeCtx.drawImage(native.canvas, 0, 0);

      nativeCanvas.style.width = native.width + 'px';
      nativeCanvas.style.height = native.height + 'px';
      nativeCanvas.style.transform = 'translate(-50%, -50%)';
      nativeCanvas.style.opacity = '1';

      LOG.render('showNativeOverlay', { w: native.width, h: native.height });
    }

    function hideNativeOverlay() {
      elements.nativeCanvas.style.opacity = '0';
    }

    function updateNativeTransform() {
      const native = state.textures.native;
      const scale = state.scale;

      if (!native.scale) return;

      const offsetX = (native.centerX - (-state.pan.x / scale)) * scale;
      const offsetY = (native.centerY - (-state.pan.y / scale)) * scale;
      const zoomRatio = scale / native.scale;

      elements.nativeCanvas.style.transform =
        `translate(-50%, -50%) translate(${offsetX}px, ${offsetY}px) scale(${zoomRatio})`;

      return { offsetX, offsetY, zoomRatio };
    }

    // ============================================================
    // TRANSFORM - Zoom IMMER sofort, Rendering asynchron
    // ============================================================
    function applyTransform() {
      const screenFontSize = state.baseFontSize * state.scale;
      const shouldBeNative = screenFontSize >= CONFIG.NATIVE_RENDER_THRESHOLD;

      // 1. Basis-Layer IMMER sofort updaten (blockiert nie)
      updateBaseTransform();

      if (shouldBeNative) {
        // === NATIVE MODUS ===

        // 2. Falls Native-Overlay existiert: sofort transformieren
        if (state.textures.native.scale) {
          updateNativeTransform();
        }

        // 3. Moduswechsel? Rendering ASYNCHRON schedulen
        if (state.renderMode !== 'native') {
          state.renderMode = 'native';
          LOG.render('Scheduling NATIVE render', { screenFontSize });
          scheduleNativeRender();
        } else {
          // 4. Check ob Re-Render nötig (asynchron)
          const result = updateNativeTransform();
          if (result) {
            const { offsetX, offsetY, zoomRatio } = result;
            const needsRerender =
              Math.abs(offsetX) > window.innerWidth * 0.5 ||
              Math.abs(offsetY) > window.innerHeight * 0.5 ||
              Math.abs(zoomRatio - 1) > 0.4;

            if (needsRerender) {
              scheduleNativeRender();
            }
          }
        }
      } else {
        // === TEXTURE MODUS ===
        if (state.renderMode !== 'texture') {
          cancelNativeRender();
          state.renderMode = 'texture';
          LOG.render('Switching to TEXTURE mode', { screenFontSize });
          hideNativeOverlay();
        }
      }
    }

    // Asynchrones Rendering - blockiert nie den Zoom
    function scheduleNativeRender() {
      cancelNativeRender();

      // requestIdleCallback für maximale Performance
      // Falls nicht verfügbar: setTimeout als Fallback
      if (window.requestIdleCallback) {
        state.renderTimeout = requestIdleCallback(() => {
          if (state.renderMode === 'native') {
            renderNativeTexture();
            showNativeOverlay();
          }
        }, { timeout: 150 });
      } else {
        state.renderTimeout = setTimeout(() => {
          if (state.renderMode === 'native') {
            renderNativeTexture();
            showNativeOverlay();
          }
        }, 16);
      }
    }

    function cancelNativeRender() {
      if (state.renderTimeout) {
        if (window.cancelIdleCallback) {
          cancelIdleCallback(state.renderTimeout);
        }
        clearTimeout(state.renderTimeout);
        state.renderTimeout = null;
      }
    }

    // ============================================================
    // EVENT HANDLERS
    // ============================================================
    function setupEvents() {
      const { container } = elements;

      // === MOUSE ===
      container.addEventListener('mousedown', e => {
        state.drag.active = true;
        state.drag.lastX = e.clientX;
        state.drag.lastY = e.clientY;
        container.classList.add('dragging');
      });

      window.addEventListener('mousemove', e => {
        if (!state.drag.active) return;
        state.pan.x += e.clientX - state.drag.lastX;
        state.pan.y += e.clientY - state.drag.lastY;
        state.drag.lastX = e.clientX;
        state.drag.lastY = e.clientY;
        applyTransform();
      });

      window.addEventListener('mouseup', () => {
        state.drag.active = false;
        container.classList.remove('dragging');
      });

      // === WHEEL ZOOM ===
      container.addEventListener('wheel', e => {
        e.preventDefault();

        const mx = e.clientX - window.innerWidth / 2 - state.pan.x;
        const my = e.clientY - window.innerHeight / 2 - state.pan.y;
        const factor = 1 + (e.deltaY > 0 ? -CONFIG.ZOOM.speed : CONFIG.ZOOM.speed);
        const newScale = clamp(state.scale * factor, CONFIG.ZOOM.min, CONFIG.ZOOM.max);

        if (newScale !== state.scale) {
          const ratio = newScale / state.scale;
          state.pan.x -= mx * (ratio - 1);
          state.pan.y -= my * (ratio - 1);
          state.scale = newScale;
          applyTransform();
        }
      }, { passive: false });

      // === TOUCH ===
      container.addEventListener('touchstart', e => {
        e.preventDefault();

        if (e.touches.length === 1) {
          state.drag.active = true;
          state.drag.lastX = e.touches[0].clientX;
          state.drag.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          state.drag.active = false;
          state.drag.lastPinchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
        }
      }, { passive: false });

      container.addEventListener('touchmove', e => {
        e.preventDefault();

        if (e.touches.length === 1 && state.drag.active) {
          state.pan.x += e.touches[0].clientX - state.drag.lastX;
          state.pan.y += e.touches[0].clientY - state.drag.lastY;
          state.drag.lastX = e.touches[0].clientX;
          state.drag.lastY = e.touches[0].clientY;
          applyTransform();
        } else if (e.touches.length === 2) {
          const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
          );
          const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2
                     - window.innerWidth / 2 - state.pan.x;
          const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2
                     - window.innerHeight / 2 - state.pan.y;
          const factor = dist / state.drag.lastPinchDist;
          const newScale = clamp(state.scale * factor, CONFIG.ZOOM.min, CONFIG.ZOOM.max);

          if (newScale !== state.scale) {
            const ratio = newScale / state.scale;
            state.pan.x -= cx * (ratio - 1);
            state.pan.y -= cy * (ratio - 1);
            state.scale = newScale;
            applyTransform();
          }
          state.drag.lastPinchDist = dist;
        }
      }, { passive: false });

      container.addEventListener('touchend', e => {
        state.drag.active = e.touches.length === 1;
        if (state.drag.active) {
          state.drag.lastX = e.touches[0].clientX;
          state.drag.lastY = e.touches[0].clientY;
        }
      });

      window.addEventListener('resize', applyTransform);
    }

    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
      try {
        LOG.init('Starting initialization...');

        // Text laden
        const response = await fetch('bibel.txt');
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        state.textData = (await response.text()).replace(/\s+/g, ' ').trim();

        if (!state.textData) {
          throw new Error('bibel.txt ist leer');
        }

        LOG.init(`Text loaded: ${state.textData.length} characters`);

        // Font-Größe festlegen, Radius berechnen der GENAU passt
        state.baseFontSize = CONFIG.TARGET_FONT_SIZE;
        state.circleRadius = calculateRadiusForText(state.textData.length, state.baseFontSize);

        LOG.init(`Target font size: ${state.baseFontSize}px`);
        LOG.init(`Calculated radius: ${state.circleRadius}px (for ${state.textData.length} chars)`);

        // Zeichenbreite und Zeilenhöhe cachen
        const measureCtx = document.createElement('canvas').getContext('2d');
        measureCtx.font = `${state.baseFontSize}px ${CONFIG.FONT_FAMILY}`;
        state.baseCharWidth = measureCtx.measureText('M').width;
        state.lineHeight = state.baseFontSize * CONFIG.LINE_HEIGHT_FACTOR;

        LOG.init(`Metrics: charWidth=${state.baseCharWidth.toFixed(2)}, lineHeight=${state.lineHeight.toFixed(2)}`);

        // Zeilen-Layout vorberechnen
        computeLineLayout();

        // Basis-Textur rendern und Layer initialisieren
        renderBaseTexture();
        initBaseLayer();
        hideNativeOverlay();

        // Events und erste Darstellung
        setupEvents();
        applyTransform();

        LOG.init('=== INITIALIZATION COMPLETE ===');
        LOG.state();

      } catch (error) {
        console.error('Fehler beim Initialisieren:', error);
        document.body.innerHTML = `
          <div style="color: #f55; padding: 2rem; font-family: monospace;">
            <h2>Fehler beim Laden</h2>
            <p>${error.message}</p>
          </div>
        `;
      }
    }

    // === START ===
    init();
  </script>
</body>
</html>
