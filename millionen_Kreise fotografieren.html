<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konzentrische Kreise mit Zoom</title>
    <style>
        body {
            --bg-color: black;
            --object-color: white;
            background: var(--bg-color);
            color: var(--object-color);
            margin: 0;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            display: block;
        }
        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
            display: none;
        }
        #downloadButton {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px; /* Festgelegte Breite für quadratischen Button */
            height: 50px; /* Festgelegte Höhe für quadratischen Button */
            background-color: var(--bg-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 24px;
            z-index: 10;
            color: var(--object-color); /* Gleiche Farbe wie body */
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #downloadButton span {
            display: inline-block;
        }
        #downloadButton:hover {
            opacity: 0.8;
        }
        /* Stil für das Mini-Fenster */
        #downloadOptions {
            position: fixed;
            top: 70px; /* Position unter dem Button */
            right: 10px;
            background-color: var(--bg-color);
            color: var(--object-color);
            padding: 10px;
            border: 1px solid var(--object-color);
            border-radius: 5px;
            display: none; /* Anfangs versteckt */
            z-index: 11;
            /* Entfernt das doppelte display: flex; */
        }
        /* Container für Breite und Höhe nebeneinander */
        .size-inputs {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .size-inputs input {
            width: 80px;
            padding: 5px;
            border: 1px solid var(--object-color);
            border-radius: 3px;
            background-color: transparent;
            color: var(--object-color);
            text-align: right;
        }
        .size-inputs label {
            margin-left: 5px;
        }
        /* Stil für das 'x' zwischen Breite und Höhe */
        .size-inputs .separator {
            margin: 0 10px;
            font-size: 16px;
        }
        /* Container für die Zentrierungsoption */
        .center-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .center-option input[type="radio"] {
            margin-right: 5px;
        }
        .center-option label {

            margin-right: 15px;
        }
        #downloadOptions button {
            align-self: center;
            padding: 5px 10px;
            background-color: var(--object-color);
            color: var(--bg-color);
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 14px;
        }
        #downloadOptions button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <canvas id="circleCanvas"></canvas>
    <div id="tooltip"></div>
    <button id="downloadButton">
        <span>&#11123;</span>
    </button>
    <!-- Mini-Fenster für Download-Einstellungen -->
    <div id="downloadOptions">
        <!-- Breite und Höhe nebeneinander mit 'x' und 'px' -->
        <div class="size-inputs">
            <input type="number" id="widthInput" value="1000" min="1">
            <label for="widthInput">px</label>
            <span class="separator">x</span>
            <input type="number" id="heightInput" value="1000" min="1">
            <label for="heightInput">px</label>
        </div>
        <!-- Zentrierungsoption -->
        <div class="center-option">
            <input type="radio" id="centered" name="centerOption" value="centered" checked>
            <label for="centered">centered</label>
            <input type="radio" id="currentView" name="centerOption" value="currentView">
            <label for="currentView">currentView</label>
        </div>
        <button id="confirmDownload">Download</button>
    </div>
    <script>
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const downloadButton = document.getElementById('downloadButton');
        const downloadOptions = document.getElementById('downloadOptions');
        const confirmDownload = document.getElementById('confirmDownload');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        let circles = [];
        let zoomLevel = 1;
        let offsetX = 0;
        let offsetY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawCircles();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawCircles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circles = [];
            let initialRadius = 1;
            let spacingFactor = 1.01;
            let lineWidth = 0.6;
            let numberOfCircles = 100000;

            ctx.strokeStyle = 'white';
            ctx.lineWidth = lineWidth;

            let radius = initialRadius;
            for (let i = 0; i < numberOfCircles; i++) {
                if ((radius * zoomLevel) > (Math.sqrt(Math.pow(canvas.width, 2) + Math.pow(canvas.height, 2)) / 2 + Math.max(Math.abs(offsetX), Math.abs(offsetY)))) {
                    break;
                }
                ctx.beginPath();
                ctx.arc(canvas.width / 2 + offsetX, canvas.height / 2 + offsetY, radius * zoomLevel, 0, Math.PI * 2);
                ctx.stroke();
                circles.push({ radius: radius, index: i + 1 });
                radius *= spacingFactor;
            }
        }

        canvas.addEventListener('mouseout', () => {
            // Entfernt das Referenzieren von hoverTimeout, da es nicht definiert ist
            tooltip.style.display = 'none';
        });

        canvas.addEventListener('wheel', (event) => {
            event.preventDefault();
            const zoomFactor = 1.05;
            if (event.deltaY < 0) {
                zoomLevel *= zoomFactor;
            } else {
                zoomLevel /= zoomFactor;
            }
            drawCircles();
        });

        canvas.addEventListener('mousedown', (event) => {
            let startX = event.clientX;
            let startY = event.clientY;
            const startOffsetX = offsetX;
            const startOffsetY = offsetY;

            function onMouseMove(e) {
                offsetX = startOffsetX + (e.clientX - startX);
                offsetY = startOffsetY + (e.clientY - startY);
                drawCircles();
            }

            function onMouseUp() {
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            }

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });

        // Toggle des Mini-Fensters beim Klicken des Download-Buttons
        downloadButton.addEventListener('click', (event) => {
            event.stopPropagation(); // Verhindert das sofortige Schließen des Fensters
            if (downloadOptions.style.display === 'none' || downloadOptions.style.display === '') {
                downloadOptions.style.display = 'block';
            } else {
                downloadOptions.style.display = 'none';
            }
        });

        // Schließen des Mini-Fensters beim Klicken außerhalb
        window.addEventListener('click', (event) => {
            if (!downloadButton.contains(event.target) && !downloadOptions.contains(event.target)) {
                downloadOptions.style.display = 'none';
            }
        });

        confirmDownload.addEventListener('click', () => {
            const width = parseInt(widthInput.value);
            const height = parseInt(heightInput.value);

            if (isNaN(width) || isNaN(height) || width < 1 || height < 1) {
                alert('Bitte geben Sie gültige Werte für Breite und Höhe ein.');
                return;
            }

            // Überprüfen, ob das Bild zentriert werden soll
            const centerOption = document.querySelector('input[name="centerOption"]:checked').value;

            let downloadOffsetX = 0;
            let downloadOffsetY = 0;

            if (centerOption === 'currentView') {
                downloadOffsetX = offsetX * (width / canvas.width);
                downloadOffsetY = offsetY * (height / canvas.height);
            }

            const downloadCanvas = document.createElement('canvas');
            downloadCanvas.width = width;
            downloadCanvas.height = height;
            const downloadCtx = downloadCanvas.getContext('2d');

            downloadCtx.fillStyle = 'black';
            downloadCtx.fillRect(0, 0, width, height);
            downloadCtx.strokeStyle = 'white';
            downloadCtx.lineWidth = 0.6 * (width / canvas.width);

            let radius = 1;
            let spacingFactor = 1.01;
            const maxRadius = Math.sqrt(Math.pow(width, 2) + Math.pow(height, 2)) / 2;

            while (radius * zoomLevel < maxRadius) {
                downloadCtx.beginPath();
                downloadCtx.arc(
                    width / 2 + downloadOffsetX,
                    height / 2 + downloadOffsetY,
                    radius * zoomLevel * (width / canvas.width),
                    0,
                    Math.PI * 2
                );
                downloadCtx.stroke();
                radius *= spacingFactor;
            }

            const link = document.createElement('a');
            link.href = downloadCanvas.toDataURL('image/png');
            link.download = 'justcircles.png';
            link.click();

            // Optional: Schließen des Mini-Fensters nach dem Download
            downloadOptions.style.display = 'none';
        });
    </script>
</body>
</html>
