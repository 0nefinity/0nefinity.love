<!DOCTYPE html>
<!-- where-is-01.html -->
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link href="/meta.css" rel="stylesheet" />
  <script src="/meta.js" defer></script>

  <style>
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }

    body {
      cursor: none;
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      touch-action: none;

      display: flex;
      align-items: center;
      justify-content: flex-start;
      flex-direction: column;
      padding-top: 3rem;
    }

    .cursor-loupe {
      position: fixed;
      width: 10rem;
      height: 10rem;
      pointer-events: none;
      z-index: 2000;
      transform: translate(-50%, -50%);
    }

    .cursor-loupe::before,
    .cursor-loupe::after {
      font-family: 'Ysabeau', system-ui, -apple-system, BlinkMacSystemFont,
        'Helvetica Neue', Arial, sans-serif;
    }

    .cursor-loupe::before {
      content: '0';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
      line-height: 1;
    }

    .cursor-loupe::after {
      content: '1';
      position: absolute;
      top: 85%;
      left: 67%;
      transform-origin: center left;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 6rem;
      line-height: 1;
    }
  </style>
</head>
<body>
  <h1>where is 0 1 ?</h1><p>can you find it?</p><p>maybe the magnifying glass can help you</p>
  <!-- 01 als Lupe angeordnet. Folgt der Maus, oder bei Touch dem Finger -->

  <script>
    (function () {
      const loupe = document.createElement('div');
      loupe.className = 'cursor-loupe';
      document.body.appendChild(loupe);

      function updatePosition(x, y) {
        loupe.style.left = x + 'px';
        loupe.style.top = y + 'px';
      }

      // Startposition: Bildschirmmitte
      updatePosition(window.innerWidth / 2, window.innerHeight / 2);

      // Direktpositionierung bei Klick/Tap
      window.addEventListener('pointerdown', function (event) {
        updatePosition(event.clientX, event.clientY);
      });

      window.addEventListener('pointermove', function (event) {
        updatePosition(event.clientX, event.clientY);
      });

      window.addEventListener(
        'touchstart',
        function (event) {
          const touch = event.touches[0];
          if (!touch) return;
          updatePosition(touch.clientX, touch.clientY);
        },
        { passive: true }
      );

      window.addEventListener(
        'touchmove',
        function (event) {
          const touch = event.touches[0];
          if (!touch) return;
          updatePosition(touch.clientX, touch.clientY);
        },
        { passive: true }
      );
    })();
  </script>
</body>
</html>
