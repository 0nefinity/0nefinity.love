<!DOCTYPE html>
<!-- where-is-01.html -->
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <link href="/meta.css" rel="stylesheet" />
  <script src="/meta.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      cursor: none;
    }

    .cursor-loupe {
      position: fixed;
      width: 10rem;
      height: 10rem;
      pointer-events: none;
      z-index: 2000;
      /* Für stufenlosen Zoom */
      --scale: 1;
      transform: translate(-75%, -85%) scale(var(--scale));
      transform-origin: 75% 85%;
    }

    .cursor-loupe::before {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8rem;
    }

    .cursor-loupe::after {
      top: 85%;
      left: 67%;
      transform-origin: center left;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 6rem;
    }
  </style>
</head>

<body>
  <h1>where is 0 1 ?</h1>
  <p>can you find it in the infinite?</p>
  <p>maybe the magnifying glass will help you</p>

  <script src="tools/zoom.js"></script>
  <script>
    (function () {
      const loupe = document.createElement('div');
      loupe.className = 'cursor-loupe';
      document.body.appendChild(loupe);

      const zoom = Zoom2D.createZoom2D({
        container: document.body,
        content: loupe,
        mode: 'relative',
        hoverFollowsPointer: true,
        minScale: 0,
        maxScale: Infinity,
        initialScale: 1,
        initialOffsetX: window.innerWidth / 2,
        initialOffsetY: window.innerHeight / 2,
        onTransform: ({ scale, offsetX, offsetY }) => {
          loupe.style.left = offsetX + 'px';
          loupe.style.top = offsetY + 'px';
          loupe.style.setProperty('--scale', scale);
        }
      });
    })();
  </script>
</body>

</html>
