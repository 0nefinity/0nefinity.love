<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kreisförmiger Text</title>
  <style>
    canvas {
      display: block;
      margin: 0 auto;
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="textCircle"></canvas>
  <script>
    const canvas = document.getElementById("textCircle");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const maxRadius = Math.min(centerX, centerY) * 0.9; // Maximaler Radius

    const text = "Hier kommt ein sehr langer Text. ".repeat(500000); // Beispieltext
    let charIndex = 0;

    const lineSpacing = 20; // Abstand zwischen den Zeilen
    const fontSize = 16; // Schriftgröße
    ctx.font = `${fontSize}px Arial`;
    ctx.fillStyle = "white";
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";

    // Zeichne den Text im Kreis
    for (let radius = 0; radius <= maxRadius; radius += lineSpacing) {
      // Berechne die Breite der Zeile
      const circumference = 2 * Math.PI * radius;
      const maxChars = Math.floor(circumference / fontSize);

      // Hole den Textabschnitt für die aktuelle Zeile
      const lineText = text.slice(charIndex, charIndex + maxChars);
      charIndex += maxChars;

      if (lineText.length === 0) break; // Ende des Textes erreicht

      // Zeichne den Text entlang der Linie
      for (let i = 0; i < lineText.length; i++) {
        const angle = (i / lineText.length) * 2 * Math.PI;
        const x = centerX + radius * Math.cos(angle);
        const y = centerY + radius * Math.sin(angle);
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle + Math.PI / 2);
        ctx.fillText(lineText[i], 0, 0);
        ctx.restore();
      }
    }
  </script>
</body>
</html>
