<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0nefinity</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .menu-button {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 5px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      background-color: transparent;
      font-size: 50px;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .menu-button.expanded {
      padding: 5px 10px;
    }

    .menu {
      position: fixed;
      top: 70px; /* Platz unterhalb des Symbols */
      right: 10px;
      width: 250px;
      max-height: 90%;
      background-color: rgba(0, 0, 0, 0.8); /* Transparenter Hintergrund */
      padding: 10px;
      box-sizing: border-box;
      overflow-y: auto;
      border-radius: 5px;
      display: none;
    }

    .menu.open {
      display: block;
    }

    .menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu ul li {
      margin: 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .menu ul li a {
      color: white;
      text-decoration: none;
    }

    .menu ul li a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="menu-button">≡</div>
  <div class="menu">
    <ul id="file-list"></ul>
  </div>

  <script>
    const menuButton = document.querySelector('.menu-button');
    const menu = document.querySelector('.menu');

    // Klick-Event für Menü
    menuButton.addEventListener('click', () => {
      menu.classList.toggle('open');
      menuButton.classList.toggle('expanded');

      // Ändere den Button-Text basierend auf dem Zustand
      menuButton.textContent = menuButton.classList.contains('expanded') ? '0 ≡ 1 ≡ ∞' : '≡';
    });

    // Funktion, um die Datei-Liste zu laden
    async function loadFileList() {
      try {
        const response = await fetch('file-list.json');
        const files = await response.json();
        const fileList = document.getElementById('file-list');

        files.forEach(file => {
          const listItem = document.createElement('li');
          const link = document.createElement('a');
          link.href = file;

          // Entferne die Dateiendung für die Anzeige
          const displayName = file.replace(/\.[^/.]+$/, '');

          link.textContent = displayName;
          listItem.appendChild(link);
          fileList.appendChild(listItem);
        });
      } catch (error) {
        console.error('Fehler beim Laden der Datei-Liste:', error);
      }
    }

    // Datei-Liste laden
    loadFileList();
  </script>
</body>
</html>
