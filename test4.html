<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Textvisualisierung</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
      touch-action: none; /* Deaktiviert Standard-Zoom und Scroll */
    }
    canvas {
      display: block;
    }
    #controls {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
    }
    .zoom-btn {
      width: 50px;
      height: 50px;
      background-color: transparent;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .zoom-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button class="zoom-btn" id="zoom-in">+</button>
    <button class="zoom-btn" id="zoom-out">−</button>
  </div>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const zoomInBtn = document.getElementById('zoom-in');
    const zoomOutBtn = document.getElementById('zoom-out');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let textData = '';
    let lines = [];
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    let panX = 0;
    let panY = 0;
    let scale = 1;
    let zoomInterval;
    let initialDistance = 0;

    fetch('bibel.txt')
      .then(response => response.text())
      .then(data => {
        textData = data.replace(/\s+/g, ' ').trim();
        init();
      })
      .catch(error => console.error(error));

    function init() {
      const radius = Math.min(canvas.width, canvas.height) / 2 - 50;

      let fontSize = 20;
      ctx.font = `${fontSize}px monospace`;
      let charWidth = ctx.measureText('M').width;
      let lineHeight = fontSize * 1.2;

      let capacity = recalculateCapacity(radius, lineHeight, charWidth);

      if (textData.length < capacity) {
        while (textData.length < capacity && fontSize < 100) {
          fontSize += 1;
          ctx.font = `${fontSize}px monospace`;
          charWidth = ctx.measureText('M').width;
          lineHeight = fontSize * 1.2;
          capacity = recalculateCapacity(radius, lineHeight, charWidth);
        }
      } else {
        while (textData.length > capacity && fontSize > 5) {
          fontSize -= 1;
          ctx.font = `${fontSize}px monospace`;
          charWidth = ctx.measureText('M').width;
          lineHeight = fontSize * 1.2;
          capacity = recalculateCapacity(radius, lineHeight, charWidth);
        }
      }

      lines = [];
      let textIndex = 0;
      for (let yPos = -radius + lineHeight / 2; yPos <= radius - lineHeight / 2; yPos += lineHeight) {
        const lineRadius = Math.sqrt(radius * radius - yPos * yPos);
        const maxLineWidth = lineRadius * 2;
        const maxChars = Math.floor(maxLineWidth / charWidth);

        const remainingChars = textData.length - textIndex;
        const charsInLine = Math.min(maxChars, remainingChars);
        const lineText = textData.substr(textIndex, charsInLine);
        textIndex += charsInLine;

        if (lineText.length > 0) {
          lines.push({ text: lineText, y: yPos });
        }
      }

      draw();
    }

    function recalculateCapacity(radius, lineHeight, charWidth) {
      let newCapacity = 0;
      for (let yPos = -radius + lineHeight / 2; yPos <= radius - lineHeight / 2; yPos += lineHeight) {
        const lineRadius = Math.sqrt(radius * radius - yPos * yPos);
        const maxLineWidth = lineRadius * 2;
        const maxChars = Math.floor(maxLineWidth / charWidth);
        newCapacity += maxChars;
      }
      return newCapacity;
    }

    function draw() {
      ctx.save();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.translate(canvas.width / 2 + panX, canvas.height / 2 + panY);
      ctx.scale(scale, scale);

      lines.forEach((line) => {
        ctx.fillText(line.text, 0, line.y);
      });

      ctx.restore();
    }

    function zoom(factor, x = canvas.width / 2, y = canvas.height / 2) {
      const zoomX = (x - canvas.width / 2 - panX) / scale;
      const zoomY = (y - canvas.height / 2 - panY) / scale;

      scale *= factor;

      panX -= (zoomX * (factor - 1)) * scale;
      panY -= (zoomY * (factor - 1)) * scale;

      draw();
    }

    function startZoom(factor) {
      zoom(factor);
      zoomInterval = setInterval(() => zoom(factor), 50);
    }

    function stopZoom() {
      clearInterval(zoomInterval);
    }

    // Maussteuerung
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      lastX = e.clientX;
      lastY = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        const dx = e.clientX - lastX;
        const dy = e.clientY - lastY;
        panX += dx;
        panY += dy;
        lastX = e.clientX;
        lastY = e.clientY;
        draw();
      }
    });

    canvas.addEventListener('mouseup', () => {
      isDragging = false;
    });

    canvas.addEventListener('mouseleave', () => {
      isDragging = false;
    });

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      zoom(Math.pow(1.05, -e.deltaY), e.clientX, e.clientY);
    });

    // Touchsteuerung
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        initialDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (e.touches.length === 2) {
        const currentDistance = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );

        const factor = currentDistance / initialDistance;
        zoom(factor, (e.touches[0].clientX + e.touches[1].clientX) / 2, (e.touches[0].clientY + e.touches[1].clientY) / 2);
        initialDistance = currentDistance;
      }
    });

    zoomInBtn.addEventListener('mousedown', () => startZoom(1.1));
    zoomInBtn.addEventListener('mouseup', stopZoom);
    zoomOutBtn.addEventListener('mousedown', () => startZoom(0.9));
    zoomOutBtn.addEventListener('mouseup', stopZoom);

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      draw();
    });
  </script>
</body>
</html>
