<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ASCII Generator</title>
    <style>
        /* Gesamte Seite nutzen */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000; /* Schwarzer Hintergrund */
            color: #fff; /* Weiße Textelemente */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .controls label {
            display: flex;
            flex-direction: column;
            font-size: 16px;
        }

        .controls input, .controls select {
            padding: 8px;
            font-size: 16px;
            margin-top: 5px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #222;
            color: #fff;
        }

        .controls select {
            height: 150px;
        }

        .preview-container {
            flex: 1;
            overflow: auto;
            background-color: #000;
            padding: 20px;
            border: 1px solid #555;
            border-radius: 4px;
        }

        .preview {
            font-family: monospace;
            white-space: pre;
            color: #fff; /* Weiße ASCII-Art */
            line-height: 1;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASCII Generator</h1>
        <div class="controls">
            <label>
                <strong>Eingabetext:</strong>
                <input type="text" id="inputText" value="Hallo">
            </label>
            <label>
                <strong>Auflösung (Skalierung):</strong>
                <input type="number" id="scale" value="2" min="1" max="10">
            </label>
            <label>
                <strong>Bausteine auswählen:</strong>
                <select id="bausteineSelect" multiple>
                    <option value="+0">+0</option>
                    <option value="*1">*1</option>
                    <option value="¹">¹</option>
                    <option value="-0">-0</option>
                    <option value="/1">/1</option>
                    <option value="+1-1">+1-1</option>
                    <option value="±log₀">±log₀</option>
                    <option value="*log₀(1)">*log₀(1)</option>
                </select>
                <small>Halte die Ctrl-Taste (Windows) oder Cmd-Taste (Mac) gedrückt, um mehrere auszuwählen.</small>
            </label>
        </div>
        <h2>ASCII-Art Vorschau:</h2>
        <div class="preview-container">
            <div class="preview" id="asciiOutput">
                <!-- ASCII-Art wird hier angezeigt -->
            </div>
        </div>
    </div>

    <script>
        // Definiere die Bausteine
        const BAUSTEINE = ["+0", "*1", "¹", "-0", "/1", "+1-1", "±log₀", "*log₀(1)"];

        /**
         * Funktion zum Zeichnen von Text auf einem unsichtbaren Canvas und Umwandeln in ein Binärraster
         * @param {string} text - Der Eingabetext
         * @param {number} scale - Der Skalierungsfaktor
         * @returns {Array<Array<number>>} Binärraster des Textes
         */
        function textToBinaryGrid(text, scale = 2) {
            const baseFontSize = 16; // Basis-Schriftgröße in Pixel
            const fontSize = baseFontSize * scale;
            const font = `${fontSize}px Arial`;

            // Erstelle ein temporäres Canvas
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            context.font = font;

            // Bestimme die Größe des Textes
            const metrics = context.measureText(text);
            const textWidth = Math.ceil(metrics.width);
            const textHeight = Math.ceil(fontSize * 1.2); // 1.2 ist ein Faktor für die Zeilenhöhe

            // Setze die Canvas-Größe entsprechend der Textabmessungen
            canvas.width = textWidth;
            canvas.height = textHeight;

            // Zeichne den Text auf die Canvas
            context.fillStyle = '#000'; // Schwarzer Hintergrund
            context.fillRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = '#fff'; // Weiße Schrift
            context.fillText(text, 0, fontSize); // Text positioniert basierend auf der Schriftgröße

            // Hole die Bilddaten
            const imageData = context.getImageData(0, 0, canvas.width, canvas.height).data;

            // Konvertiere die Bilddaten in ein Binärraster
            const binaryGrid = [];
            for (let y = 0; y < canvas.height; y++) {
                const row = [];
                for (let x = 0; x < canvas.width; x++) {
                    const index = (y * canvas.width + x) * 4;
                    const r = imageData[index];
                    const g = imageData[index + 1];
                    const b = imageData[index + 2];
                    const brightness = (r + g + b) / 3;
                    row.push(brightness > 128 ? 1 : 0); // 1 für weiße Pixel (Text), 0 für schwarze
                }
                binaryGrid.push(row);
            }

            return binaryGrid;
        }

        /**
         * Funktion zur Umwandlung des Binärrasters in ASCII-Art
         * @param {Array<Array<number>>} binaryGrid - Das Binärraster des Textes
         * @param {Array<string>} bausteine - Die ausgewählten Bausteine
         * @returns {string} Die generierte ASCII-Art
         */
        function binaryGridToAscii(binaryGrid, bausteine) {
            let asciiArt = "";
            // Erstelle eine Kopie und mische die Bausteine zufällig
            const shuffledBausteine = shuffleArray([...bausteine]);

            for (let y = 0; y < binaryGrid.length; y++) {
                for (let x = 0; x < binaryGrid[y].length; x++) {
                    if (binaryGrid[y][x]) {
                        // Verwende die Bausteine in zufälliger Reihenfolge
                        const symbol = shuffledBausteine[(y * binaryGrid[y].length + x) % shuffledBausteine.length];
                        asciiArt += symbol;
                    } else {
                        asciiArt += "  "; // Zwei Leerzeichen für bessere Darstellung
                    }
                }
                asciiArt += "\n";
            }
            return asciiArt;
        }

        /**
         * Funktion zum Zufällig Mischen eines Arrays (Fisher-Yates Algorithmus)
         * @param {Array} array - Das zu mischende Array
         * @returns {Array} Das gemischte Array
         */
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        /**
         * Funktion zum Generieren der ASCII-Art
         */
        function generateAsciiArt() {
            const inputText = document.getElementById('inputText').value;
            const scale = parseInt(document.getElementById('scale').value, 10);
            const selectedOptions = Array.from(document.getElementById('bausteineSelect').selectedOptions);
            const bausteine = selectedOptions.length > 0 ? selectedOptions.map(option => option.value) : BAUSTEINE;

            if (bausteine.length === 0) {
                document.getElementById('asciiOutput').textContent = "Bitte wähle mindestens einen Baustein aus.";
                return;
            }

            // Konvertiere den Text in ein Binärraster
            const binaryGrid = textToBinaryGrid(inputText, scale);

            // Konvertiere das Raster in ASCII-Art
            const asciiArt = binaryGridToAscii(binaryGrid, bausteine);

            // Zeige die ASCII-Art an
            document.getElementById('asciiOutput').textContent = asciiArt;
        }

        /**
         * Funktion zum Holen aller relevanten Inputs und Generieren der ASCII-Art
         */
        function updateAsciiArt() {
            generateAsciiArt();
        }

        // Event Listener für alle relevanten Eingaben
        document.getElementById('inputText').addEventListener('input', updateAsciiArt);
        document.getElementById('scale').addEventListener('input', updateAsciiArt);
        document.getElementById('bausteineSelect').addEventListener('change', updateAsciiArt);

        // Initiale Generierung beim Laden der Seite
        window.onload = generateAsciiArt;
    </script>
</body>
</html>
