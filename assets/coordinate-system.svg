         d="M 3,-3 0,0 3,3"
         transform="rotate(180,0.125,0)"
         sodipodi:nodetypes="ccc"
         id="path15" />
    </marker>
    <!-- Marker für die Pfeilspitzen, Farbe jetzt per CSS-Variable -->
    <marker
       id="arrow"
       viewBox="0 0 10 10"
       refX="5"
       refY="5"
       markerWidth="3"
       markerHeight="3"
       orient="auto">
      <path
         d="M0,0 L10,5 L0,10 L5,5 Z"
         fill="var(--text-color)"
         id="path1" />
    </marker>
  </defs>
  <!-- Gruppierung mit globalem Styling für das Koordinatensystem -->
  <g
