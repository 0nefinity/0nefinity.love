<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="400" height="400"
     viewBox="-50 -50 100 100"
     preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Marker für die Pfeilspitzen, Farbe jetzt per CSS-Variable -->
    <marker id="arrow" viewBox="0 0 10 10"
            refX="5" refY="5"
            markerWidth="3" markerHeight="3"
            orient="auto">
      <path d="M0,0 L10,5 L0,10 L5,5 Z" fill="var(--text-color)" />
    </marker>
  </defs>
  <!-- Gruppierung mit globalem Styling für das Koordinatensystem -->
  <g id="coordinateSystem" fill="none" stroke="var(--text-color)" stroke-width="1">
    <!-- X-Achse: von -35 bis 35, Pfeil am rechten Ende -->
    <line x1="-35" y1="0" x2="35" y2="0" marker-end="url(#arrow)"/>
    <!-- Y-Achse: Damit positive Y nach oben zeigt, zeichnen wir von unten nach oben -->
    <line x1="0" y1="35" x2="0" y2="-35" marker-end="url(#arrow)"/>

    <!-- Ticks für die X-Achse (alle 10 Einheiten) -->
    <line x1="-30" y1="-1" x2="-30" y2="1"/>
    <line x1="-20" y1="-1" x2="-20" y2="1"/>
    <line x1="-10" y1="-1" x2="-10" y2="1"/>
    <line x1="10"  y1="-1" x2="10"  y2="1"/>
    <line x1="20"  y1="-1" x2="20"  y2="1"/>
    <line x1="30"  y1="-1" x2="30"  y2="1"/>

    <!-- Ticks für die Y-Achse (alle 10 Einheiten) -->
    <line x1="-1" y1="-30" x2="1" y2="-30"/>
    <line x1="-1" y1="-20" x2="1" y2="-20"/>
    <line x1="-1" y1="-10" x2="1" y2="-10"/>
    <line x1="-1" y1="10"  x2="1" y2="10"/>
    <line x1="-1" y1="20"  x2="1" y2="20"/>
    <line x1="-1" y1="30"  x2="1" y2="30"/>

    <!-- Achsenbeschriftungen mit angepasstem Stroke (kein Stroke) -->
    <text x="35" y="5" text-anchor="middle" fill="var(--text-color)" stroke="none" font-size="3px">X</text>
    <text x="-3" y="-33" text-anchor="end" fill="var(--text-color)" stroke="none" font-size="3px">Y</text>
  </g>
</svg>
