<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/meta.css" rel="stylesheet">
    <script src="/meta.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <title>whitelines - 0nefinity</title>
  </head>
  <body>
    <div id="canvasContainer" class="_018-canvas"></div>

    <script>
      const config = {
        changeAngles: false,
        preventNewLines: false,
        linesPerFrame: 10,
        strokeWeight: 0.01
      };

      let lines = [];
      let canvasContainer;

      function setup() {
        canvasContainer = document.getElementById('canvasContainer');

        const canvas = createCanvas(windowWidth, windowHeight);
        if (canvasContainer) canvas.parent(canvasContainer);

        background(0);
        angleMode(DEGREES);

        if (window.Controls && Controls.createPanel) {
          const panel = Controls.createPanel({
            position: 'left',
            mobileContentElement: canvasContainer,
            mobileContentMaxOffset: 12
          });

          panel
            .addToggle('changeAngles', {
              label: 'Winkel ändern',
              value: config.changeAngles,
              onChange: value => { config.changeAngles = value; }
            })
            .addToggle('preventNewLines', {
              label: 'Keine neuen Linien',
              value: config.preventNewLines,
              onChange: value => { config.preventNewLines = value; }
            })
            .addSlider('linesPerFrame', {
              label: 'Linien / Frame',
              min: 1,
              max: 100,
              step: 1,
              value: config.linesPerFrame,
              decimals: 0,
              onChange: value => { config.linesPerFrame = value; }
            })
            .addSlider('strokeWeight', {
              label: 'Strichstärke',
              min: 0,
              max: 1,
              step: 0.01,
              value: config.strokeWeight,
              decimals: 3,
              onChange: value => { config.strokeWeight = value; }
            });
        }
      }

      function draw() {
        if (!config.preventNewLines) {
          for (let i = 0; i < config.linesPerFrame; i += 1) {
            lines.push(random(360));
          }
        }

        if (config.changeAngles) {
          lines = lines.map(() => random(360));
        }

        background(0);
        translate(width / 2, height / 2);
        stroke(255);
        strokeWeight(config.strokeWeight);

        lines.forEach(angle => {
          line(0, 0, cos(angle) * 1000, sin(angle) * 1000);
        });
      }

      function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
      }
    </script>
  </body>
</html>
