<!DOCTYPE html>
<!-- bibelaufdenpunkt.html 
 eine von unendlich random möglichkeiten, die Bibel und andere Bibeln zu rendern-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bibelpunkt</title>

  <link href="/meta.css" rel="stylesheet" />
  <script src="/meta.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    /* _018-canvas Klasse wird von meta.css bereitgestellt */
    .texture-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      will-change: transform, opacity, filter;
    }
    #fern-layer {
      z-index: 1;
      pointer-events: none;
      opacity: 0;
    }
    #nah-layer {
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }
    #presence-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
    }
    #line-width-ghost {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      display: none;
      pointer-events: none;
      opacity: 0;
      will-change: opacity;
    }
    #render-whisper {
      position: absolute;
      left: 14px;
      bottom: 14px;
      top: auto;
      z-index: 1100;
      pointer-events: none;
      padding: 6px 9px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      background: rgba(0,0,0,0.72);
      color: rgba(255,255,255,0.9);
      font: 12px/1.1 monospace;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 120ms ease, transform 120ms ease;
    }
    #render-whisper [data-render-whisper-label] {
      display: inline-block;
      position: relative;
      white-space: nowrap;
    }
    #render-whisper [data-render-whisper-dots] {
      white-space: pre;
    }
    #render-whisper.active {
      opacity: 1;
      transform: translateY(0);
    }
    #render-whisper[data-kind="load"] {
      left: 50%;
      top: 50%;
      bottom: auto;
      padding: 0;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.98);
      font: 600 16px/1.1 monospace;
      letter-spacing: 0.08em;
      transform: translate(-50%, calc(-50% + 8px));
      white-space: nowrap;
      text-shadow: 0 2px 10px rgba(0,0,0,0.45);
    }
    #render-whisper[data-kind="load"] [data-render-whisper-label] {
      display: inline-block;
      position: relative;
    }
    #render-whisper[data-kind="load"] [data-render-whisper-dots] {
      position: absolute;
      left: 100%;
      top: 0;
      margin-left: 0.08em;
    }
    #render-whisper[data-kind="load"].active {
      transform: translate(-50%, -50%);
    }

    /* Bible Karussell UI */
    #bible-selector-wrapper {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      font-family: monospace;
      user-select: none;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: 90vw;
      padding: 0 10px;
      pointer-events: auto;
    }
    #bible-selector-wrapper .title {
      color: #fff;
      font-size: 20px;
      line-height: 1.2;
      flex-shrink: 0;
    }
    #bible-selector-wrapper .remix-summary {
      display: none;
      color: #fff;
      font-size: 20px;
      line-height: 1.2;
      text-align: left;
      word-break: break-word;
      max-width: min(70vw, 680px);
    }
    #bible-selector-wrapper.remix-active {
      align-items: flex-start;
    }
    #bible-selector-wrapper.remix-active .title,
    #bible-selector-wrapper.remix-active #bible-karussell {
      display: none;
    }
    #bible-selector-wrapper.remix-active .remix-summary {
      display: block;
    }
    #bible-karussell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      /* Breite wird per JS gesetzt basierend auf längstem Namen */
    }
    #bible-karussell .item {
      transition: all 0.2s ease-out;
      cursor: pointer;
      line-height: 1.4;
      white-space: nowrap;
    }
    #bible-karussell .item.active {
      font-size: 20px;
      opacity: 1;
      color: #fff;
    }
    #bible-karussell .item.inactive {
      font-size: 14px;
      opacity: 0.5;
      color: #888;
    }
    #bible-karussell .item.more-inactive {
      font-size: 10px;
      opacity: 0.25;
      color: #666;
    }

    #drop-bible-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 1101;
      display: none;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      text-align: center;
      font-family: monospace;
    }
    #drop-bible-overlay.active {
      display: flex;
    }
    #drop-bible-button {
      --drop-bible-diameter: 220px;
      position: relative;
      display: inline-flex;
      width: var(--drop-bible-diameter);
      height: var(--drop-bible-diameter);
      align-items: center;
      justify-content: center;
      border: 2px dashed rgba(255,255,255,0.26);
      border-radius: 50%;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 35%, rgba(0,0,0,0.14) 100%),
        rgba(0,0,0,0.62);
      color: rgba(255,255,255,0.96);
      padding: 20px;
      font: 600 14px/1.2 monospace;
      letter-spacing: 0.04em;
      cursor: pointer;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease, color 120ms ease;
      box-shadow: 0 12px 34px rgba(0,0,0,0.25);
    }
    #drop-bible-button:hover,
    #drop-bible-button:focus-visible {
      transform: translateY(-1px) scale(1.01);
      border-color: rgba(255,255,255,0.5);
      box-shadow: 0 18px 44px rgba(0,0,0,0.3);
      outline: none;
    }
    #drop-bible-button[data-drop-bible-state="drag-valid"] {
      border-color: rgba(185,255,232,0.88);
      color: rgba(223,255,244,0.98);
      background:
        radial-gradient(circle at center, rgba(150,255,220,0.14) 0%, rgba(90,220,180,0.08) 35%, rgba(0,0,0,0.12) 100%),
        rgba(0,0,0,0.72);
      box-shadow: 0 0 0 1px rgba(170,255,229,0.18), 0 18px 48px rgba(44,181,143,0.18);
    }
    #drop-bible-button[data-drop-bible-state="drag-invalid"] {
      border-color: rgba(255,118,118,0.92);
      color: rgba(255,232,232,0.98);
      background:
        radial-gradient(circle at center, rgba(255,110,110,0.12) 0%, rgba(255,70,70,0.08) 35%, rgba(0,0,0,0.14) 100%),
        rgba(0,0,0,0.72);
      box-shadow: 0 0 0 1px rgba(255,120,120,0.18), 0 18px 48px rgba(186,48,48,0.18);
    }
    #drop-bible-content {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      font-size: calc(var(--drop-bible-diameter) * 0.082);
      line-height: 1;
      pointer-events: none;
    }
    /* ── Drop-Bible Slots ─────────────────────────────────
       Alle 3 Elemente sind direkt per top-% im Kreis positioniert.
       Zum Anpassen einfach den top-Wert ändern:
         SVG:  top: 30%   → höher = kleinere Zahl, tiefer = größere
         Text: top: 50%   → exakt mittig
         Hint: top: 60%   → direkt unter dem Text
       ───────────────────────────────────────────────────── */
    #drop-bible-icon-slot {
      position: absolute;
      left: 50%;
      top: 15%;              /* ← SVG-Position: höher/tiefer hier ändern */
      transform: translate(-50%, -50%);
      width: 18%;
      height: 18%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #drop-bible-icon {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.95;
    }
    #drop-bible-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: currentColor;
    }
    #drop-bible-label {
      position: absolute;
      left: 50%;
      top: 50%;              /* ← Text-Position: exakt Kreismitte */
      transform: translate(-50%, -50%);
      display: block;
      width: 100%;
      font-size: 0.9em;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }
    #drop-bible-hint {
      position: absolute;
      left: 50%;
      top: 60%;              /* ← Hint-Position: direkt unter Text */
      transform: translate(-50%, 0);
      display: none;
      width: 80%;
      max-width: none;
      color: rgba(255,198,198,0.96);
      font-size: 0.42em;
      line-height: 1.28;
      letter-spacing: 0.01em;
      text-align: center;
      pointer-events: none;
    }
    #drop-bible-button[data-drop-bible-state="drag-invalid"] #drop-bible-hint,
    #drop-bible-button[data-drop-bible-state="invalid"] #drop-bible-hint {
      display: block;
    }
    #drop-bible-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      border: 0;
      opacity: 0;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }
    /* Mobile: Titel zentriert oben, Karussell darunter */
    @media (max-width: 500px) {
      #bible-selector-wrapper {
        top: calc(env(safe-area-inset-top, 0px) + 40px);
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 12px;
      }
      #bible-selector-wrapper .title {
        font-size: 16px;
      }
      #bible-selector-wrapper .remix-summary {
        font-size: 16px;
        text-align: center;
        max-width: 90vw;
      }
      #bible-karussell {
        align-items: center;
      }
      #bible-karussell .item.active {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="bible-selector-wrapper">
    <div class="title">choose your type of</div>
    <div class="remix-summary" id="remix-summary"></div>
    <div id="bible-karussell">
      <div class="item more-inactive" id="prevItem2"></div>
      <div class="item inactive" id="prevItem1"></div>
      <div class="item active" id="activeItem"></div>
      <div class="item inactive" id="nextItem1"></div>
      <div class="item more-inactive" id="nextItem2"></div>
    </div>
  </div>

  <div class="_018-canvas">
    <canvas id="fern-layer" class="texture-layer"></canvas>
    <canvas id="nah-layer" class="texture-layer"></canvas>
    <canvas id="presence-layer"></canvas>
    <canvas id="line-width-ghost" aria-hidden="true"></canvas>
    <div id="render-whisper" aria-live="polite"><span data-render-whisper-label></span><span data-render-whisper-dots></span></div>
    <div id="drop-bible-overlay" aria-live="polite">
      <label id="drop-bible-button" role="button" tabindex="0">
        <span id="drop-bible-content">
          <span id="drop-bible-icon-slot" aria-hidden="true">
            <span id="drop-bible-icon">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M5 20h14v-6h2v8H3v-8h2v6Zm7-18 5.5 5.5h-3.5V16h-4V7.5H6.5L12 2Z" />
              </svg>
            </span>
          </span>
          <span id="drop-bible-label">drop bible txt</span>
          <span id="drop-bible-hint">only .txt files possible. If you want support for more fileformats, pls contribute to the project on github.com/0nefinity/0nefinity.love</span>
        </span>
        <input id="drop-bible-input" type="file" accept=".txt,text/plain" multiple>
      </label>
    </div>
  </div>

  <script>
    const CONFIG = {
      ZOOM: {
        min: 0.00001,
        max: 10000,
        speed: 0.03
      },
      TARGET_FONT_SIZE: 12,
      TARGET_WORLD_SPAN: 20000,
      LINE_HEIGHT_FACTOR: 1.2,
      FONT_FAMILY: 'monospace',
      SHAPES: {
        initial: 'circle',
        lineWidthChars: 420,
        minLineWidthChars: 1,
        maxLineWidthChars: 10000,
        fitMargin: 0.92,
        initialCircleViewportFraction: 0.5,
        previewSpiritMaxRows: 900,
        previewHoldWidthPx: 2,
        previewHoldFontPx: 1.5,
        nativeFallbackRowLimit: 12000
      },
      FERN_TEXTURE: {
        maxSize: 16384,
        scale: 0.42,
        safetyHeadroom: 0.985,
        progressiveScales: [0.18, 0.26, 0.34, 0.42],
        initialScreenFontThresholds: [0.9, 1.6, 2.8]
      },
      NAH: {
        rerenderZoomRatioMin: 0.88,
        rerenderZoomRatioMax: 1.14
      },
      PROGRESSIVE: {
        idleStages: [180, 700, 1600],
        midUpgradeDelays: [120, 520, 1300],
        nativeQualityBoosts: [1.1, 1.45, 1.9],
        minPixelGain: 0.75,
        minQualityGainRatio: 1.12
      },
      PRESENCE: {
        minAxisPx: 1,
        fullAlphaBelowPx: 0.35,
        vanishBelowPx: 0.04,
        brightnessNear: 1.15,
        brightnessFar: 2.7,
        contrastNear: 1.05,
        contrastFar: 1.95,
        alphaNear: 0.75,
        alphaFar: 1,
        profileBins: 1024,
        samplesPerBin: 24,
        densityGamma: 1,
        maxPixelAlpha: 0.82,
        coverageGamma: 0.5,
        longLineCoverageGamma: 0.22,
        longLineBoostStartPx: 4,
        longLineBoostFullPx: 28
      },
      BLEND: {
        midToNativeStart: 3.2,
        midToNativeEnd: 10
      },
      get MID_TEXTURE() {
        return this.FERN_TEXTURE;
      },
      get NATIVE() {
        return this.NAH;
      }
    };

    function smoothstep(min, max, value) {
      const t = Math.max(0, Math.min(1, (value - min) / (max - min)));
      return t * t * (3 - 2 * t);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(min, value), max);
    }

    const LOREM_BIBLE_FILE = '__every_bible__';
    const LOREM_BIBLE_NAME = 'every bible (Platzhalter)';
    const DEFAULT_BIBLE_FILE = 'Bibel.txt';
    const THORA_FILE = 'Thora.txt';
    const QURAN_FILE = 'Quran.txt';
    const EVOLUTIONSTHEORIE_FILE = 'Evolutionstheorie.txt';
    const BHAGAVAD_GITA_FILE = 'Bhagavad-Gita.txt';
    const FULL_MAHABHARATA_FILE = 'full-Mahabharata.txt';
    const TRIPLE_BIBLE_FILE = 'triplebible.txt';
    const FULL_MAHABHARATA_UNLOCK_LABEL = 'unlock full Mahabharata (english only)';
    const LOREM_DEFAULT_WORD_COUNT = 1000;
    const LOREM_DEFAULT_MAX_WORD_COUNT = 10000000;
    const LOREM_HARD_MAX_WORD_COUNT = 100000000;
    const LOREM_REBUILD_DEBOUNCE_MS = 220;
    const REMIX_DOCUMENT_FILE = '__bible_remix__';
    const LOREM_IPSUM_BASE_TEXT = 'Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua Ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur Excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum';
    const LOREM_IPSUM_WORDS = LOREM_IPSUM_BASE_TEXT.split(' ');

    const state = {
      textData: '',
      documentCacheKey: '',
      normalizeScale: 1,
      baseFontSize: 0,
      baseCharWidth: 0,
      lineHeight: 0,
      documentMeta: null,
      documentMode: 'single',
      documentSelectionKey: '',
      blendTuning: {
        midToNativeStart: CONFIG.BLEND.midToNativeStart,
        midToNativeEnd: CONFIG.BLEND.midToNativeEnd
      },
      shape: {
        type: CONFIG.SHAPES.initial,
        lineWidthChars: CONFIG.SHAPES.lineWidthChars
      },
      libraryUnlocks: {
        fullMahabharata: false
      },
      lorem: {
        wordCount: LOREM_DEFAULT_WORD_COUNT,
        rebuildTimeout: null
      },
      remix: {
        unitMode: 'word',
        sortMode: 'random',
        sortDirection: 'asc',
        randomSeed: createRandomSeed(),
        countsByFile: {},
        reloadTimeout: null
      },
      layout: {
        rows: [],
        bounds: { minX: -1, maxX: 1, minY: -1, maxY: 1, width: 2, height: 2 },
        center: { x: 0, y: 0 },
        maxLineWidth: 0,
        worldSpan: 2,
        meta: {}
      },
      focusWorld: { x: 0, y: 0 },
      scale: 1,
      renderMode: 'texture',
      textures: {
        fern: {
          canvas: null,
          width: 0,
          height: 0,
          padding: 0,
          scaleX: CONFIG.FERN_TEXTURE.scale,
          scaleY: CONFIG.FERN_TEXTURE.scale
        },
        nah: {
          canvas: null,
          centerX: 0,
          centerY: 0,
          scale: 0,
          width: 0,
          height: 0
        },
        get mid() {
          return this.fern;
        },
        set mid(value) {
          this.fern = value;
        },
        get native() {
          return this.nah;
        },
        set native(value) {
          this.nah = value;
        }
      },
      renderTimeout: null,
      shapeRefreshTimeout: null,
      layoutBuildRevision: 0,
      activePreparedRender: null,
      runtimeLimits: {
        glTextureMaxSize: null
      },
      lineWidthPreview: {
        active: false,
        bridging: false,
        commitTimeout: null,
        frameRequest: 0,
        interacting: false,
        revision: 0
      },
      drag: {
        active: false,
        lastX: 0,
        lastY: 0,
        lastPinchDist: 0,
        lastPinchCenterX: 0,
        lastPinchCenterY: 0
      },
      viewAutoFit: {
        enabled: true,
        initialCircleViewportFraction: CONFIG.SHAPES.initialCircleViewportFraction
      },
      stableCircleFootprint: null,
      carryOverCircleFootprint: null,
      dropBiblePlaceholder: null,
      progressive: {
        revision: 0,
        stage: 0,
        timers: [],
        activeQualityBoost: 1,
        lastInteractionAt: 0
      },
      renderWhisper: {
        timeout: null,
        kind: '',
        dotsTimer: null,
        baseText: '',
        dotsAnimated: false,
        dotCount: 0,
        dotStartedAt: 0,
        anchorX: null,
        anchorY: null,
        pendingLoadId: 0,
        committedLoadId: 0,
        pendingDocumentKey: '',
        revealFrame: 0
      }
    };

    const elements = {
      selectorWrapper: document.getElementById('bible-selector-wrapper'),
      selectorTitle: document.querySelector('#bible-selector-wrapper .title'),
      remixSummary: document.getElementById('remix-summary'),
      container: document.querySelector('._018-canvas'),
      fernCanvas: document.getElementById('fern-layer'),
      nahCanvas: document.getElementById('nah-layer'),
      presenceCanvas: document.getElementById('presence-layer'),
      lineWidthGhost: document.getElementById('line-width-ghost'),
      renderWhisper: document.getElementById('render-whisper'),
      renderWhisperLabel: document.querySelector('#render-whisper [data-render-whisper-label]'),
      renderWhisperDots: document.querySelector('#render-whisper [data-render-whisper-dots]'),
      dropBibleOverlay: document.getElementById('drop-bible-overlay'),
      dropBibleButton: document.getElementById('drop-bible-button'),
      dropBibleInput: document.getElementById('drop-bible-input'),
      dropBibleLabel: document.getElementById('drop-bible-label'),
      dropBibleHint: document.getElementById('drop-bible-hint'),
      get fernCtx() { return this.fernCanvas.getContext('2d'); },
      get presenceCtx() { return this.presenceCanvas.getContext('2d'); },
      get nahCtx() { return this.nahCanvas.getContext('2d'); },
      get midCanvas() { return this.fernCanvas; },
      get nativeCanvas() { return this.nahCanvas; },
      get midCtx() { return this.fernCtx; },
      get nativeCtx() { return this.nahCtx; },
      get lineWidthGhostCtx() { return this.lineWidthGhost.getContext('2d'); }
    };

    let shapePanel = null;
    let shapePanelEls = null;
    let viewportResizeObserver = null;
    let viewportResizeFrame = 0;

    function getViewportMetrics() {
      const rect = elements.container.getBoundingClientRect();
      const width = Math.max(1, rect.width || window.innerWidth || 1);
      const height = Math.max(1, rect.height || window.innerHeight || 1);
      return {
        rect,
        width,
        height,
        localCenterX: width / 2,
        localCenterY: height / 2,
        clientCenterX: rect.left + width / 2,
        clientCenterY: rect.top + height / 2
      };
    }

    function getUsableViewportMetrics() {
      const viewport = getViewportMetrics();
      const rootStyles = getComputedStyle(document.documentElement);
      const rawOcclusion = parseFloat(rootStyles.getPropertyValue('--controls-mobile-occlusion')) || 0;
      const bottomOcclusion = clamp(rawOcclusion, 0, Math.max(viewport.height - 1, 0));
      const usableHeight = Math.max(1, viewport.height - bottomOcclusion);

      return {
        ...viewport,
        bottomOcclusion,
        height: usableHeight,
        localCenterY: usableHeight / 2,
        clientCenterY: viewport.rect.top + usableHeight / 2
      };
    }

    const LOG = {
      lastMode: null,
      lastLoggedScale: null,
      modeChange(newMode) {
        if (newMode !== this.lastMode) {
          console.log(`%cmode: ${this.lastMode || 'start'} → ${newMode}`, 'color: #0ff; font-weight: bold');
          this.lastMode = newMode;
        }
      },
      scaleCheck(scale) {
        if (!this.lastLoggedScale) {
          this.lastLoggedScale = scale;
          return;
        }
        const ratio = scale / this.lastLoggedScale;
        if (ratio > 2 || ratio < 0.5) {
          console.log(`%cscale: ${this.lastLoggedScale.toFixed(2)} → ${scale.toFixed(2)}`, 'color: #8f8');
          this.lastLoggedScale = scale;
        }
      },
      nativeRender(centerX, centerY, scale) {
        console.log(`%crender: center=(${centerX.toFixed(1)}, ${centerY.toFixed(1)}), scale=${scale.toFixed(2)}`, 'color: #ff0');
      },
      info(msg) {
        console.log(`%cbibelpunkt ${msg}`, 'color: #888');
      }
    };

    function measureBaseMetrics() {
      const ctx = document.createElement('canvas').getContext('2d');
      ctx.font = `${state.baseFontSize}px ${CONFIG.FONT_FAMILY}`;
      state.baseCharWidth = ctx.measureText('M').width;
      state.lineHeight = state.baseFontSize * CONFIG.LINE_HEIGHT_FACTOR;
    }

    function solveCircleRadius(textLength, charWidth, lineHeight) {
      const minRadius = Math.max(charWidth * 0.75, lineHeight * 0.75, 1);
      const estimatedRadius = Math.sqrt(Math.max(textLength, 1) * charWidth * lineHeight / Math.PI);
      let low = minRadius;
      let high = Math.max(minRadius * 2, estimatedRadius * 1.8);

      const getCapacityForRadius = radius => {
        let capacity = 0;

        for (let y = -radius + lineHeight / 2; y <= radius - lineHeight / 2; y += lineHeight) {
          const rowWidth = 2 * Math.sqrt(Math.max(0, radius * radius - y * y));
          capacity += Math.floor(rowWidth / charWidth);
        }

        return capacity;
      };

      while (getCapacityForRadius(high) < textLength) {
        low = high;
        high *= 2;
      }

      for (let i = 0; i < 40; i++) {
        const mid = (low + high) / 2;
        const capacity = getCapacityForRadius(mid);

        if (capacity >= textLength) high = mid;
        else low = mid;
      }

      return Math.ceil(high);
    }

    function allocateCircleRowCharCounts(textLength, rows) {
      if (!rows.length || textLength <= 0) return [];

      if (textLength < rows.length) {
        const activeRowCount = Math.max(1, textLength);
        const startIndex = Math.floor((rows.length - activeRowCount) / 2);
        const activeRows = rows.slice(startIndex, startIndex + activeRowCount);
        return activeRows.map((row, index) => ({
          ...row,
          charCount: index === activeRows.length - 1
            ? textLength - index
            : 1
        }));
      }

      const baseCounts = rows.map(() => 1);
      let remainingChars = textLength - rows.length;
      const expandableCapacities = rows.map(row => Math.max(row.charCapacity - 1, 0));
      const totalExpandable = expandableCapacities.reduce((sum, value) => sum + value, 0);

      if (remainingChars <= 0 || totalExpandable <= 0) {
        return rows.map((row, index) => ({ ...row, charCount: baseCounts[index] }));
      }

      const rawExtras = expandableCapacities.map(capacity => (remainingChars * capacity) / totalExpandable);
      const extraCounts = rawExtras.map((raw, index) => Math.min(expandableCapacities[index], Math.floor(raw)));
      let assignedExtras = extraCounts.reduce((sum, value) => sum + value, 0);

      if (assignedExtras < remainingChars) {
        const remainderOrder = rawExtras
          .map((raw, index) => ({
            index,
            remainder: raw - Math.floor(raw),
            spare: expandableCapacities[index] - extraCounts[index]
          }))
          .sort((a, b) => b.remainder - a.remainder || b.spare - a.spare || Math.abs(rows[a.index].y) - Math.abs(rows[b.index].y));

        for (const entry of remainderOrder) {
          if (assignedExtras >= remainingChars) break;
          if (entry.spare <= 0) continue;
          extraCounts[entry.index] += 1;
          assignedExtras += 1;
        }
      }

      if (assignedExtras < remainingChars) {
        for (let index = 0; index < rows.length && assignedExtras < remainingChars; index += 1) {
          const spare = expandableCapacities[index] - extraCounts[index];
          if (spare <= 0) continue;
          const add = Math.min(spare, remainingChars - assignedExtras);
          extraCounts[index] += add;
          assignedExtras += add;
        }
      }

      return rows.map((row, index) => ({
        ...row,
        charCount: Math.min(row.charCapacity, baseCounts[index] + extraCounts[index])
      }));
    }

    function getCircleLayoutPreset(meta = state.documentMeta) {
      return meta?.layoutPresets?.circle || null;
    }

    function canUseCircleLayoutPreset(preset) {
      if (!preset || !Number.isFinite(preset.radius) || preset.radius <= 0) return false;
      if (!Number.isFinite(preset.charWidth) || !Number.isFinite(preset.lineHeight)) return false;

      const charWidthTolerance = Math.max(0.08, state.baseCharWidth * 0.01);
      const lineHeightTolerance = Math.max(0.08, state.lineHeight * 0.01);
      return Math.abs((preset.fontSize || 0) - state.baseFontSize) <= 0.01
        && Math.abs(preset.charWidth - state.baseCharWidth) <= charWidthTolerance
        && Math.abs(preset.lineHeight - state.lineHeight) <= lineHeightTolerance;
    }

    const glyphPresenceCache = new Map();
    const spiritCharWeightCache = new Map();
    let glyphPresenceCanvas = null;

    function getSpiritCharWeight(char) {
      if (!char || char <= ' ') return 0;
      if (spiritCharWeightCache.has(char)) return spiritCharWeightCache.get(char);

      const code = char.charCodeAt(0);
      let weight = 0.78;

      if (',.;:·`´\'"'.includes(char)) weight = 0.26;
      else if ('-_~|/\\()[]{}'.includes(char)) weight = 0.42;
      else if ('iljrtfI1'.includes(char)) weight = 0.5;
      else if ('mwMW@#%&8'.includes(char)) weight = 0.96;
      else if ((code >= 48 && code <= 57) || (code >= 65 && code <= 90) || (code >= 97 && code <= 122)) weight = 0.74;
      else if (code < 128) weight = 0.68;

      spiritCharWeightCache.set(char, weight);
      return weight;
    }

    function hashSpiritUnit(a, b = 0, c = 0) {
      let value = Math.imul((a | 0) + 1, 1597334677);
      value ^= Math.imul((b | 0) + 1, 3812015801);
      value ^= Math.imul((c | 0) + 1, 958282973);
      value ^= value >>> 16;
      return (value >>> 0) / 4294967295;
    }

    function sampleSpiritDensity(startIndex, charCount, rowIndex, segmentIndex) {
      if (charCount <= 0 || !state.textData) return 0;

      const sampleCount = Math.max(1, Math.min(4, charCount));
      let density = 0;

      for (let sampleIndex = 0; sampleIndex < sampleCount; sampleIndex++) {
        const offset = Math.min(charCount - 1, Math.floor((sampleIndex + 0.5) * charCount / sampleCount));
        density += getSpiritCharWeight(state.textData[startIndex + offset]);
      }

      density /= sampleCount;
      density += (hashSpiritUnit(rowIndex, segmentIndex, startIndex) - 0.5) * 0.14;
      return clamp(density, 0.04, 1);
    }

    function getGlyphPresenceWeight(char) {
      if (!char || char === ' ') return 0;
      if (glyphPresenceCache.has(char)) return glyphPresenceCache.get(char);

      if (!glyphPresenceCanvas) {
        glyphPresenceCanvas = document.createElement('canvas');
        glyphPresenceCanvas.width = 72;
        glyphPresenceCanvas.height = 72;
      }

      const ctx = glyphPresenceCanvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, glyphPresenceCanvas.width, glyphPresenceCanvas.height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, glyphPresenceCanvas.width, glyphPresenceCanvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = `56px ${CONFIG.FONT_FAMILY}`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';
      ctx.fillText(char, glyphPresenceCanvas.width / 2, glyphPresenceCanvas.height / 2 + 2);

      const data = ctx.getImageData(0, 0, glyphPresenceCanvas.width, glyphPresenceCanvas.height).data;
      let ink = 0;
      for (let i = 3; i < data.length; i += 4) {
        ink += data[i] / 255;
      }

      const weight = clamp(ink / (glyphPresenceCanvas.width * glyphPresenceCanvas.height * 0.28), 0, 1);
      glyphPresenceCache.set(char, weight);
      return weight;
    }

    async function yieldToUrgentUi(guard = null) {
      if (guard && !guard()) return false;
      await nextPaint();
      return !guard || guard();
    }

    async function buildLinePresenceProfile(charsPerLine, lineCount, { guard = null } = {}) {
      const binCount = Math.max(1, Math.min(CONFIG.PRESENCE.profileBins, lineCount));
      const profile = new Array(binCount);
      const text = state.textData;

      for (let binIndex = 0; binIndex < binCount; binIndex++) {
        const rowStart = Math.floor(binIndex * lineCount / binCount);
        const rowEnd = Math.max(rowStart + 1, Math.floor((binIndex + 1) * lineCount / binCount));
        const charStart = Math.min(text.length, rowStart * charsPerLine);
        const charEnd = Math.min(text.length, rowEnd * charsPerLine);
        const span = charEnd - charStart;

        if (span <= 0) {
          profile[binIndex] = 0;
          continue;
        }

        const sampleCount = Math.max(1, Math.min(CONFIG.PRESENCE.samplesPerBin, span));
        let density = 0;

        for (let sampleIndex = 0; sampleIndex < sampleCount; sampleIndex++) {
          const offset = Math.min(span - 1, Math.floor((sampleIndex + 0.5) * span / sampleCount));
          density += getGlyphPresenceWeight(text[charStart + offset]);
        }

        profile[binIndex] = density / sampleCount;

        if ((binIndex + 1) % 16 === 0 && binIndex + 1 < binCount) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }
      }

      return profile;
    }

    async function buildLineLayout({ includePresenceProfile = true, guard = null } = {}) {
      const widthChars = clamp(
        Math.round(state.shape.lineWidthChars),
        CONFIG.SHAPES.minLineWidthChars,
        CONFIG.SHAPES.maxLineWidthChars
      );
      const charsPerLine = Math.max(1, Math.min(widthChars, state.textData.length));
      const lineCount = Math.max(1, Math.ceil(state.textData.length / charsPerLine));
      const height = Math.max(lineCount * state.lineHeight, state.lineHeight);
      const width = charsPerLine * state.baseCharWidth;
      const rows = [];
      let textIndex = 0;
      let maxLineWidth = 0;
      const topY = -height / 2 + state.lineHeight / 2;

      if (lineCount > CONFIG.SHAPES.nativeFallbackRowLimit) {
        return {
          rows: [],
          bounds: {
            minX: -width / 2,
            maxX: width / 2,
            minY: -height / 2,
            maxY: height / 2,
            width,
            height
          },
          center: { x: 0, y: 0 },
          maxLineWidth: width,
          worldSpan: Math.max(width, height),
          meta: {
            charsPerLine,
            lineCount,
            topY,
            virtualRows: true,
            presenceProfile: null
          }
        };
      }

      for (let i = 0; i < lineCount; i++) {
        const charCount = Math.min(charsPerLine, state.textData.length - textIndex);
        if (charCount <= 0) break;

        const lineWidth = charCount * state.baseCharWidth;
        maxLineWidth = Math.max(maxLineWidth, lineWidth);
        rows.push({
          x: 0,
          y: topY + i * state.lineHeight,
          startIndex: textIndex,
          charCount
        });
        textIndex += charCount;

        if ((i + 1) % 256 === 0 && i + 1 < lineCount) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }
      }

      const presenceProfile = includePresenceProfile
        ? await buildLinePresenceProfile(charsPerLine, lineCount, { guard })
        : null;
      if (includePresenceProfile && !presenceProfile) return null;

      return {
        rows,
        bounds: {
          minX: -width / 2,
          maxX: width / 2,
          minY: -height / 2,
          maxY: height / 2,
          width,
          height
        },
        center: { x: 0, y: 0 },
        maxLineWidth,
        worldSpan: Math.max(width, height),
        meta: {
          charsPerLine,
          lineCount,
          presenceProfile
        }
      };
    }

    async function buildCircleLayout({ guard = null } = {}) {
      const preset = getCircleLayoutPreset();
      const radius = canUseCircleLayoutPreset(preset)
        ? Math.ceil(preset.radius)
        : solveCircleRadius(state.textData.length, state.baseCharWidth, state.lineHeight);
      const candidateRows = [];
      let maxLineWidth = 0;
      let rowIndex = 0;

      for (let y = -radius + state.lineHeight / 2; y <= radius - state.lineHeight / 2; y += state.lineHeight) {
        const rowWidth = 2 * Math.sqrt(Math.max(0, radius * radius - y * y));
        const charCapacity = Math.floor(rowWidth / state.baseCharWidth);
        if (charCapacity <= 0) continue;

        candidateRows.push({ y, charCapacity, rowWidth });
        rowIndex += 1;

        if (rowIndex % 256 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }
      }

      const allocatedRows = allocateCircleRowCharCounts(state.textData.length, candidateRows);
      const rows = [];
      let textIndex = 0;

      for (let index = 0; index < allocatedRows.length; index += 1) {
        const row = allocatedRows[index];
        const charCount = Math.min(row.charCount, state.textData.length - textIndex);
        if (charCount <= 0) break;

        const lineWidth = charCount * state.baseCharWidth;
        maxLineWidth = Math.max(maxLineWidth, lineWidth);
        rows.push({ x: 0, y: row.y, startIndex: textIndex, charCount });
        textIndex += charCount;

        if ((index + 1) % 256 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }

        if (textIndex >= state.textData.length) break;
      }

      return {
        rows,
        bounds: canUseCircleLayoutPreset(preset) && preset.bounds && Number.isFinite(preset.bounds.width)
          ? { ...preset.bounds }
          : {
              minX: -radius,
              maxX: radius,
              minY: -radius,
              maxY: radius,
              width: radius * 2,
              height: radius * 2
            },
        center: { x: 0, y: 0 },
        maxLineWidth,
        worldSpan: canUseCircleLayoutPreset(preset) && Number.isFinite(preset.worldSpan)
          ? preset.worldSpan
          : radius * 2,
        meta: { radius, presenceProfile: null, preset: canUseCircleLayoutPreset(preset) }
      };
    }

    async function buildShapeLayout(options = {}) {
      return state.shape.type === 'line' ? buildLineLayout(options) : buildCircleLayout(options);
    }

    function updateNormalizeScale() {
      state.normalizeScale = getNormalizeScaleForLayout(state.layout);
    }

    function resetNativeTexture() {
      state.textures.native = { canvas: null, centerX: 0, centerY: 0, scale: 0, width: 0, height: 0 };
    }

    function cloneTextureState(texture) {
      return {
        canvas: texture.canvas,
        width: texture.width,
        height: texture.height,
        padding: texture.padding,
        scaleX: texture.scaleX,
        scaleY: texture.scaleY
      };
    }

    function hasTextureCanvas(texture) {
      return !!texture?.canvas;
    }

    function getNormalizeScaleForLayout(layout) {
      const span = Math.max(layout?.worldSpan || 1, 1);
      return CONFIG.TARGET_WORLD_SPAN / span;
    }

    function getMidScaleStages() {
      return CONFIG.MID_TEXTURE.progressiveScales;
    }

    function getMidScaleForStageIndex(stageIndex) {
      const stages = getMidScaleStages();
      const safeIndex = clamp(stageIndex, 0, stages.length - 1);
      return stages[safeIndex] || CONFIG.MID_TEXTURE.scale;
    }

    function getGlTextureMaxSizeHint() {
      if (state.runtimeLimits.glTextureMaxSize != null) return state.runtimeLimits.glTextureMaxSize;

      let detected = CONFIG.MID_TEXTURE.maxSize;
      try {
        const probeCanvas = document.createElement('canvas');
        const gl = probeCanvas.getContext('webgl') || probeCanvas.getContext('experimental-webgl');
        const maxTextureSize = gl?.getParameter?.(gl.MAX_TEXTURE_SIZE);
        if (Number.isFinite(maxTextureSize) && maxTextureSize > 0) {
          detected = Math.min(detected, maxTextureSize);
        }
      } catch (error) {
        detected = CONFIG.MID_TEXTURE.maxSize;
      }

      state.runtimeLimits.glTextureMaxSize = clamp(Math.floor(detected), 2048, CONFIG.MID_TEXTURE.maxSize);
      return state.runtimeLimits.glTextureMaxSize;
    }

    function getEffectiveMidTextureMaxSize() {
      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      const deviceMemory = navigator.deviceMemory || 0;
      const glLimit = getGlTextureMaxSizeHint();
      const isMobileLike = viewport.width <= 820;

      let safeLimit = CONFIG.MID_TEXTURE.maxSize;
      if (isMobileLike) {
        if (deviceMemory >= 8 && dpr < 3) safeLimit = 8192;
        else if (deviceMemory >= 4 || dpr < 2.5) safeLimit = 6144;
        else safeLimit = 4096;
      } else if (deviceMemory && deviceMemory <= 4) {
        safeLimit = 8192;
      }

      return clamp(Math.min(CONFIG.MID_TEXTURE.maxSize, glLimit, safeLimit), 2048, CONFIG.MID_TEXTURE.maxSize);
    }

    function getSafeMidTextureMaxSize() {
      const safeMaxSize = getEffectiveMidTextureMaxSize();
      return clamp(
        Math.floor(safeMaxSize * CONFIG.MID_TEXTURE.safetyHeadroom),
        2048,
        safeMaxSize
      );
    }

    function getHardMidTextureMaxSize() {
      return clamp(
        Math.min(CONFIG.MID_TEXTURE.maxSize, getGlTextureMaxSizeHint()),
        2048,
        CONFIG.MID_TEXTURE.maxSize
      );
    }

    function getRenderableTextureScaleLimit(textureConfig, layout, maxSize = textureConfig.maxSize) {
      const boundsWidth = Math.max(layout.bounds.width, 1);
      const boundsHeight = Math.max(layout.bounds.height, 1);
      const paddingX = Math.max(8, Math.ceil(state.baseCharWidth * 3));
      const paddingY = Math.max(8, Math.ceil(state.lineHeight * 2));

      return Math.max(Math.min(
        (maxSize - paddingX * 2) / boundsWidth,
        (maxSize - paddingY * 2) / boundsHeight
      ), 0.000001);
    }

    function getActualMidStageIndexFromScale(scale) {
      const stages = getMidScaleStages();
      let bestIndex = 0;
      for (let stageIndex = 0; stageIndex < stages.length; stageIndex += 1) {
        if (stages[stageIndex] <= scale + 0.000001) bestIndex = stageIndex;
      }
      return bestIndex;
    }

    function getBestMidStageIndex(layout) {
      const maxRenderableScale = getRenderableTextureScaleLimit(
        CONFIG.MID_TEXTURE,
        layout,
        getSafeMidTextureMaxSize()
      );
      return getActualMidStageIndexFromScale(maxRenderableScale);
    }

    function getSafeMidTargetScale(layout) {
      const maxRenderableScale = getRenderableTextureScaleLimit(
        CONFIG.MID_TEXTURE,
        layout,
        getSafeMidTextureMaxSize()
      );
      return Math.max(maxRenderableScale, 0.000001);
    }

    function getBestMidTargetScale(layout) {
      const maxRenderableScale = getRenderableTextureScaleLimit(
        CONFIG.MID_TEXTURE,
        layout,
        getHardMidTextureMaxSize()
      );
      return Math.max(maxRenderableScale, 0.000001);
    }

    function getEstimatedFitScaleForLayout(layout, normalizeScale = getNormalizeScaleForLayout(layout), { initialCircleViewportFraction = null } = {}) {
      const viewport = getUsableViewportMetrics();
      const fitWidth = Math.max(layout.bounds.width * normalizeScale, 1);
      const fitHeight = Math.max(layout.bounds.height * normalizeScale, 1);

      if (layout?.meta?.radius && initialCircleViewportFraction != null) {
        const targetDiameterPx = Math.max(Math.min(viewport.width, viewport.height) * initialCircleViewportFraction, 1);
        return clamp(targetDiameterPx / Math.max(fitWidth, fitHeight), CONFIG.ZOOM.min, CONFIG.ZOOM.max);
      }

      const fitScaleX = viewport.width * CONFIG.SHAPES.fitMargin / fitWidth;
      const fitScaleY = viewport.height * CONFIG.SHAPES.fitMargin / fitHeight;
      return clamp(Math.min(fitScaleX, fitScaleY), CONFIG.ZOOM.min, CONFIG.ZOOM.max);
    }

    function getEstimatedScreenFontSizeForLayout(layout, { fitView = false, initialCircleViewportFraction = null } = {}) {
      const normalizeScale = getNormalizeScaleForLayout(layout);
      const effectiveScale = fitView || !state.layout?.rows?.length
        ? getEstimatedFitScaleForLayout(layout, normalizeScale, { initialCircleViewportFraction }) * normalizeScale
        : getEffectiveScale();
      return state.baseFontSize * effectiveScale;
    }

    function getInitialMidStageIndex(layout, { fitView = false, initialCircleViewportFraction = null } = {}) {
      const screenFontSize = getEstimatedScreenFontSizeForLayout(layout, { fitView, initialCircleViewportFraction });
      const thresholds = CONFIG.MID_TEXTURE.initialScreenFontThresholds;
      let stageIndex = thresholds.findIndex(threshold => screenFontSize <= threshold);
      if (stageIndex === -1) stageIndex = getMidScaleStages().length - 1;

      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      if (viewport.width <= 768 || dpr >= 2.5) {
        stageIndex = Math.min(stageIndex, getMidScaleStages().length - 2);
      }

      return clamp(stageIndex, 0, getMidScaleStages().length - 1);
    }

    function isPreparedRenderActive(prepared) {
      return state.activePreparedRender === prepared;
    }

    function getShapeRenderCacheKey() {
      const lineWidthPart = state.shape.type === 'line'
        ? `:${Math.round(state.shape.lineWidthChars)}`
        : '';

      return [
        state.documentCacheKey,
        state.shape.type,
        lineWidthPart,
        `midSafe:${Math.round(getSafeMidTextureMaxSize())}`,
        `midHard:${Math.round(getHardMidTextureMaxSize())}`,
        state.baseFontSize,
        state.baseCharWidth.toFixed(4),
        state.lineHeight.toFixed(4)
      ].join('|');
    }

    function createEmptyTextureState(textureConfig = CONFIG.MID_TEXTURE) {
      return {
        canvas: null,
        width: 0,
        height: 0,
        padding: 0,
        scaleX: textureConfig.scale,
        scaleY: textureConfig.scale
      };
    }

    function createEmptyLayoutState() {
      return {
        rows: [],
        bounds: { minX: -1, maxX: 1, minY: -1, maxY: 1, width: 2, height: 2 },
        center: { x: 0, y: 0 },
        maxLineWidth: 0,
        worldSpan: 2,
        meta: {}
      };
    }

    function createPreparedShapeRender(layout) {
      return {
        layout,
        midTexture: createEmptyTextureState(CONFIG.MID_TEXTURE),
        midPromise: null,
        initialMidStageIndex: 0,
        bestMidStageIndex: 0,
        safeMidTargetScale: CONFIG.MID_TEXTURE.scale,
        bestMidTargetScale: CONFIG.MID_TEXTURE.scale,
        midStageIndex: -1,
        midPendingStageIndex: -1
      };
    }

    function shouldForceNativeForLayout(layout) {
      return state.shape.type === 'line'
        && ((layout?.meta?.virtualRows) || (layout?.meta?.lineCount || layout?.rows?.length || 0) > CONFIG.SHAPES.nativeFallbackRowLimit);
    }

    function getFullTextNativeReferenceScale(qualityBoost = 1) {
      const dpr = window.devicePixelRatio || 1;
      const targetScreenFont = Math.max(state.blendTuning.midToNativeEnd || CONFIG.BLEND.midToNativeEnd, 0.1);
      const baseFontSize = Math.max(state.baseFontSize || CONFIG.TARGET_FONT_SIZE, 0.000001);
      return Math.max((targetScreenFont / baseFontSize) * dpr * Math.max(qualityBoost, 1), 0.000001);
    }

    function resizeLineWidthGhostCanvas() {
      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(viewport.width * dpr));
      const height = Math.max(1, Math.round(viewport.height * dpr));

      if (elements.lineWidthGhost.width !== width || elements.lineWidthGhost.height !== height) {
        elements.lineWidthGhost.width = width;
        elements.lineWidthGhost.height = height;
        elements.lineWidthGhost.style.width = `${viewport.width}px`;
        elements.lineWidthGhost.style.height = `${viewport.height}px`;
      }

      const ctx = elements.lineWidthGhostCtx;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width: viewport.width, height: viewport.height };
    }

    function clearLineWidthGhostCanvas() {
      const { ctx, width, height } = resizeLineWidthGhostCanvas();
      ctx.clearRect(0, 0, width, height);
    }

    function applyPreparedShapeRender(prepared, { fitView = false, viewTransition = null, initialCircleViewportFraction = null } = {}) {
      state.activePreparedRender = prepared;
      if (fitView) {
        state.layout = prepared.layout;
        updateNormalizeScale();
      } else if (viewTransition?.mode === 'circleFootprint' && state.shape.type === 'circle') {
        preserveCircleFootprint(prepared.layout, viewTransition);
      } else {
        preserveScreenTypography(prepared.layout);
      }
      resetNativeTexture();
      state.textures.mid = cloneTextureState(prepared.midTexture);

      initMidLayer();
      hideNativeOverlay();
      clearPresenceLayer();
      if (!state.textures.mid.canvas) hideMidOverlay();
      state.renderMode = 'texture';

      if (prepared.layout.meta?.forceNative) {
        state.lineWidthPreview.active = false;
        state.lineWidthPreview.bridging = true;
        updateLineWidthPreviewGhost({ bridge: true });
      } else {
        if (state.renderWhisper.kind === 'load' && hasTextureCanvas(state.textures.mid)) {
          state.renderWhisper.committedLoadId = currentLoadId;
        }
        clearLineWidthPreview({ keepOverlay: true });
      }

      if (fitView) fitShapeInView({ initialCircleViewportFraction });
      updateMidScaleReadout();
      applyTransform();
      maybeFinishLoadWhisper();
    }

    function applyPreparedMidTexture(prepared) {
      state.textures.mid = cloneTextureState(prepared.midTexture);
      initMidLayer();
      if (!state.textures.mid.canvas) hideMidOverlay();
      updateMidScaleReadout();
      applyTransform();
    }

    async function prepareShapeRender({ guard = null, fitView = false, initialCircleViewportFraction = null } = {}) {
      const layout = await buildShapeLayout({ guard });
      if (!layout) return null;
      layout.meta = {
        ...(layout.meta || {}),
        forceNative: shouldForceNativeForLayout(layout)
      };
      const prepared = createPreparedShapeRender(layout);
      prepared.safeMidTargetScale = getSafeMidTargetScale(layout);
      prepared.bestMidTargetScale = getBestMidTargetScale(layout);
      prepared.bestMidStageIndex = getActualMidStageIndexFromScale(prepared.safeMidTargetScale);
      prepared.initialMidStageIndex = getInitialMidStageIndex(layout, { fitView, initialCircleViewportFraction });
      prepared.layout.meta.fullTextNative = !prepared.layout.meta.forceNative
        && prepared.safeMidTargetScale >= getFullTextNativeReferenceScale() - 0.000001;
      if (layout.meta.forceNative) {
        return prepared;
      }

      if (!prepared.layout.meta.forceNative) {
        const midTexture = await renderMidTexture({
          layout,
          guard,
          targetScale: prepared.safeMidTargetScale
        });
        if (!midTexture) return null;
        prepared.midTexture = midTexture;
        prepared.midStageIndex = midTexture.stageIndex ?? prepared.bestMidStageIndex;
      }

      return prepared;
    }

    async function ensurePreparedMidTexture(prepared, { guard = null, targetStageIndex = null, targetScale = null } = {}) {
      if (prepared.layout.meta?.forceNative) {
        return prepared.midTexture;
      }
      const desiredTargetScale = clamp(
        Math.min(
          targetScale ?? (targetStageIndex == null
            ? prepared.safeMidTargetScale
            : getMidScaleForStageIndex(targetStageIndex)),
          prepared.safeMidTargetScale
        ),
        0.000001,
        prepared.safeMidTargetScale
      );

      if (hasTextureCanvas(prepared.midTexture) && Math.min(prepared.midTexture.scaleX, prepared.midTexture.scaleY) >= desiredTargetScale - 0.000001) {
        return prepared.midTexture;
      }

      if (!prepared.midPromise) {
        prepared.midPendingStageIndex = getActualMidStageIndexFromScale(desiredTargetScale);
        prepared.midPromise = renderMidTexture({
          layout: prepared.layout,
          guard,
          targetScale: desiredTargetScale
        })
          .then(texture => {
            if (texture && (!guard || guard())) {
              prepared.midTexture = texture;
              prepared.midStageIndex = texture.stageIndex ?? getActualMidStageIndexFromScale(desiredTargetScale);
            }
            return texture;
          })
          .finally(() => {
            prepared.midPromise = null;
            prepared.midPendingStageIndex = -1;
          });
      } else if (prepared.midPendingStageIndex < getActualMidStageIndexFromScale(desiredTargetScale)) {
        return prepared.midPromise.then(() => ensurePreparedMidTexture(prepared, { guard, targetScale: desiredTargetScale }));
      }

      return prepared.midPromise;
    }

    function clearLineWidthPreview({ keepOverlay = false } = {}) {
      if (state.lineWidthPreview.commitTimeout) {
        clearTimeout(state.lineWidthPreview.commitTimeout);
        state.lineWidthPreview.commitTimeout = null;
      }
      if (state.lineWidthPreview.frameRequest) {
        cancelAnimationFrame(state.lineWidthPreview.frameRequest);
        state.lineWidthPreview.frameRequest = 0;
      }
      state.lineWidthPreview.active = false;
      state.lineWidthPreview.bridging = false;
      clearLineWidthGhostCanvas();
      elements.lineWidthGhost.style.display = 'none';
      elements.lineWidthGhost.style.opacity = '0';
      if (!keepOverlay) hideNativeOverlay();
    }

    function cancelLineWidthCommit() {
      if (!state.lineWidthPreview.commitTimeout) return;
      clearTimeout(state.lineWidthPreview.commitTimeout);
      state.lineWidthPreview.commitTimeout = null;
    }

    function updateLineWidthReadout() {
      shapePanel?.set('lineWidthChars', state.shape.lineWidthChars);
    }

    function getNativeCoveragePercent(scale) {
      const referenceScale = getFullTextNativeReferenceScale();
      const percent = (Math.max(scale || 0, 0) / referenceScale) * 100;
      return clamp(percent, 0, 100);
    }

    function formatCoveragePercent(scale) {
      const percent = getNativeCoveragePercent(scale);
      if (percent >= 99.5) return '100%';
      if (percent >= 10) return `${Math.round(percent)}%`;
      return `${percent.toFixed(1)}%`;
    }

    function getActiveMidScale() {
      return Math.min(state.textures.mid?.scaleX || 0, state.textures.mid?.scaleY || 0);
    }

    function getCurrentDocumentCharCount() {
      const count = state.documentMeta?.charCount || state.textData.length || 0;
      return Number.isFinite(count) ? count : 0;
    }

    function formatDocumentCharCount(count) {
      return Math.max(0, Number(count) || 0).toLocaleString('de-DE');
    }

    function createRandomSeed() {
      if (window.crypto?.getRandomValues) {
        const buffer = new Uint32Array(1);
        window.crypto.getRandomValues(buffer);
        return (buffer[0] || Date.now()) >>> 0;
      }

      return ((Math.random() * 0x100000000) ^ Date.now()) >>> 0;
    }

    function isRemixModeEnabled() {
      return state.documentMode === 'remix';
    }

    function getActiveDocumentSelectionKey() {
      if (isRemixModeEnabled()) {
        return `remix:${getRemixRecipeKey()}`;
      }

      const currentFile = getCurrentKarussellBibleEntry()?.file || '';
      return currentFile ? `single:${currentFile}` : '';
    }

    function isCurrentBibleStatsReady() {
      const expectedSelectionKey = getActiveDocumentSelectionKey();
      const loadedSelectionKey = state.documentSelectionKey || '';

      if (!expectedSelectionKey || !loadedSelectionKey) return false;
      if (expectedSelectionKey !== loadedSelectionKey) return false;
      if (!state.layout?.rows?.length) return false;

      const { pendingLoadId, committedLoadId } = state.renderWhisper;
      if (pendingLoadId && committedLoadId !== pendingLoadId) return false;

      return true;
    }

    function isNativeTextDisplayed() {
      const nativeOpacity = parseFloat(elements.nativeCanvas?.style.opacity || '0');
      return isNativeOverlayReady()
        && nativeOpacity > 0.001;
    }

    function updateMidScaleReadout() {
      if (!shapePanelEls?.midScaleStatus) return;

      const statsReady = isCurrentBibleStatsReady();
      const nativeTextDisplayed = statsReady && isNativeTextDisplayed();

      const safeMax = state.activePreparedRender?.safeMidTargetScale
        || (state.layout?.rows?.length ? getSafeMidTargetScale(state.layout) : 0);
      const coveragePercent = state.layout?.rows?.length
        ? getNativeCoveragePercent(safeMax)
        : 0;
      const isFullTextNative = nativeTextDisplayed || coveragePercent >= 99.5;

      shapePanelEls.midScaleStatus.textContent = statsReady
        ? (nativeTextDisplayed ? '100%' : formatCoveragePercent(safeMax))
        : '–';

      if (shapePanelEls.midScaleHint) {
        shapePanelEls.midScaleHint.textContent = isFullTextNative ? '' : 'use better hardware for higher resolution';
        shapePanelEls.midScaleHint.style.display = (!statsReady || isFullTextNative) ? 'none' : 'inline';
      }

      if (shapePanelEls.charCountStatus) {
        shapePanelEls.charCountStatus.textContent = statsReady
          ? formatDocumentCharCount(getCurrentDocumentCharCount())
          : '–';
      }
    }

    function maybeFinishLoadWhisper(loadId = currentLoadId) {
      if (state.renderWhisper.pendingLoadId !== loadId || state.renderWhisper.kind !== 'load') return;
      if (state.renderWhisper.committedLoadId !== loadId) return;
      if (state.renderWhisper.revealFrame) return;

      state.renderWhisper.revealFrame = requestAnimationFrame(() => {
        state.renderWhisper.revealFrame = requestAnimationFrame(() => {
          state.renderWhisper.revealFrame = 0;
          if (state.renderWhisper.pendingLoadId !== loadId || state.renderWhisper.kind !== 'load') return;
          if (state.renderWhisper.committedLoadId !== loadId) return;
          rememberStableCircleFootprint(captureCircleFootprintReference(), { force: true });
          clearRenderWhisper({ kind: 'load' });
        });
      });
    }

    function getAbsoluteFocusWorld() {
      const normalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      return {
        x: state.focusWorld.x / normalizeScale,
        y: state.focusWorld.y / normalizeScale
      };
    }

    function preserveScreenTypography(layout) {
      const prevNormalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      const prevEffectiveScale = getEffectiveScale();
      const focusWorldX = state.focusWorld.x / prevNormalizeScale;
      const focusWorldY = state.focusWorld.y / prevNormalizeScale;

      state.layout = layout;
      updateNormalizeScale();
      state.scale = clamp(
        prevEffectiveScale / Math.max(state.normalizeScale, 0.000001),
        CONFIG.ZOOM.min,
        CONFIG.ZOOM.max
      );
      state.focusWorld = {
        x: focusWorldX * state.normalizeScale,
        y: focusWorldY * state.normalizeScale
      };
    }

    function captureCircleFootprintReference() {
      if (
        state.shape.type !== 'circle'
        || !state.textData
        || !state.layout?.rows?.length
        || !Number.isFinite(state.layout?.meta?.radius)
        || !state.layout?.bounds?.width
      ) return null;
      const viewport = getViewportMetrics();
      const metrics = getShapeScreenMetrics();
      return {
        mode: 'circleFootprint',
        diameterPx: Math.max(metrics.widthPx, metrics.heightPx, 1),
        centerOffsetX: metrics.centerX - viewport.localCenterX,
        centerOffsetY: metrics.centerY - viewport.localCenterY,
        anchorX: metrics.centerX,
        anchorY: metrics.centerY
      };
    }

    function cloneCircleFootprint(reference) {
      if (!reference) return null;
      return {
        ...reference,
        mode: 'circleFootprint',
        diameterPx: Math.max(reference.diameterPx || 0, 1)
      };
    }

    function rememberStableCircleFootprint(reference = captureCircleFootprintReference(), { force = false } = {}) {
      if (!reference || state.shape.type !== 'circle') return;
      if (!force && state.renderWhisper.pendingLoadId) return;
      state.stableCircleFootprint = cloneCircleFootprint(reference);
    }

    function freezeCircleFootprintTransition() {
      if (state.shape.type !== 'circle') {
        state.carryOverCircleFootprint = null;
        return null;
      }

      const liveReference = captureCircleFootprintReference();
      const reference = liveReference
        || state.carryOverCircleFootprint
        || state.stableCircleFootprint
        || getFallbackDropBibleReference();

      state.carryOverCircleFootprint = cloneCircleFootprint(reference);
      return cloneCircleFootprint(state.carryOverCircleFootprint);
    }

    function getPreferredCircleFootprintReference() {
      if (state.shape.type !== 'circle') return null;

      const liveReference = captureCircleFootprintReference();
      if (liveReference) return liveReference;

      if (state.carryOverCircleFootprint) {
        return cloneCircleFootprint(state.carryOverCircleFootprint);
      }

      return state.stableCircleFootprint
        ? cloneCircleFootprint(state.stableCircleFootprint)
        : null;
    }

    function getInitialCircleFootprintReference() {
      const viewport = getViewportMetrics();
      const fraction = CONFIG.SHAPES.initialCircleViewportFraction;
      const diameterPx = Math.max(Math.min(viewport.width, viewport.height) * fraction, 120);
      return {
        mode: 'circleFootprint',
        syntheticInitial: true,
        diameterPx,
        centerOffsetX: 0,
        centerOffsetY: 0,
        anchorX: viewport.localCenterX,
        anchorY: viewport.localCenterY
      };
    }

    function getFallbackDropBibleReference() {
      return getInitialCircleFootprintReference();
    }

    function createDropBiblePlaceholder(reference = getPreferredCircleFootprintReference()) {
      const normalizedReference = cloneCircleFootprint(reference) || getFallbackDropBibleReference();
      const normalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      const sceneScale = Math.max(state.scale || 1, 0.000001);
      const effectiveScale = Math.max(getEffectiveScale(), 0.000001);
      const normalizedCenterX = state.focusWorld.x + (normalizedReference.centerOffsetX || 0) / sceneScale;
      const normalizedCenterY = state.focusWorld.y + (normalizedReference.centerOffsetY || 0) / sceneScale;

      return {
        centerWorldX: normalizedCenterX / normalizeScale,
        centerWorldY: normalizedCenterY / normalizeScale,
        worldDiameter: Math.max(normalizedReference.diameterPx / effectiveScale, 1),
        reference: normalizedReference
      };
    }

    function updateDropBibleOverlayTransform() {
      if (!elements.dropBibleOverlay || !state.dropBiblePlaceholder) return;

      const viewport = getViewportMetrics();
      const normalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      const effectiveScale = getEffectiveScale();
      const diameterPx = Math.max(state.dropBiblePlaceholder.worldDiameter * effectiveScale, 1);
      const centerX = viewport.localCenterX + (state.dropBiblePlaceholder.centerWorldX * normalizeScale - state.focusWorld.x) * state.scale;
      const centerY = viewport.localCenterY + (state.dropBiblePlaceholder.centerWorldY * normalizeScale - state.focusWorld.y) * state.scale;

      elements.dropBibleOverlay.style.left = `${centerX}px`;
      elements.dropBibleOverlay.style.top = `${centerY}px`;
      elements.dropBibleButton?.style.setProperty('--drop-bible-diameter', `${diameterPx}px`);
    }

    function isLoadPlaceholderActive() {
      return !!state.renderWhisper.pendingLoadId
        && !!state.layout?.rows?.length
        && !hasTextureCanvas(state.textures.mid)
        && !hasNativeTextureReady();
    }

    function preserveCircleFootprint(layout, reference) {
      state.layout = layout;
      updateNormalizeScale();

      const normalizedDiameter = Math.max(
        Math.max(layout.bounds.width, layout.bounds.height) * Math.max(state.normalizeScale, 0.000001),
        1
      );
      state.scale = clamp(reference.diameterPx / normalizedDiameter, CONFIG.ZOOM.min, CONFIG.ZOOM.max);
      state.focusWorld = {
        x: layout.center.x * state.normalizeScale - (reference.centerOffsetX || 0) / Math.max(state.scale, 0.000001),
        y: layout.center.y * state.normalizeScale - (reference.centerOffsetY || 0) / Math.max(state.scale, 0.000001)
      };
    }

    function getLineWidthPreviewShape() {
      const viewport = getViewportMetrics();
      const textLength = Math.max(state.textData.length || 1, 1);
      const charsPerLine = Math.max(1, Math.min(
        clamp(Math.round(state.shape.lineWidthChars), CONFIG.SHAPES.minLineWidthChars, CONFIG.SHAPES.maxLineWidthChars),
        textLength
      ));
      const lineCount = Math.max(1, Math.ceil(textLength / charsPerLine));
      const effectiveScale = getEffectiveScale();
      const absoluteFocus = getAbsoluteFocusWorld();
      const widthWorld = Math.max(charsPerLine * state.baseCharWidth, state.baseCharWidth);
      const heightWorld = Math.max(lineCount * state.lineHeight, state.lineHeight);
      const topY = -heightWorld / 2 + state.lineHeight / 2;

      return {
        textLength,
        charsPerLine,
        lineCount,
        effectiveScale,
        absoluteFocus,
        widthWorld,
        heightWorld,
        topY,
        centerScreenX: viewport.localCenterX - absoluteFocus.x * effectiveScale,
        centerScreenY: viewport.localCenterY - absoluteFocus.y * effectiveScale,
        rowHeightPx: state.lineHeight * effectiveScale
      };
    }

    function shouldHoldBridgedLinePreview(screenFontSize = state.baseFontSize * getEffectiveScale()) {
      if (!state.lineWidthPreview.bridging || state.shape.type !== 'line' || !state.layout?.meta?.forceNative) return false;
      const { widthPx } = getShapeScreenMetrics();
      return widthPx < CONFIG.SHAPES.previewHoldWidthPx || screenFontSize < CONFIG.SHAPES.previewHoldFontPx;
    }

    function showLineWidthPreview({ bridge = false } = {}) {
      if (!bridge) {
        elements.midCanvas.style.opacity = '0';
        elements.midCanvas.style.filter = 'none';
        elements.nativeCanvas.style.opacity = '0';
        elements.presenceCanvas.style.opacity = '0';
      }
      elements.lineWidthGhost.style.display = 'block';
      elements.lineWidthGhost.style.opacity = '1';
    }

    function updateLineWidthPreviewGhost({ bridge = state.lineWidthPreview.bridging } = {}) {
      if (!state.textData || state.shape.type !== 'line' || (!state.lineWidthPreview.active && !bridge)) return;

      const { ctx, width, height } = resizeLineWidthGhostCanvas();
      ctx.clearRect(0, 0, width, height);

      const preview = getLineWidthPreviewShape();
      const visibleHalfWorldY = height / Math.max(preview.effectiveScale * 2, 0.000001);
      const worldTop = preview.absoluteFocus.y - visibleHalfWorldY;
      const worldBottom = preview.absoluteFocus.y + visibleHalfWorldY;
      const firstVisibleRow = clamp(
        Math.floor((worldTop - preview.topY) / state.lineHeight) - 3,
        0,
        preview.lineCount - 1
      );
      const lastVisibleRow = clamp(
        Math.ceil((worldBottom - preview.topY) / state.lineHeight) + 3,
        firstVisibleRow,
        preview.lineCount - 1
      );
      const visibleRowCount = lastVisibleRow - firstVisibleRow + 1;
      const rowStep = Math.max(1, Math.ceil(visibleRowCount / CONFIG.SHAPES.previewSpiritMaxRows));
      const baseStrokeWidth = clamp(preview.rowHeightPx * 0.14, 0.5, 2.1);
      const baseAlpha = 0.32;

      ctx.lineCap = 'round';

      for (let rowIndex = firstVisibleRow; rowIndex <= lastVisibleRow; rowIndex += rowStep) {
        const charStart = rowIndex * preview.charsPerLine;
        const charCount = Math.min(preview.charsPerLine, preview.textLength - charStart);
        if (charCount <= 0) continue;

        const screenY = preview.centerScreenY + (preview.topY + rowIndex * state.lineHeight) * preview.effectiveScale;
        if (screenY < -8 || screenY > height + 8) continue;

        const rowWidthPx = Math.max(charCount * state.baseCharWidth * preview.effectiveScale, 1);
        const density = sampleSpiritDensity(charStart, charCount, rowIndex, 0);
        const alpha = clamp(baseAlpha + density * 0.24, 0.05, 0.78);
        const inkFactor = charCount <= 1
          ? 0.34
          : charCount === 2
            ? 0.56
            : clamp(0.78 + density * 0.12, 0.68, 0.9);
        const inkWidthPx = Math.max(Math.min(rowWidthPx * inkFactor, rowWidthPx), 0.8);
        const x0 = preview.centerScreenX - inkWidthPx / 2;
        const x1 = preview.centerScreenX + inkWidthPx / 2;

        if (inkWidthPx <= baseStrokeWidth * 1.1 || x1 <= x0) {
          ctx.fillStyle = `rgba(255,255,255,${clamp(baseAlpha + density * 0.36, 0.08, 0.92)})`;
          const pointSize = clamp(Math.min(inkWidthPx, 1.4) + density * 0.8, 0.8, 1.9);
          ctx.beginPath();
          ctx.arc(preview.centerScreenX, screenY, pointSize / 2, 0, Math.PI * 2);
          ctx.fill();
          continue;
        }

        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = clamp(baseStrokeWidth * (0.92 + density * 0.14), 0.45, 2.2);
        ctx.beginPath();
        ctx.moveTo(x0, screenY);
        ctx.lineTo(x1, screenY);
        ctx.stroke();

      }

      showLineWidthPreview({ bridge });
    }

    function previewLineWidthChange() {
      state.lineWidthPreview.active = true;
      state.lineWidthPreview.bridging = false;
      state.renderMode = 'preview';
      updateLineWidthPreviewGhost({ bridge: false });
    }

    function scheduleLineWidthCommit(delay = 260, expectedRevision = state.lineWidthPreview.revision) {
      cancelLineWidthCommit();
      state.lineWidthPreview.commitTimeout = setTimeout(() => {
        state.lineWidthPreview.commitTimeout = null;
        if (
          !state.lineWidthPreview.active
          || state.lineWidthPreview.interacting
          || expectedRevision !== state.lineWidthPreview.revision
          || state.shape.type !== 'line'
        ) return;
        rebuildLayout({ fitView: false, guard: () => (
          state.lineWidthPreview.revision === expectedRevision && !state.lineWidthPreview.interacting
        ) });
      }, delay);
    }

    function fitShapeInView({ initialCircleViewportFraction = null } = {}) {
      state.scale = getEstimatedFitScaleForLayout(state.layout, state.normalizeScale, { initialCircleViewportFraction });
      state.focusWorld = {
        x: state.layout.center.x * state.normalizeScale,
        y: state.layout.center.y * state.normalizeScale
      };
    }

    function disableViewAutoFit() {
      state.viewAutoFit.enabled = false;
      state.viewAutoFit.initialCircleViewportFraction = null;
    }

    function maybeRefreshAutoFitViewportPlacement() {
      if (!state.viewAutoFit.enabled || !state.textData || !state.layout?.rows?.length) return false;
      fitShapeInView({ initialCircleViewportFraction: state.viewAutoFit.initialCircleViewportFraction });
      applyTransform();
      return true;
    }

    async function renderTexture(textureConfig, { layout, guard = null, targetScale = null, maxSizeOverride = null } = {}) {
      const boundsWidth = Math.max(layout.bounds.width, 1);
      const boundsHeight = Math.max(layout.bounds.height, 1);
      const paddingX = Math.max(8, Math.ceil(state.baseCharWidth * 3));
      const paddingY = Math.max(8, Math.ceil(state.lineHeight * 2));
      const resolvedScale = Math.max(targetScale ?? textureConfig.scale, 0.000001);
      const resolvedMaxSize = Math.max(maxSizeOverride ?? textureConfig.maxSize, 1);
      const textureScaleX = Math.max(Math.min(
        resolvedScale,
        (resolvedMaxSize - paddingX * 2) / boundsWidth
      ), 0.000001);
      const textureScaleY = Math.max(Math.min(
        resolvedScale,
        (resolvedMaxSize - paddingY * 2) / boundsHeight
      ), 0.000001);
      const width = Math.max(1, Math.ceil(boundsWidth * textureScaleX + paddingX * 2));
      const height = Math.max(1, Math.ceil(boundsHeight * textureScaleY + paddingY * 2));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d', { alpha: false });

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      try {
        ctx.translate(width / 2, height / 2);
        ctx.scale(textureScaleX, textureScaleY);
        ctx.fillStyle = '#fff';
        ctx.font = `${state.baseFontSize}px ${CONFIG.FONT_FAMILY}`;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';

        for (let i = 0; i < layout.rows.length; i++) {
          const line = layout.rows[i];
          ctx.fillText(
            state.textData.substr(line.startIndex, line.charCount),
            line.x,
            line.y
          );

          if ((i + 1) % 64 === 0 && i + 1 < layout.rows.length) {
            const canContinue = await yieldToUrgentUi(guard);
            if (!canContinue) return null;
          }
        }
      } finally {
        ctx.restore();
      }

      if (guard && !guard()) return null;

      return {
        canvas,
        width,
        height,
        padding: Math.max(paddingX, paddingY),
        scaleX: textureScaleX,
        scaleY: textureScaleY
      };
    }

    async function renderMidTexture({ targetStageIndex = null, targetScale = null, ...options } = {}) {
      const resolvedScale = targetScale ?? (targetStageIndex == null
        ? CONFIG.MID_TEXTURE.scale
        : getMidScaleForStageIndex(targetStageIndex));
      const texture = await renderTexture(CONFIG.MID_TEXTURE, {
        ...options,
        targetScale: resolvedScale,
        maxSizeOverride: getHardMidTextureMaxSize()
      });
      if (!texture) return null;
      texture.targetScale = resolvedScale;
      texture.stageIndex = getActualMidStageIndexFromScale(Math.min(texture.scaleX, texture.scaleY));
      return texture;
    }

    function initTextureLayer(canvas, ctx, texture) {
      if (!texture.canvas) return;

      canvas.width = texture.width;
      canvas.height = texture.height;
      canvas.style.width = texture.width + 'px';
      canvas.style.height = texture.height + 'px';
      ctx.drawImage(texture.canvas, 0, 0);
      canvas.style.filter = 'none';
    }

    function initMidLayer() {
      initTextureLayer(elements.midCanvas, elements.midCtx, state.textures.mid);
      if (!state.textures.mid.canvas) {
        hideMidOverlay();
        return;
      }
      elements.midCanvas.style.opacity = '0';
    }

    function findFirstVisibleLine(topWorldY, padding) {
      if (!state.layout.rows.length) return 0;

      const adjustedTop = topWorldY - padding;
      let lo = 0;
      let hi = state.layout.rows.length - 1;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        if (state.layout.rows[mid].y < adjustedTop) lo = mid + 1;
        else hi = mid;
      }
      return Math.max(0, lo - 1);
    }

    function getPan() {
      return {
        x: -state.focusWorld.x * state.scale,
        y: -state.focusWorld.y * state.scale
      };
    }

    function getEffectiveScale() {
      return state.scale * state.normalizeScale;
    }

    function stopRenderWhisperDots() {
      if (state.renderWhisper.dotsTimer) {
        clearTimeout(state.renderWhisper.dotsTimer);
        state.renderWhisper.dotsTimer = null;
      }
      state.renderWhisper.dotsAnimated = false;
      state.renderWhisper.dotCount = 0;
      state.renderWhisper.dotStartedAt = 0;
      if (elements.renderWhisperDots) elements.renderWhisperDots.textContent = '';
    }

    function getRenderWhisperAnchor() {
      if (state.renderWhisper.kind === 'load' && state.layout?.bounds?.width && state.textData) {
        const metrics = getShapeScreenMetrics();
        return { x: metrics.centerX, y: metrics.centerY };
      }

      if (Number.isFinite(state.renderWhisper.anchorX) && Number.isFinite(state.renderWhisper.anchorY)) {
        return { x: state.renderWhisper.anchorX, y: state.renderWhisper.anchorY };
      }

      const viewport = getViewportMetrics();

      return { x: viewport.localCenterX, y: viewport.localCenterY };
    }

    function applyRenderWhisperPlacement(kind) {
      if (!elements.renderWhisper) return;
      if (kind === 'load') {
        const anchor = getRenderWhisperAnchor();
        elements.renderWhisper.style.left = `${anchor.x}px`;
        elements.renderWhisper.style.top = `${anchor.y}px`;
        elements.renderWhisper.style.bottom = 'auto';
      } else {
        elements.renderWhisper.style.left = '';
        elements.renderWhisper.style.top = '';
        elements.renderWhisper.style.bottom = '';
      }
    }

    function setRenderWhisper(text, kind = 'general', { animateDots = false } = {}) {
      if (!elements.renderWhisper) return;
      if (kind !== 'load' && state.renderWhisper.pendingLoadId) return;
      if (state.renderWhisper.timeout) {
        clearTimeout(state.renderWhisper.timeout);
        state.renderWhisper.timeout = null;
      }
      stopRenderWhisperDots();
      if (kind === 'load') {
        const anchor = getRenderWhisperAnchor();
        state.renderWhisper.anchorX = anchor.x;
        state.renderWhisper.anchorY = anchor.y;
      } else {
        state.renderWhisper.anchorX = null;
        state.renderWhisper.anchorY = null;
      }
      state.renderWhisper.kind = kind;
      state.renderWhisper.baseText = text;
      state.renderWhisper.dotsAnimated = animateDots;
      elements.renderWhisper.dataset.kind = kind;
      applyRenderWhisperPlacement(kind);
      if (elements.renderWhisperLabel) elements.renderWhisperLabel.textContent = text;
      if (elements.renderWhisperDots) elements.renderWhisperDots.textContent = '';
      elements.renderWhisper.classList.add('active');
      elements.renderWhisper.style.display = 'block';

      if (animateDots) {
        const dotIntervalMs = 180;
        state.renderWhisper.dotCount = 0;
        state.renderWhisper.dotStartedAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
        const tickDots = () => {
          if (!elements.renderWhisper || state.renderWhisper.kind !== kind || !state.renderWhisper.dotsAnimated) return;
          const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
          const elapsed = Math.max(now - state.renderWhisper.dotStartedAt, 0);
          const nextDotCount = Math.floor(elapsed / dotIntervalMs);
          state.renderWhisper.dotCount = nextDotCount;
          if (elements.renderWhisperLabel) elements.renderWhisperLabel.textContent = text;
          if (elements.renderWhisperDots) {
            elements.renderWhisperDots.textContent = '.'.repeat(state.renderWhisper.dotCount);
          }
          const nextDelay = Math.max(dotIntervalMs * (state.renderWhisper.dotCount + 1) - elapsed, 16);
          state.renderWhisper.dotsTimer = setTimeout(tickDots, nextDelay);
        };
        state.renderWhisper.dotsTimer = setTimeout(tickDots, dotIntervalMs);
      }
    }

    function clearRenderWhisper({ delay = 0, kind = '' } = {}) {
      if (!elements.renderWhisper) return;
      if (kind && state.renderWhisper.kind !== kind) return;
      if (state.renderWhisper.timeout) {
        clearTimeout(state.renderWhisper.timeout);
        state.renderWhisper.timeout = null;
      }
      if (state.renderWhisper.revealFrame) {
        cancelAnimationFrame(state.renderWhisper.revealFrame);
        state.renderWhisper.revealFrame = 0;
      }

      const hide = () => {
        if (kind && state.renderWhisper.kind !== kind) return;
        stopRenderWhisperDots();
        if (!kind || kind === 'load') {
          state.renderWhisper.pendingLoadId = 0;
          state.renderWhisper.committedLoadId = 0;
          state.renderWhisper.pendingDocumentKey = '';
          state.renderWhisper.anchorX = null;
          state.renderWhisper.anchorY = null;
        }
        state.renderWhisper.kind = '';
        state.renderWhisper.baseText = '';
        if (elements.renderWhisperLabel) elements.renderWhisperLabel.textContent = '';
        if (elements.renderWhisperDots) elements.renderWhisperDots.textContent = '';
        delete elements.renderWhisper.dataset.kind;
        applyRenderWhisperPlacement('');
        elements.renderWhisper.classList.remove('active');
      };

      if (delay > 0) {
        state.renderWhisper.timeout = setTimeout(hide, delay);
      } else {
        hide();
      }
    }

    function showUploadOverlay() {
      if (!elements.dropBibleOverlay) return;
      resetUploadZoneFeedback();
      elements.dropBibleOverlay.classList.add('active');
      elements.dropBibleOverlay.style.display = 'flex';
      updateDropBibleOverlayTransform();
    }

    function hideUploadOverlay() {
      if (!elements.dropBibleOverlay) return;
      clearUploadFeedbackTimeout();
      clearDropBiblePendingMousePicker();
      dropBibleTouchMode = 'idle';
      dropBibleMousePressActive = false;
      dropBibleMouseSecondPress = false;
      dropBibleSuppressNextClick = false;
      if (dropBibleSuppressClickTimeout) {
        clearTimeout(dropBibleSuppressClickTimeout);
        dropBibleSuppressClickTimeout = 0;
      }
      dropBibleDragDepth = 0;
      state.dropBiblePlaceholder = null;
      elements.dropBibleOverlay.classList.remove('active');
