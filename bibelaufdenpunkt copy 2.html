      elements.dropBibleOverlay.style.display = 'none';
    }

    function nextPaint() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    function resizePresenceCanvas() {
      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(viewport.width * dpr));
      const height = Math.max(1, Math.round(viewport.height * dpr));

      if (elements.presenceCanvas.width !== width || elements.presenceCanvas.height !== height) {
        elements.presenceCanvas.width = width;
        elements.presenceCanvas.height = height;
        elements.presenceCanvas.style.width = `${viewport.width}px`;
        elements.presenceCanvas.style.height = `${viewport.height}px`;
      }
    }

    function clearPresenceLayer() {
      resizePresenceCanvas();
      elements.presenceCtx.clearRect(0, 0, elements.presenceCanvas.width, elements.presenceCanvas.height);
      elements.presenceCanvas.style.opacity = '0';
    }

    function getPresenceSourceTexture() {
      const preferred = state.textures.mid;
      if (!preferred?.canvas) {
        return null;
      }

      const padding = preferred.padding || 0;
      const sourceWidth = Math.max(1, preferred.width - padding * 2);
      const sourceHeight = Math.max(1, preferred.height - padding * 2);

      return {
        texture: preferred,
        sx: padding,
        sy: padding,
        sw: sourceWidth,
        sh: sourceHeight
      };
    }

    function getPresenceEnhancement(thinAxis) {
      const farT = 1 - smoothstep(CONFIG.PRESENCE.vanishBelowPx, CONFIG.PRESENCE.minAxisPx, thinAxis);

      return {
        brightness: CONFIG.PRESENCE.brightnessNear + (CONFIG.PRESENCE.brightnessFar - CONFIG.PRESENCE.brightnessNear) * farT,
        contrast: CONFIG.PRESENCE.contrastNear + (CONFIG.PRESENCE.contrastFar - CONFIG.PRESENCE.contrastNear) * farT,
        alphaBoost: CONFIG.PRESENCE.alphaNear + (CONFIG.PRESENCE.alphaFar - CONFIG.PRESENCE.alphaNear) * farT
      };
    }

    function drawLinePresenceProfile(ctx, drawWidth, drawHeight, baseAlpha, dpr) {
      const profile = state.layout.meta?.presenceProfile;
      if (!Array.isArray(profile) || profile.length === 0 || drawWidth <= 0 || drawHeight <= 0) return false;

      const pixelSize = 1 / dpr;
      const coverageX = clamp(drawWidth * dpr, 0, 1);
      const paintedWidth = Math.max(drawWidth, pixelSize);
      if (coverageX <= 0.0001) return false;

      const longLineT = smoothstep(
        CONFIG.PRESENCE.longLineBoostStartPx,
        CONFIG.PRESENCE.longLineBoostFullPx,
        drawHeight * dpr
      );
      const coverageGamma = CONFIG.PRESENCE.coverageGamma
        + (CONFIG.PRESENCE.longLineCoverageGamma - CONFIG.PRESENCE.coverageGamma) * longLineT;
      const deviceRowCount = Math.max(1, Math.min(elements.presenceCanvas.height, Math.ceil(drawHeight * dpr)));
      const rowPaintHeight = Math.max(drawHeight / deviceRowCount, pixelSize);
      const rowCoverageY = drawHeight < pixelSize ? clamp(drawHeight * dpr, 0, 1) : 1;
      ctx.fillStyle = '#fff';

      for (let rowIndex = 0; rowIndex < deviceRowCount; rowIndex++) {
        const profileStart = Math.floor(rowIndex * profile.length / deviceRowCount);
        const profileEnd = Math.max(profileStart + 1, Math.floor((rowIndex + 1) * profile.length / deviceRowCount));
        let densitySum = 0;

        for (let i = profileStart; i < profileEnd; i++) {
          densitySum += clamp(profile[i], 0, 1);
        }

        const density = Math.pow(densitySum / Math.max(1, profileEnd - profileStart), CONFIG.PRESENCE.densityGamma);
        if (density <= 0.001) continue;

        const coverage = Math.pow(coverageX * rowCoverageY, coverageGamma);
        if (coverage <= 0.001) continue;

        const centerY = -drawHeight / 2 + (rowIndex + 0.5) * (drawHeight / deviceRowCount);
        ctx.globalAlpha = baseAlpha * density * CONFIG.PRESENCE.maxPixelAlpha * coverage;
        ctx.fillRect(-paintedWidth / 2, centerY - rowPaintHeight / 2, paintedWidth, rowPaintHeight);
      }

      return true;
    }

    function getShapeScreenMetrics() {
      const viewport = getViewportMetrics();
      const effectiveScale = getEffectiveScale();
      return {
        widthPx: state.layout.bounds.width * effectiveScale,
        heightPx: state.layout.bounds.height * effectiveScale,
        centerX: viewport.localCenterX + (state.layout.center.x * state.normalizeScale - state.focusWorld.x) * state.scale,
        centerY: viewport.localCenterY + (state.layout.center.y * state.normalizeScale - state.focusWorld.y) * state.scale
      };
    }

    function updatePresenceLayer({ forceVisible = false } = {}) {
      if (!state.textData) {
        clearPresenceLayer();
        return;
      }

      const { widthPx, heightPx, centerX, centerY } = getShapeScreenMetrics();
      const thinAxis = Math.min(widthPx, heightPx);
      const longAxis = Math.max(widthPx, heightPx);
      const bothSubPixel = widthPx < CONFIG.PRESENCE.minAxisPx && heightPx < CONFIG.PRESENCE.minAxisPx;

      if (forceVisible ? bothSubPixel : (thinAxis >= CONFIG.PRESENCE.minAxisPx || longAxis <= CONFIG.PRESENCE.vanishBelowPx)) {
        clearPresenceLayer();
        return;
      }

      resizePresenceCanvas();
      const ctx = elements.presenceCtx;
      const source = getPresenceSourceTexture();
      const dpr = window.devicePixelRatio || 1;
      const fadeIn = forceVisible
        ? 1
        : 1 - smoothstep(CONFIG.PRESENCE.fullAlphaBelowPx, CONFIG.PRESENCE.minAxisPx, thinAxis);
      const pointFade = forceVisible
        ? 1
        : (longAxis < CONFIG.PRESENCE.minAxisPx ? clamp(longAxis / CONFIG.PRESENCE.minAxisPx, 0, 1) : 1);
      const enhancement = getPresenceEnhancement(thinAxis);
      const alpha = fadeIn * pointFade * enhancement.alphaBoost;

      ctx.clearRect(0, 0, elements.presenceCanvas.width, elements.presenceCanvas.height);
      if (alpha <= 0.001) {
        elements.presenceCanvas.style.opacity = '0';
        return;
      }

      const drawWidth = state.shape.type === 'line' ? widthPx : Math.max(widthPx, CONFIG.PRESENCE.minAxisPx);
      const drawHeight = state.shape.type === 'line' ? heightPx : Math.max(heightPx, CONFIG.PRESENCE.minAxisPx);

      ctx.save();
      ctx.scale(dpr, dpr);
      ctx.translate(centerX, centerY);
      if (state.shape.type === 'line' && drawLinePresenceProfile(ctx, drawWidth, drawHeight, alpha, dpr)) {
        ctx.restore();
        elements.presenceCanvas.style.opacity = '1';
        return;
      }

      ctx.globalAlpha = alpha;

      if (source) {
        ctx.imageSmoothingEnabled = true;
        ctx.filter = `brightness(${enhancement.brightness}) contrast(${enhancement.contrast})`;
        ctx.drawImage(
          source.texture.canvas,
          source.sx,
          source.sy,
          source.sw,
          source.sh,
          -drawWidth / 2,
          -drawHeight / 2,
          drawWidth,
          drawHeight
        );
      } else {
        ctx.fillStyle = '#fff';
        if (state.shape.type === 'circle') {
          ctx.beginPath();
          ctx.ellipse(0, 0, drawWidth / 2, drawHeight / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
        }
      }

      ctx.restore();
      elements.presenceCanvas.style.opacity = '1';
    }

    function renderNativeTexture(options = {}) {
      const viewport = getViewportMetrics();
      const w = viewport.width;
      const h = viewport.height;
      const dpr = window.devicePixelRatio || 1;
      const margin = Math.max(options.margin || 2.5, 1);
      const resolutionScale = clamp(options.resolutionScale || 1, 0.35, 2);
      const qualityBoost = Math.max(options.qualityBoost || 1, 1);
      const renderDpr = dpr * qualityBoost * resolutionScale;
      const effScale = getEffectiveScale();
      const centerWorldX = state.focusWorld.x / state.normalizeScale;
      const centerWorldY = state.focusWorld.y / state.normalizeScale;
      const cacheW = Math.round(w * margin * renderDpr);
      const cacheH = Math.round(h * margin * renderDpr);

      if (!state.textures.native.canvas) {
        state.textures.native.canvas = document.createElement('canvas');
      }

      const cacheCanvas = state.textures.native.canvas;
      cacheCanvas.width = cacheW;
      cacheCanvas.height = cacheH;
      const ctx = cacheCanvas.getContext('2d', { alpha: false });

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cacheW, cacheH);

      const halfW = (w * margin / 2) / effScale;
      const halfH = (h * margin / 2) / effScale;
      const leftWorldX = centerWorldX - halfW;
      const rightWorldX = centerWorldX + halfW;
      const topWorldY = centerWorldY - halfH;
      const bottomWorldY = centerWorldY + halfH;
      const rawFontSize = state.baseFontSize * effScale * renderDpr;
      const actualFontSize = Math.min(rawFontSize, 500);
      const fontScaleFactor = actualFontSize / rawFontSize;

      ctx.fillStyle = '#fff';
      ctx.font = `${actualFontSize}px ${CONFIG.FONT_FAMILY}`;
      ctx.textBaseline = 'middle';
      ctx.textAlign = 'center';

      const yPadding = Math.max(state.lineHeight, h / effScale);
      LOG.nativeRender(centerWorldX, centerWorldY, effScale);

      if (state.shape.type === 'line' && state.layout.meta?.virtualRows) {
        const charsPerLine = state.layout.meta.charsPerLine;
        const lineCount = state.layout.meta.lineCount;
        const topY = state.layout.meta.topY;
        const firstVisibleRow = clamp(
          Math.floor((topWorldY - yPadding - topY) / state.lineHeight) - 1,
          0,
          lineCount - 1
        );
        const lastVisibleRow = clamp(
          Math.ceil((bottomWorldY + yPadding - topY) / state.lineHeight) + 1,
          firstVisibleRow,
          lineCount - 1
        );

        ctx.textAlign = 'left';

        for (let rowIndex = firstVisibleRow; rowIndex <= lastVisibleRow; rowIndex++) {
          const startIndex = rowIndex * charsPerLine;
          const charCount = Math.min(charsPerLine, state.textData.length - startIndex);
          if (charCount <= 0) continue;

          const lineY = topY + rowIndex * state.lineHeight;
          const screenY = cacheH / 2 + (lineY - centerWorldY) * effScale * renderDpr;
          const lineLeftWorldX = -(charCount * state.baseCharWidth) / 2;
          const visibleStart = clamp(
            Math.floor((leftWorldX - lineLeftWorldX) / state.baseCharWidth) - 2,
            0,
            charCount
          );
          const visibleEnd = clamp(
            Math.ceil((rightWorldX - lineLeftWorldX) / state.baseCharWidth) + 2,
            visibleStart,
            charCount
          );
          if (visibleEnd <= visibleStart) continue;

          const lineText = state.textData.substr(startIndex + visibleStart, visibleEnd - visibleStart);
          const wholeLineVisible = visibleStart === 0 && visibleEnd === charCount;

          if (wholeLineVisible && charCount <= 8) {
            const screenCenterX = cacheW / 2 + (0 - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'center';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenCenterX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenCenterX), Math.round(screenY));
            }
          } else {
            const screenX = cacheW / 2 + (lineLeftWorldX + visibleStart * state.baseCharWidth - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'left';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenX), Math.round(screenY));
            }
          }
        }

        state.textures.native.centerX = state.focusWorld.x;
        state.textures.native.centerY = state.focusWorld.y;
        state.textures.native.scale = state.scale;
        state.textures.native.width = w * margin;
        state.textures.native.height = h * margin;
        state.textures.native.qualityBoost = qualityBoost;
        return;
      }

      const startIdx = findFirstVisibleLine(topWorldY, yPadding);

      for (let i = startIdx; i < state.layout.rows.length; i++) {
        const line = state.layout.rows[i];
        if (line.y - yPadding > bottomWorldY) break;

        const screenY = cacheH / 2 + (line.y - centerWorldY) * effScale * renderDpr;

        if (state.shape.type === 'line') {
          const lineLeftWorldX = line.x - (line.charCount * state.baseCharWidth) / 2;
          const visibleStart = clamp(
            Math.floor((leftWorldX - lineLeftWorldX) / state.baseCharWidth) - 2,
            0,
            line.charCount
          );
          const visibleEnd = clamp(
            Math.ceil((rightWorldX - lineLeftWorldX) / state.baseCharWidth) + 2,
            visibleStart,
            line.charCount
          );
          if (visibleEnd <= visibleStart) continue;

          const lineText = state.textData.substr(line.startIndex + visibleStart, visibleEnd - visibleStart);
          const wholeLineVisible = visibleStart === 0 && visibleEnd === line.charCount;

          if (wholeLineVisible && line.charCount <= 8) {
            const screenCenterX = cacheW / 2 + (line.x - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'center';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenCenterX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenCenterX), Math.round(screenY));
            }
          } else {
            const screenX = cacheW / 2 + (lineLeftWorldX + visibleStart * state.baseCharWidth - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'left';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenX), Math.round(screenY));
            }
          }
        } else {
          const lineText = state.textData.substr(line.startIndex, line.charCount);
          const screenX = cacheW / 2 + (line.x - centerWorldX) * effScale * renderDpr;
          ctx.textAlign = 'center';

          if (fontScaleFactor < 1) {
            ctx.save();
            ctx.translate(screenX, screenY);
            ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
            ctx.fillText(lineText, 0, 0);
            ctx.restore();
          } else {
            ctx.fillText(lineText, Math.round(screenX), Math.round(screenY));
          }
        }
      }

      state.textures.native.centerX = state.focusWorld.x;
      state.textures.native.centerY = state.focusWorld.y;
      state.textures.native.scale = state.scale;
      state.textures.native.width = w * margin;
      state.textures.native.height = h * margin;
      state.textures.native.qualityBoost = qualityBoost;
    }

    function showNativeOverlay() {
      const { nativeCanvas } = elements;
      const native = state.textures.native;
      if (!native.canvas) return;

      nativeCanvas.width = native.canvas.width;
      nativeCanvas.height = native.canvas.height;
      elements.nativeCtx.drawImage(native.canvas, 0, 0);
      nativeCanvas.style.width = native.width + 'px';
      nativeCanvas.style.height = native.height + 'px';
      if (state.renderWhisper.kind === 'load') {
        state.renderWhisper.committedLoadId = currentLoadId;
        maybeFinishLoadWhisper(currentLoadId);
      }
    }

    function hideNativeOverlay() {
      elements.nativeCanvas.style.opacity = '0';
      elements.nativeCanvas.width = 1;
      elements.nativeCanvas.height = 1;
      elements.nativeCanvas.style.width = '1px';
      elements.nativeCanvas.style.height = '1px';
    }

    function hideMidOverlay() {
      elements.midCanvas.style.opacity = '0';
      elements.midCanvas.width = 1;
      elements.midCanvas.height = 1;
      elements.midCanvas.style.width = '1px';
      elements.midCanvas.style.height = '1px';
    }

    function releaseCanvasResource(canvas) {
      if (!canvas) return;
      try {
        const ctx = canvas.getContext?.('2d');
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
      } catch (error) {
        // absichtlich still: Freigabe ist best-effort
      }
      canvas.width = 1;
      canvas.height = 1;
    }

    function releaseTextureResource(texture, releasedCanvases) {
      if (!texture?.canvas) return;
      if (!releasedCanvases.has(texture.canvas)) {
        releasedCanvases.add(texture.canvas);
        releaseCanvasResource(texture.canvas);
      }
      texture.canvas = null;
      texture.width = 0;
      texture.height = 0;
      if ('padding' in texture) texture.padding = 0;
      if ('scale' in texture) {
        texture.scale = 0;
        texture.centerX = 0;
        texture.centerY = 0;
      }
    }

    function releasePreparedRenderResources(prepared, releasedCanvases) {
      if (!prepared) return;
      releaseTextureResource(prepared.midTexture, releasedCanvases);
    }

    function clearShapeRenderCacheResources(releasedCanvases = new Set()) {
      for (const prepared of shapeRenderCache.values()) {
        releasePreparedRenderResources(prepared, releasedCanvases);
      }
      shapeRenderCache.clear();
    }

    function pruneTextCache(fileToKeep = '') {
      for (const key of Array.from(textCache.keys())) {
        if (key !== fileToKeep) textCache.delete(key);
      }
    }

    async function releaseCurrentBibleResources({ nextFilename = '', loadId = currentLoadId } = {}) {
      const releasedCanvases = new Set();
      const preserveGeometry = !!state.layout?.rows?.length && !!state.textData;

      state.layoutBuildRevision += 1;
      resetProgressiveRefinement();
      cancelNativeRender();
      cancelLineWidthCommit();

      if (state.shapeRefreshTimeout) {
        clearTimeout(state.shapeRefreshTimeout);
        state.shapeRefreshTimeout = null;
      }

      releaseTextureResource(state.textures.mid, releasedCanvases);
      releaseTextureResource(state.textures.native, releasedCanvases);
      clearShapeRenderCacheResources(releasedCanvases);

      state.activePreparedRender = null;
      state.textures.mid = createEmptyTextureState(CONFIG.MID_TEXTURE);
      resetNativeTexture();
      state.renderMode = 'texture';
      state.lineWidthPreview.active = false;
      state.lineWidthPreview.bridging = false;

      hideMidOverlay();
      hideNativeOverlay();
      clearLineWidthGhostCanvas();
      elements.lineWidthGhost.style.display = 'none';
      elements.lineWidthGhost.style.opacity = '0';
      updateMidScaleReadout();

      if (preserveGeometry) applyTransform();
      else clearPresenceLayer();

      pruneTextCache(textCache.has(nextFilename) ? nextFilename : '');

      await nextPaint();
      if (loadId !== currentLoadId) return false;
      await nextPaint();
      return loadId === currentLoadId;
    }

    function getTextureFidelity(texture, targetScale) {
      const scaleRatio = Math.min(texture.scaleX, texture.scaleY) / targetScale;
      return clamp(Math.sqrt(scaleRatio), 0.1, 1);
    }

    function normalizeBlendTuning() {
      const maxThreshold = 40;
      state.blendTuning.midToNativeStart = clamp(state.blendTuning.midToNativeStart, 0.1, maxThreshold - 0.3);
      state.blendTuning.midToNativeEnd = clamp(state.blendTuning.midToNativeEnd, state.blendTuning.midToNativeStart + 0.1, maxThreshold);
    }

    function getBlendThresholds() {
      const midFidelity = getTextureFidelity(state.textures.mid, CONFIG.MID_TEXTURE.scale);
      return {
        midToNativeStart: state.blendTuning.midToNativeStart * midFidelity,
        midToNativeEnd: state.blendTuning.midToNativeEnd * midFidelity
      };
    }

    function getLineAspectRatio() {
      const { width, height } = state.layout.bounds;
      return Math.max(width, height) / Math.max(Math.min(width, height), 1);
    }

    function canUseProgressiveRefinement(screenFontSize, thresholds = getBlendThresholds()) {
      return screenFontSize >= thresholds.midToNativeStart
        && screenFontSize <= thresholds.midToNativeEnd;
    }

    function getNativeRenderPixelSize(qualityBoost = 1) {
      const dpr = window.devicePixelRatio || 1;
      return Math.min(state.baseFontSize * getEffectiveScale() * dpr * qualityBoost, 500);
    }

    function hasMeaningfulQualityGain(fromBoost, toBoost) {
      const fromSize = getNativeRenderPixelSize(fromBoost);
      const toSize = getNativeRenderPixelSize(toBoost);
      if (toSize <= fromSize) {
        return false;
      }

      const pixelGain = toSize - fromSize;
      const ratioGain = toSize / Math.max(fromSize, 0.0001);
      return pixelGain >= CONFIG.PROGRESSIVE.minPixelGain && ratioGain >= CONFIG.PROGRESSIVE.minQualityGainRatio;
    }

    function getProgressiveProfile(screenFontSize, thresholds = getBlendThresholds()) {
      if (!canUseProgressiveRefinement(screenFontSize, thresholds) || state.progressive.stage <= 0) {
        return null;
      }

      const stageIndex = state.progressive.stage - 1;
      const qualityBoost = CONFIG.PROGRESSIVE.nativeQualityBoosts[stageIndex] || 1;
      if (!hasMeaningfulQualityGain(1, qualityBoost)) {
        return null;
      }

      return {
        qualityBoost
      };
    }

    function getActiveBlendProfile(screenFontSize) {
      const thresholds = getBlendThresholds();
      const progressive = getProgressiveProfile(screenFontSize, thresholds);
      const shouldForceNative = !!state.layout?.meta?.forceNative;

      if (!progressive) {
        return {
          thresholds,
          qualityBoost: 1,
          shouldForceNative
        };
      }

      return {
        thresholds,
        qualityBoost: progressive.qualityBoost,
        shouldForceNative
      };
    }

    function clearProgressiveTimers() {
      for (const timer of state.progressive.timers) {
        clearTimeout(timer);
      }
      state.progressive.timers = [];
    }

    function resetProgressiveRefinement() {
      state.progressive.revision += 1;
      state.progressive.stage = 0;
      state.progressive.activeQualityBoost = 1;
      state.progressive.lastInteractionAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
      clearProgressiveTimers();
    }

    function scheduleMidProgressiveRefinement(revision, elapsed) {
      const prepared = state.activePreparedRender;
      if (!prepared || prepared.layout.meta?.forceNative || !state.textData) return [];

      if (Math.min(prepared.midTexture.scaleX, prepared.midTexture.scaleY) >= prepared.safeMidTargetScale - 0.000001) {
        return [];
      }

      const guard = () => revision === state.progressive.revision && !state.drag.active && isPreparedRenderActive(prepared);
      const upgradeDelay = CONFIG.PROGRESSIVE.midUpgradeDelays[0] || 120;

      return [setTimeout(() => {
        if (!guard()) return;
        void ensurePreparedMidTexture(prepared, { guard, targetScale: prepared.safeMidTargetScale })
          .then(texture => {
            if (!texture || !guard() || !isPreparedRenderActive(prepared)) return;
            applyPreparedMidTexture(prepared);
          })
          .catch(error => {
            if (guard()) console.error('Mid-Upgrade fehlgeschlagen:', error);
          });
      }, Math.max(0, upgradeDelay - elapsed))];
    }

    function scheduleNativeProgressiveRefinement(screenFontSize, thresholds, revision, elapsed) {
      if (!canUseProgressiveRefinement(screenFontSize, thresholds) || !state.textData) {
        return [];
      }

      const startStageIndex = Math.max(state.progressive.stage, 0);
      return CONFIG.PROGRESSIVE.idleStages
        .map((targetDelay, stageIndex) => ({ targetDelay, stageIndex }))
        .filter(({ stageIndex }) => stageIndex >= startStageIndex)
        .map(({ targetDelay, stageIndex }) => setTimeout(() => {
          if (revision !== state.progressive.revision || state.drag.active) {
            return;
          }

          const nextBoost = CONFIG.PROGRESSIVE.nativeQualityBoosts[stageIndex] || 1;
          if (!hasMeaningfulQualityGain(state.progressive.activeQualityBoost, nextBoost)) {
            return;
          }

          state.progressive.stage = stageIndex + 1;
          state.progressive.activeQualityBoost = nextBoost;
          applyTransform();
        }, Math.max(0, targetDelay - elapsed)));
    }

    function scheduleProgressiveRefinement() {
      clearProgressiveTimers();

      if (state.drag.active || !state.textData || state.layout?.meta?.fullTextNative) {
        return;
      }

      const screenFontSize = state.baseFontSize * getEffectiveScale();
      const thresholds = getBlendThresholds();
      const revision = state.progressive.revision;
      const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
      const elapsed = Math.max(0, now - state.progressive.lastInteractionAt);

      state.progressive.timers = [
        ...scheduleMidProgressiveRefinement(revision, elapsed),
        ...scheduleNativeProgressiveRefinement(screenFontSize, thresholds, revision, elapsed)
      ];
    }

    function noteViewInteraction({ cancelNativeRender: shouldCancelNativeRender = true, isUserGesture = false } = {}) {
      if (isUserGesture) disableViewAutoFit();
      resetProgressiveRefinement();
      if (shouldCancelNativeRender) cancelNativeRender();
    }

    function beginScenePan(clientX, clientY) {
      state.drag.active = true;
      state.drag.lastX = clientX;
      state.drag.lastY = clientY;
      elements.container.classList.add('dragging');
      noteViewInteraction({ cancelNativeRender: false, isUserGesture: true });
    }

    function updateScenePan(clientX, clientY) {
      if (!state.drag.active) return;
      noteViewInteraction({ cancelNativeRender: false, isUserGesture: true });
      const dx = clientX - state.drag.lastX;
      const dy = clientY - state.drag.lastY;
      state.focusWorld.x -= dx / state.scale;
      state.focusWorld.y -= dy / state.scale;
      state.drag.lastX = clientX;
      state.drag.lastY = clientY;
      applyTransform();
    }

    function syncScenePinchState(touches) {
      state.drag.lastPinchDist = Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
      );
      state.drag.lastPinchCenterX = (touches[0].clientX + touches[1].clientX) / 2;
      state.drag.lastPinchCenterY = (touches[0].clientY + touches[1].clientY) / 2;
    }

    function beginScenePinch(touches) {
      state.drag.active = true;
      elements.container.classList.add('dragging');
      noteViewInteraction({ cancelNativeRender: false, isUserGesture: true });
      syncScenePinchState(touches);
    }

    function updateScenePinch(touches) {
      if (touches.length < 2 || !state.drag.lastPinchDist) return;
      noteViewInteraction({ cancelNativeRender: false, isUserGesture: true });

      const currentCenterX = (touches[0].clientX + touches[1].clientX) / 2;
      const currentCenterY = (touches[0].clientY + touches[1].clientY) / 2;
      const currentDist = Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
      );
      const viewport = getViewportMetrics();
      const oldScreenX = state.drag.lastPinchCenterX - viewport.clientCenterX;
      const oldScreenY = state.drag.lastPinchCenterY - viewport.clientCenterY;
      const worldUnderPinch = {
        x: state.focusWorld.x + oldScreenX / state.scale,
        y: state.focusWorld.y + oldScreenY / state.scale
      };

      state.scale = clamp(state.scale * (currentDist / state.drag.lastPinchDist), CONFIG.ZOOM.min, CONFIG.ZOOM.max);

      const newScreenX = currentCenterX - viewport.clientCenterX;
      const newScreenY = currentCenterY - viewport.clientCenterY;
      state.focusWorld.x = worldUnderPinch.x - newScreenX / state.scale;
      state.focusWorld.y = worldUnderPinch.y - newScreenY / state.scale;
      state.drag.lastPinchDist = currentDist;
      state.drag.lastPinchCenterX = currentCenterX;
      state.drag.lastPinchCenterY = currentCenterY;
      applyTransform();
    }

    function endSceneInteraction() {
      state.drag.active = false;
      elements.container.classList.remove('dragging');
      scheduleProgressiveRefinement();
    }

    function updateTextureTransform(canvas, texture) {
      const pan = getPan();
      const scaleX = getEffectiveScale() / texture.scaleX;
      const scaleY = getEffectiveScale() / texture.scaleY;
      canvas.style.transform = `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${scaleX}, ${scaleY})`;
    }

    function updateMidTransform() {
      updateTextureTransform(elements.midCanvas, state.textures.mid);
    }

    function hasNativeTextureReady() {
      return !!state.textures.native.canvas && !!state.textures.native.scale;
    }

    function isNativeOverlayReady() {
      return hasNativeTextureReady()
        && elements.nativeCanvas.width > 1
        && elements.nativeCanvas.height > 1;
    }

    function updateBlend(screenFontSize) {
      const blendProfile = getActiveBlendProfile(screenFontSize);
      const forceNative = blendProfile.shouldForceNative;
      const fullTextNative = !!state.layout?.meta?.fullTextNative;
      const holdGhost = shouldHoldBridgedLinePreview(screenFontSize);
      const hasMid = !!state.textures.mid.canvas;
      const hasFreshNative = isNativeOverlayReady();

      if (forceNative) {
        elements.midCanvas.style.opacity = '0';
        elements.midCanvas.style.filter = 'none';
        elements.nativeCanvas.style.opacity = (!holdGhost && hasFreshNative) ? '1' : '0';
        updateMidScaleReadout();
        return;
      }

      if (!hasMid && !hasFreshNative) {
        elements.midCanvas.style.opacity = '0';
        elements.midCanvas.style.filter = 'none';
        elements.nativeCanvas.style.opacity = '0';
        updateMidScaleReadout();
        return;
      }

      if (fullTextNative) {
        elements.midCanvas.style.opacity = hasMid ? '1' : '0';
        elements.midCanvas.style.filter = 'none';
        elements.nativeCanvas.style.opacity = '0';
        updateMidScaleReadout();
        return;
      }

      const thresholds = blendProfile.thresholds;
      const midToNative = hasFreshNative
        ? smoothstep(thresholds.midToNativeStart, thresholds.midToNativeEnd, screenFontSize)
        : 0;

      elements.midCanvas.style.opacity = hasMid ? 1 - midToNative : '0';
      elements.midCanvas.style.filter = 'none';
      elements.nativeCanvas.style.opacity = midToNative;
      updateMidScaleReadout();
    }

    function updateNativeTransform() {
      const native = state.textures.native;
      if (!native.scale) return null;

      const worldOffsetX = native.centerX - state.focusWorld.x;
      const worldOffsetY = native.centerY - state.focusWorld.y;
      const offsetX = worldOffsetX * state.scale;
      const offsetY = worldOffsetY * state.scale;
      const zoomRatio = state.scale / native.scale;

      elements.nativeCanvas.style.transform = `translate(-50%, -50%) translate(${offsetX}px, ${offsetY}px) scale(${zoomRatio})`;
      return { offsetX, offsetY, zoomRatio };
    }

    function cancelNativeRender() {
      if (state.renderTimeout) {
        clearTimeout(state.renderTimeout);
        state.renderTimeout = null;
      }
      renderScheduled = false;
      clearRenderWhisper({ kind: 'native' });
    }

    function applyTransform() {
      const screenFontSize = state.baseFontSize * getEffectiveScale();
      const blendProfile = getActiveBlendProfile(screenFontSize);
      const thresholds = blendProfile.thresholds;
      const fullTextNative = !!state.layout?.meta?.fullTextNative;
      const shouldBeNative = !fullTextNative && (blendProfile.shouldForceNative || screenFontSize >= thresholds.midToNativeStart);
      const loadPlaceholderActive = isLoadPlaceholderActive();

      LOG.scaleCheck(state.scale);

      if (state.lineWidthPreview.active) {
        LOG.modeChange('preview');
        updateLineWidthPreviewGhost();
        updateDropBibleOverlayTransform();
        return;
      }

      updateMidTransform();
      updateDropBibleOverlayTransform();

      if (loadPlaceholderActive) {
        elements.midCanvas.style.opacity = '0';
        elements.midCanvas.style.filter = 'none';
        hideNativeOverlay();
        state.renderMode = 'texture';
        clearPresenceLayer();
        if (state.renderWhisper.kind === 'load') applyRenderWhisperPlacement('load');
        maybeFinishLoadWhisper();
        return;
      }

      if (shouldBeNative && hasNativeTextureReady() && !isNativeOverlayReady()) {
        showNativeOverlay();
      }

      updateBlend(screenFontSize);
      if (state.layout?.meta?.forceNative) {
        const holdGhost = shouldHoldBridgedLinePreview(screenFontSize);
        const hasFreshNative = isNativeOverlayReady();
        const nativeVisible = !holdGhost && hasFreshNative;
        const ghostVisible = state.lineWidthPreview.bridging && (holdGhost || !hasFreshNative);

        if (nativeVisible || ghostVisible) clearPresenceLayer();
        else updatePresenceLayer({ forceVisible: true });
      } else {
        updatePresenceLayer();
      }

      if (shouldBeNative) {
        if (hasNativeTextureReady()) updateNativeTransform();

        if (state.renderMode !== 'native') {
          LOG.modeChange('native');
          state.renderMode = 'native';
          scheduleNativeRender(24, { qualityBoost: blendProfile.qualityBoost });
        } else if (!hasNativeTextureReady()) {
          scheduleNativeRender(24, { qualityBoost: blendProfile.qualityBoost });
        } else if (hasNativeTextureReady()) {
          const result = updateNativeTransform();
          if (!result) return;

          const viewport = getViewportMetrics();

          const needsRerender =
            Math.abs(result.offsetX) > viewport.width * 0.7 ||
            Math.abs(result.offsetY) > viewport.height * 0.7 ||
            result.zoomRatio < CONFIG.NATIVE.rerenderZoomRatioMin || result.zoomRatio > CONFIG.NATIVE.rerenderZoomRatioMax ||
            hasMeaningfulQualityGain(state.textures.native.qualityBoost || 1, blendProfile.qualityBoost);

          if (needsRerender) scheduleNativeRender(60, { qualityBoost: blendProfile.qualityBoost });
        }
      } else if (state.renderMode !== 'texture') {
        LOG.modeChange('texture');
        cancelNativeRender();
        state.renderMode = 'texture';
        hideNativeOverlay();
      }

      if (state.lineWidthPreview.bridging) {
        if (shouldHoldBridgedLinePreview(screenFontSize) || !state.textures.native.scale) {
          updateLineWidthPreviewGhost({ bridge: true });
        } else {
          clearLineWidthPreview({ keepOverlay: true });
        }
      }

      if (state.renderWhisper.kind === 'load') applyRenderWhisperPlacement('load');
      maybeFinishLoadWhisper();
      rememberStableCircleFootprint();

      scheduleProgressiveRefinement();
    }

    let renderScheduled = false;

    function scheduleNativeRender(delay = 100, options = {}) {
      if (renderScheduled) return;

      cancelNativeRender();
      renderScheduled = true;
      if (!state.textures.native.scale || (options.qualityBoost || 1) > (state.textures.native.qualityBoost || 1)) {
        setRenderWhisper('schärft sicht', 'native');
      }
      state.renderTimeout = setTimeout(() => {
        renderScheduled = false;
        if (state.renderMode !== 'native') return;
        renderNativeTexture(options);
        showNativeOverlay();
        updateNativeTransform();
        const screenFontSize = state.baseFontSize * getEffectiveScale();
        updateBlend(screenFontSize);
        if (state.lineWidthPreview.bridging && !state.lineWidthPreview.active) {
          if (shouldHoldBridgedLinePreview(screenFontSize)) {
            updateLineWidthPreviewGhost({ bridge: true });
          } else {
            clearLineWidthPreview({ keepOverlay: true });
          }
        }
        clearRenderWhisper({ delay: 160, kind: 'native' });
      }, delay);
    }

    async function rebuildLayout({ fitView = false, guard = null, viewTransition = null, initialCircleViewportFraction = null } = {}) {
      if (guard && !guard()) return;

      const layoutRevision = ++state.layoutBuildRevision;
      const activeGuard = () => layoutRevision === state.layoutBuildRevision && (!guard || guard());

      resetProgressiveRefinement();
      cancelNativeRender();

      const cacheKey = getShapeRenderCacheKey();
      const cachedRender = shapeRenderCache.get(cacheKey);
      if (cachedRender) {
        if (!activeGuard()) return;
        setRenderWhisper('holt cache', 'layout');

        const forceNative = !!cachedRender.layout.meta?.forceNative;
        if (!forceNative && !hasTextureCanvas(cachedRender.midTexture)) {
          const midTexture = await ensurePreparedMidTexture(cachedRender, { guard: activeGuard });
          if (!midTexture || !activeGuard()) {
            clearRenderWhisper({ kind: 'layout' });
            return;
          }
        }

        applyPreparedShapeRender(cachedRender, { fitView, viewTransition, initialCircleViewportFraction });
        clearRenderWhisper({ delay: 120, kind: 'layout' });
        return;
      }

      setRenderWhisper('ordnet und webt', 'layout');
      await nextPaint();
      if (!activeGuard()) {
        clearRenderWhisper({ kind: 'layout' });
        return;
      }

      const prepared = await prepareShapeRender({
        guard: activeGuard,
        fitView,
        initialCircleViewportFraction
      });
      if (!prepared || !activeGuard()) {
        clearRenderWhisper({ kind: 'layout' });
        return;
      }

      shapeRenderCache.set(cacheKey, prepared);
      applyPreparedShapeRender(prepared, { fitView, viewTransition, initialCircleViewportFraction });
      clearRenderWhisper({ delay: 220, kind: 'layout' });
    }

    function setupEvents() {
      const { container } = elements;

      container.addEventListener('mousedown', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        beginScenePan(e.clientX, e.clientY);
      });

      window.addEventListener('mousemove', e => {
        maybeBeginDropBibleMousePan(e.clientX, e.clientY, e.buttons);
        updateScenePan(e.clientX, e.clientY);
      });

      window.addEventListener('mouseup', () => {
        handleDropBibleMouseUp();
        endSceneInteraction();
      });

      container.addEventListener('wheel', e => {
        e.preventDefault();
        if (typeof karussellScrolling !== 'undefined' && karussellScrolling) return;

        const viewport = getViewportMetrics();

        const screenX = e.clientX - viewport.clientCenterX;
        const screenY = e.clientY - viewport.clientCenterY;
        const worldUnderMouse = {
          x: state.focusWorld.x + screenX / state.scale,
          y: state.focusWorld.y + screenY / state.scale
        };
        const factor = 1 + (e.deltaY > 0 ? -CONFIG.ZOOM.speed : CONFIG.ZOOM.speed);
        const newScale = clamp(state.scale * factor, CONFIG.ZOOM.min, CONFIG.ZOOM.max);

        if (newScale === state.scale) return;
        noteViewInteraction({ cancelNativeRender: false, isUserGesture: true });
        state.scale = newScale;
        state.focusWorld.x = worldUnderMouse.x - screenX / state.scale;
        state.focusWorld.y = worldUnderMouse.y - screenY / state.scale;
        applyTransform();
      }, { passive: false });

      container.addEventListener('touchstart', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        e.preventDefault();

        if (e.touches.length === 1) {
          beginScenePan(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2) {
          beginScenePinch(e.touches);
        }
      }, { passive: false });

      container.addEventListener('touchmove', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        e.preventDefault();

        if (e.touches.length === 1 && state.drag.active) {
          updateScenePan(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2) {
          updateScenePinch(e.touches);
        }
      }, { passive: false });

      container.addEventListener('touchend', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        if (e.touches.length === 0) {
          endSceneInteraction();
        } else if (e.touches.length === 1) {
          state.drag.active = true;
          state.drag.lastX = e.touches[0].clientX;
          state.drag.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          syncScenePinchState(e.touches);
        }
      });

      window.addEventListener('resize', () => {
        noteViewInteraction({ cancelNativeRender: false });
        if (maybeRefreshAutoFitViewportPlacement()) return;
        applyTransform();
      });
    }

    let eventsInitialized = false;
    const DROP_BIBLE_TRIGGER_FILE = '__drop_bible__';
    const DROP_BIBLE_TRIGGER_NAME = 'upload your own bible';
    const DEFAULT_DROP_BIBLE_LABEL = 'drop bible txt';
    const INVALID_DROP_BIBLE_HINT = 'only .txt files possible. If you want support for more fileformats, pls contribute to the project on github.com/0nefinity/0nefinity.love';
    const textCache = new Map();
    const bibleMetaCache = new Map();
    const remixUnitCache = new Map();
    const remixDocumentCache = new Map();
    const shapeRenderCache = new Map();
    const uploadedBibleStore = new Map();
    const ENABLE_TEXT_PRELOAD = false;
    let currentLoadId = 0;
    let uploadedBibleSequence = 0;
    let dropBibleDragDepth = 0;
    let dropBibleFeedbackTimeout = 0;
    const DROP_BIBLE_GESTURE = {
      tapMovePx: 12,
      tapMaxMs: 280,
      doublePressMs: 320,
      doublePressMovePx: 22
    };
    let dropBiblePressStartX = 0;
    let dropBiblePressStartY = 0;
    let dropBiblePressStartedAt = 0;
    let dropBibleLastMouseClickAt = 0;
    let dropBibleLastMouseClickX = 0;
    let dropBibleLastMouseClickY = 0;
    let dropBiblePendingMousePickerTimeout = 0;
    let dropBibleMousePressActive = false;
    let dropBibleMouseSecondPress = false;
    let dropBibleSuppressNextClick = false;
    let dropBibleSuppressClickTimeout = 0;
    let dropBibleTouchMode = 'idle';

    function getPointDistance(x1, y1, x2, y2) {
      return Math.hypot(x1 - x2, y1 - y2);
    }

    function clearDropBiblePendingMousePicker() {
      if (!dropBiblePendingMousePickerTimeout) return;
      clearTimeout(dropBiblePendingMousePickerTimeout);
      dropBiblePendingMousePickerTimeout = 0;
    }

    function suppressDropBibleNextClick(durationMs = 450) {
      dropBibleSuppressNextClick = true;
      if (dropBibleSuppressClickTimeout) {
        clearTimeout(dropBibleSuppressClickTimeout);
      }
      dropBibleSuppressClickTimeout = window.setTimeout(() => {
        dropBibleSuppressNextClick = false;
        dropBibleSuppressClickTimeout = 0;
      }, durationMs);
    }

    function queueDropBibleMousePicker() {
      clearDropBiblePendingMousePicker();
      dropBiblePendingMousePickerTimeout = window.setTimeout(() => {
        dropBiblePendingMousePickerTimeout = 0;
        openUploadBiblePicker();
      }, DROP_BIBLE_GESTURE.doublePressMs);
    }

    function maybeBeginDropBibleMousePan(clientX, clientY, buttons = 1) {
      if (!dropBibleMousePressActive || state.drag.active || !(buttons & 1)) return false;
      const moved = getPointDistance(clientX, clientY, dropBiblePressStartX, dropBiblePressStartY);
      if (moved <= DROP_BIBLE_GESTURE.tapMovePx) return false;
      clearDropBiblePendingMousePicker();
      suppressDropBibleNextClick();
      beginScenePan(clientX, clientY);
      return true;
    }

    function handleDropBibleMouseDown(event) {
      if (event.button !== 0) return;
      resetUploadZoneFeedback();

      const now = performance.now();
      const isSecondPress = dropBiblePendingMousePickerTimeout > 0
        && now - dropBibleLastMouseClickAt <= DROP_BIBLE_GESTURE.doublePressMs
        && getPointDistance(event.clientX, event.clientY, dropBibleLastMouseClickX, dropBibleLastMouseClickY) <= DROP_BIBLE_GESTURE.doublePressMovePx;

      dropBibleMousePressActive = true;
      dropBibleMouseSecondPress = isSecondPress;
      if (isSecondPress) {
        event.preventDefault();
        clearDropBiblePendingMousePicker();
      }

      dropBiblePressStartX = event.clientX;
      dropBiblePressStartY = event.clientY;
      dropBiblePressStartedAt = now;
    }

    function handleDropBibleMouseClick(event) {
      event.stopPropagation();

      if (dropBibleSuppressNextClick) {
        event.preventDefault();
        dropBibleSuppressNextClick = false;
        if (dropBibleSuppressClickTimeout) {
          clearTimeout(dropBibleSuppressClickTimeout);
          dropBibleSuppressClickTimeout = 0;
        }
        return;
      }

      if (dropBibleMouseSecondPress) {
        event.preventDefault();
        dropBibleMouseSecondPress = false;
        return;
      }

      const elapsed = performance.now() - dropBiblePressStartedAt;
      const moved = getPointDistance(event.clientX, event.clientY, dropBiblePressStartX, dropBiblePressStartY);
      if (elapsed > DROP_BIBLE_GESTURE.tapMaxMs || moved > DROP_BIBLE_GESTURE.tapMovePx) {
        event.preventDefault();
        return;
      }

      event.preventDefault();
      dropBibleLastMouseClickAt = performance.now();
      dropBibleLastMouseClickX = event.clientX;
      dropBibleLastMouseClickY = event.clientY;
      queueDropBibleMousePicker();
    }

    function handleDropBibleDoubleClick(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function handleDropBibleMouseUp() {
      dropBibleMousePressActive = false;
      if (!state.drag.active) {
        dropBibleMouseSecondPress = false;
      }
    }

    function handleDropBibleTouchStart(event) {
      event.preventDefault();
      event.stopPropagation();
      resetUploadZoneFeedback();
      clearDropBiblePendingMousePicker();

      if (event.touches.length >= 2) {
        dropBibleTouchMode = 'pinch';
        suppressDropBibleNextClick();
        beginScenePinch(event.touches);
        return;
      }

      const touch = event.touches[0];
      dropBibleTouchMode = 'tap';
      dropBiblePressStartX = touch.clientX;
      dropBiblePressStartY = touch.clientY;
      dropBiblePressStartedAt = performance.now();
    }

    function handleDropBibleTouchMove(event) {
      event.preventDefault();
      event.stopPropagation();

      if (event.touches.length >= 2) {
        if (dropBibleTouchMode !== 'pinch') {
          dropBibleTouchMode = 'pinch';
          suppressDropBibleNextClick();
          beginScenePinch(event.touches);
        } else {
          updateScenePinch(event.touches);
        }
        return;
      }

      const touch = event.touches[0];
      const moved = getPointDistance(touch.clientX, touch.clientY, dropBiblePressStartX, dropBiblePressStartY);
      if (dropBibleTouchMode === 'tap' && moved > DROP_BIBLE_GESTURE.tapMovePx) {
        dropBibleTouchMode = 'pan';
        suppressDropBibleNextClick();
        beginScenePan(touch.clientX, touch.clientY);
        return;
      }

      if (dropBibleTouchMode === 'pan') {
        updateScenePan(touch.clientX, touch.clientY);
      }
    }

    function handleDropBibleTouchEnd(event) {
      event.preventDefault();
      event.stopPropagation();

      if (dropBibleTouchMode === 'tap' && event.touches.length === 0) {
        const elapsed = performance.now() - dropBiblePressStartedAt;
        const touch = event.changedTouches[0];
        const moved = touch
          ? getPointDistance(touch.clientX, touch.clientY, dropBiblePressStartX, dropBiblePressStartY)
          : Infinity;
        if (elapsed <= DROP_BIBLE_GESTURE.tapMaxMs && moved <= DROP_BIBLE_GESTURE.tapMovePx) {
          suppressDropBibleNextClick();
          openUploadBiblePicker();
        }
      }

      if (dropBibleTouchMode === 'pan') {
        if (event.touches.length === 0) {
          endSceneInteraction();
        } else if (event.touches.length === 1) {
          state.drag.active = true;
          state.drag.lastX = event.touches[0].clientX;
          state.drag.lastY = event.touches[0].clientY;
        }
      } else if (dropBibleTouchMode === 'pinch') {
        if (event.touches.length >= 2) {
          syncScenePinchState(event.touches);
          return;

        if (event.touches.length === 1) {
          dropBibleTouchMode = 'pan';
          state.drag.active = true;
          state.drag.lastX = event.touches[0].clientX;
          state.drag.lastY = event.touches[0].clientY;
          state.drag.lastPinchDist = 0;
          return;

    function extractTransferFiles(dataTransfer) {
      return Array.from(dataTransfer?.files || []).filter(file => file && typeof file.name === 'string');
    }

      if (extractTransferFiles(dataTransfer).length > 0) return true;
      return Array.from(dataTransfer?.items || []).some(item => item.kind === 'file');
    }

    function transferAcceptsTxt(dataTransfer) {
      const directFiles = extractTransferFiles(dataTransfer);
      if (directFiles.length) {
        return directFiles.every(isTxtFile);
      }

      const items = Array.from(dataTransfer?.items || []).filter(item => item.kind === 'file');
      if (!items.length) return false;

      let sawKnownInvalid = false;
      for (const item of items) {
        const file = typeof item.getAsFile === 'function' ? item.getAsFile() : null;
        if (file?.name) {
          if (!isTxtFile(file)) sawKnownInvalid = true;
          continue;
        }
        if (item.type && item.type !== 'text/plain') {
          sawKnownInvalid = true;
        }
      }

      return !sawKnownInvalid;
    }

      if (!transferHasFiles(event.dataTransfer)) return;
      event.preventDefault();
      dropBibleDragDepth += 1;
      const isValid = transferAcceptsTxt(event.dataTransfer);
      setDropBibleFeedback(isValid ? 'drag-valid' : 'drag-invalid', {
        labelText: DEFAULT_DROP_BIBLE_LABEL,
        hintText: isValid ? '' : INVALID_DROP_BIBLE_HINT
      });
    }

      const isValid = transferAcceptsTxt(event.dataTransfer);

        hintText: isValid ? '' : INVALID_DROP_BIBLE_HINT

    async function handleUploadZoneDrop(event) {
      if (!transferHasFiles(event.dataTransfer)) return;
      event.preventDefault();
      dropBibleDragDepth = 0;
      const files = extractTransferFiles(event.dataTransfer);
      if (!files.length || !files.every(isTxtFile)) {
        showInvalidUploadFeedback();
        return;

      resetUploadZoneFeedback();
      await processUploadFiles(files);

    function ensureBibelpunktUi() {

    function scheduleBiblePreload() {

    function normalizeBibleText(rawText) {

    function clampLoremWordCount(value) {

    function generateLoremIpsumText(wordCount = state.lorem.wordCount) {
      const safeWordCount = clampLoremWordCount(wordCount);
      if (safeWordCount <= 0) return '';

      const baseWordCount = LOREM_IPSUM_WORDS.length;
      const fullCycles = Math.floor(safeWordCount / baseWordCount);
      const remainder = safeWordCount % baseWordCount;
      const chunks = [];

      for (let index = 0; index < fullCycles; index += 1) {
        chunks.push(LOREM_IPSUM_BASE_TEXT);
      }

      if (remainder > 0) {
        chunks.push(LOREM_IPSUM_WORDS.slice(0, remainder).join(' '));
      }

    function buildLoremBibleMeta(text, wordCount = state.lorem.wordCount) {

      return rememberBibleMeta(LOREM_BIBLE_FILE, {
        name: LOREM_BIBLE_NAME,
        rawCharCount: text.length,
        uniqueChars: analysis.uniqueChars,
        uniqueCharCount: analysis.uniqueCharCount,
        charCount: analysis.charCount,
        cacheKey: `generated:lorem:${normalizedWordCount}:${analysis.charCount}:${analysis.uniqueCharCount}`,
        kind: 'generated-lorem'
      });
    }

    function analyzeBibleText(text) {
      const uniqueChars = Array.from(new Set(text)).sort().join('');
      return {
        charCount: text.length,
        uniqueChars,
        uniqueCharCount: uniqueChars.length

    }

    function getDocumentCacheKey(meta, text) {
      if (meta?.cacheKey) return meta.cacheKey;
      if (meta?.file) return `file:${meta.file}`;
      return `inline:${text.length}:${meta?.uniqueCharCount || 0}:${text.slice(0, 24)}:${text.slice(-24)}`;
    }

    function rememberBibleMeta(file, meta = {}) {
      const normalizedMeta = {
        file,
        name: meta.name || cleanDisplayName(file),
        charCount: Number.isFinite(meta.charCount) ? meta.charCount : undefined,
        rawCharCount: Number.isFinite(meta.rawCharCount) ? meta.rawCharCount : undefined,
        uniqueChars: typeof meta.uniqueChars === 'string' ? meta.uniqueChars : undefined,
        cacheKey: typeof meta.cacheKey === 'string' ? meta.cacheKey : undefined,
        kind: typeof meta.kind === 'string' ? meta.kind : undefined,
        sourceFileName: typeof meta.sourceFileName === 'string' ? meta.sourceFileName : undefined,
        layoutPresets: meta.layoutPresets && typeof meta.layoutPresets === 'object'
          ? meta.layoutPresets
          : undefined,
        uniqueCharCount: Number.isFinite(meta.uniqueCharCount)
          ? meta.uniqueCharCount
          : (typeof meta.uniqueChars === 'string' ? meta.uniqueChars.length : undefined)
      };

      return normalizedMeta;
    }

    function getBibleMeta(file) {
      return bibleMetaCache.get(file) || null;
    }

    function getBibleLoadText(file) {
      const name = getBibleMeta(file)?.name || cleanDisplayName(file || 'bibel');
      return `${name} lädt`;
    }

    function greatestCommonDivisor(a, b) {
      let x = Math.abs(Math.round(a)) || 0;
      let y = Math.abs(Math.round(b)) || 0;
      while (y) {
        const temp = y;
        y = x % y;
        x = temp;
      }
      return x || 1;
    }

    function createAffinePermutationParams(length, seed) {
      if (length <= 1) return { a: 1, b: 0 };

      let a = (((seed >>> 0) ^ 0x9e3779b9) % Math.max(2, length - 1)) + 1;
      while (greatestCommonDivisor(a, length) !== 1) {
        a += 1;
        if (a >= length) a = 1;
      }

      return {
        a,
        b: ((((seed >>> 0) * 2654435761) >>> 0) % length)
      };
    }

    function permuteAffineIndex(index, length, params) {
      if (length <= 1) return 0;
      return ((params.a * index) + params.b) % length;
    }

    function getAlphabeticSortKey(text = '') {
      const normalized = String(text || '')
        .trim()
        .replace(/^[^0-9A-Za-zÄÖÜäöüß]+/, '')
        .toLocaleLowerCase('de-DE');
      return normalized || '\uffff';
    }

    function compareAlphabeticItems(a, b, direction = 'asc') {
      const order = direction === 'desc' ? -1 : 1;
      const cmp = String(a?.sortKey || '').localeCompare(String(b?.sortKey || ''), 'de-DE', { sensitivity: 'base' });
      if (cmp !== 0) return cmp * order;
      return (a?.index || 0) - (b?.index || 0);
    }

    function getRemixSourceEntries() {
      return sortVisibleBibleEntries(filterVisibleBibleEntries(allBibles))
        .filter(entry => !isDropBibleTriggerEntry(entry));
    }

    function normalizeRemixCounts(counts = state.remix.countsByFile) {
      const next = { ...(counts || {}) };

      if (state.libraryUnlocks.fullMahabharata) {
        if ((next[FULL_MAHABHARATA_FILE] || 0) <= 0 && (next[BHAGAVAD_GITA_FILE] || 0) > 0) {
          next[FULL_MAHABHARATA_FILE] = next[BHAGAVAD_GITA_FILE];
        }
        delete next[BHAGAVAD_GITA_FILE];
      } else {
        if ((next[BHAGAVAD_GITA_FILE] || 0) <= 0 && (next[FULL_MAHABHARATA_FILE] || 0) > 0) {
          next[BHAGAVAD_GITA_FILE] = next[FULL_MAHABHARATA_FILE];
        }
        delete next[FULL_MAHABHARATA_FILE];
      }

      const allowedFiles = new Set(getRemixSourceEntries().map(entry => entry.file));
      const normalized = {};

      for (const file of allowedFiles) {
        const count = Math.max(0, Math.round(Number(next[file]) || 0));
        if (count > 0) normalized[file] = count;
      }

      return normalized;
    }

    function getActiveRemixCounts() {
      state.remix.countsByFile = normalizeRemixCounts(state.remix.countsByFile);
      return state.remix.countsByFile;
    }

    function getPreferredRemixSourceFile() {
      const visibleEntries = getRemixSourceEntries();
      if (!visibleEntries.length) return '';

      const preferredFile = getMahabharataSwapFile(
        getCurrentKarussellBibleEntry()?.file || state.documentMeta?.file || DEFAULT_BIBLE_FILE
      );

      return visibleEntries.find(entry => entry.file === preferredFile)?.file
        || visibleEntries.find(entry => entry.file === DEFAULT_BIBLE_FILE)?.file
        || visibleEntries[0]?.file
        || '';
    }

    function ensureRemixSelection() {
      const counts = getActiveRemixCounts();
      const total = Object.values(counts).reduce((sum, value) => sum + value, 0);
      if (total > 0) return false;

      const preferredFile = getPreferredRemixSourceFile();
      if (!preferredFile) return false;

      state.remix.countsByFile = { ...counts, [preferredFile]: 1 };
      return true;
    }

    function getRemixSelectionParts(counts = getActiveRemixCounts()) {
      return getRemixSourceEntries()
        .map(entry => {
          const count = Math.max(0, Math.round(Number(counts?.[entry.file]) || 0));
          return count > 0 ? { entry, count } : null;
        })
        .filter(Boolean);
    }

    function formatRemixPartLabel(name, count) {
      return count > 1 ? `${count}${name}` : name;
    }

    function getRemixSummaryLabel(counts = getActiveRemixCounts()) {
      const parts = getRemixSelectionParts(counts)
        .map(({ entry, count }) => formatRemixPartLabel(entry.name, count));
      return parts.length ? `${parts.join('-')}-Remix` : 'Remix';
    }

    function getRemixControlSummary({ value } = {}) {
      const parts = getRemixSelectionParts(value || {})
        .map(({ entry, count }) => formatRemixPartLabel(entry.name, count));
      return parts.length ? parts.join(' · ') : 'nichts ausgewählt';
    }

    function getRemixRecipe() {
      const counts = getActiveRemixCounts();
      const sources = getRemixSelectionParts(counts).map(({ entry, count }) => ({
        file: entry.file,
        name: entry.name,
        count,
        kind: entry.kind || 'library'
      }));

      return {
        unitMode: state.remix.unitMode,
        sortMode: state.remix.sortMode,
        sortDirection: state.remix.sortDirection,
        randomSeed: state.remix.randomSeed >>> 0,
        loremWordCount: clampLoremWordCount(state.lorem.wordCount),
        sources
      };
    }

    function getRemixRecipeKey(recipe = getRemixRecipe()) {
      const sourceKey = recipe.sources
        .map(source => `${source.file}:${source.count}`)
        .join('|');

      return [
        recipe.unitMode,
        recipe.sortMode,
        recipe.sortDirection,
        recipe.sortMode === 'random' ? (recipe.randomSeed >>> 0) : 'fixed',
        recipe.loremWordCount,
        sourceKey || 'empty'
      ].join('::');
    }

    function collectWordUnits(text) {
      const units = [];
      let start = 0;

      for (let index = 0; index <= text.length; index += 1) {
        const isBoundary = index === text.length || text.charCodeAt(index) === 32;
        if (!isBoundary) continue;

        if (index > start) {
          const value = text.slice(start, index);
          units.push({
            start,
            end: index,
            sortKey: getAlphabeticSortKey(value)
          });
        }

        start = index + 1;
      }

      return units;
    }

    function collectSentenceUnits(text) {
      const units = [];
      const punctuation = new Set(['.', '!', '?', ';', ':']);
      let start = 0;

      const pushSentence = (from, to) => {
        let safeStart = from;
        let safeEnd = to;
        while (safeStart < safeEnd && text.charCodeAt(safeStart) === 32) safeStart += 1;
        while (safeEnd > safeStart && text.charCodeAt(safeEnd - 1) === 32) safeEnd -= 1;
        if (safeEnd <= safeStart) return;

        const preview = text.slice(safeStart, Math.min(safeEnd, safeStart + 48));
        units.push({
          start: safeStart,
          end: safeEnd,
          sortKey: getAlphabeticSortKey(preview)
        });

        if (!punctuation.has(char)) continue;

        let end = index + 1;

        start = end;

      if (start < text.length) {

      }

      if (source.unitData.kind === 'text' || source.unitData.kind === 'char') return [];
      if (Array.isArray(source.unitData.units) && source.unitData.units.length) {

      source.unitData.unitCount = rebuiltUnits.length;
      source.unitCount = rebuiltUnits.length;
      return rebuiltUnits;

        const signature = getRemixSourceSignature(source.file, text);
        const unitCacheKey = `${signature}::${recipe.unitMode}`;
        let unitData = remixUnitCache.get(unitCacheKey);

              unitCount: text ? 1 : 0,
              sortKey: getAlphabeticSortKey(text.slice(0, 48))

          } else if (recipe.unitMode === 'sentence') {
            unitData = {
              kind: 'sentence',
              unitCount: 0,
              units: collectSentenceUnits(text)

            unitData.unitCount = unitData.units.length;
          } else if (recipe.unitMode === 'char') {

              kind: 'char',
              unitCount: text.length

              kind: 'word',
              unitCount: 0,

          return {
            source,
            unitIndex: source.unitCount > 0 ? (offset % source.unitCount) : 0

      return null;

      return chunks.join(joiner);

    function buildRandomRemixText(preparedSources, recipe) {
      const totalUnits = preparedSources.reduce((sum, source) => sum + (source.unitCount * source.count), 0);
      if (totalUnits <= 0) return '';

      let index = 0;

            sortKey: source.unitData.sortKey,
            value: source.text,
            index: index += 1

      items.sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));
      return buildChunkedString(items.map(item => item.value), ' ');
    }

    function buildAlphabeticSentenceRemix(preparedSources, recipe) {
      const items = [];
      let index = 0;

      preparedSources.forEach(source => {
        source.unitData.units.forEach(span => {
          const value = getRemixSpanText(source, span);
          for (let copy = 0; copy < source.count; copy += 1) {
            items.push({
              sortKey: span.sortKey,
              value,
              index: index += 1
            });
          }
        });
      });

      items.sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));
      return buildChunkedString(items.map(item => item.value), ' ');
    }

    function buildAlphabeticWordRemix(preparedSources, recipe) {
      const wordCounts = new Map();

      preparedSources.forEach(source => {
        source.unitData.units.forEach(span => {
          const value = getRemixSpanText(source, span);
          const existing = wordCounts.get(value) || { count: 0, sortKey: span.sortKey };
          existing.count += source.count;
          wordCounts.set(value, existing);
        });
      });

      const items = Array.from(wordCounts.entries())
        .map(([value, meta], index) => ({ value, count: meta.count, sortKey: meta.sortKey, index }))
        .sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));

      const parts = [];
      items.forEach(item => {
        for (let copy = 0; copy < item.count; copy += 1) {
          parts.push(item.value);
        }
      });

      return buildChunkedString(parts, ' ');
    }

    function buildAlphabeticCharRemix(preparedSources, recipe) {
      const charCounts = new Map();

      preparedSources.forEach(source => {
        for (const char of source.text) {
          charCounts.set(char, (charCounts.get(char) || 0) + source.count);
        }
      });

      const items = Array.from(charCounts.entries())
        .map(([value, count], index) => ({ value, count, sortKey: getAlphabeticSortKey(value), index }))
        .sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));

      return items.map(item => item.value.repeat(item.count)).join('');
    }

    async function buildRemixDocument(recipe = getRemixRecipe()) {
      const recipeKey = getRemixRecipeKey(recipe);
      if (remixDocumentCache.has(recipeKey)) {
        return remixDocumentCache.get(recipeKey);
      }

      const preparedSources = await getPreparedRemixSources(recipe);
      let text = '';

      if (recipe.sortMode === 'alphabetic') {
        if (recipe.unitMode === 'text') {
          text = buildAlphabeticTextRemix(preparedSources, recipe);
        } else if (recipe.unitMode === 'sentence') {
          text = buildAlphabeticSentenceRemix(preparedSources, recipe);
        } else if (recipe.unitMode === 'char') {
          text = buildAlphabeticCharRemix(preparedSources, recipe);
        } else {
          text = buildAlphabeticWordRemix(preparedSources, recipe);
        }
      } else {
        text = buildRandomRemixText(preparedSources, recipe);
      }

      const analysis = analyzeBibleText(text);
      const meta = {
        ...analysis,
        file: REMIX_DOCUMENT_FILE,
        name: getRemixSummaryLabel(Object.fromEntries(recipe.sources.map(source => [source.file, source.count]))),
        cacheKey: `remix:${recipeKey}`,
        kind: 'remix',
        selectionKey: `remix:${recipeKey}`,
        recipeKey,
        recipe,
        sourceCount: recipe.sources.length
      };

      const document = { text, meta, recipeKey };
      remixDocumentCache.set(recipeKey, document);

      while (remixDocumentCache.size > 6) {
        const oldestKey = remixDocumentCache.keys().next().value;
        remixDocumentCache.delete(oldestKey);
      }

      return document;
    }

    async function fetchBibleText(filename) {
      if (filename === LOREM_BIBLE_FILE) {
        const wordCount = clampLoremWordCount(state.lorem.wordCount);
        const text = generateLoremIpsumText(wordCount);
        buildLoremBibleMeta(text, wordCount);
        return text;
      }

      if (uploadedBibleStore.has(filename)) {
        return uploadedBibleStore.get(filename).text;
      }

      if (textCache.has(filename)) return textCache.get(filename);

      const response = await fetch(`/assets/bibeln/${filename}?raw=1`);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const rawText = await response.text();
      const text = normalizeBibleText(rawText);
      textCache.set(filename, text);

      if (!bibleMetaCache.has(filename)) {
        rememberBibleMeta(filename, {
          ...analyzeBibleText(text),
          rawCharCount: rawText.length
        });
      }

      return text;
    }

    async function preloadAllBibles() {
      if (!ENABLE_TEXT_PRELOAD) return;
      for (const bible of bibles) {
        try {
          if (bible.kind !== 'library') continue;
          if (textCache.has(bible.file)) continue;
          await fetchBibleText(bible.file);
          LOG.info(`text vorgeladen: ${bible.name}`);
        } catch (e) {
          console.warn(`Vorladen fehlgeschlagen: ${bible.file}`, e);
        }
      }
    }
