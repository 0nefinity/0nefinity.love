<!DOCTYPE html>
<!-- shadows1.html shadershadows
 Das eine Licht aus x Lampen trifft auf ein Objekt
 Pyhsikalisch inspirierte mathematisch (offensichtlich) realistische Lichtquellen
 treffen auf mathematisch realistische Objekte wodurch es zu einer durch den Nutzer zu interpretierenden Schattenbildung kommt.
 -->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shadows</title>

  <link href="/meta.css" rel="stylesheet">
  <script src="/meta.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
      "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.168.0/examples/jsm/controls/OrbitControls.js",
      "three/examples/jsm/loaders/FontLoader.js": "https://unpkg.com/three@0.168.0/examples/jsm/loaders/FontLoader.js",
      "three/examples/jsm/geometries/TextGeometry.js": "https://unpkg.com/three@0.168.0/examples/jsm/geometries/TextGeometry.js"
    }
  }
  </script>

  <style>
    body {
      margin: 0; overflow: hidden;
    }

    ._018-canvas {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #shadows-controls {
      position: fixed;
      top: 4.375rem;
      right: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.85);
      color: var(--text-color, #ffffff);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      max-width: 320px;
      z-index: 10;
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #shadows-controls .drag-handle {
      display: none;
    }

    #shadows-controls .controls-content {
      max-height: none;
      overflow: visible;
    }

    #shadows-controls .row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      min-height: 32px;
    }

    #shadows-controls label {
      flex: 0 0 80px;
      font-size: 13px;
      opacity: 0.8;
    }

    #shadows-controls .slider-container {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #shadows-controls input[type='range'] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    #shadows-controls input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: var(--text-color);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    #shadows-controls input[type='range']::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    #shadows-controls input[type='range']::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: var(--text-color);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    #shadows-controls .value-display {
      min-width: 40px;
      text-align: right;
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      opacity: 0.7;
    }

    #shadows-controls input[type='number'] {
      flex: 1 1 auto;
      width: 100%;
    }

    #shadows-controls input[type='text'] {
      flex: 1;
      min-width: 80px;
      height: 32px;
      text-align: center;
      font-size: 16px;
      background: var(--bg-color);
      color: var(--text-color);
      border-radius: 9999px;
      padding: 0 0.5rem;
      font-weight: 500;
    }

    #shadows-controls input[type='text']:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.3);
    }

    #shadows-controls .geb-row {
      display: flex;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      margin: 0;
      padding: 0;
      transition: max-height 0.25s ease, opacity 0.2s ease, margin 0.25s ease;
    }
    #shadows-controls .geb-row.visible {
      max-height: 60px;
      opacity: 1;
      margin: 0.5rem 0;
    }

    #shadows-controls .segmented-control {
      display: flex;
      flex: 1;
      gap: 6px;
    }

    #shadows-controls .segmented-control button {
      flex: 1;
      padding: 0.5rem 0.75rem;
      font-size: 13px;
      background: var(--bg-color);
      color: var(--text-color);
      border: 2px solid var(--text-color);
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    #shadows-controls .segmented-control button:hover {
      background: var(--text-color);
      color: var(--bg-color);
    }

    #shadows-controls .segmented-control button.active {
      background: var(--text-color);
      color: var(--bg-color);
    }

    #shadows-controls .toggle-row {
      justify-content: space-between;
    }

    #shadows-controls .toggle-row input[type='checkbox'] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: var(--text-color);
    }

    #shadows-controls .section-divider {
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 0.75rem 0;
    }

    #shadows-controls .stepper-container {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    #shadows-controls .value-input-wrapper {
      display: flex;
      align-items: center;
      gap: 0;
    }
    #shadows-controls .value-input {
      background: transparent;
      border: none;
      color: var(--text-color);
      font-size: inherit;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      text-align: right;
      width: 4.5em;
      padding: 0.2em 0.1em;
      outline: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    #shadows-controls .value-input:hover {
      border-bottom-color: rgba(255,255,255,0.3);
    }
    #shadows-controls .value-input:focus {
      border-bottom-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.05);
    }
    #shadows-controls .value-suffix {
      opacity: 0.6;
      font-size: 0.9em;
      margin-left: 1px;
      pointer-events: none;
    }
    #shadows-controls .stepper-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--text-color);
      font-size: 1.4rem;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s ease, transform 0.1s ease;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
      opacity: 0.7;
    }
    #shadows-controls .stepper-btn:focus {
      outline: none;
    }
    #shadows-controls .stepper-btn:hover {
      opacity: 1;
    }
    #shadows-controls .stepper-btn:active {
      transform: scale(0.85);
      opacity: 1;
    }
    @media (max-width: 768px) {
      #shadows-controls .stepper-btn {
        width: 44px;
        height: 44px;
        font-size: 1.6rem;
      }
    }

    @media (max-width: 768px) {
      #shadows-controls {
        position: fixed;
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 100%;
        width: 100%;
        border-radius: 20px 20px 0 0;
        padding: 0;
        max-height: 50vh;
        font-size: 14px;
        will-change: transform;
      }

      #shadows-root {
        will-change: transform;
      }

      #shadows-controls .drag-handle {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
        cursor: grab;
        touch-action: none;
      }

      #shadows-controls .drag-handle::before {
        content: '';
        width: 40px;
        height: 4px;
        background: rgba(255,255,255,0.4);
        border-radius: 2px;
      }

      #shadows-controls .drag-handle-label {
        position: absolute;
        font-size: 12px;
        opacity: 0.6;
      }

      #shadows-controls .controls-content {
        max-height: calc(50vh - 56px);
        overflow-y: auto;
        overflow-x: hidden;
        padding: 0 1rem 1.5rem;
        -webkit-overflow-scrolling: touch;
      }

      #shadows-controls .row {
        min-height: 48px;
        gap: 0.75rem;
        margin-bottom: 0.25rem;
      }

      #shadows-controls label {
        flex: 0 0 90px;
        font-size: 14px;
      }

      #shadows-controls input[type='range'] {
        height: 6px;
      }

      #shadows-controls input[type='range']::-webkit-slider-thumb {
        width: 24px;
        height: 24px;
      }

      #shadows-controls input[type='range']::-moz-range-thumb {
        width: 24px;
        height: 24px;
      }

      #shadows-controls .value-display {
        min-width: 44px;
        font-size: 14px;
      }

      #shadows-controls .segmented-control {
        gap: 8px;
      }

      #shadows-controls .segmented-control button {
        min-height: 44px;
        font-size: 16px;
        font-weight: 500;
      }

      #shadows-controls .toggle-row input[type='checkbox'] {
        width: 28px;
        height: 28px;
      }

      #shadows-controls .section-divider {
        margin: 0.8rem 0;
      }

      #shadows-controls input[type='text'] {
        min-width: 100px;
        height: 44px;
        font-size: 18px;
      }

      #shadows-controls input[type='number'] {
        min-height: 44px;
        font-size: 16px;
        border-radius: 8px;
        padding: 0 0.75rem;
      }
    }

    @media (max-width: 380px) {
      #shadows-controls label {
        flex: 0 0 70px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="_018-canvas" id="shadows-root"></div>
  <div id="shadows-controls">
    <div class="drag-handle" id="dragHandle">
      <span class="drag-handle-label"></span>
    </div>

    <div class="controls-content">
      <div class="row" style="justify-content: center; margin-bottom: 0.75rem;">
        <button id="resetParams" style="
          background: transparent;
          border: 1px solid rgba(255,255,255,0.3);
          color: var(--text-color);
          padding: 0.4rem 1.2rem;
          border-radius: 9999px;
          font-size: 13px;
          cursor: pointer;
          opacity: 0.8;
          transition: opacity 0.2s ease, background 0.2s ease;
        " onmouseover="this.style.opacity='1'; this.style.background='rgba(255,255,255,0.1)';" onmouseout="this.style.opacity='0.8'; this.style.background='transparent';">Reset</button>
      </div>

      <div class="row">
        <label>Brightness</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="brightness">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="brightnessValue" data-param="brightness" value="80">
          </div>
          <button class="stepper-btn plus" data-param="brightness">+</button>
        </div>
      </div>
      <div class="row">
        <label>Ambient</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="ambientIntensity">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="ambientValue" data-param="ambientIntensity" value="0.5">
          </div>
          <button class="stepper-btn plus" data-param="ambientIntensity">+</button>
        </div>
      </div>
      <div class="row">
        <label>Decay</label>
        <div class="segmented-control" id="decayControl">
          <button data-value="0" class="active">0</button>
          <button data-value="1">1</button>
          <button data-value="2">2</button>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="row">
        <label>Radius</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="sphereRadius">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="radiusValue" data-param="sphereRadius" value="1">
          </div>
          <button class="stepper-btn plus" data-param="sphereRadius">+</button>
        </div>
      </div>
      <div class="row">
        <label>Distance</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="wallDistance">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="distValue" data-param="wallDistance" value="14">
          </div>
          <button class="stepper-btn plus" data-param="wallDistance">+</button>
        </div>
      </div>
      <div class="row">
        <label>Light Dist</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="lightDistance">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="lightDistanceValue" data-param="lightDistance" value="15">
          </div>
          <button class="stepper-btn plus" data-param="lightDistance">+</button>
        </div>
      </div>
      <div class="row">
        <label>Spot Angle</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="spotAngle">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="spotAngleValue" data-param="spotAngle" value="15">
            <span class="value-suffix">°</span>
          </div>
          <button class="stepper-btn plus" data-param="spotAngle">+</button>
        </div>
      </div>
      <div class="row">
        <label>Lamp Size</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="lampScale">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="lampScaleValue" data-param="lampScale" value="5">
          </div>
          <button class="stepper-btn plus" data-param="lampScale">+</button>
        </div>
      </div>

      <div class="section-divider"></div>

      <div class="row toggle-row">
        <label for="showLamps">Show Lamps</label>
        <input id="showLamps" type="checkbox" checked>
      </div>
      <!-- 018 Mode ist jetzt immer aktiv -->

      <div class="row">
        <label>Glyph Size</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="glyphSize">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="glyphSizeValue" data-param="glyphSize" value="4">
          </div>
          <button class="stepper-btn plus" data-param="glyphSize">+</button>
        </div>
      </div>
      <div class="row">
        <label>0</label>
        <input id="glyphChar0" type="text" value="0">
      </div>
      <div class="row">
        <label>1</label>
        <input id="glyphChar1" type="text" value="1">
      </div>
      <div class="row">
        <label>∞</label>
        <input id="glyphCharInf" type="text" value="∞">
      </div>
      <div class="row">
        <label>Rot 0</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="glyphRot0">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="glyphRot0Value" data-param="glyphRot0" value="0">
            <span class="value-suffix">°</span>
          </div>
          <button class="stepper-btn plus" data-param="glyphRot0">+</button>
        </div>
      </div>
      <div class="row">
        <label>Rot 1</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="glyphRot1">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="glyphRot1Value" data-param="glyphRot1" value="0">
            <span class="value-suffix">°</span>
          </div>
          <button class="stepper-btn plus" data-param="glyphRot1">+</button>
        </div>
      </div>
      <div class="row">
        <label>Rot ∞</label>
        <div class="stepper-container">
          <button class="stepper-btn minus" data-param="glyphRotInf">−</button>
          <div class="value-input-wrapper">
            <input type="text" class="value-input" id="glyphRotInfValue" data-param="glyphRotInf" value="315">
            <span class="value-suffix">°</span>
          </div>
          <button class="stepper-btn plus" data-param="glyphRotInf">+</button>
        </div>
      </div>
      <div class="row">
        <label>Font</label>
        <select id="glyphFontSelect" style="flex:1; height:32px; border-radius:9999px; padding:0 0.5rem; background:var(--bg-color); color:var(--text-color); border:2px solid var(--text-color); cursor:pointer;"></select>
      </div>
    </div>
    
  <!-- maybe better a cube instead of a sphere. Spheres tend to create artifacts in 3 dimansional space. The .141592... -->
  </div>

  <script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

  function getCSSVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  let container, scene, camera, renderer, controls;
  let sphereMesh;
  let glyphTextures = { x: null, y: null, z: null };

  let ambientLight;
  let spotFloor, spotBack, spotSide;
  let lampFloor, lampBack, lampSide;
  let lightConeFloor, lightConeBack, lightConeSide;
  let baseBgColor, textColorThree;
  let floor, backWall, sideWall;  // Nebel-Scheiben (fog layers)
  let hitLayerFloor, hitLayerBack, hitLayerSide;  // Hit-Layer für Drag (Lichtkegel-Größe)

  // Outline-Meshes für Auswahl-Highlight
  let outlineFloor, outlineBack, outlineSide;  // Fog-Outlines
  let outlineSphere;  // Kugel-Outline

  let gebEnabled = true;  // 018 Mode ist immer aktiv
  let invertMode = false;

  // Lampen-Zustände (an/aus)
  let lampStates = {
    floor: true,
    back: true,
    side: true
  };

  const DEFAULT_GLYPH_CHARS = { left: '0', right: '1', floor: '∞' };
  let glyphChars = { ...DEFAULT_GLYPH_CHARS };

  const GLYPH_URL_KEYS = { left: 'g0', right: 'g1', floor: 'g8' };

  // Schatten-Fokus für direkte Text-Eingabe
  let activeGlyphTarget = null;  // 'left', 'right', 'floor', oder null
  let cursorVisible = false;
  let cursorBlinkInterval = null;

  // Font-Optionen für das Glyph-Rendering (nur System-Fonts)
  const FONT_OPTIONS = {
    // Sans-Serif
    'Arial':            'Arial, sans-serif',
    'Helvetica':        'Helvetica, Arial, sans-serif',
    'Verdana':          'Verdana, sans-serif',
    'Tahoma':           'Tahoma, sans-serif',
    'Trebuchet MS':     'Trebuchet MS, sans-serif',
    // Serif
    'Times New Roman':  'Times New Roman, serif',
    'Georgia':          'Georgia, serif',
    'Palatino':         'Palatino Linotype, Palatino, serif',
    'Book Antiqua':     'Book Antiqua, Palatino, serif',
    'Garamond':         'Garamond, serif',
    // Monospace
    'Courier New':      'Courier New, monospace',
    'Lucida Console':   'Lucida Console, Monaco, monospace',
    'Consolas':         'Consolas, monospace',
  };
  const DEFAULT_FONT_KEY = 'Courier New';
  let currentFontKey = DEFAULT_FONT_KEY;

  const INTERACTION_CONFIG = {
    // Tap-Erkennung
    tapMaxDuration: 200,       // ms - maximale Dauer für einen Tap
    tapMaxDistance: 10,        // px - maximale Bewegung für einen Tap

    // Scroll/Wheel
    wheelThrottleMs: 100,      // ms - Throttle für Wheel-Events
    wheelDeltaThreshold: 15,   // Ignoriere kleine Deltas (Momentum)

    // Pinch
    pinchSensitivity: 50,      // px Bewegung pro Step

    // Minimum Hitbox-Größen (damit Objekte bei Wert=0 noch interagierbar bleiben)
    minSphereHitRadius: 2,     // Minimaler Radius für Kugel-Hitbox
    minFogHitRadius: 3,        // Minimaler Radius für Fog-Layer-Hitbox

    // Outlines
    outlineThickness: 0.15,    // Relative Dicke der Auswahl-Outlines

    // Mobile Panel
    collapsedHandleHeight: 56, // px - Höhe des eingeklappten Panels
    canvasOffsetMax: 15,       // vh - maximale Canvas-Verschiebung
  };

  const PARAMS_CONFIG = {
    // Kamera
    cameraDistance:   {                             urlKey: 'zoom',      min: 0,     max: 10000,  step: 1,    default: 45,  decimals: 0, dynamicStep: true },
    cameraAzimuth:    {                             urlKey: 'az',        min: -180,  max: 180,    step: 1,    default: 45,  decimals: 0, dynamicStep: true },
    cameraElevation:  {                             urlKey: 'el',        min: -89,   max: 89,     step: 1,    default: 35,  decimals: 0, dynamicStep: true },

    // Beleuchtung
    wallBrightness:   {                             urlKey: 'fog',       min: 0,     max: 1,      step: 0.1,  default: 1,    decimals: 1, dynamicStep: true },
    ambientIntensity: { id: 'ambient',              urlKey: 'ambient',   min: 0,     max: 10,     step: 0.1,  default: 0.5,  decimals: 1, dynamicStep: true },
    brightness:       { id: 'brightness',           urlKey: 'bright',    min: 0,     max: 100000,  step: 1,    default: 80,   decimals: 0, dynamicStep: true },

    // Geometrie
    wallDistance:     { id: 'dist',                 urlKey: 'dist',      min: -100,  max: 1000,    step: 0.1,  default: 14,   decimals: 1, dynamicStep: true },
    sphereRadius:     { id: 'radius',               urlKey: 'r',         min: 0,     max: 1000,    step: 0.1,  default: 1,    decimals: 1, dynamicStep: true },
    glyphSize:        { id: 'glyphSize',            urlKey: 'gsize',     min: 0,     max: 500,     step: 0.1,  default: 4,    decimals: 1, dynamicStep: true },
    wallSize:         { id: 'wallSize',             urlKey: 'wsize',     min: 0,     max: 200,    step: 1,    default: 25,   decimals: 0, dynamicStep: true },

    // Glyph-Rotationen (0-360° = voller Kreis)
    glyphRot0:        { id: 'glyphRot0',            urlKey: 'r0',        min: 0,     max: 360,    step: 1,    default: 0,    decimals: 0, dynamicStep: true },
    glyphRot1:        { id: 'glyphRot1',            urlKey: 'r1',        min: 0,     max: 360,    step: 1,    default: 0,    decimals: 0, dynamicStep: true },
    glyphRotInf:      { id: 'glyphRotInf',          urlKey: 'rInf',      min: 0,     max: 360,    step: 1,    default: 315,  decimals: 0, dynamicStep: true },

    // Licht-Position
    lightDistance:    { id: 'lightDistance',        urlKey: 'ldist',     min: 0,     max: 100000,    step: 0.1,  default: 15,   decimals: 1, dynamicStep: true },
    lampScale:        { id: 'lampScale',            urlKey: 'lamp',      min: 0,     max: 500,     step: 1,    default: 5,    decimals: 0, dynamicStep: true },

    // Spotlight-Parameter
    spotAngle:        { id: 'spotAngle',            urlKey: 'angle',     min: 0,     max: 180,    step: 1,    default: 15,   decimals: 4, dynamicStep: true },
    spotPenumbra:     { id: 'spotPenumbra',         urlKey: 'pen',       min: 0,     max: 1,      step: 0.05, default: 0.5,  decimals: 2, dynamicStep: true },
    spotDecay:        { id: 'spotDecay',            urlKey: 'decay',     min: 0,     max: 2,      step: 1,    default: 0,    decimals: 0, isSegmented: true },
    spotRange:        { id: 'spotRange',            urlKey: 'range',     min: 0,     max: 10000,  step: 1,    default: 10000, decimals: 0, dynamicStep: true },

    // Shadow-Parameter
    shadowMapSize:    { id: 'shadowMapSize',        urlKey: 'smap',      min: 256,   max: 4096,   step: 256,  default: 1024, decimals: 0 },
    // Nebel-Parameter
    fogThickness:     { id: 'fogThickness',         urlKey: 'fogT',      min: 0.05, max: 100,     step: 0.05, default: 0.3, decimals: 2, dynamicStep: true }
  };

  const params = {};
  Object.keys(PARAMS_CONFIG).forEach((key) => {
    params[key] = PARAMS_CONFIG[key].default;
  });


  function readParamsFromURL() {
    const urlParams = new URLSearchParams(window.location.search);

    Object.entries(PARAMS_CONFIG).forEach(([key, cfg]) => {
      const value = urlParams.get(cfg.urlKey);
      if (value === null) return;
      const num = parseFloat(value);
      if (isNaN(num)) return;
      const clamped = Math.min(cfg.max, Math.max(cfg.min, num));
      params[key] = clamped;
    });

	    // Glyph-Zeichen (Text) ebenfalls aus der URL lesen
	    const infFromUrl  = urlParams.get(GLYPH_URL_KEYS.floor);
	    const leftFromUrl = urlParams.get(GLYPH_URL_KEYS.left);
	    const rightFromUrl= urlParams.get(GLYPH_URL_KEYS.right);
	    if (infFromUrl !== null)  glyphChars.floor = infFromUrl;
	    if (leftFromUrl !== null) glyphChars.left  = leftFromUrl;
	    if (rightFromUrl !== null)glyphChars.right = rightFromUrl;

    // Font aus URL laden
    const fontFromUrl = urlParams.get('font');
    if (fontFromUrl && FONT_OPTIONS[fontFromUrl]) {
      currentFontKey = fontFromUrl;
    }

    // Invert-Mode aus URL laden
    const invertFromUrl = urlParams.get('invert');
    if (invertFromUrl === '1') {
      invertMode = true;
    }

    // Lampen-Zustände aus URL laden (z.B. lights=110 → floor=1, back=1, side=0)
    const lightsFromUrl = urlParams.get('lights');
    if (lightsFromUrl && lightsFromUrl.length === 3) {
      lampStates.floor = lightsFromUrl[0] === '1';
      lampStates.back = lightsFromUrl[1] === '1';
      lampStates.side = lightsFromUrl[2] === '1';
    }
  }

  function updateURLFromParams() {
    const urlParams = new URLSearchParams(window.location.search);

    Object.entries(PARAMS_CONFIG).forEach(([key, cfg]) => {
      const value = params[key];
      if (typeof value === 'number') {
        const decimals = cfg.decimals !== undefined ? cfg.decimals : 2;
        urlParams.set(cfg.urlKey, value.toFixed(decimals));
      }
    });

	    // Glyph-Texte in die URL schreiben (Mehr-Zeichen-Strings erlaubt)
	    Object.entries(GLYPH_URL_KEYS).forEach(([key, urlKey]) => {
	      const value = glyphChars[key];
	      if (value && value.length > 0) {
	        urlParams.set(urlKey, value);
	      } else {
	        urlParams.delete(urlKey);
	      }
	    });

    // Font in URL schreiben
    if (currentFontKey && currentFontKey !== DEFAULT_FONT_KEY) {
      urlParams.set('font', currentFontKey);
    } else {
      urlParams.delete('font');
    }

    // Invert-Mode in URL schreiben
    if (invertMode) {
      urlParams.set('invert', '1');
    } else {
      urlParams.delete('invert');
    }

    // Lampen-Zustände in URL schreiben
    const lightsStr = (lampStates.floor ? '1' : '0') +
                      (lampStates.back ? '1' : '0') +
                      (lampStates.side ? '1' : '0');
    if (lightsStr !== '111') {
      urlParams.set('lights', lightsStr);
    } else {
      urlParams.delete('lights');  // Default: alle an
    }

    const newURL = `${window.location.pathname}?${urlParams.toString()}`;
    window.history.replaceState({}, '', newURL);
  }

  function updateLightingFromParams() {
    if (ambientLight) ambientLight.intensity = params.ambientIntensity;

    // brightness: Three.js Spotlights + Kugel-Shader (für Shadows etc.)
    const spotIntensity = (params.brightness ?? 100) * 5000;
    if (spotFloor) spotFloor.intensity = spotIntensity;
    if (spotBack) spotBack.intensity = spotIntensity;
    if (spotSide) spotSide.intensity = spotIntensity;

    // wallBrightness = Fog-Opacity (0 = unsichtbar, 1 = voll sichtbar)
    if (fogMaterials && fogMaterials.length > 0) {
      const fogOpacity = params.wallBrightness || 0;  // Direkt: 0=aus, 1=voll
      fogMaterials.forEach(mat => {
        if (mat && mat.uniforms && mat.uniforms.uFogDensity) {
          mat.uniforms.uFogDensity.value = fogOpacity;
        }
      });
    }
  }

  // Berechnet Radius des Lichtkegels an der Wand
  function calcConeRadius(spotPos, wallDist, axis) {
    // Abstand vom Spotlight zur Wand
    let dist;
    if (axis === 'y') dist = Math.abs(spotPos.y - (-wallDist));
    else if (axis === 'z') dist = Math.abs(spotPos.z - (-wallDist));
    else if (axis === 'x') dist = Math.abs(spotPos.x - (-wallDist));
    else dist = wallDist;

    const angleRad = (params.spotAngle ?? PARAMS_CONFIG.spotAngle.default) * Math.PI / 180;
    // Bei angle=0 geben wir minHitRadius zurück, damit noch interagierbar
    if (params.spotAngle === 0) return INTERACTION_CONFIG.minFogHitRadius;
    return Math.tan(angleRad) * dist;
  }

  function updateGeometryFromParams() {
    // Kugel-Radius über Scale steuern
    if (sphereMesh && typeof params.sphereRadius === 'number') {
      const r = Math.max(0.001, params.sphereRadius);
      sphereMesh.scale.setScalar(r);
      needsUniformUpdate = true;  // Matrix-Inverse muss neu berechnet werden
    }

    // Shader-Uniforms aktualisieren
    if (sphereMesh && sphereMesh.material && sphereMesh.material.uniforms) {
      const u = sphereMesh.material.uniforms;
      if (typeof params.glyphSize === 'number' && u.uGlyphSize) {
        u.uGlyphSize.value = params.glyphSize;
      }
    }

    if (typeof params.wallDistance === 'number') {
      const d = -params.wallDistance;
      if (floor) floor.position.y = d;
      if (backWall) backWall.position.z = d;
      if (sideWall) sideWall.position.x = d;

      // Hit-Layer synchronisieren
      if (hitLayerFloor) hitLayerFloor.position.y = d;
      if (hitLayerBack) hitLayerBack.position.z = d;
      if (hitLayerSide) hitLayerSide.position.x = d;

      if (spotFloor && spotFloor.target) {
        spotFloor.target.position.set(0, -params.wallDistance, 0);
      }
      if (spotBack && spotBack.target) {
        spotBack.target.position.set(0, 0, -params.wallDistance);
      }
      if (spotSide && spotSide.target) {
        spotSide.target.position.set(-params.wallDistance, 0, 0);
      }
    }

    if (typeof params.wallSize === 'number') {
      const s = Math.max(0.001, params.wallSize);
      if (floor) floor.scale.set(s, s, 1);
      if (backWall) backWall.scale.set(s, s, 1);
      if (sideWall) sideWall.scale.set(s, s, 1);
    }

    if (typeof params.lightDistance === 'number') {
      const d = params.lightDistance;
      if (spotFloor) spotFloor.position.set(0, d, 0);
      if (spotBack) spotBack.position.set(0, 0, d);
      if (spotSide) spotSide.position.set(d, 0, 0);
    }

    if (typeof params.lampScale === 'number') {
      const s = params.lampScale;
      if (lampFloor) lampFloor.scale.set(s, s, s);
      if (lampBack) lampBack.scale.set(s, s, s);
      if (lampSide) lampSide.scale.set(s, s, s);
    }

    // Hit-Layer und Outline Radien aktualisieren (wenn spotAngle sich ändert)
    if (typeof params.spotAngle === 'number') {
      const outlineThickness = INTERACTION_CONFIG.outlineThickness;

      if (hitLayerFloor && spotFloor) {
        const r = calcConeRadius(spotFloor.position, params.wallDistance, 'y');
        hitLayerFloor.geometry.dispose();
        hitLayerFloor.geometry = new THREE.CircleGeometry(r, 32);
        if (outlineFloor) {
          outlineFloor.geometry.dispose();
          outlineFloor.geometry = new THREE.RingGeometry(r, r + outlineThickness, 64);
        }
      }
      if (hitLayerBack && spotBack) {
        const r = calcConeRadius(spotBack.position, params.wallDistance, 'z');
        hitLayerBack.geometry.dispose();
        hitLayerBack.geometry = new THREE.CircleGeometry(r, 32);
        if (outlineBack) {
          outlineBack.geometry.dispose();
          outlineBack.geometry = new THREE.RingGeometry(r, r + outlineThickness, 64);
        }
      }
      if (hitLayerSide && spotSide) {
        const r = calcConeRadius(spotSide.position, params.wallDistance, 'x');
        hitLayerSide.geometry.dispose();
        hitLayerSide.geometry = new THREE.CircleGeometry(r, 32);
        if (outlineSide) {
          outlineSide.geometry.dispose();
          outlineSide.geometry = new THREE.RingGeometry(r, r + outlineThickness, 64);
        }
      }
    }

    const spots = [spotFloor, spotBack, spotSide];
    spots.forEach(spot => {
      if (!spot) return;
      if (typeof params.spotAngle === 'number') {
        spot.angle = params.spotAngle * Math.PI / 180;
      }
      if (typeof params.spotPenumbra === 'number') {
        spot.penumbra = params.spotPenumbra;
      }
      if (typeof params.spotDecay === 'number') {
        spot.decay = params.spotDecay;
      }
      if (typeof params.spotRange === 'number') {
        spot.distance = params.spotRange;
      }
      if (typeof params.shadowMapSize === 'number') {
        const newSize = params.shadowMapSize;
        if (spot.shadow.mapSize.x !== newSize) {
          spot.shadow.mapSize.set(newSize, newSize);
          if (spot.shadow.map) {
            spot.shadow.map.dispose();
            spot.shadow.map = null;
          }
        }
      }
      // Shadow-Kamera dynamisch anpassen
      const r = params.sphereRadius || 1;
      spot.shadow.camera.near = Math.max(0.1, params.lightDistance - r * 2);
      spot.shadow.camera.far = params.lightDistance + params.wallDistance + 1;
      spot.shadow.camera.fov = Math.max(1, params.spotAngle ?? 25) * 1.2;
      spot.shadow.camera.updateProjectionMatrix();
    });
  }

  function createGlyphTexture(text, rotation = 0, showCursor = false) {
    // Hohe Auflösung für glatte Kanten
    const size = 1024;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d', { willReadFrequently: false });

    // Schwarzer Hintergrund (= nicht im Loch)
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, size, size);

    const safeText = text ?? '';
    const fontFamily = FONT_OPTIONS[currentFontKey] || FONT_OPTIONS[DEFAULT_FONT_KEY];

    // Leerer Text ohne Cursor = nur schwarzer Hintergrund
    if (safeText.length === 0 && !showCursor) {
      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearMipmapLinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = true;
      texture.anisotropy = 16;
      texture.needsUpdate = true;
      return texture;
    }

    // Rotation um Mittelpunkt
    ctx.translate(size / 2, size / 2);
    ctx.rotate(rotation);

    // Text zentriert zeichnen (weiß = Loch)
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Dynamische Schriftgröße basierend auf Text + Cursor-Breite
    const maxSize = size * 0.85;
    let fontSize = 720;
    const cursorWidthRatio = 0.08;  // Cursor-Breite relativ zur Schriftgröße
    const cursorGap = showCursor ? fontSize * 0.05 : 0;  // Abstand zum Cursor

    ctx.font = `bold ${fontSize}px ${fontFamily}`;
    let metrics = ctx.measureText(safeText);

    // Berücksichtige Cursor bei der Skalierung
    const textWidth = metrics.width + (showCursor ? fontSize * cursorWidthRatio + cursorGap : 0);
    const textHeight = metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent || fontSize;
    const scale = Math.min(maxSize / textWidth, maxSize / textHeight, 1);
    fontSize = Math.floor(fontSize * scale);
    ctx.font = `bold ${fontSize}px ${fontFamily}`;

    // Neu messen nach Skalierung
    metrics = ctx.measureText(safeText);
    const yOffset = (metrics.actualBoundingBoxAscent - metrics.actualBoundingBoxDescent) / 2;

    // Text-Position: Wenn Cursor da ist, Text etwas nach links
    const cursorWidth = fontSize * cursorWidthRatio;
    const cursorGapScaled = showCursor ? fontSize * 0.05 : 0;
    const textOffsetX = showCursor ? -(cursorWidth + cursorGapScaled) / 2 : 0;

    // Text zeichnen
    if (safeText.length > 0) {
      ctx.fillText(safeText, textOffsetX, yOffset);
    }

    // Cursor zeichnen (dünner vertikaler Strich nach dem Text)
    if (showCursor) {
      const cursorHeight = fontSize * 0.85;
      const cursorX = metrics.width / 2 + textOffsetX + cursorGapScaled;
      ctx.fillRect(cursorX, -cursorHeight / 2, cursorWidth, cursorHeight);
    }

    const texture = new THREE.CanvasTexture(canvas);
    // Wichtig: Lineare Filterung für glatte Übergänge!
    texture.minFilter = THREE.LinearMipmapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = true;
    texture.anisotropy = 16;
    texture.needsUpdate = true;
    return texture;
  }

  function updateGlyphTextures() {
    // Texturen für alle drei Achsen erstellen/aktualisieren
    const rot0   = (params.glyphRot0   || 0) * Math.PI / 180;
    const rotInf = (params.glyphRotInf || 0) * Math.PI / 180;
    const rot1   = (params.glyphRot1   || 0) * Math.PI / 180;

    // Alte Texturen freigeben (dispose + image nullen für GC)
    if (glyphTextures.x) { glyphTextures.x.dispose(); glyphTextures.x.image = null; }
    if (glyphTextures.y) { glyphTextures.y.dispose(); glyphTextures.y.image = null; }
    if (glyphTextures.z) { glyphTextures.z.dispose(); glyphTextures.z.image = null; }

    // Cursor anzeigen wenn Schatten aktiv ist UND cursorVisible true
    const showCursorLeft  = activeGlyphTarget === 'left'  && cursorVisible;
    const showCursorFloor = activeGlyphTarget === 'floor' && cursorVisible;
    const showCursorRight = activeGlyphTarget === 'right' && cursorVisible;

    // Keine Fallbacks: Leere Eingabe = nichts auf der Kugel
    glyphTextures.x = createGlyphTexture(glyphChars.left, rot0, showCursorLeft);
    glyphTextures.y = createGlyphTexture(glyphChars.floor, rotInf, showCursorFloor);
    glyphTextures.z = createGlyphTexture(glyphChars.right, rot1, showCursorRight);

    // Shader-Uniforms aktualisieren
    if (sphereMesh && sphereMesh.material && sphereMesh.material.uniforms) {
      sphereMesh.material.uniforms.uGlyphTexX.value = glyphTextures.x;
      sphereMesh.material.uniforms.uGlyphTexY.value = glyphTextures.y;
      sphereMesh.material.uniforms.uGlyphTexZ.value = glyphTextures.z;
    }
  }

  // Cursor-Blink starten/stoppen
  function startCursorBlink(target) {
    stopCursorBlink();
    activeGlyphTarget = target;
    cursorVisible = true;
    updateGlyphTextures();
    needsUniformUpdate = true;

    cursorBlinkInterval = setInterval(() => {
      cursorVisible = !cursorVisible;
      updateGlyphTextures();
      needsUniformUpdate = true;
    }, 500);
  }

  function stopCursorBlink() {
    if (cursorBlinkInterval) {
      clearInterval(cursorBlinkInterval);
      cursorBlinkInterval = null;
    }
    if (activeGlyphTarget) {
      activeGlyphTarget = null;
      cursorVisible = false;
      updateGlyphTextures();
      needsUniformUpdate = true;
    }
  }

  const sphereVertexShader = `
    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying vec3 vLocalPos;
    varying vec3 vCameraLocal;

    uniform mat4 uModelMatrixInverse;

    void main() {
      vLocalPos = position;
      vNormal = normalize(normalMatrix * normal);
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      // Kamera-Position in lokalem Koordinatensystem
      vCameraLocal = (uModelMatrixInverse * vec4(cameraPosition, 1.0)).xyz;
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
  `;

  const sphereFragmentShader = `
    precision highp float;

    uniform vec3 uColor;
    uniform float uGlyphSize;
    uniform sampler2D uGlyphTexX;
    uniform sampler2D uGlyphTexY;
    uniform sampler2D uGlyphTexZ;
    uniform float uAmbient;
    uniform float uBrightness;     // Licht-Intensität (normalisiert)
    uniform float uDecay;          // Licht-Abfall (0=keiner, 1=linear, 2=physikalisch)
    uniform float uLightDistance;  // Distanz der Lichtquellen vom Zentrum
    uniform int uGebEnabled;
    uniform int uInvertMode;       // 0=normal (Löcher), 1=invertiert (nur Zeichen)
    uniform vec3 uLightsActive;    // Welche Lichter aktiv sind (x=floor, y=back, z=side)

    varying vec3 vWorldPos;
    varying vec3 vNormal;
    varying vec3 vLocalPos;
    varying vec3 vCameraLocal;

    // Glyph-Textur samplen (clamp statt discard für korrekte Löcher am Rand)
    float sampleGlyph(sampler2D tex, vec2 uv) {
      vec2 clamped = clamp(uv, 0.0, 1.0);
      // Außerhalb der Textur = kein Loch
      if (uv != clamped) return 0.0;
      return texture2D(tex, uv).r;
    }

    // Prüft ob Punkt in einem der drei Glyph-Zylinder liegt
    // Gibt zurück: 0 = nicht im Loch, 1/2/3 = in Loch X/Y/Z (erstes gefundenes)
    // holeCount wird gesetzt um Überschneidungen zu erkennen
    // Im Invert-Modus: Early-Exit wenn eine Textur 0 ist (kann nie 3 werden)
    int whichHole(vec3 p, out int holeCount) {
      holeCount = 0;
      if (uGebEnabled == 0) return 0;

      float glyphScale = uGlyphSize * 0.3;
      float threshold = 0.5;
      int firstHole = 0;

      // X-Achse Loch (0) - Zylinder entlang X (gespiegelt für korrekte Orientierung)
      vec2 uvX = vec2(1.0 - (p.z / glyphScale * 0.5 + 0.5), p.y / glyphScale * 0.5 + 0.5);
      bool inX = sampleGlyph(uGlyphTexX, uvX) > threshold;
      if (inX) {
        holeCount++;
        firstHole = 1;
      } else if (uInvertMode == 1) {
        return 0;  // EARLY EXIT: kann nie 3 werden
      }

      // Y-Achse Loch (∞) - Zylinder entlang Y (gespiegelt)
      vec2 uvY = vec2(p.x / glyphScale * 0.5 + 0.5, 1.0 - (p.z / glyphScale * 0.5 + 0.5));
      bool inY = sampleGlyph(uGlyphTexY, uvY) > threshold;
      if (inY) {
        holeCount++;
        if (firstHole == 0) firstHole = 2;
      } else if (uInvertMode == 1) {
        return firstHole;  // EARLY EXIT: kann nie 3 werden
      }

      // Z-Achse Loch (1) - Zylinder entlang Z (original, war korrekt)
      vec2 uvZ = (p.xy / glyphScale) * 0.5 + 0.5;
      if (sampleGlyph(uGlyphTexZ, uvZ) > threshold) {
        holeCount++;
        if (firstHole == 0) firstHole = 3;
      }

      return firstHole;
    }

    // SDF für Kugel
    float sphereSDF(vec3 p) {
      return length(p) - 1.0;
    }

    // Normale der Tunnel-Wand berechnen (Gradient der Glyph-Textur)
    // Zeigt NACH INNEN zum Tunnel (weg von der Wand)
    vec3 calcTunnelNormal(vec3 p, int holeAxis) {
      float glyphScale = uGlyphSize * 0.3;
      float eps = 0.002;

      if (holeAxis == 1) {
        // X-Achsen-Tunnel: Normale in YZ-Ebene (gespiegelt)
        vec2 uv = vec2(1.0 - (p.z / glyphScale * 0.5 + 0.5), p.y / glyphScale * 0.5 + 0.5);
        float gx = sampleGlyph(uGlyphTexX, uv + vec2(eps, 0.0)) - sampleGlyph(uGlyphTexX, uv - vec2(eps, 0.0));
        float gy = sampleGlyph(uGlyphTexX, uv + vec2(0.0, eps)) - sampleGlyph(uGlyphTexX, uv - vec2(0.0, eps));
        return normalize(vec3(0.0, gy, gx));  // Vorzeichen angepasst wegen Spiegelung
      } else if (holeAxis == 2) {
        // Y-Achsen-Tunnel: Normale in XZ-Ebene (gespiegelt)
        vec2 uv = vec2(p.x / glyphScale * 0.5 + 0.5, 1.0 - (p.z / glyphScale * 0.5 + 0.5));
        float gx = sampleGlyph(uGlyphTexY, uv + vec2(eps, 0.0)) - sampleGlyph(uGlyphTexY, uv - vec2(eps, 0.0));
        float gy = sampleGlyph(uGlyphTexY, uv + vec2(0.0, eps)) - sampleGlyph(uGlyphTexY, uv - vec2(0.0, eps));
        return normalize(vec3(-gx, 0.0, gy));  // Vorzeichen angepasst wegen Spiegelung
      } else {
        // Z-Achsen-Tunnel: Normale in XY-Ebene (unverändert)
        vec2 uv = (p.xy / glyphScale) * 0.5 + 0.5;
        float gx = sampleGlyph(uGlyphTexZ, uv + vec2(eps, 0.0)) - sampleGlyph(uGlyphTexZ, uv - vec2(eps, 0.0));
        float gy = sampleGlyph(uGlyphTexZ, uv + vec2(0.0, eps)) - sampleGlyph(uGlyphTexZ, uv - vec2(0.0, eps));
        return normalize(vec3(-gx, -gy, 0.0));
      }
    }

    // Berechnet Distanz zur Tunnel-Wand für eine Achse (0 = auf der Wand, >0 = im Tunnel)
    float tunnelWallDist(vec3 p, int axis) {
      float glyphScale = uGlyphSize * 0.3;
      float threshold = 0.5;
      vec2 uv;

      if (axis == 1) {
        uv = vec2(1.0 - (p.z / glyphScale * 0.5 + 0.5), p.y / glyphScale * 0.5 + 0.5);
        return sampleGlyph(uGlyphTexX, uv) - threshold;
      } else if (axis == 2) {
        uv = vec2(p.x / glyphScale * 0.5 + 0.5, 1.0 - (p.z / glyphScale * 0.5 + 0.5));
        return sampleGlyph(uGlyphTexY, uv) - threshold;
      } else {
        uv = (p.xy / glyphScale) * 0.5 + 0.5;
        return sampleGlyph(uGlyphTexZ, uv) - threshold;
      }
    }

    // Berechnet die korrekte Normale für die Schnittmenge aller drei Tunnel
    // Die nächste Tunnel-Wand bestimmt die Normale
    vec3 calcIntersectionNormal(vec3 p, vec3 viewDir) {
      // Finde welcher Tunnel am nächsten zur Wand ist (kleinster Wert = nächste Wand)
      float distX = tunnelWallDist(p, 1);
      float distY = tunnelWallDist(p, 2);
      float distZ = tunnelWallDist(p, 3);

      int closestAxis;
      if (distX <= distY && distX <= distZ) {
        closestAxis = 1;
      } else if (distY <= distX && distY <= distZ) {
        closestAxis = 2;
      } else {
        closestAxis = 3;
      }

      // calcTunnelNormal gibt den Gradienten zurück, der INS LOCH zeigt
      // (von schwarz/Rand nach weiß/Mitte)
      // Im Invert-Modus ist das Loch-Innere unser Objekt
      // Die Oberflächen-Normale muss ZUR LICHTQUELLE zeigen können
      // Der Gradient zeigt ins Loch = zum Objekt-Inneren
      // Für korrekte Beleuchtung: Normale = Gradient (zeigt zur beleuchteten Seite)
      vec3 normal = calcTunnelNormal(p, closestAxis);

      return normal;
    }

    void main() {
      vec3 rayOrigin = vCameraLocal;
      vec3 rayDir = normalize(vLocalPos - vCameraLocal);

      // Ray-Sphere Intersection für Start/End des Raymarchings
      float a = dot(rayDir, rayDir);
      float b = 2.0 * dot(rayOrigin, rayDir);
      float c = dot(rayOrigin, rayOrigin) - 1.0;
      float discriminant = b * b - 4.0 * a * c;

      if (discriminant < 0.0) discard;

      float sqrtD = sqrt(discriminant);
      float tEnter = (-b - sqrtD) / (2.0 * a);
      float tExit = (-b + sqrtD) / (2.0 * a);

      if (tExit < 0.0) discard;
      tEnter = max(tEnter, 0.001);

      // Raymarching durch die Kugel
      vec3 hitPos;
      vec3 hitNormal;
      bool foundHit = false;
      int hitType = 0;  // 0=sphere outside, 1=sphere inside, 2=tunnel wall

      float t = tEnter;
      // Größerer baseStep für Invert-Modus (Objekt ist kleiner)
      float baseStep = (uInvertMode == 1) ? 0.025 : 0.015;

      bool wasInHole = false;
      int lastHoleAxis = 0;
      float lastT = t;

      // Reduzierte Iterationen: 80 statt 120 (mit adaptivem Stepping ausreichend)
      for (int i = 0; i < 80; i++) {
        if (t > tExit) break;

        vec3 p = rayOrigin + rayDir * t;
        float dist = sphereSDF(p);
        bool inSphere = (dist < 0.0);
        int holeCount;
        int holeAxis = whichHole(p, holeCount);
        bool inHole = (holeCount > 0);

        if (uInvertMode == 1) {
          // INVERTIERTER MODUS: Nur die SCHNITTMENGE aller drei Zeichen rendern
          // inGlyph = innerhalb Kugel UND in ALLEN DREI Zylindern gleichzeitig
          bool inGlyph = inSphere && (holeCount == 3);
          bool wasInGlyph = wasInHole;  // wasInHole wird hier als wasInGlyph genutzt

          // Eintritt in Glyph-Volumen (Außenkante der Schnittmenge)
          if (!wasInGlyph && inGlyph) {
            // Binary Search für präzise Kante (reduziert auf 8 Iterationen)
            float tLo = lastT;
            float tHi = t;
            int finalAxis = holeAxis;
            for (int j = 0; j < 8; j++) {
              float tMid = (tLo + tHi) * 0.5;
              vec3 pMid = rayOrigin + rayDir * tMid;
              float distMid = sphereSDF(pMid);
              int midCount;
              int midAxis = whichHole(pMid, midCount);
              bool midInGlyph = (distMid < 0.0) && (midCount == 3);
              if (midInGlyph) {
                tHi = tMid;
                finalAxis = midAxis;
              } else {
                tLo = tMid;
              }
            }
            hitPos = rayOrigin + rayDir * tHi;
            // Normale muss NACH AUSSEN vom Glyph-Körper zeigen (in den leeren Raum)
            float hitDist = sphereSDF(hitPos);
            if (abs(hitDist) < 0.05) {
              // Auf Kugeloberfläche: Normale zeigt radial nach außen
              hitNormal = normalize(hitPos);
            } else {
              // An Tunnel-Wand: Berechne korrekte Normale basierend auf nächster Wand
              hitNormal = calcIntersectionNormal(hitPos, rayDir);
            }
            hitType = 0;
            foundHit = true;
            break;
          }

          wasInHole = inGlyph;  // Track ob wir im Glyph waren
          lastHoleAxis = holeAxis;
          lastT = t;

          // ADAPTIVE STEPPING für Invert-Modus:
          // Außerhalb der Kugel: große Schritte (SDF-basiert)
          // Innerhalb aber nicht in Schnittmenge: mittlere Schritte
          // Nahe der Schnittmenge (holeCount >= 2): kleine Schritte
          float step;
          if (!inSphere) {
            step = max(dist * 0.5, baseStep);  // Außerhalb: SDF-Distanz nutzen
          } else if (holeCount >= 2) {
            step = baseStep;  // Nahe Schnittmenge: fein
          } else {
            step = baseStep * 2.0;  // In Kugel aber weit weg: gröber
          }
          t += step;

        } else {
          // NORMALER MODUS: Kugel mit Löchern

          // Tunnel-Wand-Detektion: Übergang von "im Loch" zu "nicht im Loch"
          if (wasInHole && !inHole && dist < 0.0) {
            // Binary Search für sub-pixel präzise Tunnel-Wand-Position
            float tLo = lastT;
            float tHi = t;
            for (int j = 0; j < 12; j++) {
              float tMid = (tLo + tHi) * 0.5;
              vec3 pMid = rayOrigin + rayDir * tMid;
              int dummyCount;
              int midAxis = whichHole(pMid, dummyCount);
              bool midInHole = (dummyCount > 0);
              if (midInHole) {
                tLo = tMid;
              } else {
                tHi = tMid;
              }
            }
            // Präzise Position auf der Tunnel-Wand
            hitPos = rayOrigin + rayDir * tHi;
            hitNormal = calcTunnelNormal(hitPos, lastHoleAxis);
            hitType = 2;  // Tunnel-Wand
            foundHit = true;
            break;
          }

          // Kugeloberfläche (nicht im Loch)?
          if (abs(dist) < 0.01 && !inHole) {
            hitPos = p;
            hitNormal = normalize(p);
            if (dot(hitNormal, rayDir) > 0.0) {
              hitNormal = -hitNormal;
              hitType = 1;  // Innenseite
            } else {
              hitType = 0;  // Außenseite
            }
            foundHit = true;
            break;
          }

          wasInHole = inHole;
          if (inHole) lastHoleAxis = holeAxis;
          lastT = t;

          // Adaptiver Schritt: kleiner nahe der Oberfläche, aber konstant in Löchern
          float step = inHole ? baseStep : max(abs(dist) * 0.4, baseStep);
          t += step;
        }
      }

      if (!foundHit) discard;

      // Lichtrichtungen (von Lichtquelle zur Kugel)
      vec3 lightPos1 = vec3(0.0, 1.0, 0.0) * uLightDistance;  // Floor-Spot
      vec3 lightPos2 = vec3(0.0, 0.0, 1.0) * uLightDistance;  // Back-Spot
      vec3 lightPos3 = vec3(1.0, 0.0, 0.0) * uLightDistance;  // Side-Spot

      vec3 toLight1 = lightPos1 - hitPos;
      vec3 toLight2 = lightPos2 - hitPos;
      vec3 toLight3 = lightPos3 - hitPos;

      float dist1 = length(toLight1);
      float dist2 = length(toLight2);
      float dist3 = length(toLight3);

      // Diffuse: wie direkt das Licht auf die Oberfläche trifft
      float diff1 = max(dot(hitNormal, normalize(toLight1)), 0.0);
      float diff2 = max(dot(hitNormal, normalize(toLight2)), 0.0);
      float diff3 = max(dot(hitNormal, normalize(toLight3)), 0.0);

      // Decay: 0 = kein Abfall, 1 = linear, 2 = physikalisch (1/d²)
      float decay1 = 1.0, decay2 = 1.0, decay3 = 1.0;
      if (uDecay > 0.0) {
        decay1 = pow(max(dist1, 0.1), -uDecay);
        decay2 = pow(max(dist2, 0.1), -uDecay);
        decay3 = pow(max(dist3, 0.1), -uDecay);
      }

      // Lichtintensität pro Spot: diffuse × decay × brightness × aktiv
      // uLightsActive: x=floor, y=back, z=side (0.0 oder 1.0)
      float light1 = diff1 * decay1 * uLightsActive.x;
      float light2 = diff2 * decay2 * uLightsActive.y;
      float light3 = diff3 * decay3 * uLightsActive.z;

      // Summe aller aktiven Lichter, normalisiert auf Anzahl aktiver Lichter
      float activeLights = uLightsActive.x + uLightsActive.y + uLightsActive.z;
      float rawLight = activeLights > 0.0 ? (light1 + light2 + light3) / activeLights : 0.0;
      float directLight = rawLight * uBrightness;

      // Ambient: Grundhelligkeit (0-1), nur aktiv wenn brightness > 0
      // Bei brightness=0 → komplett dunkel
      float ambientLight = uAmbient * min(uBrightness, 1.0);  // Ambient nicht über 1.0 skalieren
      float totalLight = ambientLight + directLight;

      // Tunnel-Wände und Innenseite etwas dunkler
      if (hitType == 1) totalLight *= 0.7;
      if (hitType == 2) totalLight *= 0.85;

      vec3 finalColor = uColor * clamp(totalLight, 0.0, 1.0);
      gl_FragColor = vec4(finalColor, 1.0);
    }
  `;

  // Inverse Model Matrix für Raymarching
  let modelMatrixInverse = new THREE.Matrix4();

  const _tempVec3A = new THREE.Vector3();
  const _tempVec3B = new THREE.Vector3();
  const _tempQuat = new THREE.Quaternion();
  const _defaultLampDir = new THREE.Vector3(0, 1, 0);
  const _defaultConeDir = new THREE.Vector3(0, -1, 0);

  let needsUniformUpdate = true;

    urlUpdateTimeout = setTimeout(() => {
      updateURLFromParams();
      urlUpdateTimeout = null;
    }, 300);

  // Aktualisiert die visuelle Darstellung der Lampen basierend auf lampStates
  function updateLampVisuals() {
    const updateLamp = (lamp, lightCone, isActive) => {
      if (!lamp) return;

      // Lichtkegel ein/aus
      if (lightCone) {
        lightCone.visible = isActive;
      }

      // Lampen-Material: emissive an/aus
      lamp.traverse(child => {
        if (child.isMesh && child.material && !child.userData.isOutline) {
          if (child.material.emissive) {

            child.material.emissive.setHex(isActive ? 0xffffff : 0x222222);
            child.material.emissiveIntensity = isActive ? 0.5 : 0;
          }
        }
      });
    };

    updateLamp(lampFloor, lightConeFloor, lampStates.floor);
    updateLamp(lampBack, lightConeBack, lampStates.back);
    updateLamp(lampSide, lightConeSide, lampStates.side);

  // Custom Depth Shader für korrekte Schatten durch Löcher UND Tunnel-Wände
  const depthVertexShader = `
    #include <common>

    varying vec3 vLocalPos;
    varying vec3 vLightLocal;
    varying vec2 vHighPrecisionZW;

    uniform mat4 uModelMatrixInverse;

    void main() {
      vLocalPos = position;
      // Licht-Position (= Kamera bei Shadow-Pass) in lokalem System
      vLightLocal = (uModelMatrixInverse * vec4(cameraPosition, 1.0)).xyz;

      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      vHighPrecisionZW = gl_Position.zw;
    }
  `;

  const depthFragmentShader = `
    #include <common>
    #include <packing>

    uniform float uGlyphSize;
    uniform sampler2D uGlyphTexX;
    uniform sampler2D uGlyphTexY;
    uniform sampler2D uGlyphTexZ;
    uniform int uGebEnabled;
    uniform int uInvertMode;

    varying vec3 vLocalPos;
    varying vec3 vLightLocal;
    varying vec2 vHighPrecisionZW;

    // EXAKT wie im Haupt-Shader!
    float sampleGlyph(sampler2D tex, vec2 uv) {
      vec2 clamped = clamp(uv, 0.0, 1.0);
      if (uv != clamped) return 0.0;
      return texture2D(tex, uv).r;
    }

    // Zählt in wie vielen Löchern der Punkt liegt (0-3)
    // Im Invert-Modus: Early-Exit wenn eine Textur 0 ist (kann nie 3 werden)
    int countHoles(vec3 p) {
      if (uGebEnabled == 0) return 0;

      float glyphScale = uGlyphSize * 0.3;
      float threshold = 0.5;

      // X-Achse (gespiegelt)
      vec2 uvX = vec2(1.0 - (p.z / glyphScale * 0.5 + 0.5), p.y / glyphScale * 0.5 + 0.5);
      bool inX = sampleGlyph(uGlyphTexX, uvX) > threshold;

      // EARLY EXIT für Invert-Modus: Wenn X=0, kann es nie 3 werden
      if (uInvertMode == 1 && !inX) return 0;

      // Y-Achse (gespiegelt)
      vec2 uvY = vec2(p.x / glyphScale * 0.5 + 0.5, 1.0 - (p.z / glyphScale * 0.5 + 0.5));
      bool inY = sampleGlyph(uGlyphTexY, uvY) > threshold;

      // EARLY EXIT für Invert-Modus: Wenn Y=0, kann es nie 3 werden
      if (uInvertMode == 1 && !inY) return inX ? 1 : 0;

      // Z-Achse (original)
      vec2 uvZ = (p.xy / glyphScale) * 0.5 + 0.5;
      bool inZ = sampleGlyph(uGlyphTexZ, uvZ) > threshold;

      return (inX ? 1 : 0) + (inY ? 1 : 0) + (inZ ? 1 : 0);
    }

    // Prüft ob Punkt in mindestens einem Loch ist
    bool isInHole(vec3 p) {
      return countHoles(p) > 0;
    }

    float sphereSDF(vec3 p) {
      return length(p) - 1.0;
    }

    void main() {
      vec3 rayOrigin = vLightLocal;
      vec3 rayDir = normalize(vLocalPos - vLightLocal);

      // Ray-Sphere Intersection
      float a = dot(rayDir, rayDir);
      float b = 2.0 * dot(rayOrigin, rayDir);
      float c = dot(rayOrigin, rayOrigin) - 1.0;
      float discriminant = b * b - 4.0 * a * c;

      if (discriminant < 0.0) discard;

      float sqrtD = sqrt(discriminant);
      float tEnter = (-b - sqrtD) / (2.0 * a);
      float tExit = (-b + sqrtD) / (2.0 * a);

      if (tExit < 0.0) discard;
      tEnter = max(tEnter, 0.001);

      // Raymarching: Finde ersten soliden Punkt
      float t = tEnter;
      float baseStep = (uInvertMode == 1) ? 0.03 : 0.015;  // Gröber im Invert-Modus
      bool foundSolid = false;
      bool wasInHole = false;
      float lastT = t;

      for (int i = 0; i < 60; i++) {  // Reduziert von 100 auf 60
        if (t > tExit) break;

        vec3 p = rayOrigin + rayDir * t;
        float dist = sphereSDF(p);
        bool inSphere = (dist < 0.0);
        int holeCount = countHoles(p);
        bool inHole = (holeCount > 0);

        if (uInvertMode == 1) {
          // INVERTIERTER MODUS: Solid = Schnittmenge aller 3 Zylinder
          bool inGlyph = inSphere && (holeCount == 3);
          bool wasInGlyph = wasInHole;

          // Eintritt in Glyph-Volumen (Schnittmenge)
          if (!wasInGlyph && inGlyph) {
            foundSolid = true;
            break;
          }

          wasInHole = inGlyph;
          lastT = t;

          // ADAPTIVE STEPPING (wie im Hauptshader)
          float step;
          if (!inSphere) {
            step = max(dist * 0.5, baseStep);
          } else if (holeCount >= 2) {
            step = baseStep;
          } else {
            step = baseStep * 2.0;
          }
          t += step;

        } else {
          // NORMALER MODUS: Kugel mit Löchern

          // Tunnel-Wand: Übergang von Loch zu Nicht-Loch INNERHALB der Kugel
          if (wasInHole && !inHole && dist < 0.0) {
            // Binary Search für präzise Position (konsistent mit Hauptshader)
            float tLo = lastT;
            float tHi = t;
            for (int j = 0; j < 12; j++) {
              float tMid = (tLo + tHi) * 0.5;
              vec3 pMid = rayOrigin + rayDir * tMid;
              if (isInHole(pMid)) {
                tLo = tMid;
              } else {
                tHi = tMid;
              }
            }
            foundSolid = true;
            break;
          }

          // Auf Kugeloberfläche und NICHT im Loch?
          if (abs(dist) < 0.02 && !inHole) {
            foundSolid = true;
            break;
          }

          wasInHole = inHole;
          lastT = t;
          float step = inHole ? baseStep : max(abs(dist) * 0.4, baseStep);
          t += step;
        }
      }

      if (!foundSolid) discard;

      float fragCoordZ = 0.5 * vHighPrecisionZW.x / vHighPrecisionZW.y + 0.5;
      gl_FragColor = packDepthToRGBA(fragCoordZ);
    }
  `;

  const fogVertexShader = `
    varying vec3 vWorldPos;
    varying vec3 vLocalPos;

    void main() {
      vLocalPos = position;
      vec4 worldPos = modelMatrix * vec4(position, 1.0);
      vWorldPos = worldPos.xyz;
      gl_Position = projectionMatrix * viewMatrix * worldPos;
    }
