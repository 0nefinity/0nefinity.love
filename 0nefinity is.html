<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>0nefinity</title>
  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .menu-button {
      position: fixed;
      top: 10px;
      right: 10px;
      padding: 5px 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      background-color: transparent;
      font-size: 57px;
      cursor: pointer;
      z-index: 1000;
      transition: all 0.3s ease;
    }

    .menu-button.expanded {
      padding: 5px 10px;
    }

    .menu {
      position: fixed;
      top: 100px;
      right: 10px;
      width: 250px;
      max-height: 90%;
      background-color: rgba(0, 0, 0, 0);
      padding: 10px;
      box-sizing: border-box;
      overflow-y: auto;
      border-radius: 5px;
      display: none;
    }

    .menu.open {
      display: block;
    }

    .menu ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .menu ul li {
      margin: 5px 0;
    }

    .menu ul li a {
      color: white;
      text-decoration: none;
    }

    .menu ul li a:hover {
      text-decoration: underline;
    }
  </style>
</html>
