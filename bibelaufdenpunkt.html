      elements.dropBibleOverlay.style.top = `${centerY}px`;
      elements.dropBibleButton?.style.setProperty('--drop-bible-diameter', `${diameterPx}px`);
    }

    function isLoadPlaceholderActive() {
      return !!state.renderWhisper.pendingLoadId
        && hasLayoutGeometry(state.layout)
        && !hasTextureCanvas(state.textures.fern)
        && !hasNahTextureReady();
    }

    function preserveCircleFootprint(layout, reference) {
      state.layout = layout;
      updateNormalizeScale();

      const normalizedDiameter = Math.max(
        Math.max(layout.bounds.width, layout.bounds.height) * Math.max(state.normalizeScale, 0.000001),
        1
      );
      state.scale = clamp(reference.diameterPx / normalizedDiameter, CONFIG.ZOOM.min, CONFIG.ZOOM.max);
      state.focusWorld = {
        x: layout.center.x * state.normalizeScale - (reference.centerOffsetX || 0) / Math.max(state.scale, 0.000001),
        y: layout.center.y * state.normalizeScale - (reference.centerOffsetY || 0) / Math.max(state.scale, 0.000001)
      };
      syncViewportResponsiveScaleState();
    }

    function getLineWidthPreviewShape() {
      const viewport = getViewportMetrics();
      const textLength = Math.max(state.textData.length || 1, 1);
      const charsPerLine = clampLineWidthChars(state.shape.lineWidthChars, textLength);
      const lineCount = Math.max(1, Math.ceil(textLength / charsPerLine));
      const effectiveScale = getEffectiveScale();
      const absoluteFocus = getAbsoluteFocusWorld();
      const widthWorld = Math.max(charsPerLine * state.baseCharWidth, state.baseCharWidth);
      const heightWorld = Math.max(lineCount * state.lineHeight, state.lineHeight);
      const topY = -heightWorld / 2 + state.lineHeight / 2;

      return {
        textLength,
        charsPerLine,
        lineCount,
        effectiveScale,
        absoluteFocus,
        widthWorld,
        heightWorld,
        topY,
        centerScreenX: viewport.localCenterX - absoluteFocus.x * effectiveScale,
        centerScreenY: viewport.localCenterY - absoluteFocus.y * effectiveScale,
        rowHeightPx: state.lineHeight * effectiveScale
      };
    }

    function shouldHoldBridgedLinePreview(screenFontSize = state.baseFontSize * getEffectiveScale()) {
      if (!state.lineWidthPreview.bridging || state.shape.type !== 'line' || !state.layout?.meta?.forceNah) return false;
      const { widthPx } = getShapeScreenMetrics();
      return widthPx < CONFIG.SHAPES.previewHoldWidthPx || screenFontSize < CONFIG.SHAPES.previewHoldFontPx;
    }

    function showLineWidthPreview({ bridge = false } = {}) {
      if (!bridge) {
        elements.fernCanvas.style.opacity = '0';
        elements.fernCanvas.style.filter = 'none';
        elements.nahCanvas.style.opacity = '0';
        elements.presenceCanvas.style.opacity = '0';
      }
      elements.lineWidthGhost.style.display = 'block';
      elements.lineWidthGhost.style.opacity = '1';
    }

    function updateLineWidthPreviewGhost({ bridge = state.lineWidthPreview.bridging } = {}) {
      if (!state.textData || state.shape.type !== 'line' || (!state.lineWidthPreview.active && !bridge)) return;

      const { ctx, width, height } = resizeLineWidthGhostCanvas();
      ctx.clearRect(0, 0, width, height);

      const preview = getLineWidthPreviewShape();
      const visibleHalfWorldY = height / Math.max(preview.effectiveScale * 2, 0.000001);
      const worldTop = preview.absoluteFocus.y - visibleHalfWorldY;
      const worldBottom = preview.absoluteFocus.y + visibleHalfWorldY;
      const firstVisibleRow = clamp(
        Math.floor((worldTop - preview.topY) / state.lineHeight) - 3,
        0,
        preview.lineCount - 1
      );
      const lastVisibleRow = clamp(
        Math.ceil((worldBottom - preview.topY) / state.lineHeight) + 3,
        firstVisibleRow,
        preview.lineCount - 1
      );
      const visibleRowCount = lastVisibleRow - firstVisibleRow + 1;
      const rowStep = Math.max(1, Math.ceil(visibleRowCount / CONFIG.SHAPES.previewSpiritMaxRows));
      const baseStrokeWidth = clamp(preview.rowHeightPx * 0.14, 0.5, 2.1);
      const baseAlpha = 0.32;
      const theme = getMonochromeThemePalette();

      ctx.lineCap = 'round';

      for (let rowIndex = firstVisibleRow; rowIndex <= lastVisibleRow; rowIndex += rowStep) {
        const charStart = rowIndex * preview.charsPerLine;
        const charCount = Math.min(preview.charsPerLine, preview.textLength - charStart);
        if (charCount <= 0) continue;

        const screenY = preview.centerScreenY + (preview.topY + rowIndex * state.lineHeight) * preview.effectiveScale;
        if (screenY < -8 || screenY > height + 8) continue;

        const rowWidthPx = Math.max(preview.charsPerLine * state.baseCharWidth * preview.effectiveScale, 1);
        const density = sampleSpiritDensity(charStart, charCount, rowIndex, 0);
        const alpha = clamp(baseAlpha + density * 0.24, 0.05, 0.78);
        const x0 = preview.centerScreenX - rowWidthPx / 2;
        const x1 = preview.centerScreenX + rowWidthPx / 2;

        if (rowWidthPx <= baseStrokeWidth * 1.1 || x1 <= x0) {
          ctx.fillStyle = withAlpha(theme.textChannels, clamp(baseAlpha + density * 0.36, 0.08, 0.92));
          const pointSize = clamp(Math.min(rowWidthPx, 1.4) + density * 0.8, 0.8, 1.9);
          ctx.beginPath();
          ctx.arc(preview.centerScreenX, screenY, pointSize / 2, 0, Math.PI * 2);
          ctx.fill();
          continue;
        }

        ctx.strokeStyle = withAlpha(theme.textChannels, alpha);
        ctx.lineWidth = clamp(baseStrokeWidth * (0.92 + density * 0.14), 0.45, 2.2);
        ctx.beginPath();
        ctx.moveTo(x0, screenY);
        ctx.lineTo(x1, screenY);
        ctx.stroke();

      }

      showLineWidthPreview({ bridge });
    }

    function previewLineWidthChange() {
      clearLocalRenderLoadWhisper();
      state.lineWidthPreview.active = true;
      state.lineWidthPreview.bridging = false;
      state.renderMode = 'preview';
      updateLineWidthPreviewGhost({ bridge: false });
    }

    function scheduleLineWidthCommit(delay = 260, expectedRevision = state.lineWidthPreview.revision) {
      cancelLineWidthCommit();
      state.lineWidthPreview.commitTimeout = setTimeout(() => {
        state.lineWidthPreview.commitTimeout = null;
        if (
          !state.lineWidthPreview.active
          || state.lineWidthPreview.interacting
          || expectedRevision !== state.lineWidthPreview.revision
          || state.shape.type !== 'line'
        ) return;
        rebuildLayout({ fitView: false, guard: () => (
          state.lineWidthPreview.revision === expectedRevision && !state.lineWidthPreview.interacting
        ) });
      }, delay);
    }

    function fitShapeInView({ initialCircleViewportFraction = null } = {}) {
	      const viewport = getViewportMetrics();
	      const placementViewport = getPreferredPlacementViewportMetrics();
      state.scale = getEstimatedFitScaleForLayout(state.layout, state.normalizeScale, { initialCircleViewportFraction });
      state.focusWorld = {
	        x: state.layout.center.x * state.normalizeScale - (placementViewport.localCenterX - viewport.localCenterX) / state.scale,
	        y: state.layout.center.y * state.normalizeScale - (placementViewport.localCenterY - viewport.localCenterY) / state.scale
      };
	      syncViewportResponsiveScaleState({ initialCircleViewportFraction });
      state.panelPlacement.lastCenterY = placementViewport.localCenterY;
    }

	    function syncPanelPlacementAnchor() {
	      state.panelPlacement.lastCenterY = getPreferredPlacementViewportMetrics().localCenterY;
	    }

	    function shiftShapeWithPanelSafeAreaDelta() {
	      if (!shouldUseShapePanelSafeArea() || !state.textData || !hasLayoutGeometry(state.layout) || !state.scale) return false;
	      const nextCenterY = getPreferredPlacementViewportMetrics().localCenterY;
	      const prevCenterY = state.panelPlacement.lastCenterY;
	      state.panelPlacement.lastCenterY = nextCenterY;
	      if (!Number.isFinite(prevCenterY)) return false;
	      const deltaY = nextCenterY - prevCenterY;
	      if (!Number.isFinite(deltaY) || Math.abs(deltaY) < 0.5) return false;
	      state.focusWorld.y -= deltaY / Math.max(state.scale, 0.000001);
	      return true;
	    }

    function disableViewAutoFit() {
      state.viewAutoFit.enabled = false;
      state.viewAutoFit.initialCircleViewportFraction = null;
    }

    function maybeRefreshAutoFitViewportPlacement() {
      if (!state.viewAutoFit.enabled || !state.textData || !hasLayoutGeometry(state.layout)) return false;
      fitShapeInView({ initialCircleViewportFraction: state.viewAutoFit.initialCircleViewportFraction });
      applyTransform();
      return true;
    }

    async function renderTexture(textureConfig, { layout, guard = null, targetScale = null, maxSizeOverride = null } = {}) {
      const boundsWidth = Math.max(layout.bounds.width, 1);
      const boundsHeight = Math.max(layout.bounds.height, 1);
      const paddingX = Math.max(8, Math.ceil(state.baseCharWidth * 3));
      const paddingY = Math.max(8, Math.ceil(state.lineHeight * 2));
      const resolvedScale = Math.max(targetScale ?? textureConfig.scale, 0.000001);
      const resolvedMaxSize = Math.max(maxSizeOverride ?? textureConfig.maxSize, 1);
      const textureScaleX = Math.max(Math.min(
        resolvedScale,
        (resolvedMaxSize - paddingX * 2) / boundsWidth
      ), 0.000001);
      const textureScaleY = Math.max(Math.min(
        resolvedScale,
        (resolvedMaxSize - paddingY * 2) / boundsHeight
      ), 0.000001);
      const width = Math.max(1, Math.ceil(boundsWidth * textureScaleX + paddingX * 2));
      const height = Math.max(1, Math.ceil(boundsHeight * textureScaleY + paddingY * 2));

      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d', { alpha: false });
      const theme = getMonochromeThemePalette();

      ctx.fillStyle = theme.bgCss;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      try {
        ctx.translate(width / 2, height / 2);
        ctx.scale(textureScaleX, textureScaleY);
        ctx.fillStyle = theme.textCss;
        ctx.font = `${state.baseFontSize}px ${CONFIG.FONT_FAMILY}`;
        ctx.textBaseline = getCenteredTextBaseline();
        ctx.textAlign = 'center';

        const rowCount = layout.meta?.virtualRows
          ? Math.max(layout.meta?.lineCount || 0, 0)
          : layout.rows.length;

        for (let i = 0; i < rowCount; i++) {
          const line = layout.meta?.virtualRows
            ? getVirtualLineRowAt(layout, i)
            : layout.rows[i];
          if (!line) continue;

          ctx.fillText(
            state.textData.substr(line.startIndex, line.charCount),
            line.x,
            line.y
          );

          if ((i + 1) % 64 === 0 && i + 1 < rowCount) {
            const canContinue = await yieldToUrgentUi(guard);
            if (!canContinue) return null;
          }
        }
      } finally {
        ctx.restore();
      }

      if (guard && !guard()) return null;

      return {
        canvas,
        width,
        height,
        padding: Math.max(paddingX, paddingY),
        scaleX: textureScaleX,
        scaleY: textureScaleY
      };
    }

    async function renderFernTexture({ targetStageIndex = null, targetScale = null, ...options } = {}) {
      const resolvedScale = targetScale ?? (targetStageIndex == null
        ? CONFIG.FERN_TEXTURE.scale
        : getFernScaleForStageIndex(targetStageIndex));
      const texture = await renderTexture(CONFIG.FERN_TEXTURE, {
        ...options,
        targetScale: resolvedScale,
        maxSizeOverride: getHardFernTextureMaxSize()
      });
      if (!texture) return null;
      texture.targetScale = resolvedScale;
      texture.stageIndex = getActualFernStageIndexFromScale(Math.min(texture.scaleX, texture.scaleY));
      return texture;
    }

    function initTextureLayer(canvas, ctx, texture) {
      if (!texture.canvas) return;

      canvas.width = texture.width;
      canvas.height = texture.height;
      canvas.style.width = texture.width + 'px';
      canvas.style.height = texture.height + 'px';
      ctx.drawImage(texture.canvas, 0, 0);
      canvas.style.filter = 'none';
    }

    function initFernLayer() {
      initTextureLayer(elements.fernCanvas, elements.fernCtx, state.textures.fern);
      if (!state.textures.fern.canvas) {
        hideFernOverlay();
        return;
      }
      elements.fernCanvas.style.opacity = '0';
    }

    function findFirstVisibleLine(topWorldY, padding) {
      if (!state.layout.rows.length) return 0;

      const adjustedTop = topWorldY - padding;
      let lo = 0;
      let hi = state.layout.rows.length - 1;
      while (lo < hi) {
        const pivotIndex = (lo + hi) >> 1;
        if (state.layout.rows[pivotIndex].y < adjustedTop) lo = pivotIndex + 1;
        else hi = pivotIndex;
      }
      return Math.max(0, lo - 1);
    }

    function getPan() {
      return {
        x: -state.focusWorld.x * state.scale,
        y: -state.focusWorld.y * state.scale
      };
    }

    function getEffectiveScale() {
      return state.scale * state.normalizeScale;
    }

    function stopRenderWhisperDots() {
      if (state.renderWhisper.dotsTimer) {
        clearTimeout(state.renderWhisper.dotsTimer);
        state.renderWhisper.dotsTimer = null;
      }
      state.renderWhisper.dotsAnimated = false;
      state.renderWhisper.dotCount = 0;
      state.renderWhisper.dotStartedAt = 0;
      if (elements.renderWhisperDots) elements.renderWhisperDots.textContent = '';
    }

    function isRenderWhisperAnchorVisible(anchor, viewport = getViewportMetrics()) {
      if (!anchor) return false;
      const marginX = 24;
      const marginY = 24;
      return anchor.x >= -marginX
        && anchor.y >= -marginY
        && anchor.x <= viewport.width + marginX
        && anchor.y <= viewport.height + marginY;
    }

    function getRenderWhisperAnchor() {
      const viewport = getViewportMetrics();

      if (state.renderWhisper.kind === 'load' && state.layout?.bounds?.width && state.textData) {
        const metrics = getShapeScreenMetrics();
        const shapeAnchor = { x: metrics.centerX, y: metrics.centerY };
        if (isRenderWhisperAnchorVisible(shapeAnchor, viewport)) {
          return shapeAnchor;
        }
      }

      if (Number.isFinite(state.renderWhisper.anchorX) && Number.isFinite(state.renderWhisper.anchorY)) {
        const storedAnchor = { x: state.renderWhisper.anchorX, y: state.renderWhisper.anchorY };
        if (state.renderWhisper.kind !== 'load' || isRenderWhisperAnchorVisible(storedAnchor, viewport)) {
          return storedAnchor;
        }
      }

      return { x: viewport.localCenterX, y: viewport.localCenterY };
    }

    function applyRenderWhisperPlacement(kind) {
      if (!elements.renderWhisper) return;
      if (kind === 'load') {
        const anchor = getRenderWhisperAnchor();
        elements.renderWhisper.style.left = `${anchor.x}px`;
        elements.renderWhisper.style.top = `${anchor.y}px`;
        elements.renderWhisper.style.bottom = 'auto';
      } else {
        elements.renderWhisper.style.left = '';
        elements.renderWhisper.style.top = '';
        elements.renderWhisper.style.bottom = '';
      }
    }

    function setRenderWhisper(text, kind = 'general', { animateDots = false } = {}) {
      if (!elements.renderWhisper) return;
      if (kind !== 'load' && state.renderWhisper.pendingLoadId) return;
      if (state.renderWhisper.timeout) {
        clearTimeout(state.renderWhisper.timeout);
        state.renderWhisper.timeout = null;
      }
      stopRenderWhisperDots();
      if (kind === 'load') {
        const anchor = getRenderWhisperAnchor();
        state.renderWhisper.anchorX = anchor.x;
        state.renderWhisper.anchorY = anchor.y;
      } else {
        state.renderWhisper.anchorX = null;
        state.renderWhisper.anchorY = null;
      }
      state.renderWhisper.kind = kind;
      state.renderWhisper.baseText = text;
      state.renderWhisper.dotsAnimated = animateDots;
      elements.renderWhisper.dataset.kind = kind;
      applyRenderWhisperPlacement(kind);
      if (elements.renderWhisperLabel) elements.renderWhisperLabel.textContent = text;
      if (elements.renderWhisperDots) elements.renderWhisperDots.textContent = '';
      elements.renderWhisper.classList.add('active');
      elements.renderWhisper.style.display = 'block';

      if (animateDots) {
        const dotIntervalMs = 180;
        state.renderWhisper.dotCount = 0;
        state.renderWhisper.dotStartedAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
        const tickDots = () => {
          if (!elements.renderWhisper || state.renderWhisper.kind !== kind || !state.renderWhisper.dotsAnimated) return;
          const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
          const elapsed = Math.max(now - state.renderWhisper.dotStartedAt, 0);
          const nextDotCount = Math.floor(elapsed / dotIntervalMs);
          state.renderWhisper.dotCount = nextDotCount;
          if (elements.renderWhisperLabel) elements.renderWhisperLabel.textContent = text;
          if (elements.renderWhisperDots) {
            elements.renderWhisperDots.textContent = '.'.repeat(state.renderWhisper.dotCount);
          }
          const nextDelay = Math.max(dotIntervalMs * (state.renderWhisper.dotCount + 1) - elapsed, 16);
          state.renderWhisper.dotsTimer = setTimeout(tickDots, nextDelay);
        };
        state.renderWhisper.dotsTimer = setTimeout(tickDots, dotIntervalMs);
      }
    }

    function beginRenderLoadWhisper(text = getShapeLoadWhisperText(), { requiredLayoutRevision = 0 } = {}) {
      const loadId = ++state.renderWhisper.serial;
      state.renderWhisper.pendingLoadId = loadId;
      state.renderWhisper.committedLoadId = 0;
      state.renderWhisper.requiredLayoutRevision = Math.max(0, requiredLayoutRevision || 0);
      state.renderWhisper.pendingDocumentKey = state.documentCacheKey || '';
      setRenderWhisper(text, 'load', { animateDots: true });
      return loadId;
    }

    function clearLocalRenderLoadWhisper() {
      if (state.renderWhisper.kind !== 'load') return;
      if (state.renderWhisper.pendingDocumentKey && state.renderWhisper.pendingDocumentKey !== state.documentCacheKey) return;
      clearRenderWhisper({ kind: 'load' });
    }

    function clearRenderWhisper({ delay = 0, kind = '' } = {}) {
      if (!elements.renderWhisper) return;
      if (kind && state.renderWhisper.kind !== kind) return;
      if (state.renderWhisper.timeout) {
        clearTimeout(state.renderWhisper.timeout);
        state.renderWhisper.timeout = null;
      }
      if (state.renderWhisper.revealFrame) {
        cancelAnimationFrame(state.renderWhisper.revealFrame);
        state.renderWhisper.revealFrame = 0;
      }

      const hide = () => {
        if (kind && state.renderWhisper.kind !== kind) return;
        stopRenderWhisperDots();
        if (!kind || kind === 'load') {
          state.renderWhisper.pendingLoadId = 0;
          state.renderWhisper.committedLoadId = 0;
          state.renderWhisper.requiredLayoutRevision = 0;
          state.renderWhisper.pendingDocumentKey = '';
          state.renderWhisper.anchorX = null;
          state.renderWhisper.anchorY = null;
        }
        state.renderWhisper.kind = '';
        state.renderWhisper.baseText = '';
        if (elements.renderWhisperLabel) elements.renderWhisperLabel.textContent = '';
        if (elements.renderWhisperDots) elements.renderWhisperDots.textContent = '';
        delete elements.renderWhisper.dataset.kind;
        applyRenderWhisperPlacement('');
        elements.renderWhisper.classList.remove('active');
      };

      if (delay > 0) {
        state.renderWhisper.timeout = setTimeout(hide, delay);
      } else {
        hide();
      }
    }

    function showUploadOverlay() {
      if (!elements.dropBibleOverlay) return;
      resetUploadZoneFeedback();
      elements.dropBibleOverlay.classList.add('active');
      elements.dropBibleOverlay.style.display = 'flex';
      updateDropBibleOverlayTransform();
    }

    function hideUploadOverlay() {
      if (!elements.dropBibleOverlay) return;
      clearUploadFeedbackTimeout();
      clearDropBiblePendingMousePicker();
      dropBibleTouchMode = 'idle';
      dropBibleMousePressActive = false;
      dropBibleMouseSecondPress = false;
      dropBibleSuppressNextClick = false;
      if (dropBibleSuppressClickTimeout) {
        clearTimeout(dropBibleSuppressClickTimeout);
        dropBibleSuppressClickTimeout = 0;
      }
      dropBibleDragDepth = 0;
      state.dropBiblePlaceholder = null;
      elements.dropBibleOverlay.classList.remove('active');
      elements.dropBibleOverlay.style.display = 'none';
    }

    function nextPaint() {
      return new Promise(resolve => requestAnimationFrame(resolve));
    }

    function createDocumentLoadAbortError() {
      try {
        return new DOMException('document-load-aborted', 'AbortError');
      } catch (error) {
        const abortError = new Error('document-load-aborted');
        abortError.name = 'AbortError';
        return abortError;
      }
    }

    function isDocumentLoadAbortError(error) {
      return error?.name === 'AbortError' || error?.message === 'document-load-aborted';
    }

    function throwIfDocumentLoadAborted({ guard = null, signal = null } = {}) {
      if ((signal && signal.aborted) || (guard && !guard())) {
        throw createDocumentLoadAbortError();
      }
    }

    function beginDocumentLoad() {
      if (activeDocumentLoadController) {
        try {
          activeDocumentLoadController.abort();
        } catch (error) {
          // best effort
        }
      }

      const controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
      activeDocumentLoadController = controller;
      const loadId = ++currentLoadId;
      return {
        loadId,
        signal: controller?.signal || null,
        guard: () => loadId === currentLoadId && !(controller?.signal?.aborted)
      };
    }

    function finishDocumentLoad(loadId, signal = null) {
      if (loadId !== currentLoadId) return;
      if (!activeDocumentLoadController) return;
      if (!signal || activeDocumentLoadController.signal === signal) {
        activeDocumentLoadController = null;
      }
    }

    function cancelInFlightDocumentLoad({ clearWhisper = true } = {}) {
      if (activeDocumentLoadController) {
        try {
          activeDocumentLoadController.abort();
        } catch (error) {
          // best effort
        }
        activeDocumentLoadController = null;
      }

      currentLoadId += 1;
      state.renderWhisper.pendingLoadId = 0;
      state.renderWhisper.committedLoadId = 0;
      state.renderWhisper.pendingDocumentKey = '';
      if (clearWhisper) {
        clearRenderWhisper({ kind: 'load' });
      }
    }

    function resizePresenceCanvas() {
      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(viewport.width * dpr));
      const height = Math.max(1, Math.round(viewport.height * dpr));

      if (elements.presenceCanvas.width !== width || elements.presenceCanvas.height !== height) {
        elements.presenceCanvas.width = width;
        elements.presenceCanvas.height = height;
        elements.presenceCanvas.style.width = `${viewport.width}px`;
        elements.presenceCanvas.style.height = `${viewport.height}px`;
      }
    }

    function clearPresenceLayer() {
      resizePresenceCanvas();
      elements.presenceCtx.clearRect(0, 0, elements.presenceCanvas.width, elements.presenceCanvas.height);
      elements.presenceCanvas.style.opacity = '0';
    }

    function getPresenceSourceTexture() {
      const preferred = state.textures.fern;
      if (!preferred?.canvas) {
        return null;
      }

      const padding = preferred.padding || 0;
      const sourceWidth = Math.max(1, preferred.width - padding * 2);
      const sourceHeight = Math.max(1, preferred.height - padding * 2);

      return {
        texture: preferred,
        sx: padding,
        sy: padding,
        sw: sourceWidth,
        sh: sourceHeight
      };
    }

    function getPresenceEnhancement(thinAxis) {
      const farT = 1 - smoothstep(CONFIG.PRESENCE.vanishBelowPx, CONFIG.PRESENCE.minAxisPx, thinAxis);

      return {
        brightness: CONFIG.PRESENCE.brightnessNear + (CONFIG.PRESENCE.brightnessFar - CONFIG.PRESENCE.brightnessNear) * farT,
        contrast: CONFIG.PRESENCE.contrastNear + (CONFIG.PRESENCE.contrastFar - CONFIG.PRESENCE.contrastNear) * farT,
        alphaBoost: CONFIG.PRESENCE.alphaNear + (CONFIG.PRESENCE.alphaFar - CONFIG.PRESENCE.alphaNear) * farT
      };
    }

    function drawLinePresenceProfile(ctx, drawWidth, drawHeight, baseAlpha, dpr) {
      const profile = state.layout.meta?.presenceProfile;
      if (!Array.isArray(profile) || profile.length === 0 || drawWidth <= 0 || drawHeight <= 0) return false;

      const pixelSize = 1 / dpr;
      const coverageX = clamp(drawWidth * dpr, 0, 1);
      const paintedWidth = Math.max(drawWidth, pixelSize);
      if (coverageX <= 0.0001) return false;

      const longAxisPx = Math.max(drawWidth, drawHeight) * dpr;
      const lineCount = Math.max(state.layout?.meta?.lineCount || state.layout?.rows?.length || 1, 1);
      const charsPerLine = Math.max(state.layout?.meta?.charsPerLine || state.shape.lineWidthChars || 1, 1);
      const orientationBalance = clamp(
        Math.log(charsPerLine / lineCount) / Math.log(64),
        -1,
        1
      );

      const longLineT = smoothstep(
        CONFIG.PRESENCE.longLineBoostStartPx,
        CONFIG.PRESENCE.longLineBoostFullPx,
        longAxisPx
      );
      const coverageGammaBase = CONFIG.PRESENCE.coverageGamma
        + (CONFIG.PRESENCE.longLineCoverageGamma - CONFIG.PRESENCE.coverageGamma) * longLineT;
      const coverageGamma = clamp(
        coverageGammaBase
          + (orientationBalance > 0
            ? CONFIG.PRESENCE.horizontalCoverageGammaBias * orientationBalance
            : CONFIG.PRESENCE.verticalCoverageGammaBias * -orientationBalance),
        0.14,
        1.2
      );
      const orientationAlpha = orientationBalance > 0
        ? 1 + (CONFIG.PRESENCE.horizontalAlphaBoost - 1) * orientationBalance
        : 1 - (1 - CONFIG.PRESENCE.verticalAlphaSoftening) * -orientationBalance;
      const deviceRowCount = Math.max(1, Math.min(elements.presenceCanvas.height, Math.ceil(drawHeight * dpr)));
      const rowPaintHeight = Math.max(drawHeight / deviceRowCount, pixelSize);
      const rowCoverageY = drawHeight < pixelSize ? clamp(drawHeight * dpr, 0, 1) : 1;
      ctx.fillStyle = getMonochromeThemePalette().textCss;

      for (let rowIndex = 0; rowIndex < deviceRowCount; rowIndex++) {
        const profileStart = Math.floor(rowIndex * profile.length / deviceRowCount);
        const profileEnd = Math.max(profileStart + 1, Math.floor((rowIndex + 1) * profile.length / deviceRowCount));
        let densitySum = 0;

        for (let i = profileStart; i < profileEnd; i++) {
          densitySum += clamp(profile[i], 0, 1);
        }

        const density = Math.pow(densitySum / Math.max(1, profileEnd - profileStart), CONFIG.PRESENCE.densityGamma);
        if (density <= 0.001) continue;

        const coverage = Math.pow(coverageX * rowCoverageY, coverageGamma);
        if (coverage <= 0.001) continue;

        const centerY = -drawHeight / 2 + (rowIndex + 0.5) * (drawHeight / deviceRowCount);
        ctx.globalAlpha = baseAlpha * density * CONFIG.PRESENCE.maxPixelAlpha * coverage * orientationAlpha;
        ctx.fillRect(-paintedWidth / 2, centerY - rowPaintHeight / 2, paintedWidth, rowPaintHeight);
      }

      return true;
    }

    function getShapeScreenMetrics() {
      const viewport = getViewportMetrics();
      const effectiveScale = getEffectiveScale();
      return {
        widthPx: state.layout.bounds.width * effectiveScale,
        heightPx: state.layout.bounds.height * effectiveScale,
        centerX: viewport.localCenterX + (state.layout.center.x * state.normalizeScale - state.focusWorld.x) * state.scale,
        centerY: viewport.localCenterY + (state.layout.center.y * state.normalizeScale - state.focusWorld.y) * state.scale
      };
    }

    function updatePresenceLayer({ forceVisible = false } = {}) {
      if (!state.textData) {
        clearPresenceLayer();
        return;
      }

      const { widthPx, heightPx, centerX, centerY } = getShapeScreenMetrics();
      const thinAxis = Math.min(widthPx, heightPx);
      const longAxis = Math.max(widthPx, heightPx);
      const bothSubPixel = widthPx < CONFIG.PRESENCE.minAxisPx && heightPx < CONFIG.PRESENCE.minAxisPx;

      if (forceVisible ? bothSubPixel : (thinAxis >= CONFIG.PRESENCE.minAxisPx || longAxis <= CONFIG.PRESENCE.vanishBelowPx)) {
        clearPresenceLayer();
        return;
      }

      resizePresenceCanvas();
      const ctx = elements.presenceCtx;
      const source = getPresenceSourceTexture();
      const dpr = window.devicePixelRatio || 1;
      const fadeIn = forceVisible
        ? 1
        : 1 - smoothstep(CONFIG.PRESENCE.fullAlphaBelowPx, CONFIG.PRESENCE.minAxisPx, thinAxis);
      const pointFade = forceVisible
        ? 1
        : (longAxis < CONFIG.PRESENCE.pointFadeStartPx ? clamp(longAxis / CONFIG.PRESENCE.pointFadeStartPx, 0, 1) : 1);
      const enhancement = getPresenceEnhancement(thinAxis);
      const alpha = fadeIn * pointFade * enhancement.alphaBoost;

      ctx.clearRect(0, 0, elements.presenceCanvas.width, elements.presenceCanvas.height);
      if (alpha <= 0.001) {
        elements.presenceCanvas.style.opacity = '0';
        return;
      }

      const drawWidth = state.shape.type === 'line' ? widthPx : Math.max(widthPx, CONFIG.PRESENCE.minAxisPx);
      const drawHeight = state.shape.type === 'line' ? heightPx : Math.max(heightPx, CONFIG.PRESENCE.minAxisPx);

      ctx.save();
      ctx.scale(dpr, dpr);
      ctx.translate(centerX, centerY);
      if (state.shape.type === 'line' && drawLinePresenceProfile(ctx, drawWidth, drawHeight, alpha, dpr)) {
        ctx.restore();
        elements.presenceCanvas.style.opacity = '1';
        return;
      }

      ctx.globalAlpha = alpha;
      const theme = getMonochromeThemePalette();

      if (source) {
        ctx.imageSmoothingEnabled = true;
        ctx.filter = `brightness(${enhancement.brightness}) contrast(${enhancement.contrast})`;
        ctx.drawImage(
          source.texture.canvas,
          source.sx,
          source.sy,
          source.sw,
          source.sh,
          -drawWidth / 2,
          -drawHeight / 2,
          drawWidth,
          drawHeight
        );
      } else {
        ctx.fillStyle = theme.textCss;
        if (state.shape.type === 'circle') {
          ctx.beginPath();
          ctx.ellipse(0, 0, drawWidth / 2, drawHeight / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
        }
      }

      ctx.restore();
      elements.presenceCanvas.style.opacity = '1';
    }

    function renderNahTexture(options = {}) {
      const viewport = getViewportMetrics();
      const w = viewport.width;
      const h = viewport.height;
      const dpr = window.devicePixelRatio || 1;
      const margin = Math.max(options.margin || 2.5, 1);
      const resolutionScale = clamp(options.resolutionScale || 1, 0.35, 2);
      const qualityBoost = Math.max(options.qualityBoost || 1, 1);
      const renderDpr = dpr * qualityBoost * resolutionScale;
      const effScale = getEffectiveScale();
      const centerWorldX = state.focusWorld.x / state.normalizeScale;
      const centerWorldY = state.focusWorld.y / state.normalizeScale;
      const cacheW = Math.round(w * margin * renderDpr);
      const cacheH = Math.round(h * margin * renderDpr);

      if (!state.textures.nah.canvas) {
        state.textures.nah.canvas = document.createElement('canvas');
      }

      const cacheCanvas = state.textures.nah.canvas;
      cacheCanvas.width = cacheW;
      cacheCanvas.height = cacheH;
      const ctx = cacheCanvas.getContext('2d', { alpha: false });
      const theme = getMonochromeThemePalette();

      ctx.fillStyle = theme.bgCss;
      ctx.fillRect(0, 0, cacheW, cacheH);

      const halfW = (w * margin / 2) / effScale;
      const halfH = (h * margin / 2) / effScale;
      const leftWorldX = centerWorldX - halfW;
      const rightWorldX = centerWorldX + halfW;
      const topWorldY = centerWorldY - halfH;
      const bottomWorldY = centerWorldY + halfH;
      const rawFontSize = state.baseFontSize * effScale * renderDpr;
      const actualFontSize = Math.min(rawFontSize, 500);
      const fontScaleFactor = actualFontSize / rawFontSize;

      ctx.fillStyle = theme.textCss;
      ctx.font = `${actualFontSize}px ${CONFIG.FONT_FAMILY}`;
      ctx.textBaseline = getCenteredTextBaseline();
      ctx.textAlign = 'center';

      const yPadding = Math.max(state.lineHeight, h / effScale);
      LOG.nahRender(centerWorldX, centerWorldY, effScale);

      if (state.shape.type === 'line' && state.layout.meta?.virtualRows) {
        const charsPerLine = state.layout.meta.charsPerLine;
        const lineCount = state.layout.meta.lineCount;
        const topY = state.layout.meta.topY;
        const firstVisibleRow = clamp(
          Math.floor((topWorldY - yPadding - topY) / state.lineHeight) - 1,
          0,
          lineCount - 1
        );
        const lastVisibleRow = clamp(
          Math.ceil((bottomWorldY + yPadding - topY) / state.lineHeight) + 1,
          firstVisibleRow,
          lineCount - 1
        );

        ctx.textAlign = 'left';

        for (let rowIndex = firstVisibleRow; rowIndex <= lastVisibleRow; rowIndex++) {
          const startIndex = rowIndex * charsPerLine;
          const charCount = Math.min(charsPerLine, state.textData.length - startIndex);
          if (charCount <= 0) continue;

          const lineY = topY + rowIndex * state.lineHeight;
          const screenY = cacheH / 2 + (lineY - centerWorldY) * effScale * renderDpr;
          const lineLeftWorldX = -(charCount * state.baseCharWidth) / 2;
          const visibleStart = clamp(
            Math.floor((leftWorldX - lineLeftWorldX) / state.baseCharWidth) - 2,
            0,
            charCount
          );
          const visibleEnd = clamp(
            Math.ceil((rightWorldX - lineLeftWorldX) / state.baseCharWidth) + 2,
            visibleStart,
            charCount
          );
          if (visibleEnd <= visibleStart) continue;

          const lineText = state.textData.substr(startIndex + visibleStart, visibleEnd - visibleStart);
          const wholeLineVisible = visibleStart === 0 && visibleEnd === charCount;

          if (wholeLineVisible && charCount <= 8) {
            const screenCenterX = cacheW / 2 + (0 - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'center';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenCenterX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenCenterX), Math.round(screenY));
            }
          } else {
            const screenX = cacheW / 2 + (lineLeftWorldX + visibleStart * state.baseCharWidth - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'left';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenX), Math.round(screenY));
            }
          }
        }

        state.textures.nah.centerX = state.focusWorld.x;
        state.textures.nah.centerY = state.focusWorld.y;
        state.textures.nah.scale = state.scale;
        state.textures.nah.width = w * margin;
        state.textures.nah.height = h * margin;
        state.textures.nah.qualityBoost = qualityBoost;
        return;
      }

      const startIdx = findFirstVisibleLine(topWorldY, yPadding);

      for (let i = startIdx; i < state.layout.rows.length; i++) {
        const line = state.layout.rows[i];
        if (line.y - yPadding > bottomWorldY) break;

        const screenY = cacheH / 2 + (line.y - centerWorldY) * effScale * renderDpr;

        if (state.shape.type === 'line') {
          const lineLeftWorldX = line.x - (line.charCount * state.baseCharWidth) / 2;
          const visibleStart = clamp(
            Math.floor((leftWorldX - lineLeftWorldX) / state.baseCharWidth) - 2,
            0,
            line.charCount
          );
          const visibleEnd = clamp(
            Math.ceil((rightWorldX - lineLeftWorldX) / state.baseCharWidth) + 2,
            visibleStart,
            line.charCount
          );
          if (visibleEnd <= visibleStart) continue;

          const lineText = state.textData.substr(line.startIndex + visibleStart, visibleEnd - visibleStart);
          const wholeLineVisible = visibleStart === 0 && visibleEnd === line.charCount;

          if (wholeLineVisible && line.charCount <= 8) {
            const screenCenterX = cacheW / 2 + (line.x - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'center';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenCenterX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenCenterX), Math.round(screenY));
            }
          } else {
            const screenX = cacheW / 2 + (lineLeftWorldX + visibleStart * state.baseCharWidth - centerWorldX) * effScale * renderDpr;
            ctx.textAlign = 'left';
            if (fontScaleFactor < 1) {
              ctx.save();
              ctx.translate(screenX, screenY);
              ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
              ctx.fillText(lineText, 0, 0);
              ctx.restore();
            } else {
              ctx.fillText(lineText, Math.round(screenX), Math.round(screenY));
            }
          }
        } else {
          const lineText = state.textData.substr(line.startIndex, line.charCount);
          const screenX = cacheW / 2 + (line.x - centerWorldX) * effScale * renderDpr;
          ctx.textAlign = 'center';

          if (fontScaleFactor < 1) {
            ctx.save();
            ctx.translate(screenX, screenY);
            ctx.scale(1 / fontScaleFactor, 1 / fontScaleFactor);
            ctx.fillText(lineText, 0, 0);
            ctx.restore();
          } else {
            ctx.fillText(lineText, Math.round(screenX), Math.round(screenY));
          }
        }
      }

      state.textures.nah.centerX = state.focusWorld.x;
      state.textures.nah.centerY = state.focusWorld.y;
      state.textures.nah.scale = state.scale;
      state.textures.nah.width = w * margin;
      state.textures.nah.height = h * margin;
      state.textures.nah.qualityBoost = qualityBoost;
    }

    function showNahOverlay() {
      const { nahCanvas } = elements;
      const nahTexture = state.textures.nah;
      if (!nahTexture.canvas) return;

      nahCanvas.width = nahTexture.canvas.width;
      nahCanvas.height = nahTexture.canvas.height;
      elements.nahCtx.drawImage(nahTexture.canvas, 0, 0);
      nahCanvas.style.width = nahTexture.width + 'px';
      nahCanvas.style.height = nahTexture.height + 'px';
    }

    function hideNahOverlay() {
      elements.nahCanvas.style.opacity = '0';
      elements.nahCanvas.width = 1;
      elements.nahCanvas.height = 1;
      elements.nahCanvas.style.width = '1px';
      elements.nahCanvas.style.height = '1px';
    }

    function hideFernOverlay() {
      elements.fernCanvas.style.opacity = '0';
      elements.fernCanvas.width = 1;
      elements.fernCanvas.height = 1;
      elements.fernCanvas.style.width = '1px';
      elements.fernCanvas.style.height = '1px';
    }

    function releaseCanvasResource(canvas) {
      if (!canvas) return;
      try {
        const ctx = canvas.getContext?.('2d');
        if (ctx) ctx.clearRect(0, 0, canvas.width, canvas.height);
      } catch (error) {
        // absichtlich still: Freigabe ist best-effort
      }
      canvas.width = 1;
      canvas.height = 1;
    }

    function releaseTextureResource(texture, releasedCanvases) {
      if (!texture?.canvas) return;
      if (!releasedCanvases.has(texture.canvas)) {
        releasedCanvases.add(texture.canvas);
        releaseCanvasResource(texture.canvas);
      }
      texture.canvas = null;
      texture.width = 0;
      texture.height = 0;
      if ('padding' in texture) texture.padding = 0;
      if ('scale' in texture) {
        texture.scale = 0;
        texture.centerX = 0;
        texture.centerY = 0;
      }
    }

    function releasePreparedRenderResources(prepared, releasedCanvases) {
      if (!prepared) return;
      releaseTextureResource(prepared.fernTexture, releasedCanvases);
    }

    function clearShapeRenderCacheResources(releasedCanvases = new Set()) {
      for (const prepared of shapeRenderCache.values()) {
        releasePreparedRenderResources(prepared, releasedCanvases);
      }
      shapeRenderCache.clear();
    }

    function pruneTextCache(fileToKeep = '') {
      for (const key of Array.from(textCache.keys())) {
        if (key !== fileToKeep) textCache.delete(key);
      }
      for (const key of Array.from(rawTextCache.keys())) {
        if (key !== fileToKeep) rawTextCache.delete(key);
      }
    }

    async function releaseCurrentBibleResources({ nextFilename = '', loadId = currentLoadId } = {}) {
      const releasedCanvases = new Set();
      const preserveGeometry = hasLayoutGeometry(state.layout) && !!state.textData;

      state.layoutBuildRevision += 1;
      resetProgressiveRefinement();
      cancelNahRender();
      cancelLineWidthCommit();

      if (state.shapeRefreshTimeout) {
        clearTimeout(state.shapeRefreshTimeout);
        state.shapeRefreshTimeout = null;
      }

      releaseTextureResource(state.textures.fern, releasedCanvases);
      releaseTextureResource(state.textures.nah, releasedCanvases);
      clearShapeRenderCacheResources(releasedCanvases);

      state.activePreparedRender = null;
      state.textures.fern = createEmptyTextureState(CONFIG.FERN_TEXTURE);
      resetNahTexture();
      state.renderMode = 'fern';
      state.lineWidthPreview.active = false;
      state.lineWidthPreview.bridging = false;

      hideFernOverlay();
      hideNahOverlay();
      clearLineWidthGhostCanvas();
      elements.lineWidthGhost.style.display = 'none';
      elements.lineWidthGhost.style.opacity = '0';
      updateDocumentStatsReadout();

      if (preserveGeometry) applyTransform();
      else clearPresenceLayer();

      pruneTextCache(textCache.has(nextFilename) ? nextFilename : '');

      await nextPaint();
      if (loadId !== currentLoadId) return false;
      await nextPaint();
      return loadId === currentLoadId;
    }

    function getTextureFidelity(texture, targetScale) {
      const scaleRatio = Math.min(texture.scaleX, texture.scaleY) / targetScale;
      return clamp(Math.sqrt(scaleRatio), 0.1, 1);
    }

    function normalizeBlendTuning() {
      const maxThreshold = 40;
      state.blendTuning.fernToNahStart = clamp(state.blendTuning.fernToNahStart, 0.1, maxThreshold - 0.3);
      state.blendTuning.fernToNahEnd = clamp(state.blendTuning.fernToNahEnd, state.blendTuning.fernToNahStart + 0.1, maxThreshold);
    }

    function getBlendThresholds() {
      const fernFidelity = getTextureFidelity(state.textures.fern, CONFIG.FERN_TEXTURE.scale);
      let fernToNahStart = state.blendTuning.fernToNahStart * fernFidelity;
      let fernToNahEnd = state.blendTuning.fernToNahEnd * fernFidelity;

      if (state.shape.type === 'line') {
        const charsPerLine = Math.max(state.layout?.meta?.charsPerLine || state.shape.lineWidthChars || 1, 1);
        const lineCount = Math.max(state.layout?.meta?.lineCount || Math.ceil(Math.max(state.textData.length, 1) / charsPerLine), 1);
        const verticality = clamp(Math.log(lineCount / charsPerLine) / Math.log(64), 0, 1);
        const narrowBoost = charsPerLine <= 2 ? 1.55 : (charsPerLine <= 4 ? 1.28 : 1);
        const lineMultiplier = 1 + verticality * (narrowBoost - 1);
        fernToNahStart *= lineMultiplier;
        fernToNahEnd *= lineMultiplier;
      }

      return {
        fernToNahStart,
        fernToNahEnd
      };
    }

    function getLineAspectRatio() {
      const { width, height } = state.layout.bounds;
      return Math.max(width, height) / Math.max(Math.min(width, height), 1);
    }

    function canUseProgressiveRefinement(screenFontSize, thresholds = getBlendThresholds()) {
      return screenFontSize >= thresholds.fernToNahStart
        && screenFontSize <= thresholds.fernToNahEnd;
    }

    function getNahRenderPixelSize(qualityBoost = 1) {
      const dpr = window.devicePixelRatio || 1;
      return Math.min(state.baseFontSize * getEffectiveScale() * dpr * qualityBoost, 500);
    }

    function hasMeaningfulQualityGain(fromBoost, toBoost) {
      const fromSize = getNahRenderPixelSize(fromBoost);
      const toSize = getNahRenderPixelSize(toBoost);
      if (toSize <= fromSize) {
        return false;
      }

      const pixelGain = toSize - fromSize;
      const ratioGain = toSize / Math.max(fromSize, 0.0001);
      return pixelGain >= CONFIG.PROGRESSIVE.minPixelGain && ratioGain >= CONFIG.PROGRESSIVE.minQualityGainRatio;
    }

    function getProgressiveProfile(screenFontSize, thresholds = getBlendThresholds()) {
      if (!canUseProgressiveRefinement(screenFontSize, thresholds) || state.progressive.stage <= 0) {
        return null;
      }

      const stageIndex = state.progressive.stage - 1;
      const qualityBoost = CONFIG.PROGRESSIVE.nahQualityBoosts[stageIndex] || 1;
      if (!hasMeaningfulQualityGain(1, qualityBoost)) {
        return null;
      }

      return {
        qualityBoost
      };
    }

    function getActiveBlendProfile(screenFontSize) {
      const thresholds = getBlendThresholds();
      const progressive = getProgressiveProfile(screenFontSize, thresholds);
      const shouldForceNah = !!state.layout?.meta?.forceNah;

      if (!progressive) {
        return {
          thresholds,
          qualityBoost: 1,
          shouldForceNah
        };
      }

      return {
        thresholds,
        qualityBoost: progressive.qualityBoost,
        shouldForceNah
      };
    }

    function clearProgressiveTimers() {
      for (const timer of state.progressive.timers) {
        clearTimeout(timer);
      }
      state.progressive.timers = [];
    }

    function resetProgressiveRefinement() {
      state.progressive.revision += 1;
      state.progressive.stage = 0;
      state.progressive.activeQualityBoost = 1;
      state.progressive.lastInteractionAt = (typeof performance !== 'undefined' ? performance.now() : Date.now());
      clearProgressiveTimers();
    }

    function scheduleFernProgressiveRefinement(revision, elapsed) {
      const prepared = state.activePreparedRender;
      if (!prepared || prepared.layout.meta?.forceNah || !state.textData) return [];

      if (Math.min(prepared.fernTexture.scaleX, prepared.fernTexture.scaleY) >= prepared.safeFernTargetScale - 0.000001) {
        return [];
      }

      const guard = () => revision === state.progressive.revision && !state.drag.active && isPreparedRenderActive(prepared);
      const upgradeDelay = CONFIG.PROGRESSIVE.fernUpgradeDelays[0] || 120;

      return [setTimeout(() => {
        if (!guard()) return;
        void ensurePreparedFernTexture(prepared, { guard, targetScale: prepared.safeFernTargetScale })
          .then(texture => {
            if (!texture || !guard() || !isPreparedRenderActive(prepared)) return;
            applyPreparedFernTexture(prepared);
          })
          .catch(error => {
            if (guard()) console.error('Fern-Upgrade fehlgeschlagen:', error);
          });
      }, Math.max(0, upgradeDelay - elapsed))];
    }

    function scheduleNahProgressiveRefinement(screenFontSize, thresholds, revision, elapsed) {
      if (!canUseProgressiveRefinement(screenFontSize, thresholds) || !state.textData) {
        return [];
      }

      const startStageIndex = Math.max(state.progressive.stage, 0);
      return CONFIG.PROGRESSIVE.idleStages
        .map((targetDelay, stageIndex) => ({ targetDelay, stageIndex }))
        .filter(({ stageIndex }) => stageIndex >= startStageIndex)
        .map(({ targetDelay, stageIndex }) => setTimeout(() => {
          if (revision !== state.progressive.revision || state.drag.active) {
            return;
          }

          const nextBoost = CONFIG.PROGRESSIVE.nahQualityBoosts[stageIndex] || 1;
          if (!hasMeaningfulQualityGain(state.progressive.activeQualityBoost, nextBoost)) {
            return;
          }

          state.progressive.stage = stageIndex + 1;
          state.progressive.activeQualityBoost = nextBoost;
          applyTransform();
        }, Math.max(0, targetDelay - elapsed)));
    }

    function scheduleProgressiveRefinement() {
      clearProgressiveTimers();

      if (state.drag.active || !state.textData || state.layout?.meta?.fullTextFern) {
        return;
      }

      const screenFontSize = state.baseFontSize * getEffectiveScale();
      const thresholds = getBlendThresholds();
      const revision = state.progressive.revision;
      const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
      const elapsed = Math.max(0, now - state.progressive.lastInteractionAt);

      state.progressive.timers = [
        ...scheduleFernProgressiveRefinement(revision, elapsed),
        ...scheduleNahProgressiveRefinement(screenFontSize, thresholds, revision, elapsed)
      ];
    }

    function noteViewInteraction({ cancelNahRender: shouldCancelNahRender = true, isUserGesture = false } = {}) {
      const shouldCancelRender = shouldCancelNahRender;
      if (isUserGesture) disableViewAutoFit();
      resetProgressiveRefinement();
      if (shouldCancelRender) cancelNahRender();
    }

    function beginScenePan(clientX, clientY) {
      state.drag.active = true;
      state.drag.lastX = clientX;
      state.drag.lastY = clientY;
      elements.container.classList.add('dragging');
      noteViewInteraction({ cancelNahRender: false, isUserGesture: true });
    }

    function updateScenePan(clientX, clientY) {
      if (!state.drag.active) return;
      noteViewInteraction({ cancelNahRender: false, isUserGesture: true });
      const dx = clientX - state.drag.lastX;
      const dy = clientY - state.drag.lastY;
      state.focusWorld.x -= dx / state.scale;
      state.focusWorld.y -= dy / state.scale;
      state.drag.lastX = clientX;
      state.drag.lastY = clientY;
      applyTransform();
    }

    function syncScenePinchState(touches) {
      state.drag.lastPinchDist = Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
      );
      state.drag.lastPinchCenterX = (touches[0].clientX + touches[1].clientX) / 2;
      state.drag.lastPinchCenterY = (touches[0].clientY + touches[1].clientY) / 2;
    }

    function beginScenePinch(touches) {
      state.drag.active = true;
      elements.container.classList.add('dragging');
      noteViewInteraction({ cancelNahRender: false, isUserGesture: true });
      syncScenePinchState(touches);
    }

    function updateScenePinch(touches) {
      if (touches.length < 2 || !state.drag.lastPinchDist) return;
      noteViewInteraction({ cancelNahRender: false, isUserGesture: true });

      const currentCenterX = (touches[0].clientX + touches[1].clientX) / 2;
      const currentCenterY = (touches[0].clientY + touches[1].clientY) / 2;
      const currentDist = Math.hypot(
        touches[0].clientX - touches[1].clientX,
        touches[0].clientY - touches[1].clientY
      );
      const viewport = getViewportMetrics();
      const oldScreenX = state.drag.lastPinchCenterX - viewport.clientCenterX;
      const oldScreenY = state.drag.lastPinchCenterY - viewport.clientCenterY;
      const worldUnderPinch = {
        x: state.focusWorld.x + oldScreenX / state.scale,
        y: state.focusWorld.y + oldScreenY / state.scale
      };

      state.scale = clamp(state.scale * (currentDist / state.drag.lastPinchDist), CONFIG.ZOOM.min, CONFIG.ZOOM.max);

      const newScreenX = currentCenterX - viewport.clientCenterX;
      const newScreenY = currentCenterY - viewport.clientCenterY;
      state.focusWorld.x = worldUnderPinch.x - newScreenX / state.scale;
      state.focusWorld.y = worldUnderPinch.y - newScreenY / state.scale;
      syncViewportResponsiveScaleState();
      state.drag.lastPinchDist = currentDist;
      state.drag.lastPinchCenterX = currentCenterX;
      state.drag.lastPinchCenterY = currentCenterY;
      applyTransform();
    }

    function endSceneInteraction() {
      state.drag.active = false;
      elements.container.classList.remove('dragging');
      scheduleProgressiveRefinement();
    }

    function updateTextureTransform(canvas, texture) {
      const pan = getPan();
      const scaleX = getEffectiveScale() / texture.scaleX;
      const scaleY = getEffectiveScale() / texture.scaleY;
      canvas.style.transform = `translate(-50%, -50%) translate(${pan.x}px, ${pan.y}px) scale(${scaleX}, ${scaleY})`;
    }

    function updateFernTransform() {
      updateTextureTransform(elements.fernCanvas, state.textures.fern);
    }

    function hasNahTextureReady() {
      return !!state.textures.nah.canvas && !!state.textures.nah.scale;
    }

    function isNahOverlayReady() {
      return hasNahTextureReady()
        && elements.nahCanvas.width > 1
        && elements.nahCanvas.height > 1;
    }

    function updateBlend(screenFontSize) {
      const blendProfile = getActiveBlendProfile(screenFontSize);
      const forceNah = blendProfile.shouldForceNah;
      const fullTextFern = !!state.layout?.meta?.fullTextFern;
      const holdGhost = shouldHoldBridgedLinePreview(screenFontSize);
      const hasFern = !!state.textures.fern.canvas;
      const hasFreshNah = isNahOverlayReady();

      if (forceNah) {
        elements.fernCanvas.style.opacity = '0';
        elements.fernCanvas.style.filter = 'none';
        elements.nahCanvas.style.opacity = (!holdGhost && hasFreshNah) ? '1' : '0';
        updateDocumentStatsReadout();
        return;
      }

      if (!hasFern && !hasFreshNah) {
        elements.fernCanvas.style.opacity = '0';
        elements.fernCanvas.style.filter = 'none';
        elements.nahCanvas.style.opacity = '0';
        updateDocumentStatsReadout();
        return;
      }

      if (fullTextFern) {
        elements.fernCanvas.style.opacity = hasFern ? '1' : '0';
        elements.fernCanvas.style.filter = 'none';
        elements.nahCanvas.style.opacity = '0';
        updateDocumentStatsReadout();
        return;
      }

      const thresholds = blendProfile.thresholds;
      const fernToNah = hasFreshNah
        ? smoothstep(thresholds.fernToNahStart, thresholds.fernToNahEnd, screenFontSize)
        : 0;

      elements.fernCanvas.style.opacity = hasFern ? 1 - fernToNah : '0';
      elements.fernCanvas.style.filter = 'none';
      elements.nahCanvas.style.opacity = fernToNah;
      updateDocumentStatsReadout();
    }

    function updateNahTransform() {
      const nahTexture = state.textures.nah;
      if (!nahTexture.scale) return null;

      const worldOffsetX = nahTexture.centerX - state.focusWorld.x;
      const worldOffsetY = nahTexture.centerY - state.focusWorld.y;
      const offsetX = worldOffsetX * state.scale;
      const offsetY = worldOffsetY * state.scale;
      const zoomRatio = state.scale / nahTexture.scale;

      elements.nahCanvas.style.transform = `translate(-50%, -50%) translate(${offsetX}px, ${offsetY}px) scale(${zoomRatio})`;
      return { offsetX, offsetY, zoomRatio };
    }

    function cancelNahRender() {
      if (state.renderTimeout) {
        clearTimeout(state.renderTimeout);
        state.renderTimeout = null;
      }
      renderScheduled = false;
      clearRenderWhisper({ kind: 'nah' });
    }

    function applyTransform() {
      const screenFontSize = state.baseFontSize * getEffectiveScale();
      const blendProfile = getActiveBlendProfile(screenFontSize);
      const thresholds = blendProfile.thresholds;
      const fullTextFern = !!state.layout?.meta?.fullTextFern;
      const shouldBeNah = !fullTextFern && (blendProfile.shouldForceNah || screenFontSize >= thresholds.fernToNahStart);
      const loadPlaceholderActive = isLoadPlaceholderActive();

      LOG.scaleCheck(state.scale);

      if (state.lineWidthPreview.active) {
        LOG.modeChange('preview');
        updateLineWidthPreviewGhost();
        updateDropBibleOverlayTransform();
        return;
      }

      updateFernTransform();
      updateDropBibleOverlayTransform();

      if (loadPlaceholderActive) {
        elements.fernCanvas.style.opacity = '0';
        elements.fernCanvas.style.filter = 'none';
        hideNahOverlay();
        if (state.layout?.meta?.forceNah) {
          if (state.renderMode !== 'nah') {
            state.renderMode = 'nah';
            scheduleNahRender(24, { qualityBoost: blendProfile.qualityBoost });
          } else if (!hasNahTextureReady()) {
            scheduleNahRender(24, { qualityBoost: blendProfile.qualityBoost });
          }
        } else {
          state.renderMode = 'fern';
        }
        clearPresenceLayer();
        if (state.renderWhisper.kind === 'load') applyRenderWhisperPlacement('load');
        updateLoadWhisperCommitState();
        maybeFinishLoadWhisper();
        return;
      }

      if (shouldBeNah && hasNahTextureReady() && !isNahOverlayReady()) {
        showNahOverlay();
      }

      updateBlend(screenFontSize);
      if (state.layout?.meta?.forceNah) {
        const holdGhost = shouldHoldBridgedLinePreview(screenFontSize);
        const hasFreshNah = isNahOverlayReady();
        const nahVisible = !holdGhost && hasFreshNah;
        const ghostVisible = state.lineWidthPreview.bridging && (holdGhost || !hasFreshNah);

        if (nahVisible || ghostVisible) clearPresenceLayer();
        else updatePresenceLayer({ forceVisible: true });
      } else {
        updatePresenceLayer();
      }

      if (shouldBeNah) {
        if (hasNahTextureReady()) updateNahTransform();

        if (state.renderMode !== 'nah') {
          LOG.modeChange('nah');
          state.renderMode = 'nah';
          scheduleNahRender(24, { qualityBoost: blendProfile.qualityBoost });
        } else if (!hasNahTextureReady()) {
          scheduleNahRender(24, { qualityBoost: blendProfile.qualityBoost });
        } else if (hasNahTextureReady()) {
          const result = updateNahTransform();
          if (!result) return;

          const viewport = getViewportMetrics();

          const needsRerender =
            Math.abs(result.offsetX) > viewport.width * 0.7 ||
            Math.abs(result.offsetY) > viewport.height * 0.7 ||
            result.zoomRatio < CONFIG.NAH.rerenderZoomRatioMin || result.zoomRatio > CONFIG.NAH.rerenderZoomRatioMax ||
            hasMeaningfulQualityGain(state.textures.nah.qualityBoost || 1, blendProfile.qualityBoost);

          if (needsRerender) scheduleNahRender(60, { qualityBoost: blendProfile.qualityBoost });
        }
      } else if (state.renderMode !== 'fern') {
        LOG.modeChange('fern');
        cancelNahRender();
        state.renderMode = 'fern';
        hideNahOverlay();
      }

      if (state.lineWidthPreview.bridging) {
        if (shouldHoldBridgedLinePreview(screenFontSize) || !state.textures.nah.scale) {
          updateLineWidthPreviewGhost({ bridge: true });
        } else {
          clearLineWidthPreview({ keepOverlay: true });
        }
      }

      if (state.renderWhisper.kind === 'load') applyRenderWhisperPlacement('load');
      updateLoadWhisperCommitState();
      maybeFinishLoadWhisper();
      rememberStableCircleFootprint();

      scheduleProgressiveRefinement();
    }

    let renderScheduled = false;

    function scheduleNahRender(delay = 100, options = {}) {
      if (renderScheduled) return;

      cancelNahRender();
      renderScheduled = true;
      if (!state.textures.nah.scale || (options.qualityBoost || 1) > (state.textures.nah.qualityBoost || 1)) {
        setRenderWhisper('schärft sicht', 'nah');
      }
      state.renderTimeout = setTimeout(() => {
        renderScheduled = false;
        if (state.renderMode !== 'nah') return;
        renderNahTexture(options);
        showNahOverlay();
        updateNahTransform();
        const screenFontSize = state.baseFontSize * getEffectiveScale();
        updateBlend(screenFontSize);
        updateLoadWhisperCommitState();
        maybeFinishLoadWhisper();
        if (state.lineWidthPreview.bridging && !state.lineWidthPreview.active) {
          if (shouldHoldBridgedLinePreview(screenFontSize)) {
            updateLineWidthPreviewGhost({ bridge: true });
          } else {
            clearLineWidthPreview({ keepOverlay: true });
          }
        }
        clearRenderWhisper({ delay: 160, kind: 'nah' });
      }, delay);
    }

    async function rebuildLayout({ fitView = false, guard = null, viewTransition = null, initialCircleViewportFraction = null } = {}) {
      if (guard && !guard()) return;

      const layoutRevision = ++state.layoutBuildRevision;
      const activeGuard = () => layoutRevision === state.layoutBuildRevision && (!guard || guard());

      resetProgressiveRefinement();
      cancelNahRender();

      const cacheKey = getShapeRenderCacheKey();
      const cachedRender = shapeRenderCache.get(cacheKey);
      if (cachedRender) {
        if (!activeGuard()) return;
        setRenderWhisper('holt cache', 'layout');

        const forceNah = !!cachedRender.layout.meta?.forceNah;
        if (!forceNah && !hasTextureCanvas(cachedRender.fernTexture)) {
          const fernTexture = await ensurePreparedFernTexture(cachedRender, { guard: activeGuard });
          if (!fernTexture || !activeGuard()) {
            clearRenderWhisper({ kind: 'layout' });
            return;
          }
        }

        applyPreparedShapeRender(cachedRender, { fitView, viewTransition, initialCircleViewportFraction });
        clearRenderWhisper({ delay: 120, kind: 'layout' });
        return;
      }

      setRenderWhisper('ordnet und webt', 'layout');
      await nextPaint();
      if (!activeGuard()) {
        clearRenderWhisper({ kind: 'layout' });
        return;
      }

      const prepared = await prepareShapeRender({
        guard: activeGuard,
        fitView,
        initialCircleViewportFraction
      });
      if (!prepared || !activeGuard()) {
        clearRenderWhisper({ kind: 'layout' });
        return;
      }

      shapeRenderCache.set(cacheKey, prepared);
      applyPreparedShapeRender(prepared, { fitView, viewTransition, initialCircleViewportFraction });
      clearRenderWhisper({ delay: 220, kind: 'layout' });
    }

    function setupEvents() {
      const { container } = elements;

      container.addEventListener('mousedown', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        beginScenePan(e.clientX, e.clientY);
      });

      window.addEventListener('mousemove', e => {
        maybeBeginDropBibleMousePan(e.clientX, e.clientY, e.buttons);
        updateScenePan(e.clientX, e.clientY);
      });

      window.addEventListener('mouseup', () => {
        handleDropBibleMouseUp();
        endSceneInteraction();
      });

      container.addEventListener('wheel', e => {
        e.preventDefault();
        if (typeof karussellScrolling !== 'undefined' && karussellScrolling) return;

        const viewport = getViewportMetrics();

        const screenX = e.clientX - viewport.clientCenterX;
        const screenY = e.clientY - viewport.clientCenterY;
        const worldUnderMouse = {
          x: state.focusWorld.x + screenX / state.scale,
          y: state.focusWorld.y + screenY / state.scale
        };
        const factor = 1 + (e.deltaY > 0 ? -CONFIG.ZOOM.speed : CONFIG.ZOOM.speed);
        const newScale = clamp(state.scale * factor, CONFIG.ZOOM.min, CONFIG.ZOOM.max);

        if (newScale === state.scale) return;
        noteViewInteraction({ cancelNahRender: false, isUserGesture: true });
        state.scale = newScale;
        state.focusWorld.x = worldUnderMouse.x - screenX / state.scale;
        state.focusWorld.y = worldUnderMouse.y - screenY / state.scale;
        syncViewportResponsiveScaleState();
        applyTransform();
      }, { passive: false });

      container.addEventListener('touchstart', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        e.preventDefault();

        if (e.touches.length === 1) {
          beginScenePan(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2) {
          beginScenePinch(e.touches);
        }
      }, { passive: false });

      container.addEventListener('touchmove', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        e.preventDefault();

        if (e.touches.length === 1 && state.drag.active) {
          updateScenePan(e.touches[0].clientX, e.touches[0].clientY);
        } else if (e.touches.length === 2) {
          updateScenePinch(e.touches);
        }
      }, { passive: false });

      container.addEventListener('touchend', e => {
        if (isDropBibleOverlayTarget(e.target)) return;
        if (e.touches.length === 0) {
          endSceneInteraction();
        } else if (e.touches.length === 1) {
          state.drag.active = true;
          state.drag.lastX = e.touches[0].clientX;
          state.drag.lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2) {
          syncScenePinchState(e.touches);
        }
      });

      window.addEventListener('resize', () => {
        noteViewInteraction({ cancelNahRender: false });
        if (maybeRefreshAutoFitViewportPlacement()) {
	          syncViewportResponsiveScaleState({ initialCircleViewportFraction: state.viewAutoFit.initialCircleViewportFraction });
          syncPanelPlacementAnchor();
          return;
        }
	        applyViewportResponsiveScaleOnResize();
        syncPanelPlacementAnchor();
        applyTransform();
      });
    }

    let eventsInitialized = false;
    const DROP_BIBLE_TRIGGER_FILE = '__drop_bible__';
    const DROP_BIBLE_TRIGGER_NAME = 'upload your own bible';
    const DEFAULT_DROP_BIBLE_LABEL = 'drop bible txt';
    const INVALID_DROP_BIBLE_HINT = 'only .txt files possible. If you want support for more fileformats, pls contribute to the project on github.com/0nefinity/0nefinity.love';
    const textCache = new Map();
    const rawTextCache = new Map();
    const bibleMetaCache = new Map();
    const remixUnitCache = new Map();
    const remixDocumentCache = new Map();
    const shapeRenderCache = new Map();
    const uploadedBibleStore = new Map();
    const ENABLE_TEXT_PRELOAD = false;
    let currentLoadId = 0;
    let activeDocumentLoadController = null;
    let uploadedBibleSequence = 0;
    let dropBibleDragDepth = 0;
    let dropBibleFeedbackTimeout = 0;
    const DROP_BIBLE_GESTURE = {
      tapMovePx: 12,
      tapMaxMs: 280,
      doublePressMs: 320,
      doublePressMovePx: 22
    };
    let dropBiblePressStartX = 0;
    let dropBiblePressStartY = 0;
    let dropBiblePressStartedAt = 0;
    let dropBibleLastMouseClickAt = 0;
    let dropBibleLastMouseClickX = 0;
    let dropBibleLastMouseClickY = 0;
    let dropBiblePendingMousePickerTimeout = 0;
    let dropBibleMousePressActive = false;
    let dropBibleMouseSecondPress = false;
    let dropBibleSuppressNextClick = false;
    let dropBibleSuppressClickTimeout = 0;
    let dropBibleTouchMode = 'idle';

    function getPointDistance(x1, y1, x2, y2) {
      return Math.hypot(x1 - x2, y1 - y2);
    }

    function clearDropBiblePendingMousePicker() {
      if (!dropBiblePendingMousePickerTimeout) return;
      clearTimeout(dropBiblePendingMousePickerTimeout);
      dropBiblePendingMousePickerTimeout = 0;
    }

    function suppressDropBibleNextClick(durationMs = 450) {
      dropBibleSuppressNextClick = true;
      if (dropBibleSuppressClickTimeout) {
        clearTimeout(dropBibleSuppressClickTimeout);
      }
      dropBibleSuppressClickTimeout = window.setTimeout(() => {
        dropBibleSuppressNextClick = false;
        dropBibleSuppressClickTimeout = 0;
      }, durationMs);
    }

    function queueDropBibleMousePicker() {
      clearDropBiblePendingMousePicker();
      dropBiblePendingMousePickerTimeout = window.setTimeout(() => {
        dropBiblePendingMousePickerTimeout = 0;
        openUploadBiblePicker();
      }, DROP_BIBLE_GESTURE.doublePressMs);
    }

    function maybeBeginDropBibleMousePan(clientX, clientY, buttons = 1) {
      if (!dropBibleMousePressActive || state.drag.active || !(buttons & 1)) return false;
      const moved = getPointDistance(clientX, clientY, dropBiblePressStartX, dropBiblePressStartY);
      if (moved <= DROP_BIBLE_GESTURE.tapMovePx) return false;
      clearDropBiblePendingMousePicker();
      suppressDropBibleNextClick();
      beginScenePan(clientX, clientY);
      return true;
    }

    function handleDropBibleMouseDown(event) {
      if (event.button !== 0) return;
      resetUploadZoneFeedback();

      const now = performance.now();
      const isSecondPress = dropBiblePendingMousePickerTimeout > 0
        && now - dropBibleLastMouseClickAt <= DROP_BIBLE_GESTURE.doublePressMs
        && getPointDistance(event.clientX, event.clientY, dropBibleLastMouseClickX, dropBibleLastMouseClickY) <= DROP_BIBLE_GESTURE.doublePressMovePx;

      dropBibleMousePressActive = true;
      dropBibleMouseSecondPress = isSecondPress;
      if (isSecondPress) {
        event.preventDefault();
        clearDropBiblePendingMousePicker();
      }

      dropBiblePressStartX = event.clientX;
      dropBiblePressStartY = event.clientY;
      dropBiblePressStartedAt = now;
    }

    function handleDropBibleMouseClick(event) {
      event.stopPropagation();

      if (dropBibleSuppressNextClick) {
        event.preventDefault();
        dropBibleSuppressNextClick = false;
        if (dropBibleSuppressClickTimeout) {
          clearTimeout(dropBibleSuppressClickTimeout);
          dropBibleSuppressClickTimeout = 0;
        }
        return;
      }

      if (dropBibleMouseSecondPress) {
        event.preventDefault();
        dropBibleMouseSecondPress = false;
        return;
      }

      const elapsed = performance.now() - dropBiblePressStartedAt;
      const moved = getPointDistance(event.clientX, event.clientY, dropBiblePressStartX, dropBiblePressStartY);
      if (elapsed > DROP_BIBLE_GESTURE.tapMaxMs || moved > DROP_BIBLE_GESTURE.tapMovePx) {
        event.preventDefault();
        return;
      }

      event.preventDefault();
      dropBibleLastMouseClickAt = performance.now();
      dropBibleLastMouseClickX = event.clientX;
      dropBibleLastMouseClickY = event.clientY;
      queueDropBibleMousePicker();
    }

    function handleDropBibleDoubleClick(event) {
      event.preventDefault();
      event.stopPropagation();
    }

    function handleDropBibleMouseUp() {
      dropBibleMousePressActive = false;
      if (!state.drag.active) {
        dropBibleMouseSecondPress = false;
      }
    }

    function handleDropBibleTouchStart(event) {
      event.preventDefault();
      event.stopPropagation();
      resetUploadZoneFeedback();
