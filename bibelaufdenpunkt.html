        while (safeEnd > safeStart && text.charCodeAt(safeEnd - 1) === 32) safeEnd -= 1;
        if (safeEnd <= safeStart) return;

        const preview = text.slice(safeStart, Math.min(safeEnd, safeStart + 48));
        units.push({
          start: safeStart,
          end: safeEnd,
          sortKey: getAlphabeticSortKey(preview)
        });
      };

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        if (!punctuation.has(char)) continue;

        let end = index + 1;
        while (end < text.length && text.charCodeAt(end) === 32) end += 1;
        pushSentence(start, end);
        start = end;
      }

      if (start < text.length) {
        pushSentence(start, text.length);
      }

      return units;
    }

    function getRemixSourceSignature(file, text) {
      const meta = getBibleMeta(file);
      return meta?.cacheKey || getDocumentCacheKey(meta, text);
    }

    function getRemixSpanText(source, span) {
      return source.text.slice(span.start, span.end);
    }

    function ensurePreparedRemixUnitArray(source) {
      if (!source?.unitData) return [];
      if (source.unitData.kind === 'text' || source.unitData.kind === 'char') return [];
      if (Array.isArray(source.unitData.units) && source.unitData.units.length) {
        source.unitData.unitCount = source.unitData.units.length;
        source.unitCount = source.unitData.units.length;
        return source.unitData.units;
      }

      const rebuiltUnits = source.unitData.kind === 'sentence'
        ? collectSentenceUnits(source.text)
        : collectWordUnits(source.text);

      source.unitData.units = rebuiltUnits;
      source.unitData.unitCount = rebuiltUnits.length;
      source.unitCount = rebuiltUnits.length;
      return rebuiltUnits;
    }

    async function getPreparedRemixSources(recipe = getRemixRecipe(), { guard = null, signal = null } = {}) {
      const prepared = [];

      for (const source of recipe.sources) {
        throwIfDocumentLoadAborted({ guard, signal });
        const text = await fetchBibleText(source.file, { guard, signal });
        const signature = getRemixSourceSignature(source.file, text);
        const unitCacheKey = `${signature}::${recipe.unitMode}`;
        let unitData = remixUnitCache.get(unitCacheKey);

        if (!unitData) {
          if (recipe.unitMode === 'text') {
            unitData = {
              kind: 'text',
              unitCount: text ? 1 : 0,
              sortKey: getAlphabeticSortKey(text.slice(0, 48))
            };
          } else if (recipe.unitMode === 'sentence') {
            unitData = {
              kind: 'sentence',
              unitCount: 0,
              units: collectSentenceUnits(text)
            };
            unitData.unitCount = unitData.units.length;
          } else if (recipe.unitMode === 'char') {
            unitData = {
              kind: 'char',
              unitCount: text.length
            };
          } else {
            unitData = {
              kind: 'word',
              unitCount: 0,
              units: collectWordUnits(text)
            };
            unitData.unitCount = unitData.units.length;
          }

          remixUnitCache.set(unitCacheKey, unitData);
        }

        prepared.push({
          ...source,
          text,
          unitData,
          unitCount: unitData.unitCount || 0
        });

        if (prepared.length % 2 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) throw createDocumentLoadAbortError();
        }
      }

      return prepared;
    }

    function resolveVirtualRemixUnit(preparedSources, virtualIndex) {
      let offset = virtualIndex;

      for (const source of preparedSources) {
        const span = source.unitCount * source.count;
        if (offset < span) {
          if (source.unitData.kind === 'text') {
            return { source, unitIndex: 0 };
          }

          return {
            source,
            unitIndex: source.unitCount > 0 ? (offset % source.unitCount) : 0
          };
        }

        offset -= span;
      }

      return null;
    }

    function getPreparedRemixUnitValue(source, unitIndex) {
      if (source.unitData.kind === 'text') return source.text;
      if (source.unitData.kind === 'char') return source.text.charAt(unitIndex);

      const units = ensurePreparedRemixUnitArray(source);
      if (!units.length) return source.text || '';

      const safeIndexRaw = Number.isFinite(unitIndex) ? unitIndex : 0;
      const safeIndex = ((Math.floor(safeIndexRaw) % units.length) + units.length) % units.length;
      const span = units[safeIndex];
      if (!span) return source.text || '';

      return getRemixSpanText(source, span);
    }

    function buildChunkedString(parts, joiner) {
      if (!parts.length) return '';
      const chunks = [];
      for (let index = 0; index < parts.length; index += 512) {
        chunks.push(parts.slice(index, index + 512).join(joiner));
      }
      return chunks.join(joiner);
    }

    async function buildRandomCharRemixText(preparedSources, recipe, { guard = null, signal = null } = {}) {
      const totalUnits = preparedSources.reduce((sum, source) => sum + (source.unitCount * source.count), 0);
      if (totalUnits <= 0) return '';

      const permutation = createAffinePermutationParams(totalUnits, recipe.randomSeed >>> 0);
      const chunks = [];
      let chunk = '';

      for (let outputIndex = 0; outputIndex < totalUnits; outputIndex += 1) {
        throwIfDocumentLoadAborted({ guard, signal });
        const shuffledIndex = permuteAffineIndex(outputIndex, totalUnits, permutation);
        const resolved = resolveVirtualRemixUnit(preparedSources, shuffledIndex);
        chunk += resolved ? getPreparedRemixUnitValue(resolved.source, resolved.unitIndex) : '';

        if ((outputIndex + 1) % 8192 === 0) {
          chunks.push(chunk);
          chunk = '';
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) throw createDocumentLoadAbortError();
        }
      }

      if (chunk) chunks.push(chunk);
      return chunks.join('');
    }

    async function buildRandomRemixText(preparedSources, recipe, { guard = null, signal = null } = {}) {
      const totalUnits = preparedSources.reduce((sum, source) => sum + (source.unitCount * source.count), 0);
      if (totalUnits <= 0) return '';

      if (recipe.unitMode === 'char') {
        return buildRandomCharRemixText(preparedSources, recipe, { guard, signal });
      }

      const joiner = recipe.unitMode === 'char' ? '' : ' ';
      const permutation = createAffinePermutationParams(totalUnits, recipe.randomSeed >>> 0);
      const parts = new Array(totalUnits);

      for (let outputIndex = 0; outputIndex < totalUnits; outputIndex += 1) {
        throwIfDocumentLoadAborted({ guard, signal });
        const shuffledIndex = permuteAffineIndex(outputIndex, totalUnits, permutation);
        const resolved = resolveVirtualRemixUnit(preparedSources, shuffledIndex);
        parts[outputIndex] = resolved ? getPreparedRemixUnitValue(resolved.source, resolved.unitIndex) : '';

        if ((outputIndex + 1) % 2048 === 0 && outputIndex + 1 < totalUnits) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) throw createDocumentLoadAbortError();
        }
      }

      return buildChunkedString(parts, joiner);
    }

    async function buildAlphabeticTextRemix(preparedSources, recipe, { guard = null, signal = null } = {}) {
      const items = [];
      let index = 0;

      for (const source of preparedSources) {
        throwIfDocumentLoadAborted({ guard, signal });
        for (let copy = 0; copy < source.count; copy += 1) {
          items.push({
            sortKey: source.unitData.sortKey,
            value: source.text,
            index: index += 1
          });

          if (index % 128 === 0) {
            const canContinue = await yieldToUrgentUi(guard);
            if (!canContinue) throw createDocumentLoadAbortError();
          }
        }
      }

      items.sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));
      return buildChunkedString(items.map(item => item.value), ' ');
    }

    async function buildAlphabeticSentenceRemix(preparedSources, recipe, { guard = null, signal = null } = {}) {
      const items = [];
      let index = 0;

      for (const source of preparedSources) {
        throwIfDocumentLoadAborted({ guard, signal });
        const units = ensurePreparedRemixUnitArray(source);
        for (const span of units) {
          const value = getRemixSpanText(source, span);
          for (let copy = 0; copy < source.count; copy += 1) {
            items.push({
              sortKey: span.sortKey,
              value,
              index: index += 1
            });

            if (index % 512 === 0) {
              const canContinue = await yieldToUrgentUi(guard);
              if (!canContinue) throw createDocumentLoadAbortError();
            }
          }
        }
      }

      items.sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));
      return buildChunkedString(items.map(item => item.value), ' ');
    }

    async function buildAlphabeticWordRemix(preparedSources, recipe, { guard = null, signal = null } = {}) {
      const wordCounts = new Map();
      let processedWords = 0;

      for (const source of preparedSources) {
        throwIfDocumentLoadAborted({ guard, signal });
        const units = ensurePreparedRemixUnitArray(source);
        for (const span of units) {
          const value = getRemixSpanText(source, span);
          const existing = wordCounts.get(value) || { count: 0, sortKey: span.sortKey };
          existing.count += source.count;
          wordCounts.set(value, existing);
          processedWords += 1;

          if (processedWords % 2048 === 0) {
            const canContinue = await yieldToUrgentUi(guard);
            if (!canContinue) throw createDocumentLoadAbortError();
          }
        }
      }

      const items = Array.from(wordCounts.entries())
        .map(([value, meta], index) => ({ value, count: meta.count, sortKey: meta.sortKey, index }))
        .sort((a, b) => compareAlphabeticItems(a, b, recipe.sortDirection));

      const parts = [];
      for (const item of items) {
        for (let copy = 0; copy < item.count; copy += 1) {
          parts.push(item.value);
        }

        if (parts.length % 4096 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) throw createDocumentLoadAbortError();
        }
      }

      return buildChunkedString(parts, ' ');
    }

    async function buildAlphabeticCharRemix(preparedSources, recipe, { guard = null, signal = null } = {}) {
      const charCounts = new Map();
      let processedChars = 0;
      const includeSpaces = recipe.includeSpaces !== false;

      for (const source of preparedSources) {
        throwIfDocumentLoadAborted({ guard, signal });
        for (const char of source.text) {
          if (!includeSpaces && /\s/u.test(char)) continue;
          charCounts.set(char, (charCounts.get(char) || 0) + source.count);

          processedChars += 1;
          if (processedChars % 8192 === 0) {
            const canContinue = await yieldToUrgentUi(guard);
            if (!canContinue) throw createDocumentLoadAbortError();
          }
        }
      }

      const items = Array.from(charCounts.entries())
        .map(([value, count], index) => ({ value, count, sortKey: getAlphabeticSortKey(value), index }))
        .sort((a, b) => compareAlphabeticChars(a, b, recipe.sortDirection));

      const parts = [];
      for (let index = 0; index < items.length; index += 1) {
        const item = items[index];
        parts.push(item.value.repeat(item.count));
        if ((index + 1) % 64 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) throw createDocumentLoadAbortError();
        }
      }

      return parts.join('');
    }

    function createRemixDocumentFromText(text, recipe = getRemixRecipe()) {
      const recipeKey = getRemixRecipeKey(recipe);
      const analysis = analyzeBibleText(text);
      const meta = {
        ...analysis,
        file: REMIX_DOCUMENT_FILE,
        name: getRemixSummaryLabel(Object.fromEntries(recipe.sources.map(source => [source.file, source.count]))),
        cacheKey: `remix:${recipeKey}`,
        kind: 'remix',
        selectionKey: `remix:${recipeKey}`,
        recipeKey,
        recipe,
        sourceCount: recipe.sources.length
      };

      return { text, meta, recipeKey };
    }

    async function buildRemixDocument(recipe = getRemixRecipe(), { guard = null, signal = null } = {}) {
      throwIfDocumentLoadAborted({ guard, signal });
      const recipeKey = getRemixRecipeKey(recipe);
      if (remixDocumentCache.has(recipeKey)) {
        return remixDocumentCache.get(recipeKey);
      }

      const preparedSources = await getPreparedRemixSources(recipe, { guard, signal });
      throwIfDocumentLoadAborted({ guard, signal });
      let text = '';

      if (recipe.sortMode === 'alphabetic') {
        if (recipe.unitMode === 'text') {
          text = await buildAlphabeticTextRemix(preparedSources, recipe, { guard, signal });
        } else if (recipe.unitMode === 'sentence') {
          text = await buildAlphabeticSentenceRemix(preparedSources, recipe, { guard, signal });
        } else if (recipe.unitMode === 'char') {
          text = await buildAlphabeticCharRemix(preparedSources, recipe, { guard, signal });
        } else {
          text = await buildAlphabeticWordRemix(preparedSources, recipe, { guard, signal });
        }
      } else {
        text = await buildRandomRemixText(preparedSources, recipe, { guard, signal });
      }

      throwIfDocumentLoadAborted({ guard, signal });

      const document = createRemixDocumentFromText(text, recipe);
      remixDocumentCache.set(recipeKey, document);

      while (remixDocumentCache.size > 6) {
        const oldestKey = remixDocumentCache.keys().next().value;
        remixDocumentCache.delete(oldestKey);
      }

      return document;
    }

    async function fetchBibleText(filename, { signal = null, guard = null } = {}) {
      throwIfDocumentLoadAborted({ guard, signal });

      if (filename === LOREM_BIBLE_FILE) {
        const wordCount = clampLoremWordCount(state.lorem.wordCount);
        const text = generateLoremIpsumText(wordCount);
        buildLoremBibleMeta(text, wordCount);
        return text;
      }

      if (uploadedBibleStore.has(filename)) {
        return uploadedBibleStore.get(filename).text;
      }

      if (textCache.has(filename)) return textCache.get(filename);

      const rawText = await fetchBibleOriginalText(filename, { signal, guard });
      throwIfDocumentLoadAborted({ guard, signal });
      const text = normalizeBibleText(rawText);
      textCache.set(filename, text);

      if (!bibleMetaCache.has(filename)) {
        rememberBibleMeta(filename, {
          ...analyzeBibleText(text),
          rawCharCount: rawText.length
        });
      }

      return text;
    }

      if (!ENABLE_TEXT_PRELOAD) return;
      for (const bible of bibles) {

          if (textCache.has(bible.file)) continue;
          await fetchBibleText(bible.file);
          LOG.info(`text vorgeladen: ${bible.name}`);

      if (state.remix.unitMode !== 'text') return true;

    function applyRemixDocumentState(document) {

      state.documentCacheKey = document.meta.cacheKey;
      state.renderWhisper.pendingDocumentKey = document.meta.cacheKey;
      preserveLineWidthCharsForDocumentChange(previousTextLength, document.meta?.charCount || document.text?.length || 0);

    function sanitizeTxtDownloadName(value, fallback = 'text') {
      const base = String(value || '').trim() || fallback;
      const sanitized = base
        .replace(/\.txt$/i, '')
        .replace(/[<>:"/\\|?*]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\.+$/g, '');
      return `${sanitized || fallback}.txt`;
    }

    function getCurrentDocumentDownloadName() {
      return sanitizeTxtDownloadName(
        state.documentMeta?.sourceFileName
          || state.documentMeta?.name
          || getCurrentKarussellBibleEntry()?.name
          || 'text'
      );
    }

    function downloadTextAsTxt(text, filename = 'text.txt') {
      if (!text) return;
      const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
      const objectUrl = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = objectUrl;
      link.download = sanitizeTxtDownloadName(filename);
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(objectUrl), 0);
    }

    async function fetchBibleOriginalText(filename, { signal = null, guard = null } = {}) {
      throwIfDocumentLoadAborted({ guard, signal });

      if (filename === LOREM_BIBLE_FILE) {
        return generateLoremIpsumText(clampLoremWordCount(state.lorem.wordCount));
      }

      if (uploadedBibleStore.has(filename)) {
        const uploadedEntry = uploadedBibleStore.get(filename);
        return uploadedEntry?.rawText ?? uploadedEntry?.text ?? '';
      }

      if (rawTextCache.has(filename)) return rawTextCache.get(filename);

      const response = await fetch(`/assets/bibeln/${filename}?raw=1`, signal ? { signal } : undefined);
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const rawText = await response.text();
      throwIfDocumentLoadAborted({ guard, signal });
      rawTextCache.set(filename, rawText);
      return rawText;
    }

      const button = getSaveRemixButtonEl();

	        button.dataset.baseLabel = button.textContent || 'save';
      }

      const token = String(Date.now());
      button.dataset.toastToken = token;
      button.textContent = message;
      button.classList.add('is-success');

      window.setTimeout(() => {

    function syncShapeControls() {
      if (!shapePanel) return;
      const currentEntry = getCurrentKarussellBibleEntry();
      const isLine = state.shape.type === 'line';
      const remixActive = isRemixModeEnabled();
      const remixCounts = getActiveRemixCounts();
      const remixUsesLorem = !!remixCounts[LOREM_BIBLE_FILE];
      const isGeneratedLorem = remixActive ? remixUsesLorem : isGeneratedLoremEntry(currentEntry);
      const hasMahabharataToggle = hasMahabharataSwapOption() && (
        remixActive
          ? hasSelectedMahabharataRemixSource(remixCounts)
          : isMahabharataSwapEntry(currentEntry)
      );
      normalizeBlendTuning();
      normalizeLineWidthCharsState();
      shapePanel.set('remixEnabled', remixActive);
      shapePanel.set('documentName', getCurrentEditableDocumentName());
      shapePanel.set('remixUnit', state.remix.unitMode);
      shapePanel.set('remixSort', state.remix.sortMode);
      shapePanel.set('remixIncludeSpaces', state.remix.includeSpaces !== false);
      shapePanel.setCountPickerOptions('remixSources', getRemixSourceEntries().map(entry => ({
        value: entry.file,
        label: entry.name
      })), remixCounts);
      shapePanel.set('remixSources', remixCounts);
      shapePanel.set('shapeType', state.shape.type);
      shapePanel.set('unlockFullMahabharata', state.libraryUnlocks.fullMahabharata);
      shapePanel.setSliderConfig('lineWidthChars', {
        min: CONFIG.SHAPES.minLineWidthChars,
        max: getLineWidthCharLimit()
      });
      shapePanel.set('lineWidthChars', state.shape.lineWidthChars);
      shapePanel.set('loremWordCount', state.lorem.wordCount);
      shapePanel.setRowVisibility('remixUnit', remixActive);
      shapePanel.setRowVisibility('remixSort', remixActive);
      shapePanel.setRowVisibility('remixIncludeSpaces', remixActive && state.remix.sortMode === 'alphabetic' && state.remix.unitMode === 'char');
      shapePanel.setRowVisibility('remixSources', remixActive);
      shapePanel.setRowVisibility('documentName', !!currentEntry || remixActive || !!state.textData);
      shapePanel.setRowVisibility('unlockFullMahabharata', hasMahabharataToggle);
      shapePanel.setRowVisibility('lineWidthChars', isLine);
      shapePanel.setRowVisibility('loremWordCount', isGeneratedLorem);

      if (shapePanelEls?.saveRemixButton) {
        shapePanelEls.saveRemixButton.style.display = shouldShowInternalSaveButton() ? '' : 'none';
      }
      if (shapePanelEls?.downloadCurrentTextButton) {
        shapePanelEls.downloadCurrentTextButton.style.display = state.textData ? '' : 'none';
      }

      if (shapePanelEls?.remixRerollButton) {
        shapePanelEls.remixRerollButton.style.display = remixActive && state.remix.sortMode === 'random' && hasMeaningfulRandomRemix() ? '' : 'none';
      }
      if (shapePanelEls?.remixSortAscButton && shapePanelEls?.remixSortDescButton) {
        const showDirection = remixActive && state.remix.sortMode === 'alphabetic' && hasMeaningfulAlphabeticRemix();
        shapePanelEls.remixSortAscButton.style.display = showDirection ? '' : 'none';
        shapePanelEls.remixSortDescButton.style.display = showDirection ? '' : 'none';
        shapePanelEls.remixSortAscButton.style.opacity = state.remix.sortDirection === 'asc' ? '1' : '0.58';
        shapePanelEls.remixSortDescButton.style.opacity = state.remix.sortDirection === 'desc' ? '1' : '0.58';
      }

      syncRemixBibleSelectionUi();
      updateLineWidthReadout();
      updateDocumentStatsReadout();
	      refreshMobileShapePanelOpenState();
	      schedulePanelSafeAreaRealign();
    }

    function scheduleLoremBibleRebuild(delay = LOREM_REBUILD_DEBOUNCE_MS) {
      if (state.lorem.rebuildTimeout) {
        clearTimeout(state.lorem.rebuildTimeout);
      }

      clearTimeout(loadBibleTimeout);
      loadBibleTimeout = null;

      state.lorem.rebuildTimeout = setTimeout(() => {
        state.lorem.rebuildTimeout = null;
        const activeEntry = getCurrentKarussellBibleEntry();
        const shouldReloadSingleLorem = !isRemixModeEnabled() && isGeneratedLoremEntry(activeEntry);
        const shouldReloadRemixLorem = isRemixModeEnabled() && !!getActiveRemixCounts()[LOREM_BIBLE_FILE];
        if (!shouldReloadSingleLorem && !shouldReloadRemixLorem) return;
        scheduleCurrentDocumentLoad(0);
      }, delay);
    }

    function scheduleShapeRebuild({ fitView = false, delay = 60 } = {}) {
      clearTimeout(state.shapeRefreshTimeout);
      setRenderWhisper('ordnet neu', 'layout');
      state.shapeRefreshTimeout = setTimeout(() => {
        rebuildLayout({ fitView });
      }, delay);
    }

    function setupViewportObserver() {
      if (viewportResizeObserver || typeof ResizeObserver === 'undefined') return;
      viewportResizeObserver = new ResizeObserver(() => {
        cancelAnimationFrame(viewportResizeFrame);
        viewportResizeFrame = requestAnimationFrame(() => {
          if (!state.textData) return;
          noteViewInteraction({ cancelNahRender: false });
	          if (maybeRefreshAutoFitViewportPlacement()) {
	            syncViewportResponsiveScaleState({ initialCircleViewportFraction: state.viewAutoFit.initialCircleViewportFraction });
	            syncPanelPlacementAnchor();
	            return;
	          }
	          applyViewportResponsiveScaleOnResize();
	          syncPanelPlacementAnchor();
          applyTransform();
        });
      });
      viewportResizeObserver.observe(elements.container);
    }

	    function schedulePanelSafeAreaRealign() {
	      cancelAnimationFrame(mobilePanelLayoutFrame);
	      mobilePanelLayoutFrame = requestAnimationFrame(() => {
	        mobilePanelLayoutFrame = 0;
	        if (!shiftShapeWithPanelSafeAreaDelta()) return;
        noteViewInteraction({ cancelNahRender: false });
	        applyTransform();
	      });
	    }

	    function refreshMobileShapePanelOpenState() {
	      if (!shapePanel?._refreshMobileSheetLayout || !isMobileViewport()) return;
	      requestAnimationFrame(() => {
	        shapePanel?._refreshMobileSheetLayout?.({ animate: false });
	      });
	    }

	    function reorderShapePanelRows() {
	      if (!shapePanel?.bodyEl) return;

      const desiredOrder = [
	        'documentName',
	        'shapeType',
	        'lineWidthChars',
	        'remixEnabled',
	        'remixSources',
	        'remixSort',
	        'remixUnit',
	        'remixIncludeSpaces',
	        'unlockFullMahabharata',
	        'loremWordCount',
        'charCountStatus'
	      ];

	      const orderedRows = desiredOrder
	        .map(key => shapePanel.bodyEl.querySelector(`[data-key="${key}"]`))
	        .filter(Boolean);
	      const remainingRows = Array.from(shapePanel.bodyEl.children)
	        .filter(row => !orderedRows.includes(row));

	      [...orderedRows, ...remainingRows].forEach(row => shapePanel.bodyEl.appendChild(row));
	    }

    function setupShapeControls() {
      if (shapePanel) {
	      ensureShapePanelHeaderActionButtons();
	      reorderShapePanelRows();
	      syncShapeControls();
	      refreshMobileShapePanelOpenState();
        return;
      }

      shapePanel = Controls.createPanel({
        id: 'bibelpunkt-spellbook',
	        position: 'left',
	        mobileCanvasOcclusion: false
      });
	      ensureShapePanelHeaderActionButtons();

	      shapePanel.el?.addEventListener('ctrl-panel-layout-change', () => {
	        schedulePanelSafeAreaRealign();
	      });

	      shapePanel.el?.addEventListener('ctrl-panel-drag-move', () => {
	        schedulePanelSafeAreaRealign();
	      });

	      shapePanel.el?.addEventListener('ctrl-panel-drag-end', () => {
	        schedulePanelSafeAreaRealign();
	      });

      shapePanel
        .addToggle('remixEnabled', {
          label: 'remix your bibles',
          value: isRemixModeEnabled(),
          onChange: value => {
            void (async () => {
              if (isRemixModeEnabled() === !!value) return;
              if (!value && !(await confirmDiscardOrSaveUnsavedRemix())) {
                shapePanel?.set('remixEnabled', true);
                return;
              }

              const currentEntry = getCurrentKarussellBibleEntry();
              state.remix.enabled = !!value;
              if (value) {
                if (currentEntry?.recipe) {
                  state.remix = {
                    ...createRemixStateFromRecipe(currentEntry.recipe, {
                      baseFile: currentEntry.file,
                      enabled: true,
                      nameDraft: currentEntry.name,
                      nameTouched: false
                    }),
                    enabled: true
                  };
                } else {
                  resetRemixStateToDefault({
                    preferredFile: currentEntry?.file || state.documentMeta?.file || getPreferredRemixSourceFile()
                  });
                  state.remix.enabled = true;
                }
              }

              rebuildVisibleBibleList({ preserveFile: currentEntry?.file || state.remix.baseFile || '' });
              updateKarussell();
              syncShapeControls();
              if (!value || !state.textData || !state.renderWhisper.pendingLoadId) {
                if (value && currentEntry && doesBibleEntryRepresentRecipe(currentEntry, getRemixRecipe())) return;
                if (value && applyCurrentSingleTextAsDefaultRemix()) return;
                scheduleCurrentDocumentLoad(0);
              }
            })();
          }
        })
        .addInput('documentName', {

          value: getCurrentEditableDocumentName(),
          placeholder: 'name',
          onChange: value => {
            const normalized = getNormalizedEditableName(value, getCurrentEditableDocumentName());
            const directEntry = getDirectDocumentEntryForCurrentUi();

            if (directEntry && !isLiveRemixPreviewEntry(directEntry)) {
              renameBibleEntry(directEntry.file, normalized);

        .addCountPicker('remixSources', {

          options: getRemixSourceEntries().map(entry => ({ value: entry.file, label: entry.name })),

          summaryFormatter: getRemixControlSummary,
          emptyLabel: 'keine bibeln',
          emptyPopupLabel: 'keine bibeln',
          onChange: value => {
            state.remix.countsByFile = normalizeRemixCounts(value);

            remixDocumentCache.clear();
            refreshRemixKarussellPreview();
            syncRemixBibleSelectionUi();
            if (isRemixModeEnabled()) scheduleCurrentDocumentLoad(80);
          }
        })
        .addSelect('remixSort', {
          label: 'sortierung',

              state.remix.randomSeed = createRandomSeed();

            refreshRemixKarussellPreview();
            syncShapeControls();

          }

        .addSelect('remixUnit', {
          label: 'objekte',
          value: state.remix.unitMode,
          options: [
            { value: 'text', label: 'text' },

            { value: 'word', label: 'wörter' },

          ],
          onChange: value => {
            if (state.remix.unitMode === value) return;
            state.remix.unitMode = value;
            syncRemixNameDraftToRecipe();
            remixDocumentCache.clear();
            refreshRemixKarussellPreview();
            syncShapeControls();
            if (isRemixModeEnabled()) scheduleCurrentDocumentLoad(20);
          }
        })
        .addToggle('remixIncludeSpaces', {
          label: 'leerzeichen behalten',
          value: state.remix.includeSpaces !== false,
          onChange: value => {
            const nextValue = !!value;
            if ((state.remix.includeSpaces !== false) === nextValue) return;
            state.remix.includeSpaces = nextValue;
            remixDocumentCache.clear();
            refreshRemixKarussellPreview();
            syncShapeControls();
            if (isRemixModeEnabled()) scheduleCurrentDocumentLoad(20);
          }
        })
        .addToggle('unlockFullMahabharata', {
          label: FULL_MAHABHARATA_UNLOCK_LABEL,
          value: state.libraryUnlocks.fullMahabharata,
          onChange: value => {
            const enabled = !!value;
            if (state.libraryUnlocks.fullMahabharata === enabled) return;
            state.libraryUnlocks.fullMahabharata = enabled;
            const activeFile = getCurrentKarussellBibleEntry()?.file || state.documentMeta?.file || '';
            const nextFile = rebuildVisibleBibleList({ preserveFile: activeFile });
            state.remix.countsByFile = normalizeRemixCounts(state.remix.countsByFile);
            updateKarussell();
            if (isRemixModeEnabled()) {
              syncShapeControls();
              refreshRemixKarussellPreview({ preserveFile: nextFile || state.remix.baseFile || '' });
              scheduleCurrentDocumentLoad(0);
              return;

              scheduleCurrentDocumentLoad(0);
              return;

          }

          label: 'wortanzahl',
          min: 0,
          max: LOREM_DEFAULT_MAX_WORD_COUNT,
          step: 1,

          decimals: 0,
          onChange: value => {
            state.lorem.wordCount = clampLoremWordCount(value);
            shapePanel?.set('loremWordCount', state.lorem.wordCount);
            if (!isRemixModeEnabled() && !isGeneratedLoremEntry(getCurrentKarussellBibleEntry())) return;
            scheduleLoremBibleRebuild();
          }
        })
        .addSelect('shapeType', {
          label: 'gestalt',
          value: state.shape.type,
          options: [
            { value: 'circle', label: 'circle' },

            noteViewInteraction();
            clearLocalRenderLoadWhisper();

            state.shape.type = value;
            if (value === 'line' && previousShapeType !== 'line' && (!state.shape.lineWidthCustomized || state.shape.lineWidthChars <= CONFIG.SHAPES.minLineWidthChars)) {
              applyLineShapeDefaultWidth();
            }

            syncShapeControls();
            void (async () => {
              await nextPaint();
              await rebuildLayout({ fitView: true });
            })();
          }
        })
        .addSlider('lineWidthChars', {
          label: 'linienbreite',
          min: CONFIG.SHAPES.minLineWidthChars,
          max: getLineWidthCharLimit(),
          step: 1,
          value: state.shape.lineWidthChars,
          decimals: 0,
          transform: {
            toSliderValue: value => lineWidthCharsToSliderValue(value),
            fromSliderValue: value => sliderValueToLineWidthChars(value)
          },
          onChange: value => {
            noteViewInteraction();
            state.lineWidthPreview.revision += 1;
            state.shape.lineWidthCustomized = true;
            state.shape.lineWidthChars = clampLineWidthChars(value);
            updateLineWidthReadout();
            if (state.shape.type === 'line') {

      const remixSortRow = shapePanel.bodyEl.querySelector('[data-key="remixSort"]');

        remixActionGroup.style.flex = '0 0 auto';

        const rerollButton = document.createElement('button');
        rerollButton.type = 'button';
        rerollButton.className = 'ctrl-button';
        rerollButton.textContent = '🎲';

        rerollButton.addEventListener('click', () => {

        const sortAscButton = document.createElement('button');

          remixDocumentCache.clear();
          refreshRemixKarussellPreview();
          syncShapeControls();
          if (isRemixModeEnabled()) scheduleCurrentDocumentLoad(20);
        });

        const sortDescButton = document.createElement('button');
        sortDescButton.type = 'button';
        sortDescButton.className = 'ctrl-button';
        sortDescButton.textContent = '↓';
        sortDescButton.title = 'absteigend';
        sortDescButton.style.padding = '0 0.55rem';
        sortDescButton.addEventListener('click', () => {
          if (state.remix.sortDirection === 'desc') return;
          state.remix.sortDirection = 'desc';

          refreshRemixKarussellPreview();
          syncShapeControls();
          if (isRemixModeEnabled()) scheduleCurrentDocumentLoad(20);

        remixActionGroup.appendChild(rerollButton);
        remixActionGroup.appendChild(sortAscButton);
        remixActionGroup.appendChild(sortDescButton);
        remixSortWrap.appendChild(remixActionGroup);

      const charCountRow = document.createElement('div');
      charCountRow.className = 'ctrl-row';
      charCountRow.dataset.key = 'charCountStatus';
      charCountRow.innerHTML = `
        <label class="ctrl-label">zeichen</label>

        </div>
      `;

      shapePanelEls = {
        ...(shapePanelEls || {}),
        lineWidth: shapePanel.bodyEl.querySelector('[data-key="lineWidthChars"] .ctrl-range'),
        charCountStatus: charCountRow.querySelector('[data-char-count-status]')
      };

	      reorderShapePanelRows();
      syncShapeControls();

      const beginLineWidthInteraction = () => {
        clearLocalRenderLoadWhisper();
        state.lineWidthPreview.interacting = true;
        cancelLineWidthCommit();

      const endLineWidthInteraction = () => {
        state.lineWidthPreview.interacting = false;
        if (!state.lineWidthPreview.active || state.shape.type !== 'line') return;
        beginRenderLoadWhisper(getShapeLoadWhisperText('line'), { requiredLayoutRevision: state.layoutBuildRevision + 1 });
        scheduleLineWidthCommit(180);
      };

      shapePanelEls.lineWidth?.addEventListener('pointerdown', beginLineWidthInteraction);
      shapePanelEls.lineWidth?.addEventListener('pointerup', endLineWidthInteraction);
      shapePanelEls.lineWidth?.addEventListener('pointercancel', endLineWidthInteraction);
      shapePanelEls.lineWidth?.addEventListener('change', endLineWidthInteraction);
      shapePanelEls.lineWidth?.addEventListener('blur', endLineWidthInteraction);

    function clearActiveBibleScene({ preserveView = false } = {}) {
      cancelNahRender();
      resetProgressiveRefinement();
      state.activePreparedRender = null;
      state.textures.fern = createEmptyTextureState(CONFIG.FERN_TEXTURE);
      resetNahTexture();
      state.renderMode = 'fern';
      state.textData = '';
      state.documentCacheKey = '';
      state.documentMeta = null;
      state.documentSelectionKey = '';
      state.layout = createEmptyLayoutState();
      if (!preserveView) {
        updateNormalizeScale();
        state.focusWorld = { x: 0, y: 0 };
        state.scale = 1;
	        state.viewportResponsiveScale.zoomMultiplier = 1;
      }
      state.lineWidthPreview.active = false;
      state.lineWidthPreview.bridging = false;
      clearPresenceLayer();
      hideFernOverlay();
      hideNahOverlay();
      clearLineWidthGhostCanvas();
      elements.lineWidthGhost.style.display = 'none';
      elements.lineWidthGhost.style.opacity = '0';
      updateDocumentStatsReadout();
    }

    async function loadUploadTrigger({ loadId, viewTransition = null }) {
      ensureBibelpunktUi();
      clearRenderWhisper();
      const currentFile = state.documentMeta?.file || '';

      if (currentFile) {
        const released = await releaseCurrentBibleResources({ nextFilename: '', loadId });
        if (!released) return;
      }

      if (loadId !== currentLoadId) return;
      clearActiveBibleScene({ preserveView: true });
      state.dropBiblePlaceholder = createDropBiblePlaceholder(viewTransition);
      state.renderWhisper.pendingLoadId = 0;
      state.renderWhisper.committedLoadId = 0;
      state.renderWhisper.pendingDocumentKey = '';
      showUploadOverlay();
      applyTransform();
    }

    async function loadCurrentDocument(isFirstLoad = false) {
      if (isRemixModeEnabled()) {
        const currentEntry = getCurrentKarussellBibleEntry();
        if (isDropBibleTriggerEntry(currentEntry)) {
          return loadBible(currentEntry.file, isFirstLoad);
        }
        const directEntry = getDirectDocumentEntryForCurrentUi();
        if (directEntry && !isLiveRemixPreviewEntry(directEntry)) {
          return loadBible(directEntry.file, isFirstLoad);
        }
        return loadRemixDocument(isFirstLoad);
      }

      const currentFile = getCurrentKarussellBibleEntry()?.file;
      if (!currentFile) return;
      return loadBible(currentFile, isFirstLoad);
    }

    async function loadRemixDocument(isFirstLoad = false) {
      const { loadId, signal, guard } = beginDocumentLoad();
      const recipe = getRemixRecipe();
      const frozenCircleTransition = !isFirstLoad ? freezeCircleFootprintTransition() : null;
      const hasLiveCircleReference = !!captureCircleFootprintReference();
      const isSyntheticInitialTransition = !!frozenCircleTransition?.syntheticInitial;
      const shouldUseInitialCircleFit = !isFirstLoad
        && isSyntheticInitialTransition
        && !hasLiveCircleReference;
      const carriedInitialCircleViewportFraction = !frozenCircleTransition
        && state.shape.type === 'circle'
        && state.viewAutoFit.initialCircleViewportFraction != null
        ? state.viewAutoFit.initialCircleViewportFraction
        : null;

      const initialViewTransition = shouldUseInitialCircleFit
        ? null
        : (frozenCircleTransition ? cloneCircleFootprint(frozenCircleTransition) : null);
      const initialCircleViewportFraction = isFirstLoad || shouldUseInitialCircleFit
        ? CONFIG.SHAPES.initialCircleViewportFraction
        : carriedInitialCircleViewportFraction;
      const shouldFitView = isFirstLoad
        || shouldUseInitialCircleFit
        || (!initialViewTransition && initialCircleViewportFraction != null);
      const nextSelectionKey = `remix:${getRemixRecipeKey(recipe)}`;

      try {
        throwIfDocumentLoadAborted({ guard, signal });
        ensureBibelpunktUi();
        hideUploadOverlay();
        state.viewAutoFit.enabled = shouldFitView;
        state.viewAutoFit.initialCircleViewportFraction = initialCircleViewportFraction;
        if (initialViewTransition) {
          state.renderWhisper.anchorX = initialViewTransition.anchorX;
          state.renderWhisper.anchorY = initialViewTransition.anchorY;
        }
        state.renderWhisper.pendingLoadId = loadId;
        state.renderWhisper.requiredLayoutRevision = 0;
        state.renderWhisper.committedLoadId = 0;
        state.renderWhisper.pendingDocumentKey = '';
        setRenderWhisper(getShapeLoadWhisperText(), 'load', { animateDots: true });
        await nextPaint();
        if (!guard()) return;

        const currentSelectionKey = state.documentSelectionKey || '';
        if (currentSelectionKey && currentSelectionKey !== nextSelectionKey) {
          const released = await releaseCurrentBibleResources({ nextFilename: REMIX_DOCUMENT_FILE, loadId });
          if (!released) return;
          state.textData = '';
          state.documentCacheKey = '';
          state.documentMeta = null;
          state.documentSelectionKey = '';
          state.layout = createEmptyLayoutState();
          clearPresenceLayer();
          applyTransform();
          setRenderWhisper(getShapeLoadWhisperText(), 'load', { animateDots: true });
          await nextPaint();
          if (!guard()) return;
        }

        if (!recipe.sources.length) {
          clearActiveBibleScene({ preserveView: true });
          const emptyRemixDocument = createRemixDocumentFromText('', recipe);
          applyRemixDocumentState(emptyRemixDocument);
          applyTransform();
          syncShapeControls();
          clearRenderWhisper({ kind: 'load' });
          return;
        }

        const remixDocument = await buildRemixDocument(recipe, { guard, signal });
        if (!guard()) return;
        if (!remixDocument?.text) throw new Error('Remix-Text ist leer');

        setRenderWhisper(getShapeLoadWhisperText(), 'load', { animateDots: true });
        await nextPaint();
        if (!guard()) return;
        applyRemixDocumentState(remixDocument);
        state.baseFontSize = CONFIG.TARGET_FONT_SIZE;
        measureBaseMetrics();
        const viewTransition = initialViewTransition ? { ...initialViewTransition } : null;
        await rebuildLayout({ fitView: shouldFitView, guard, viewTransition, initialCircleViewportFraction });
        if (!guard()) return;

        rememberStableCircleFootprint(captureCircleFootprintReference(), { force: true });
        syncShapeControls();

        const { width, height } = state.layout.bounds;
        const charCount = state.documentMeta?.charCount || state.textData.length;
        LOG.info(`remix: ${charCount.toLocaleString()} zeichen, form=${state.shape.type}, bounds=${Math.round(width)}×${Math.round(height)}, normalize=${state.normalizeScale.toFixed(2)}`);
        maybeFinishLoadWhisper(loadId);
      } catch (error) {
        if (isDocumentLoadAbortError(error) || !guard()) return;
        state.renderWhisper.pendingLoadId = 0;
        state.renderWhisper.committedLoadId = 0;
        state.renderWhisper.pendingDocumentKey = '';
        setRenderWhisper('etwas hakt', 'load');
        console.error('Fehler beim Remix-Laden:', error);
      } finally {
        finishDocumentLoad(loadId, signal);
      }
    }

    async function loadBible(filename, isFirstLoad = false) {
      const { loadId, signal, guard } = beginDocumentLoad();
      const bibleEntry = getBibleEntry(filename);
      const frozenCircleTransition = !isFirstLoad ? freezeCircleFootprintTransition() : null;
      const hasLiveCircleReference = !!captureCircleFootprintReference();
      const isSyntheticInitialTransition = !!frozenCircleTransition?.syntheticInitial;
      const shouldUseInitialCircleFit = !isFirstLoad
        && isSyntheticInitialTransition
        && !hasLiveCircleReference;
      const carriedInitialCircleViewportFraction = !frozenCircleTransition
        && state.shape.type === 'circle'
        && state.viewAutoFit.initialCircleViewportFraction != null
        ? state.viewAutoFit.initialCircleViewportFraction
        : null;

      if (isDropBibleTriggerEntry(bibleEntry)) {
        try {
          await loadUploadTrigger({ loadId, viewTransition: frozenCircleTransition });
        } finally {
          finishDocumentLoad(loadId, signal);
        }
        return;
      }

      const loadText = getShapeLoadWhisperText();
      const initialViewTransition = shouldUseInitialCircleFit
        ? null
        : (frozenCircleTransition ? cloneCircleFootprint(frozenCircleTransition) : null);
      const initialCircleViewportFraction = isFirstLoad || shouldUseInitialCircleFit
        ? CONFIG.SHAPES.initialCircleViewportFraction
        : carriedInitialCircleViewportFraction;
      const shouldFitView = isFirstLoad
        || shouldUseInitialCircleFit
        || (!initialViewTransition && initialCircleViewportFraction != null);

      try {
        throwIfDocumentLoadAborted({ guard, signal });
        ensureBibelpunktUi();
        hideUploadOverlay();
        state.viewAutoFit.enabled = shouldFitView;
        state.viewAutoFit.initialCircleViewportFraction = initialCircleViewportFraction;
        if (initialViewTransition) {
          state.renderWhisper.anchorX = initialViewTransition.anchorX;
          state.renderWhisper.anchorY = initialViewTransition.anchorY;
        }
        state.renderWhisper.pendingLoadId = loadId;
        state.renderWhisper.requiredLayoutRevision = 0;
        state.renderWhisper.committedLoadId = 0;
        state.renderWhisper.pendingDocumentKey = '';
        setRenderWhisper(loadText, 'load', { animateDots: true });
        await nextPaint();
        if (!guard()) return;

        const currentFile = state.documentMeta?.file || '';
        const shouldRefreshCurrentResources = !!currentFile && (currentFile !== filename || isGeneratedLoremEntry(bibleEntry));
        if (shouldRefreshCurrentResources) {
          const released = await releaseCurrentBibleResources({ nextFilename: filename, loadId });
          if (!released) return;
          setRenderWhisper(loadText, 'load', { animateDots: true });
          await nextPaint();
          if (!guard()) return;
        }

        if (textCache.has(filename)) await nextPaint();
        const text = await fetchBibleText(filename, { guard, signal });
        if (!guard()) return;
        if (!text && !isGeneratedLoremEntry(bibleEntry)) throw new Error('Textdokument ist leer');

        setRenderWhisper(loadText, 'load', { animateDots: true });
        await nextPaint();
        if (!guard()) return;
        const previousTextLength = getCurrentDocumentCharCount();
        state.textData = text;
        state.documentMeta = getBibleMeta(filename) || analyzeBibleText(text);
        state.documentSelectionKey = `single:${filename}`;
        state.documentCacheKey = getDocumentCacheKey(state.documentMeta, text);
        state.renderWhisper.pendingDocumentKey = state.documentCacheKey;
        preserveLineWidthCharsForDocumentChange(previousTextLength, text.length);
        if (!isRemixModeEnabled()) {
          state.remix = createRemixStateFromRecipe(getRecipeFromBibleEntry(bibleEntry), {
            baseFile: bibleEntry.file,
            enabled: false,
            nameDraft: bibleEntry.name,
            nameTouched: false
          });
        }
        pruneTextCache(filename);
        state.baseFontSize = CONFIG.TARGET_FONT_SIZE;
        measureBaseMetrics();
        const viewTransition = initialViewTransition ? { ...initialViewTransition } : null;
        await rebuildLayout({ fitView: shouldFitView, guard, viewTransition, initialCircleViewportFraction });
        if (!guard()) return;
        // Footprint sofort speichern, damit ein schneller Bibelwechsel
        // vor Render-Ende den Radius nicht verliert
        rememberStableCircleFootprint(captureCircleFootprintReference(), { force: true });
        syncShapeControls();

        const { width, height } = state.layout.bounds;
        const charCount = state.documentMeta?.charCount || state.textData.length;
        LOG.info(`${filename}: ${charCount.toLocaleString()} zeichen, form=${state.shape.type}, bounds=${Math.round(width)}×${Math.round(height)}, normalize=${state.normalizeScale.toFixed(2)}`);
        maybeFinishLoadWhisper(loadId);
      } catch (error) {
        if (isDocumentLoadAbortError(error) || !guard()) return;
        state.renderWhisper.pendingLoadId = 0;
        state.renderWhisper.committedLoadId = 0;
        state.renderWhisper.pendingDocumentKey = '';
        setRenderWhisper('etwas hakt', 'load');
        console.error('Fehler beim Laden:', error);
      } finally {
        finishDocumentLoad(loadId, signal);
      }
    }

    let allBibles = [];
    let bibles = [];
    let currentBibleIndex = 0;

    const karussellEl = document.getElementById('bible-karussell');
    const prevItem2 = document.getElementById('prevItem2');
    const prevItem1 = document.getElementById('prevItem1');
    const activeItem = document.getElementById('activeItem');
    const nextItem1 = document.getElementById('nextItem1');
    const nextItem2 = document.getElementById('nextItem2');

    function cleanDisplayName(file) {
      let name = file.split('/').pop();
      name = decodeURIComponent(name);
      name = name.replace(/\.txt$/i, '');
      name = name.replace(/_/g, ' ');
      return name;
    }

    function createBibleEntry(file, meta = {}, kind = 'library') {
      const normalizedMeta = rememberBibleMeta(file, { ...meta, kind });
      return {
        ...normalizedMeta,
        file,
        name: normalizedMeta.name || meta.name || cleanDisplayName(file),
        kind: normalizedMeta.kind || kind
      };
    }

    function createDropBibleTriggerEntry() {
      return createBibleEntry(DROP_BIBLE_TRIGGER_FILE, { name: DROP_BIBLE_TRIGGER_NAME }, 'drop-bible-trigger');
    }

    function createLoremBibleEntry() {
      return createBibleEntry(LOREM_BIBLE_FILE, { name: LOREM_BIBLE_NAME }, 'generated-lorem');
    }

    function isBhagavadGitaEntry(entry) {
      return !!entry && entry.file === BHAGAVAD_GITA_FILE;
    }

    function isFullMahabharataEntry(entry) {
      return !!entry && entry.file === FULL_MAHABHARATA_FILE;
    }

    function isMahabharataSwapEntry(entry) {
      return isBhagavadGitaEntry(entry) || isFullMahabharataEntry(entry);
    }

    function hasMahabharataSwapOption() {
      return allBibles.some(isBhagavadGitaEntry) && allBibles.some(isFullMahabharataEntry);
    }

    function getMahabharataSwapFile(file) {
      if (file === BHAGAVAD_GITA_FILE && state.libraryUnlocks.fullMahabharata) {
        return FULL_MAHABHARATA_FILE;
      }
      if (file === FULL_MAHABHARATA_FILE && !state.libraryUnlocks.fullMahabharata) {
        return BHAGAVAD_GITA_FILE;
      }
      return file;
    }

    function filterVisibleBibleEntries(entries) {
      return entries.filter(entry => {
        if (isBhagavadGitaEntry(entry)) return !state.libraryUnlocks.fullMahabharata;
        if (isFullMahabharataEntry(entry)) return state.libraryUnlocks.fullMahabharata;
        return true;
      });
    }

    function getConfiguredBibleOrder(entry, originalIndex = 0) {
      const file = entry?.file || '';

      if (file === DEFAULT_BIBLE_FILE) return 0;
      if (file === QURAN_FILE) return 100;
      if (file === EVOLUTIONSTHEORIE_FILE) return 200;
      if (file === BHAGAVAD_GITA_FILE || file === FULL_MAHABHARATA_FILE) return 300;
      if (file === TRIPLE_BIBLE_FILE) return 400;
      if (file === LOREM_BIBLE_FILE) return 500;
      if (isLiveRemixPreviewEntry(entry)) return 610;
      if (entry?.kind === 'uploaded') return 600 + originalIndex;
      if (entry?.kind === 'saved-remix') return 620 + originalIndex;
      if (file === DROP_BIBLE_TRIGGER_FILE) return 800;
      if (file === THORA_FILE) return 900;

      return 700 + originalIndex;
    }

    function sortVisibleBibleEntries(entries) {
      return entries
        .map((entry, index) => ({ entry, index }))
        .sort((a, b) => getConfiguredBibleOrder(a.entry, a.index) - getConfiguredBibleOrder(b.entry, b.index))
        .map(({ entry }) => entry);
    }

    function getLiveRemixPreviewEntry() {
      if (!isRemixModeEnabled()) return null;

      const recipe = getRemixRecipe();
      const previewName = getCurrentEditableDocumentName(recipe);
      const baseEntry = getBibleEntry(state.remix.baseFile) || null;
      if (!recipe.sources.length) return createBibleEntry(LIVE_REMIX_PREVIEW_FILE, {
        name: previewName,
        kind: 'live-remix-preview',
        recipe,
        recipeKey: getRemixRecipeKey(recipe),
        sourceCount: 0,
        sourceFileName: sanitizeTxtDownloadName(previewName)
      }, 'live-remix-preview');

      if (baseEntry && doesBibleEntryRepresentRecipe(baseEntry, recipe)) return null;

      const selectedEntry = getCurrentKarussellBibleEntry();
      if (selectedEntry && !isLiveRemixPreviewEntry(selectedEntry) && doesBibleEntryRepresentRecipe(selectedEntry, recipe)) {
        return null;
      }

      return createBibleEntry(LIVE_REMIX_PREVIEW_FILE, {
        name: previewName,
        kind: 'live-remix-preview',
        recipe,
        recipeKey: getRemixRecipeKey(recipe),
        sourceCount: recipe.sources.length,
        sourceFileName: sanitizeTxtDownloadName(previewName)
      }, 'live-remix-preview');
    }

    function getVisibleBibleEntries() {
      const visibleEntries = sortVisibleBibleEntries(filterVisibleBibleEntries(allBibles));
      const livePreviewEntry = getLiveRemixPreviewEntry();
      return livePreviewEntry ? sortVisibleBibleEntries([...visibleEntries, livePreviewEntry]) : visibleEntries;
    }

    function syncRemixStateToKarussellEntry(entry) {
      if (!entry || isLiveRemixPreviewEntry(entry) || isDropBibleTriggerEntry(entry)) return false;

      const nextRecipe = getRecipeFromBibleEntry(entry);
      if (!nextRecipe) return false;

      const currentRecipeKey = getRemixRecipeKey(getRemixRecipe());
      const nextRecipeKey = getRemixRecipeKey(nextRecipe);
      state.remix = createRemixStateFromRecipe(nextRecipe, {
        baseFile: entry.file,
        enabled: state.remix.enabled,
        nameDraft: entry.name,
        nameTouched: false
      });
      return currentRecipeKey !== nextRecipeKey;
    }

    function refreshRemixKarussellPreview({ preserveFile = '' } = {}) {
      const activeEntry = getCurrentKarussellBibleEntry();
      const recipe = getRemixRecipe();
      const baseEntry = getBibleEntry(state.remix.baseFile) || null;
      const representedByBase = !!baseEntry && doesBibleEntryRepresentRecipe(baseEntry, recipe);
      const shouldUsePreviewSlot = isRemixModeEnabled()
        && !representedByBase
        && (!activeEntry || !doesBibleEntryRepresentRecipe(activeEntry, recipe));
      const nextPreserveFile = preserveFile
        || (shouldUsePreviewSlot
          ? LIVE_REMIX_PREVIEW_FILE
          : (representedByBase ? baseEntry.file : (activeEntry?.file || state.remix.baseFile || '')));

      rebuildVisibleBibleList({ preserveFile: nextPreserveFile });
      updateKarussell();
    }

    function rebuildVisibleBibleList({ preserveFile = '' } = {}) {
      const preferredFile = getMahabharataSwapFile(
        preserveFile || getCurrentKarussellBibleEntry()?.file || state.documentMeta?.file || ''
      );

      bibles = getVisibleBibleEntries();

      if (!bibles.length) {
        currentBibleIndex = 0;
        return null;
      }

      let nextIndex = preferredFile
        ? bibles.findIndex(bible => bible.file === preferredFile)
        : -1;

      if (nextIndex < 0) {
        nextIndex = clamp(currentBibleIndex, 0, bibles.length - 1);
      }

      currentBibleIndex = nextIndex;
      setKarussellWidth();
      return bibles[currentBibleIndex]?.file || null;
    }

    function getBibleEntry(file) {
      return allBibles.find(bible => bible.file === file) || null;
    }

    function getCurrentKarussellBibleEntry() {
      return bibles[currentBibleIndex] || null;
    }

    function isDropBibleTriggerEntry(entry) {
      return !!entry && entry.file === DROP_BIBLE_TRIGGER_FILE;
    }

    function isSavedRemixEntry(entry) {
      return !!entry && entry.kind === 'saved-remix';
    }

    function isLiveRemixPreviewEntry(entry) {
      return !!entry && entry.file === LIVE_REMIX_PREVIEW_FILE;
    }

    function isGeneratedLoremEntry(entry) {
      return !!entry && entry.file === LOREM_BIBLE_FILE;
    }

    function getUniqueBibleName(preferredName, { excludeFile = '' } = {}) {
      const baseName = (preferredName || 'your own bible').trim() || 'your own bible';
      const existingNames = new Set(
        allBibles
          .filter(bible => bible?.file !== excludeFile)
          .map(bible => String(bible?.name || '').trim().toLocaleLowerCase())
          .filter(Boolean)
      );

      if (!existingNames.has(baseName.toLocaleLowerCase())) {
        return baseName;
      }

      let suffix = 2;
      while (existingNames.has(`${baseName} (${suffix})`.toLocaleLowerCase())) {
        suffix += 1;
      }

      return `${baseName} (${suffix})`;
    }

    function createUploadedBibleId() {
      uploadedBibleSequence += 1;
      return `upload:${Date.now().toString(36)}:${uploadedBibleSequence.toString(36)}`;
    }

    function registerInlineBibleText({
      rawText,
      preferredName = 'your own bible',
      sourceFileName = '',
      kind = 'uploaded',
      cacheKeyPrefix = 'upload',
      preserveFormatting = false,
      recipe = null
    } = {}) {
      const text = preserveFormatting ? String(rawText || '') : normalizeBibleText(rawText);
      if (!text) {
        throw new Error('Textdokument ist leer');
      }

      const analysis = analyzeBibleText(text);
      const fileId = createUploadedBibleId();
      const name = getUniqueBibleName(preferredName);
      const resolvedSourceFileName = sourceFileName || sanitizeTxtDownloadName(name);
      const entry = createBibleEntry(fileId, {
        name,
        rawCharCount: rawText.length,
        uniqueChars: analysis.uniqueChars,
        uniqueCharCount: analysis.uniqueCharCount,
        charCount: analysis.charCount,
        cacheKey: `${cacheKeyPrefix}:${fileId}:${rawText.length}:${analysis.charCount}:${analysis.uniqueCharCount}`,
        sourceFileName: resolvedSourceFileName,
        recipe,
        recipeKey: recipe ? getRemixRecipeKey(recipe) : undefined,
        sourceCount: recipe?.sources?.length,
        kind
      }, kind);

      uploadedBibleStore.set(fileId, {
        file: fileId,
        name,
        rawText: String(rawText || ''),
        text,
        sourceFileName: resolvedSourceFileName,
        meta: entry
      });
      allBibles.push(entry);
      return entry;
    }

    function renameBibleEntry(file, preferredName) {
      const entry = getBibleEntry(file);
      if (!entry || !isKarussellEntryRenamable(entry)) return null;

      const nextName = getNormalizedEditableName(preferredName, entry.name);
      entry.name = nextName;

      const cachedMeta = getBibleMeta(file) || {};
      const updatedMeta = rememberBibleMeta(file, {
        ...cachedMeta,
        name: nextName,
        sourceFileName: sanitizeTxtDownloadName(nextName)
      });

      if (uploadedBibleStore.has(file)) {
        const uploadEntry = uploadedBibleStore.get(file);
        uploadEntry.name = nextName;
        uploadEntry.meta = { ...uploadEntry.meta, ...updatedMeta, name: nextName };
        uploadEntry.sourceFileName = sanitizeTxtDownloadName(nextName);
      }

      if (state.documentMeta?.file === file) {
        state.documentMeta = { ...state.documentMeta, ...updatedMeta, name: nextName };
      }

      bibles = getVisibleBibleEntries();
	      setKarussellWidth();
      updateKarussell();
      return entry;
    }

    function registerUploadedBible(file, rawText) {
      return registerInlineBibleText({
        rawText,
        preferredName: cleanDisplayName(file?.name || 'your own bible'),
        sourceFileName: file?.name || '',
        kind: 'uploaded',
        cacheKeyPrefix: 'upload'
      });
    }

    function saveCurrentRemixToKarussell({ flashToast = true } = {}) {
      if (!isRemixModeEnabled() || !state.textData) return;

      const preferredName = getCurrentEditableDocumentName();

      const savedRecipe = getRemixRecipe();
      const savedEntry = registerInlineBibleText({
        rawText: state.textData,
        preferredName,
        sourceFileName: sanitizeTxtDownloadName(preferredName),
        kind: 'saved-remix',
        cacheKeyPrefix: 'saved-remix',
        preserveFormatting: true,
        recipe: savedRecipe
      });

      state.remix.baseFile = savedEntry.file;
      state.remix.nameDraft = savedEntry.name;
      state.remix.nameTouched = false;
      rebuildVisibleBibleList({ preserveFile: savedEntry.file });
      state.remix.countsByFile = normalizeRemixCounts(state.remix.countsByFile);
      state.documentMeta = getBibleMeta(savedEntry.file) || state.documentMeta;
      state.documentSelectionKey = `single:${savedEntry.file}`;
      state.documentCacheKey = state.documentMeta?.cacheKey || state.documentCacheKey;
      updateKarussell();
      if (flashToast) flashSaveRemixButtonToast();
      setRenderWhisper('intern gespeichert', 'general');
      clearRenderWhisper({ delay: 900, kind: 'general' });
      return savedEntry;
    }

    function openUploadBiblePicker() {
      if (!elements.dropBibleInput) return;
      clearDropBiblePendingMousePicker();
      elements.dropBibleInput.value = '';
      if (typeof elements.dropBibleInput.showPicker === 'function') {
        elements.dropBibleInput.showPicker();
      } else {
        elements.dropBibleInput.click();
      }
    }

    function isTxtFile(file) {
      if (!file) return false;
      return /\.txt$/i.test(file.name || '');
    }

    async function processUploadFiles(files) {
      if (!files.length) {
        resetUploadZoneFeedback();
        return;
      }

      const addedEntries = [];
      const issues = [];

      for (const file of files) {
        if (!isTxtFile(file)) {
          issues.push(`${file.name || 'Datei'} ist keine .txt`);
          continue;
        }

        try {
          const rawText = await file.text();
          addedEntries.push(registerUploadedBible(file, rawText));
        } catch (error) {
          issues.push(`${file.name || 'Datei'}: ${error?.message || 'Upload fehlgeschlagen'}`);
        }
      }

      if (!addedEntries.length) {
        showInvalidUploadFeedback();
        console.warn('Upload fehlgeschlagen:', issues);
        return;
      }

      resetUploadZoneFeedback();
      const preserveFile = isRemixModeEnabled()
        ? (getCurrentKarussellBibleEntry()?.file || addedEntries[0].file)
        : addedEntries[0].file;
      rebuildVisibleBibleList({ preserveFile });
      state.remix.countsByFile = normalizeRemixCounts(state.remix.countsByFile);
      updateKarussell();

      if (issues.length) {
        LOG.info(`upload mit hinweisen: ${issues.join(' | ')}`);
      }

      if (isRemixModeEnabled()) {
        syncShapeControls();
        return;
      }

      await loadCurrentDocument();
    }

    async function handleUploadBibleSelection(event) {
      const files = Array.from(event?.target?.files || []);
      if (event?.target) event.target.value = '';
      await processUploadFiles(files);
    }

    function normalizeBibleListEntry(entry) {
      if (typeof entry === 'string') {
        return createBibleEntry(entry, { name: cleanDisplayName(entry) }, 'library');
      }

      if (!entry || typeof entry !== 'object' || typeof entry.file !== 'string') {
        return null;
      }

      return createBibleEntry(entry.file, entry, 'library');
    }

    function setKarussellWidth() {
      const tempSpan = document.createElement('span');
      tempSpan.style.cssText = 'position:absolute;visibility:hidden;font:20px monospace;white-space:nowrap;';
      document.body.appendChild(tempSpan);

      let maxWidth = 150;
      for (const bible of bibles) {
        tempSpan.textContent = bible.name;
        maxWidth = Math.max(maxWidth, tempSpan.offsetWidth);
      }

      document.body.removeChild(tempSpan);
      karussellEl.style.minWidth = (maxWidth + 20) + 'px';
    }

    async function loadBibleList() {
      try {
        let manifestEntries = [];

        try {
          const jsonResponse = await fetch(`/assets/bibeln/bibles.json?t=${Date.now()}`);
          if (jsonResponse.ok) {
            const manifest = await jsonResponse.json();
            const rawEntries = Array.isArray(manifest)
              ? manifest
              : (Array.isArray(manifest?.items) ? manifest.items : []);

            manifestEntries = rawEntries
              .map(normalizeBibleListEntry)
              .filter(Boolean);

            if (manifestEntries.length > 0) {
              LOG.info('liste aus bibles.json geladen');
            }
          }
        } catch (e) {
          LOG.info('bibles.json nicht verfügbar, versuche directory listing');
        }

        if (manifestEntries.length === 0) {
          try {
            const response = await fetch('/assets/bibeln/');
            const html = await response.text();
            const regex = /href="([^"]+\.txt)"/gi;
            let match;
            while ((match = regex.exec(html)) !== null) {
              const entry = normalizeBibleListEntry(match[1]);
              if (entry) manifestEntries.push(entry);
            }
            if (manifestEntries.length > 0) LOG.info('liste aus directory listing geladen');
          } catch (e) {
            LOG.info('directory listing nicht verfügbar');
          }
        }

        allBibles = [...manifestEntries, createLoremBibleEntry(), createDropBibleTriggerEntry()];
        if (!rebuildVisibleBibleList({ preserveFile: DEFAULT_BIBLE_FILE })) {
          throw new Error('Keine Bibel-Dateien gefunden');
        }
      } catch (error) {
        console.error('Fehler beim Laden der Bibel-Liste:', error);
        allBibles = [
          createBibleEntry(DEFAULT_BIBLE_FILE, { name: 'Bibel' }, 'library'),
          createLoremBibleEntry(),
          createDropBibleTriggerEntry()
        ];
        rebuildVisibleBibleList({ preserveFile: DEFAULT_BIBLE_FILE });
      }
    }

    function getWrappedBible(offset) {
      if (bibles.length === 0) return '';
      const idx = (currentBibleIndex + offset + bibles.length * 100) % bibles.length;
      return bibles[idx]?.name || '';
    }

    function updateKarussell() {
      prevItem2.textContent = getWrappedBible(-2);
      prevItem1.textContent = getWrappedBible(-1);
      activeItem.textContent = getWrappedBible(0);
      nextItem1.textContent = getWrappedBible(1);
      nextItem2.textContent = getWrappedBible(2);
      syncShapeControls();
    }

    let loadBibleTimeout = null;
    let wheelEnabled = true;
    let wheelDisableTimeout = null;
    let karussellScrolling = false;
    let karussellScrollTimeout = null;

    async function scrollBible(steps, immediate = false) {
      if (steps !== 0 && !(await confirmDiscardOrSaveUnsavedRemix())) {
        return;
      }

      currentBibleIndex = (currentBibleIndex + steps + bibles.length * 100) % bibles.length;
      const selectedEntry = getCurrentKarussellBibleEntry();

      if (isRemixModeEnabled() && selectedEntry && !isLiveRemixPreviewEntry(selectedEntry)) {
        syncRemixStateToKarussellEntry(selectedEntry);
        refreshRemixKarussellPreview({ preserveFile: selectedEntry.file });
      } else {
        if (!isRemixModeEnabled() && selectedEntry) {
          state.remix = createRemixStateFromRecipe(getRecipeFromBibleEntry(selectedEntry), {
            baseFile: selectedEntry.file,
            enabled: false,
            nameDraft: selectedEntry.name,
            nameTouched: false
          });
        }
        updateKarussell();
      }

      clearTimeout(loadBibleTimeout);
      if (immediate) {
        void loadCurrentDocument();
      } else {
        loadBibleTimeout = setTimeout(() => void loadCurrentDocument(), 150);
      }
    }

    function handleWheel(e) {
      const direction = Math.sign(e.deltaY);
      if (direction === 0) return;

      if (wheelEnabled) {
        void scrollBible(direction);
        wheelEnabled = false;
      }

      clearTimeout(wheelDisableTimeout);
      wheelDisableTimeout = setTimeout(() => {
        wheelEnabled = true;
      }, 300);
    }

    prevItem2.addEventListener('click', () => void scrollBible(-2, true));
    prevItem1.addEventListener('click', () => void scrollBible(-1, true));
    nextItem1.addEventListener('click', () => void scrollBible(1, true));
    nextItem2.addEventListener('click', () => void scrollBible(2, true));

    karussellEl.addEventListener('wheel', (e) => {
      e.preventDefault();
      e.stopPropagation();
      karussellScrolling = true;
      clearTimeout(karussellScrollTimeout);
      karussellScrollTimeout = setTimeout(() => {
        karussellScrolling = false;
      }, 400);
      handleWheel(e);
    }, { passive: false });

    let karussellTouchStartY = 0;
    let touchScrolled = false;

    karussellEl.addEventListener('touchstart', (e) => {
      karussellTouchStartY = e.touches[0].clientY;
      touchScrolled = false;
      karussellScrolling = true;
    }, { passive: true });

    karussellEl.addEventListener('touchmove', (e) => {
      e.stopPropagation();
      const diff = karussellTouchStartY - e.touches[0].clientY;
      if (!touchScrolled && Math.abs(diff) > 25) {
        touchScrolled = true;
        void scrollBible(diff > 0 ? 1 : -1);
      }
    }, { passive: true });

    karussellEl.addEventListener('touchend', () => {
      setTimeout(() => {
        karussellScrolling = false;
      }, 200);
    }, { passive: true });

    async function init() {
      await loadBibleList();
      updateKarussell();
      ensureBibelpunktUi();
      await nextPaint();

      // Initialen Kreis-Footprint sofort speichern, BEVOR die erste Bibel lädt.
      // Damit hat ein schneller Bibelwechsel vor Render-Ende immer einen Radius.
      if (state.shape.type === 'circle') {
        const initialFootprint = getInitialCircleFootprintReference();
        state.stableCircleFootprint = cloneCircleFootprint(initialFootprint);
        state.carryOverCircleFootprint = cloneCircleFootprint(initialFootprint);
      }

      await loadCurrentDocument(true);
      scheduleBiblePreload();
    }

    init();
  </script>
</body>
</html>
