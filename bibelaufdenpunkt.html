<!DOCTYPE html>
<!-- bibelaufdenpunkt.html 
 eine von unendlich random möglichkeiten, die Bibel und andere Bibeln zu rendern-->
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bibelpunkt</title>

  <link href="/meta.css" rel="stylesheet" />
  <script src="/meta.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-color);
      color: var(--text-color);
    }
    /* _018-canvas Klasse wird von meta.css bereitgestellt */
    .texture-layer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform-origin: center center;
      will-change: transform, opacity, filter;
    }
    #fern-layer {
      z-index: 1;
      pointer-events: none;
      opacity: 0;
    }
    #nah-layer {
      z-index: 2;
      pointer-events: none;
      opacity: 0;
    }
    #presence-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
    }
    #line-width-ghost {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 4;
      display: none;
      pointer-events: none;
      opacity: 0;
      will-change: opacity;
    }
    #render-whisper {
      position: absolute;
      left: 14px;
      bottom: 14px;
      top: auto;
      z-index: 1100;
      pointer-events: none;
      padding: 6px 9px;
      border: 1px solid color-mix(in srgb, var(--text-color) 12%, var(--bg-color));
      border-radius: 999px;
      background: color-mix(in srgb, var(--bg-color) 88%, var(--text-color));
      color: color-mix(in srgb, var(--text-color) 90%, var(--bg-color));
      font: 12px/1.1 monospace;
      letter-spacing: 0.04em;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 120ms ease, transform 120ms ease;
    }
    #render-whisper [data-render-whisper-label] {
      display: inline-block;
      position: relative;
      white-space: nowrap;
    }
    #render-whisper [data-render-whisper-dots] {
      white-space: pre;
    }
    #render-whisper.active {
      opacity: 1;
      transform: translateY(0);
    }
    #render-whisper[data-kind="load"] {
      left: 50%;
      top: 50%;
      bottom: auto;
      padding: 0;
      border: none;
      background: transparent;
      color: color-mix(in srgb, var(--text-color) 98%, var(--bg-color));
      font: 600 16px/1.1 monospace;
      letter-spacing: 0.08em;
      transform: translate(-50%, calc(-50% + 8px));
      white-space: nowrap;
      text-shadow: 0 2px 10px color-mix(in srgb, var(--bg-color) 75%, transparent);
    }
    #render-whisper[data-kind="load"] [data-render-whisper-label] {
      display: inline-block;
      position: relative;
    }
    #render-whisper[data-kind="load"] [data-render-whisper-dots] {
      position: absolute;
      left: 100%;
      top: 0;
      margin-left: 0.08em;
    }
    #render-whisper[data-kind="load"].active {
      transform: translate(-50%, -50%);
    }

    /* Bible Karussell UI */
    #bible-selector-wrapper {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      font-family: monospace;
      user-select: none;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 8px;
      max-width: 90vw;
      padding: 0 10px;
      pointer-events: auto;
      min-height: 92px;
    }
    #bible-selector-wrapper .title {
      color: var(--text-color);
      font-size: 20px;
      line-height: 1.2;
      flex-shrink: 0;
    }
    #bible-selector-wrapper .remix-summary {
      display: none !important;
    }
    #bible-karussell {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      /* Breite wird per JS gesetzt basierend auf längstem Namen */
    }
    #bible-karussell .item {
      transition: all 0.2s ease-out;
      cursor: pointer;
      line-height: 1.4;
      white-space: nowrap;
    }
    #bible-karussell .item.active {
      font-size: 20px;
      opacity: 1;
      color: var(--text-color);
    }
    #bible-karussell .item.inactive {
      font-size: 14px;
      opacity: 0.7;
      color: var(--text-color);
    }
    #bible-karussell .item.more-inactive {
      font-size: 10px;
      opacity: 0.4;
      color: var(--text-color);
    }

    #bibelpunkt-spellbook .ctrl-select-trigger,
    #bibelpunkt-spellbook .ctrl-input {
      box-shadow: none;
    }
    #drop-bible-overlay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 1101;
      display: none;
      flex-direction: column;
      align-items: center;
      pointer-events: auto;
      text-align: center;
      font-family: monospace;
    }
    #drop-bible-overlay.active {
      display: flex;
    }
    #drop-bible-button {
      --drop-bible-diameter: 220px;
      position: relative;
      display: inline-flex;
      width: var(--drop-bible-diameter);
      height: var(--drop-bible-diameter);
      align-items: center;
      justify-content: center;
      border: 2px dashed color-mix(in srgb, var(--text-color) 26%, var(--bg-color));
      border-radius: 50%;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      font: 600 14px/1.2 monospace;
      letter-spacing: 0.04em;
      cursor: pointer;
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, box-shadow 120ms ease, color 120ms ease;
      box-shadow: 0 12px 34px color-mix(in srgb, var(--bg-color) 75%, transparent);
    }
    #drop-bible-button:hover,
    #drop-bible-button:focus-visible {
      transform: translateY(-1px) scale(1.01);
      border-color: color-mix(in srgb, var(--text-color) 50%, var(--bg-color));
      box-shadow: 0 18px 44px color-mix(in srgb, var(--bg-color) 68%, transparent);
      outline: none;
    }
    #drop-bible-button[data-drop-bible-state="drag-valid"] {
      border-color: var(--text-color);
      color: var(--text-color);
      background: var(--bg-color);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--text-color) 16%, var(--bg-color)),
        0 18px 48px color-mix(in srgb, var(--bg-color) 68%, transparent);
    }
    #drop-bible-button[data-drop-bible-state="drag-invalid"],
    #drop-bible-button[data-drop-bible-state="invalid"] {
      border-color: transparent;
      color: var(--text-color);
      background: var(--bg-color);
      overflow: visible;
      box-shadow: 0 18px 48px color-mix(in srgb, var(--bg-color) 68%, transparent);
    }
    #drop-bible-button[data-drop-bible-state="drag-invalid"] #drop-bible-icon,
    #drop-bible-button[data-drop-bible-state="invalid"] #drop-bible-icon,
    #drop-bible-button[data-drop-bible-state="drag-invalid"] #drop-bible-label,
    #drop-bible-button[data-drop-bible-state="invalid"] #drop-bible-label {
      display: none;
    }
    #drop-bible-alert-ring {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
      opacity: 0.96;
    }
    #drop-bible-alert-ring > span {
      position: absolute;
      left: 0;
      top: 0;
      display: block;
      color: var(--text-color);
      font: 700 calc(var(--drop-bible-diameter) * 0.06)/1 monospace;
      letter-spacing: 0;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      transform-origin: center center;
    }
    #drop-bible-button[data-drop-bible-state="drag-invalid"] #drop-bible-alert-ring,
    #drop-bible-button[data-drop-bible-state="invalid"] #drop-bible-alert-ring {
      display: block;
    }
    #drop-bible-content {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      font-size: calc(var(--drop-bible-diameter) * 0.082);
      line-height: 1;
      pointer-events: none;
    }

    #drop-bible-icon-slot {
      position: absolute;
      left: 50%;
      top: 20%;
      transform: translate(-50%, -50%);
      width: 18%;
      height: 18%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #drop-bible-icon {
      width: 100%;
      height: 100%;
      display: block;
      opacity: 0.95;
    }
    #drop-bible-icon svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: currentColor;
    }
    #drop-bible-label {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      display: block;
      width: 100%;
      font-size: 0.9em;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      pointer-events: none;
    }
    #drop-bible-hint {
      position: absolute;
      left: 50%;
      top: 60%;
      transform: translate(-50%, 0);
      display: none;
      width: 80%;
      max-width: none;
      color: color-mix(in srgb, var(--text-color) 88%, var(--bg-color));
      font-size: 0.42em;
      line-height: 1.28;
      letter-spacing: 0.01em;
      text-align: center;
      pointer-events: none;
    }
    #drop-bible-button[data-drop-bible-state="drag-invalid"] #drop-bible-hint,
    #drop-bible-button[data-drop-bible-state="invalid"] #drop-bible-hint {
      display: block;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 70%;
    }
    #drop-bible-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      border: 0;
      opacity: 0;
      overflow: hidden;
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      white-space: nowrap;
    }
    /* Mobile: Titel zentriert oben, Karussell darunter */
    @media (max-width: 500px) {
      #bible-selector-wrapper {
        top: calc(env(safe-area-inset-top, 0px) + 40px);
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 12px;
      }
      #bible-selector-wrapper .title {
        font-size: 16px;
      }
      #bible-karussell {
        align-items: center;
      }
      #bible-karussell .item.active {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="bible-selector-wrapper">
    <div class="title">choose your type of</div>
    <div class="remix-summary" id="remix-summary"></div>
    <div id="bible-karussell">
      <div class="item more-inactive" id="prevItem2"></div>
      <div class="item inactive" id="prevItem1"></div>
      <div class="item active" id="activeItem"></div>
      <div class="item inactive" id="nextItem1"></div>
      <div class="item more-inactive" id="nextItem2"></div>
    </div>
  </div>

  <div class="_018-canvas">
    <canvas id="fern-layer" class="texture-layer"></canvas>
    <canvas id="nah-layer" class="texture-layer"></canvas>
    <canvas id="presence-layer"></canvas>
    <canvas id="line-width-ghost" aria-hidden="true"></canvas>
    <div id="render-whisper" aria-live="polite"><span data-render-whisper-label></span><span data-render-whisper-dots></span></div>
    <div id="drop-bible-overlay" aria-live="polite">
      <label id="drop-bible-button" role="button" tabindex="0">
        <span id="drop-bible-content">
          <span id="drop-bible-alert-ring" aria-hidden="true"></span>
          <span id="drop-bible-icon-slot" aria-hidden="true">
            <span id="drop-bible-icon">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M5 20h14v-6h2v8H3v-8h2v6Zm7-18 5.5 5.5h-3.5V16h-4V7.5H6.5L12 2Z" />
              </svg>
            </span>
          </span>
          <span id="drop-bible-label">drop bible txt</span>
          <span id="drop-bible-hint">only .txt files possible. If you want support for more fileformats, pls contribute to the project on github.com/0nefinity/0nefinity.love</span>
        </span>
        <input id="drop-bible-input" type="file" accept=".txt,text/plain" multiple>
      </label>
    </div>
  </div>

  <script>
    const CONFIG = {
      ZOOM: {
        min: 0.00001,
        max: 10000,
        speed: 0.03
      },
      TARGET_FONT_SIZE: 12,
      TARGET_WORLD_SPAN: 20000,
      LINE_HEIGHT_FACTOR: 1.2,
      FONT_FAMILY: 'monospace',
      SHAPES: {
        initial: 'circle',
        lineWidthChars: 420,
        defaultLineWidthChars: 70,
        minLineWidthChars: 1,
        maxLineWidthChars: 10000,
        lineWidthSquareSnapProgress: 0.018,
        fitMargin: 0.92,
        initialCircleViewportFraction: 0.5,
        previewSpiritMaxRows: 900,
        previewHoldWidthPx: 2,
        previewHoldFontPx: 1.5,
        nahFallbackRowLimit: 12000
      },
      FERN_TEXTURE: {
        maxSize: 16384,
        scale: 0.42,
        safetyHeadroom: 0.985,
        progressiveScales: [0.18, 0.26, 0.34, 0.42],
        initialScreenFontThresholds: [0.9, 1.6, 2.8]
      },
      NAH: {
        rerenderZoomRatioMin: 0.88,
        rerenderZoomRatioMax: 1.14
      },
      PROGRESSIVE: {
        idleStages: [180, 700, 1600],
        fernUpgradeDelays: [120, 520, 1300],
        nahQualityBoosts: [1.1, 1.45, 1.9],
        minPixelGain: 0.75,
        minQualityGainRatio: 1.12
      },
      PRESENCE: {
        minAxisPx: 1,
        fullAlphaBelowPx: 0.35,
        vanishBelowPx: 0.04,
        pointFadeStartPx: 0.55,
        brightnessNear: 1.15,
        brightnessFar: 2.7,
        contrastNear: 1.05,
        contrastFar: 1.95,
        alphaNear: 0.75,
        alphaFar: 1,
        horizontalAlphaBoost: 1.18,
        verticalAlphaSoftening: 0.84,
        horizontalCoverageGammaBias: -0.05,
        verticalCoverageGammaBias: 0.07,
        profileBins: 1024,
        samplesPerBin: 24,
        densityGamma: 1,
        maxPixelAlpha: 0.82,
        coverageGamma: 0.5,
        longLineCoverageGamma: 0.22,
        longLineBoostStartPx: 4,
        longLineBoostFullPx: 28
      },
      BLEND: {
        fernToNahStart: 3.2,
        fernToNahEnd: 10
      }
    };

    function smoothstep(min, max, value) {
      const t = Math.max(0, Math.min(1, (value - min) / (max - min)));
      return t * t * (3 - 2 * t);
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(min, value), max);
    }

    const FALLBACK_BG_COLOR = 'rgb(0, 0, 0)';
    const FALLBACK_TEXT_COLOR = 'rgb(255, 255, 255)';
    const themeColorCache = { key: '', palette: null };

    function getThemeColorProbe() {
      if (getThemeColorProbe.element) return getThemeColorProbe.element;

      const probe = document.createElement('span');
      probe.setAttribute('aria-hidden', 'true');
      probe.style.cssText = 'position:fixed;left:-9999px;top:-9999px;visibility:hidden;pointer-events:none;';
      (document.body || document.documentElement).appendChild(probe);
      getThemeColorProbe.element = probe;
      return probe;
    }

    function resolveCssColor(value, fallback) {
      const probe = getThemeColorProbe();
      probe.style.color = '';
      probe.style.color = value || '';
      return getComputedStyle(probe).color || fallback;
    }

    function parseRgbChannels(value) {
      const match = value.match(/rgba?\(\s*([0-9.]+)[,\s]+([0-9.]+)[,\s]+([0-9.]+)/i);
      if (!match) return null;
      return {
        r: Math.round(Number(match[1])),
        g: Math.round(Number(match[2])),
        b: Math.round(Number(match[3]))
      };
    }

    function withAlpha(channels, alpha = 1) {
      return `rgba(${channels.r}, ${channels.g}, ${channels.b}, ${clamp(alpha, 0, 1)})`;
    }

    function getMonochromeThemePalette() {
      const rootStyles = getComputedStyle(document.documentElement);
      const bgRaw = rootStyles.getPropertyValue('--bg-color').trim() || rootStyles.backgroundColor || FALLBACK_BG_COLOR;
      const textRaw = rootStyles.getPropertyValue('--text-color').trim() || rootStyles.color || FALLBACK_TEXT_COLOR;
      const key = `${bgRaw}|${textRaw}`;
      if (themeColorCache.key === key && themeColorCache.palette) return themeColorCache.palette;

      const bgCss = resolveCssColor(bgRaw, FALLBACK_BG_COLOR);
      const textCss = resolveCssColor(textRaw, FALLBACK_TEXT_COLOR);
      const palette = {
        bgCss,
        textCss,
        bgChannels: parseRgbChannels(bgCss) || { r: 0, g: 0, b: 0 },
        textChannels: parseRgbChannels(textCss) || { r: 255, g: 255, b: 255 }
      };

      themeColorCache.key = key;
      themeColorCache.palette = palette;
      return palette;
    }

    const LOREM_BIBLE_FILE = '__every_bible__';
    const LOREM_BIBLE_NAME = 'every bible (Platzhalter)';
    const DEFAULT_BIBLE_FILE = 'Bibel.txt';
    const THORA_FILE = 'Thora.txt';
    const QURAN_FILE = 'Quran.txt';
    const EVOLUTIONSTHEORIE_FILE = 'Evolutionstheorie.txt';
    const BHAGAVAD_GITA_FILE = 'Bhagavad-Gita.txt';
    const FULL_MAHABHARATA_FILE = 'full-Mahabharata.txt';
    const TRIPLE_BIBLE_FILE = 'triplebible.txt';
    const FULL_MAHABHARATA_UNLOCK_LABEL = 'unlock full Mahabharata (english only)';
    const LOREM_DEFAULT_WORD_COUNT = 1000;
    const LOREM_DEFAULT_MAX_WORD_COUNT = 10000000;
    const LOREM_HARD_MAX_WORD_COUNT = 100000000;
    const LOREM_REBUILD_DEBOUNCE_MS = 220;
    const REMIX_DOCUMENT_FILE = '__bible_remix__';
    const LIVE_REMIX_PREVIEW_FILE = '__live_remix_preview__';
    const DEFAULT_REMIX_UNIT_MODE = 'text';
    const DEFAULT_REMIX_SORT_MODE = 'random';
    const DEFAULT_REMIX_SORT_DIRECTION = 'asc';
    const LOREM_IPSUM_BASE_TEXT = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.';
    const LOREM_IPSUM_WORDS = LOREM_IPSUM_BASE_TEXT.split(/\s+/);

    const state = {
      textData: '',
      documentCacheKey: '',
      normalizeScale: 1,
      baseFontSize: 0,
      baseCharWidth: 0,
      lineHeight: 0,
      documentMeta: null,
      documentSelectionKey: '',
      blendTuning: {
        fernToNahStart: CONFIG.BLEND.fernToNahStart,
        fernToNahEnd: CONFIG.BLEND.fernToNahEnd
      },
      shape: {
        type: CONFIG.SHAPES.initial,
        lineWidthChars: CONFIG.SHAPES.lineWidthChars,
        lineWidthCustomized: false
      },
      libraryUnlocks: {
        fullMahabharata: false
      },
      lorem: {
        wordCount: LOREM_DEFAULT_WORD_COUNT,
        rebuildTimeout: null
      },
      remix: {
        enabled: false,
        unitMode: DEFAULT_REMIX_UNIT_MODE,
        sortMode: DEFAULT_REMIX_SORT_MODE,
        sortDirection: DEFAULT_REMIX_SORT_DIRECTION,
        includeSpaces: true,
        randomSeed: createRandomSeed(),
        countsByFile: {},
        reloadTimeout: null,
        baseFile: '',
        nameDraft: '',
        nameTouched: false
      },
      layout: {
        rows: [],
        bounds: { minX: -1, maxX: 1, minY: -1, maxY: 1, width: 2, height: 2 },
        center: { x: 0, y: 0 },
        maxLineWidth: 0,
        worldSpan: 2,
        meta: {}
      },
      focusWorld: { x: 0, y: 0 },
      scale: 1,
      renderMode: 'fern',
      textures: {
        fern: {
          canvas: null,
          width: 0,
          height: 0,
          padding: 0,
          scaleX: CONFIG.FERN_TEXTURE.scale,
          scaleY: CONFIG.FERN_TEXTURE.scale
        },
        nah: {
          canvas: null,
          centerX: 0,
          centerY: 0,
          scale: 0,
          width: 0,
          height: 0
        }
      },
      renderTimeout: null,
      shapeRefreshTimeout: null,
      layoutBuildRevision: 0,
      activePreparedRender: null,
      runtimeLimits: {
        glTextureMaxSize: null
      },
      lineWidthPreview: {
        active: false,
        bridging: false,
        commitTimeout: null,
        frameRequest: 0,
        interacting: false,
        revision: 0
      },
      drag: {
        active: false,
        lastX: 0,
        lastY: 0,
        lastPinchDist: 0,
        lastPinchCenterX: 0,
        lastPinchCenterY: 0
      },
      viewAutoFit: {
        enabled: true,
        initialCircleViewportFraction: CONFIG.SHAPES.initialCircleViewportFraction
      },
      viewportResponsiveScale: {
        zoomMultiplier: 1,
        circleViewportFraction: CONFIG.SHAPES.initialCircleViewportFraction
      },
      panelPlacement: {
        lastCenterY: null
      },
      stableCircleFootprint: null,
      carryOverCircleFootprint: null,
      dropBiblePlaceholder: null,
      progressive: {
        revision: 0,
        stage: 0,
        timers: [],
        activeQualityBoost: 1,
        lastInteractionAt: 0
      },
      renderWhisper: {
        timeout: null,
        kind: '',
        dotsTimer: null,
        baseText: '',
        dotsAnimated: false,
        dotCount: 0,
        dotStartedAt: 0,
        anchorX: null,
        anchorY: null,
        serial: 0,
        requiredLayoutRevision: 0,
        pendingLoadId: 0,
        committedLoadId: 0,
        pendingDocumentKey: '',
        revealFrame: 0
      }
    };

    const elements = {
      selectorWrapper: document.getElementById('bible-selector-wrapper'),
      selectorTitle: document.querySelector('#bible-selector-wrapper .title'),
      remixSummary: document.getElementById('remix-summary'),
      container: document.querySelector('._018-canvas'),
      fernCanvas: document.getElementById('fern-layer'),
      nahCanvas: document.getElementById('nah-layer'),
      presenceCanvas: document.getElementById('presence-layer'),
      lineWidthGhost: document.getElementById('line-width-ghost'),
      renderWhisper: document.getElementById('render-whisper'),
      renderWhisperLabel: document.querySelector('#render-whisper [data-render-whisper-label]'),
      renderWhisperDots: document.querySelector('#render-whisper [data-render-whisper-dots]'),
      dropBibleOverlay: document.getElementById('drop-bible-overlay'),
      dropBibleButton: document.getElementById('drop-bible-button'),
      dropBibleAlertRing: document.getElementById('drop-bible-alert-ring'),
      dropBibleInput: document.getElementById('drop-bible-input'),
      dropBibleLabel: document.getElementById('drop-bible-label'),
      dropBibleHint: document.getElementById('drop-bible-hint'),
      get fernCtx() { return this.fernCanvas.getContext('2d'); },
      get presenceCtx() { return this.presenceCanvas.getContext('2d'); },
      get nahCtx() { return this.nahCanvas.getContext('2d'); },
      get lineWidthGhostCtx() { return this.lineWidthGhost.getContext('2d'); }
    };

    let shapePanel = null;
    let shapePanelEls = null;
    let viewportResizeObserver = null;
    let viewportResizeFrame = 0;
	    let mobilePanelLayoutFrame = 0;

    function ensureDropBibleAlertRing() {
      const ring = elements.dropBibleAlertRing;
      if (!ring || ring.dataset.ready === '1') return;

      const glyphCount = 28;
      const centerPercent = 50;
      const radiusPercent = 49.15;
      const markup = Array.from({ length: glyphCount }, (_, index) => {
        const angle = -Math.PI / 2 + (index / glyphCount) * Math.PI * 2;
        const x = centerPercent + Math.cos(angle) * radiusPercent;
        const y = centerPercent + Math.sin(angle) * radiusPercent;
        return `<span style="left:${x.toFixed(3)}%;top:${y.toFixed(3)}%;">!</span>`;
      }).join('');

      ring.innerHTML = markup;
      ring.dataset.ready = '1';
    }

    function getViewportMetrics() {
      const rect = elements.container.getBoundingClientRect();
      const width = Math.max(1, rect.width || window.innerWidth || 1);
      const height = Math.max(1, rect.height || window.innerHeight || 1);
      return {
        rect,
        width,
        height,
        localCenterX: width / 2,
        localCenterY: height / 2,
        clientCenterX: rect.left + width / 2,
        clientCenterY: rect.top + height / 2
      };
    }

    function getUsableViewportMetrics() {
      const viewport = getViewportMetrics();
      const rootStyles = getComputedStyle(document.documentElement);
      const rawOcclusion = parseFloat(rootStyles.getPropertyValue('--controls-mobile-occlusion')) || 0;
      const bottomOcclusion = clamp(rawOcclusion, 0, Math.max(viewport.height - 1, 0));
      const usableHeight = Math.max(1, viewport.height - bottomOcclusion);

      return {
        ...viewport,
        bottomOcclusion,
        height: usableHeight,
        localCenterY: usableHeight / 2,
        clientCenterY: viewport.rect.top + usableHeight / 2
      };
    }

	    function isMobileViewport() {
	      return window.innerWidth <= 768;
	    }

	    function shouldUseShapePanelSafeArea() {
	      return !!(shapePanel?.el && !shapePanel.el.classList.contains('bar-mode'));
	    }

	    function getShapePanelPlacementWeight() {
	      if (!shouldUseShapePanelSafeArea()) return 0;
	      if (isMobileViewport()) return 1;
	      const fullWeightMaxWidth = 860;
	      const zeroWeightMinWidth = 1180;
	      const range = Math.max(1, zeroWeightMinWidth - fullWeightMaxWidth);
	      return clamp((zeroWeightMinWidth - window.innerWidth) / range, 0, 1);
	    }

	    function getShapePanelSafeAreaMetrics() {
	      const viewport = getViewportMetrics();
	      const margin = 16;
	      let safeTop = 0;
	      let safeBottom = viewport.height;

	      if (elements.selectorWrapper) {
	        const selectorRect = elements.selectorWrapper.getBoundingClientRect();
	        const selectorBottom = selectorRect.bottom - viewport.rect.top;
	        if (Number.isFinite(selectorBottom)) {
	          safeTop = clamp(selectorBottom + margin, 0, viewport.height);
	        }
	      }

	      if (shapePanel?.el) {
	        const panelRect = shapePanel.el.getBoundingClientRect();
	        const panelTop = panelRect.top - viewport.rect.top;
	        if (Number.isFinite(panelTop)) {
	          safeBottom = clamp(panelTop - margin, 0, viewport.height);
	        }
	      }

	      if (safeBottom <= safeTop) {
	        const centerY = clamp((safeTop + safeBottom) / 2, 0, viewport.height);
	        safeTop = Math.max(0, centerY - 0.5);
	        safeBottom = Math.min(viewport.height, centerY + 0.5);
	      }

	      const safeHeight = Math.max(1, safeBottom - safeTop);
	      return {
	        ...viewport,
	        safeTop,
	        safeBottom,
	        topInset: safeTop,
	        bottomInset: Math.max(0, viewport.height - safeBottom),
	        height: safeHeight,
	        localCenterY: safeTop + safeHeight / 2,
	        clientCenterY: viewport.rect.top + safeTop + safeHeight / 2
	      };
	    }

	    function getPreferredScaleViewportMetrics() {
	      return getViewportMetrics();
	    }

	    function getPreferredPlacementViewportMetrics() {
	      const viewport = getViewportMetrics();
	      const weight = getShapePanelPlacementWeight();
	      if (weight <= 0) return viewport;
	      const safeViewport = getShapePanelSafeAreaMetrics();
	      if (weight >= 1) return safeViewport;

	      const blendedSafeTop = safeViewport.safeTop * weight;
	      const blendedSafeBottom = viewport.height - (viewport.height - safeViewport.safeBottom) * weight;
	      const blendedHeight = Math.max(1, blendedSafeBottom - blendedSafeTop);
	      const blendedLocalCenterY = blendedSafeTop + blendedHeight / 2;

	      return {
	        ...viewport,
	        safeTop: blendedSafeTop,
	        safeBottom: blendedSafeBottom,
	        topInset: blendedSafeTop,
	        bottomInset: Math.max(0, viewport.height - blendedSafeBottom),
	        height: blendedHeight,
	        localCenterY: blendedLocalCenterY,
	        clientCenterY: viewport.rect.top + blendedLocalCenterY
	      };
	    }

    const LOG = {
      lastMode: null,
      lastLoggedScale: null,
      modeChange(newMode) {
        if (newMode !== this.lastMode) {
          console.log(`%cmode: ${this.lastMode || 'start'} → ${newMode}`, 'color: #0ff; font-weight: bold');
          this.lastMode = newMode;
        }
      },
      scaleCheck(scale) {
        if (!this.lastLoggedScale) {
          this.lastLoggedScale = scale;
          return;
        }
        const ratio = scale / this.lastLoggedScale;
        if (ratio > 2 || ratio < 0.5) {
          console.log(`%cscale: ${this.lastLoggedScale.toFixed(2)} → ${scale.toFixed(2)}`, 'color: #8f8');
          this.lastLoggedScale = scale;
        }
      },
      nahRender(centerX, centerY, scale) {
        console.log(`%crender: center=(${centerX.toFixed(1)}, ${centerY.toFixed(1)}), scale=${scale.toFixed(2)}`, 'color: #ff0');
      },
      info(msg) {
        console.log(`%cbibelpunkt ${msg}`, 'color: #888');
      }
    };

    function measureBaseMetrics() {
      const ctx = document.createElement('canvas').getContext('2d');
      ctx.font = `${state.baseFontSize}px ${CONFIG.FONT_FAMILY}`;
      state.baseCharWidth = ctx.measureText('M').width;
      state.lineHeight = state.baseFontSize * CONFIG.LINE_HEIGHT_FACTOR;
    }

    function getCenteredTextBaseline() {
      return ['mi', 'ddle'].join('');
    }

    function getLineWidthCharLimit(textLength = state.textData.length) {
      return Math.max(CONFIG.SHAPES.minLineWidthChars, Math.round(Number(textLength) || 0), 1);
    }

    function clampLineWidthChars(value, textLength = state.textData.length) {
      return clamp(
        Math.round(Number(value) || CONFIG.SHAPES.minLineWidthChars),
        CONFIG.SHAPES.minLineWidthChars,
        getLineWidthCharLimit(textLength)
      );
    }

    function normalizeLineWidthCharsState(textLength = state.textData.length) {
      state.shape.lineWidthChars = clampLineWidthChars(state.shape.lineWidthChars, textLength);
      return state.shape.lineWidthChars;
    }

    function remapLineWidthCharsForTextLength(charsPerLine, previousTextLength, nextTextLength) {
      const safeNextLength = Math.max(nextTextLength || 0, 1);
      const safePreviousLength = Math.max(previousTextLength || 0, 0);

      if (safePreviousLength <= 0) {
        return clampLineWidthChars(charsPerLine, safeNextLength);
      }

      const previousMax = getLineWidthCharLimit(safePreviousLength);
      const nextMax = getLineWidthCharLimit(safeNextLength);
      const safeChars = clampLineWidthChars(charsPerLine, safePreviousLength);
      const previousSquare = getSquareLineWidthChars(safePreviousLength);

      if (safeChars <= CONFIG.SHAPES.minLineWidthChars) return CONFIG.SHAPES.minLineWidthChars;
      if (safeChars >= previousMax) return nextMax;
      if (safeChars === previousSquare) return getSquareLineWidthChars(safeNextLength);

      const progress = getLineWidthControlProgressForChars(safeChars, safePreviousLength);
      return getLineWidthCharsForControlProgress(progress, safeNextLength);
    }

    function preserveLineWidthCharsForDocumentChange(previousTextLength, nextTextLength) {
      state.shape.lineWidthChars = remapLineWidthCharsForTextLength(
        state.shape.lineWidthChars,
        previousTextLength,
        nextTextLength
      );
      return state.shape.lineWidthChars;
    }

    function getSquareLineWidthChars(textLength = state.textData.length) {
      const maxChars = getLineWidthCharLimit(textLength);
      if (maxChars <= 1) return 1;

      const charWidth = Math.max(state.baseCharWidth || 1, 0.000001);
      const lineHeight = Math.max(state.lineHeight || (CONFIG.TARGET_FONT_SIZE * CONFIG.LINE_HEIGHT_FACTOR), 0.000001);
      const estimatedSquareChars = Math.sqrt(Math.max(textLength, 1) * lineHeight / charWidth);
      const candidates = new Set([
        1,
        maxChars,
        Math.floor(estimatedSquareChars) - 1,
        Math.floor(estimatedSquareChars),
        Math.round(estimatedSquareChars),
        Math.ceil(estimatedSquareChars),
        Math.ceil(estimatedSquareChars) + 1
      ]);

      let bestChars = 1;
      let bestScore = Infinity;
      candidates.forEach(candidate => {
        const safeCandidate = clampLineWidthChars(candidate, textLength);
        const lineCount = Math.max(1, Math.ceil(Math.max(textLength, 1) / safeCandidate));
        const widthWorld = safeCandidate * charWidth;
        const heightWorld = lineCount * lineHeight;
        const ratioScore = Math.abs(Math.log(Math.max(widthWorld, 0.000001) / Math.max(heightWorld, 0.000001)));
        if (ratioScore < bestScore - 0.000001 || (Math.abs(ratioScore - bestScore) <= 0.000001 && Math.abs(safeCandidate - estimatedSquareChars) < Math.abs(bestChars - estimatedSquareChars))) {
          bestChars = safeCandidate;
          bestScore = ratioScore;
        }
      });

      return bestChars;
    }

    function getDefaultLineWidthChars(textLength = state.textData.length) {
      return clampLineWidthChars(CONFIG.SHAPES.defaultLineWidthChars, textLength);
    }

    function getVirtualLineRowLimit(charsPerLine) {
      const safeCharsPerLine = Math.max(charsPerLine || 1, 1);
      if (safeCharsPerLine <= 1) return 2400;
      if (safeCharsPerLine <= 2) return 3600;
      if (safeCharsPerLine <= 4) return 5400;
      if (safeCharsPerLine <= 8) return 7800;
      return CONFIG.SHAPES.nahFallbackRowLimit;
    }

    function getLineWidthControlProgressForChars(charsPerLine, textLength = state.textData.length) {
      const maxChars = getLineWidthCharLimit(textLength);
      if (maxChars <= 1) return 0.5;

      const squareChars = getSquareLineWidthChars(textLength);
      const safeChars = clampLineWidthChars(charsPerLine, textLength);
      if (safeChars === squareChars) return 0.5;

      if (safeChars < squareChars) {
        if (squareChars <= 1) return 0;
        return 0.5 * clamp(Math.log(safeChars) / Math.log(squareChars), 0, 1);
      }

      if (squareChars >= maxChars) return 1;
      return 0.5 + 0.5 * clamp(
        Math.log(safeChars / squareChars) / Math.log(maxChars / squareChars),
        0,
        1
      );
    }

    function getLineWidthCharsForControlProgress(progress, textLength = state.textData.length) {
      const maxChars = getLineWidthCharLimit(textLength);
      if (maxChars <= 1) return 1;

      const safeProgress = clamp(Number(progress) || 0, 0, 1);
      const squareChars = getSquareLineWidthChars(textLength);
      if (Math.abs(safeProgress - 0.5) <= CONFIG.SHAPES.lineWidthSquareSnapProgress) return squareChars;

      let mappedChars = 1;
      if (safeProgress < 0.5) {
        const t = safeProgress / 0.5;
        mappedChars = squareChars <= 1 ? 1 : Math.exp(Math.log(squareChars) * t);
      } else {
        const t = (safeProgress - 0.5) / 0.5;
        mappedChars = squareChars >= maxChars
          ? maxChars
          : squareChars * Math.exp(Math.log(maxChars / squareChars) * t);
      }

      const safeChars = clampLineWidthChars(mappedChars, textLength);
      return Math.abs(safeChars - squareChars) <= 1 ? squareChars : safeChars;
    }

    function lineWidthCharsToSliderValue(charsPerLine) {
      const maxChars = getLineWidthCharLimit();
      if (maxChars <= 1) return 1;
      const progress = getLineWidthControlProgressForChars(charsPerLine);
      return 1 + progress * (maxChars - 1);
    }

    function sliderValueToLineWidthChars(sliderValue) {
      const maxChars = getLineWidthCharLimit();
      if (maxChars <= 1) return 1;
      const progress = clamp((Number(sliderValue) - 1) / Math.max(maxChars - 1, 1), 0, 1);
      return getLineWidthCharsForControlProgress(progress);
    }

    function solveCircleRadius(textLength, charWidth, lineHeight) {
      const minRadius = Math.max(charWidth * 0.75, lineHeight * 0.75, 1);
      const estimatedRadius = Math.sqrt(Math.max(textLength, 1) * charWidth * lineHeight / Math.PI);
      let low = minRadius;
      let high = Math.max(minRadius * 2, estimatedRadius * 1.8);

      const getCapacityForRadius = radius => {
        let capacity = 0;

        for (let y = -radius + lineHeight / 2; y <= radius - lineHeight / 2; y += lineHeight) {
          const rowWidth = 2 * Math.sqrt(Math.max(0, radius * radius - y * y));
          capacity += Math.floor(rowWidth / charWidth);
        }

        return capacity;
      };

      while (getCapacityForRadius(high) < textLength) {
        low = high;
        high *= 2;
      }

      for (let i = 0; i < 40; i++) {
        const pivot = (low + high) / 2;
        const capacity = getCapacityForRadius(pivot);

        if (capacity >= textLength) high = pivot;
        else low = pivot;
      }

      return Math.ceil(high);
    }

    function allocateCircleRowCharCounts(textLength, rows) {
      if (!rows.length || textLength <= 0) return [];

      if (textLength < rows.length) {
        const activeRowCount = Math.max(1, textLength);
        const startIndex = Math.floor((rows.length - activeRowCount) / 2);
        const activeRows = rows.slice(startIndex, startIndex + activeRowCount);
        return activeRows.map((row, index) => ({
          ...row,
          charCount: index === activeRows.length - 1
            ? textLength - index
            : 1
        }));
      }

      const baseCounts = rows.map(() => 1);
      let remainingChars = textLength - rows.length;
      const expandableCapacities = rows.map(row => Math.max(row.charCapacity - 1, 0));
      const totalExpandable = expandableCapacities.reduce((sum, value) => sum + value, 0);

      if (remainingChars <= 0 || totalExpandable <= 0) {
        return rows.map((row, index) => ({ ...row, charCount: baseCounts[index] }));
      }

      const rawExtras = expandableCapacities.map(capacity => (remainingChars * capacity) / totalExpandable);
      const extraCounts = rawExtras.map((raw, index) => Math.min(expandableCapacities[index], Math.floor(raw)));
      let assignedExtras = extraCounts.reduce((sum, value) => sum + value, 0);

      if (assignedExtras < remainingChars) {
        const remainderOrder = rawExtras
          .map((raw, index) => ({
            index,
            remainder: raw - Math.floor(raw),
            spare: expandableCapacities[index] - extraCounts[index]
          }))
          .sort((a, b) => b.remainder - a.remainder || b.spare - a.spare || Math.abs(rows[a.index].y) - Math.abs(rows[b.index].y));

        for (const entry of remainderOrder) {
          if (assignedExtras >= remainingChars) break;
          if (entry.spare <= 0) continue;
          extraCounts[entry.index] += 1;
          assignedExtras += 1;
        }
      }

      if (assignedExtras < remainingChars) {
        for (let index = 0; index < rows.length && assignedExtras < remainingChars; index += 1) {
          const spare = expandableCapacities[index] - extraCounts[index];
          if (spare <= 0) continue;
          const add = Math.min(spare, remainingChars - assignedExtras);
          extraCounts[index] += add;
          assignedExtras += add;
        }
      }

      return rows.map((row, index) => ({
        ...row,
        charCount: Math.min(row.charCapacity, baseCounts[index] + extraCounts[index])
      }));
    }

    function getCircleLayoutPreset(meta = state.documentMeta) {
      return meta?.layoutPresets?.circle || null;
    }

    function canUseCircleLayoutPreset(preset) {
      if (!preset || !Number.isFinite(preset.radius) || preset.radius <= 0) return false;
      if (!Number.isFinite(preset.charWidth) || !Number.isFinite(preset.lineHeight)) return false;

      const charWidthTolerance = Math.max(0.08, state.baseCharWidth * 0.01);
      const lineHeightTolerance = Math.max(0.08, state.lineHeight * 0.01);
      return Math.abs((preset.fontSize || 0) - state.baseFontSize) <= 0.01
        && Math.abs(preset.charWidth - state.baseCharWidth) <= charWidthTolerance
        && Math.abs(preset.lineHeight - state.lineHeight) <= lineHeightTolerance;
    }

    const glyphPresenceCache = new Map();
    const spiritCharWeightCache = new Map();
    let glyphPresenceCanvas = null;

    function getSpiritCharWeight(char) {
      if (!char || char <= ' ') return 0;
      if (spiritCharWeightCache.has(char)) return spiritCharWeightCache.get(char);

      const code = char.charCodeAt(0);
      let weight = 0.78;

      if (',.;:·`´\'"'.includes(char)) weight = 0.26;
      else if ('-_~|/\\()[]{}'.includes(char)) weight = 0.42;
      else if ('iljrtfI1'.includes(char)) weight = 0.5;
      else if ('mwMW@#%&8'.includes(char)) weight = 0.96;
      else if ((code >= 48 && code <= 57) || (code >= 65 && code <= 90) || (code >= 97 && code <= 122)) weight = 0.74;
      else if (code < 128) weight = 0.68;

      spiritCharWeightCache.set(char, weight);
      return weight;
    }

    function hashSpiritUnit(a, b = 0, c = 0) {
      let value = Math.imul((a | 0) + 1, 1597334677);
      value ^= Math.imul((b | 0) + 1, 3812015801);
      value ^= Math.imul((c | 0) + 1, 958282973);
      value ^= value >>> 16;
      return (value >>> 0) / 4294967295;
    }

    function sampleSpiritDensity(startIndex, charCount, rowIndex, segmentIndex) {
      if (charCount <= 0 || !state.textData) return 0;

      const sampleCount = Math.max(1, Math.min(4, charCount));
      let density = 0;

      for (let sampleIndex = 0; sampleIndex < sampleCount; sampleIndex++) {
        const offset = Math.min(charCount - 1, Math.floor((sampleIndex + 0.5) * charCount / sampleCount));
        density += getSpiritCharWeight(state.textData[startIndex + offset]);
      }

      density /= sampleCount;
      density += (hashSpiritUnit(rowIndex, segmentIndex, startIndex) - 0.5) * 0.14;
      return clamp(density, 0.04, 1);
    }

    function getGlyphPresenceWeight(char) {
      if (!char || char === ' ') return 0;
      if (glyphPresenceCache.has(char)) return glyphPresenceCache.get(char);

      if (!glyphPresenceCanvas) {
        glyphPresenceCanvas = document.createElement('canvas');
        glyphPresenceCanvas.width = 72;
        glyphPresenceCanvas.height = 72;
      }

      const ctx = glyphPresenceCanvas.getContext('2d', { willReadFrequently: true });
      ctx.clearRect(0, 0, glyphPresenceCanvas.width, glyphPresenceCanvas.height);
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, glyphPresenceCanvas.width, glyphPresenceCanvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = `56px ${CONFIG.FONT_FAMILY}`;
      ctx.textBaseline = getCenteredTextBaseline();
      ctx.textAlign = 'center';
      ctx.fillText(char, glyphPresenceCanvas.width / 2, glyphPresenceCanvas.height / 2 + 2);

      const data = ctx.getImageData(0, 0, glyphPresenceCanvas.width, glyphPresenceCanvas.height).data;
      let ink = 0;
      for (let i = 3; i < data.length; i += 4) {
        ink += data[i] / 255;
      }

      const weight = clamp(ink / (glyphPresenceCanvas.width * glyphPresenceCanvas.height * 0.28), 0, 1);
      glyphPresenceCache.set(char, weight);
      return weight;
    }

    async function yieldToUrgentUi(guard = null) {
      if (guard && !guard()) return false;
      await nextPaint();
      return !guard || guard();
    }

    async function buildLinePresenceProfile(charsPerLine, lineCount, { guard = null } = {}) {
      const binCount = Math.max(1, Math.min(CONFIG.PRESENCE.profileBins, lineCount));
      const profile = new Array(binCount);
      const text = state.textData;

      for (let binIndex = 0; binIndex < binCount; binIndex++) {
        const rowStart = Math.floor(binIndex * lineCount / binCount);
        const rowEnd = Math.max(rowStart + 1, Math.floor((binIndex + 1) * lineCount / binCount));
        const charStart = Math.min(text.length, rowStart * charsPerLine);
        const charEnd = Math.min(text.length, rowEnd * charsPerLine);
        const span = charEnd - charStart;

        if (span <= 0) {
          profile[binIndex] = 0;
          continue;
        }

        const sampleCount = Math.max(1, Math.min(CONFIG.PRESENCE.samplesPerBin, span));
        let density = 0;

        for (let sampleIndex = 0; sampleIndex < sampleCount; sampleIndex++) {
          const offset = Math.min(span - 1, Math.floor((sampleIndex + 0.5) * span / sampleCount));
          density += getGlyphPresenceWeight(text[charStart + offset]);
        }

        profile[binIndex] = density / sampleCount;

        if ((binIndex + 1) % 16 === 0 && binIndex + 1 < binCount) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }
      }

      return profile;
    }

    async function buildLineLayout({ includePresenceProfile = true, guard = null } = {}) {
      const charsPerLine = clampLineWidthChars(state.shape.lineWidthChars);
      const lineCount = Math.max(1, Math.ceil(state.textData.length / charsPerLine));
      const virtualRowLimit = getVirtualLineRowLimit(charsPerLine);
      const shouldUseVirtualRows = lineCount > virtualRowLimit;
      const height = Math.max(lineCount * state.lineHeight, state.lineHeight);
      const width = charsPerLine * state.baseCharWidth;
      const rows = [];
      let textIndex = 0;
      let maxLineWidth = 0;
      const topY = -height / 2 + state.lineHeight / 2;

      if (shouldUseVirtualRows) {
        return {
          rows: [],
          bounds: {
            minX: -width / 2,
            maxX: width / 2,
            minY: -height / 2,
            maxY: height / 2,
            width,
            height
          },
          center: { x: 0, y: 0 },
          maxLineWidth: width,
          worldSpan: Math.max(width, height),
          meta: {
            charsPerLine,
            lineCount,
            topY,
            virtualRows: true,
            presenceProfile: null
          }
        };
      }

      for (let i = 0; i < lineCount; i++) {
        const charCount = Math.min(charsPerLine, state.textData.length - textIndex);
        if (charCount <= 0) break;

        const lineWidth = charCount * state.baseCharWidth;
        maxLineWidth = Math.max(maxLineWidth, lineWidth);
        rows.push({
          x: 0,
          y: topY + i * state.lineHeight,
          startIndex: textIndex,
          charCount
        });
        textIndex += charCount;

        if ((i + 1) % 256 === 0 && i + 1 < lineCount) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }
      }

      const presenceProfile = includePresenceProfile
        ? await buildLinePresenceProfile(charsPerLine, lineCount, { guard })
        : null;
      if (includePresenceProfile && !presenceProfile) return null;

      return {
        rows,
        bounds: {
          minX: -width / 2,
          maxX: width / 2,
          minY: -height / 2,
          maxY: height / 2,
          width,
          height
        },
        center: { x: 0, y: 0 },
        maxLineWidth,
        worldSpan: Math.max(width, height),
        meta: {
          charsPerLine,
          lineCount,
          topY,
          presenceProfile
        }
      };
    }

    async function buildCircleLayout({ guard = null } = {}) {
      const preset = getCircleLayoutPreset();
      const radius = canUseCircleLayoutPreset(preset)
        ? Math.ceil(preset.radius)
        : solveCircleRadius(state.textData.length, state.baseCharWidth, state.lineHeight);
      const candidateRows = [];
      let maxLineWidth = 0;
      let rowIndex = 0;

      for (let y = -radius + state.lineHeight / 2; y <= radius - state.lineHeight / 2; y += state.lineHeight) {
        const rowWidth = 2 * Math.sqrt(Math.max(0, radius * radius - y * y));
        const charCapacity = Math.floor(rowWidth / state.baseCharWidth);
        if (charCapacity <= 0) continue;

        candidateRows.push({ y, charCapacity, rowWidth });
        rowIndex += 1;

        if (rowIndex % 256 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }
      }

      const allocatedRows = allocateCircleRowCharCounts(state.textData.length, candidateRows);
      const rows = [];
      let textIndex = 0;

      for (let index = 0; index < allocatedRows.length; index += 1) {
        const row = allocatedRows[index];
        const charCount = Math.min(row.charCount, state.textData.length - textIndex);
        if (charCount <= 0) break;

        const lineWidth = charCount * state.baseCharWidth;
        maxLineWidth = Math.max(maxLineWidth, lineWidth);
        rows.push({ x: 0, y: row.y, startIndex: textIndex, charCount });
        textIndex += charCount;

        if ((index + 1) % 256 === 0) {
          const canContinue = await yieldToUrgentUi(guard);
          if (!canContinue) return null;
        }

        if (textIndex >= state.textData.length) break;
      }

      return {
        rows,
        bounds: canUseCircleLayoutPreset(preset) && preset.bounds && Number.isFinite(preset.bounds.width)
          ? { ...preset.bounds }
          : {
              minX: -radius,
              maxX: radius,
              minY: -radius,
              maxY: radius,
              width: radius * 2,
              height: radius * 2
            },
        center: { x: 0, y: 0 },
        maxLineWidth,
        worldSpan: canUseCircleLayoutPreset(preset) && Number.isFinite(preset.worldSpan)
          ? preset.worldSpan
          : radius * 2,
        meta: { radius, presenceProfile: null, preset: canUseCircleLayoutPreset(preset) }
      };
    }

    async function buildShapeLayout(options = {}) {
      return state.shape.type === 'line' ? buildLineLayout(options) : buildCircleLayout(options);
    }

    function updateNormalizeScale() {
      state.normalizeScale = getNormalizeScaleForLayout(state.layout);
    }

    function resetNahTexture() {
      state.textures.nah = { canvas: null, centerX: 0, centerY: 0, scale: 0, width: 0, height: 0 };
    }

    function cloneTextureState(texture) {
      return {
        canvas: texture.canvas,
        width: texture.width,
        height: texture.height,
        padding: texture.padding,
        scaleX: texture.scaleX,
        scaleY: texture.scaleY
      };
    }

    function hasTextureCanvas(texture) {
      return !!texture?.canvas;
    }

    function getNormalizeScaleForLayout(layout) {
      const span = Math.max(layout?.worldSpan || 1, 1);
      return CONFIG.TARGET_WORLD_SPAN / span;
    }

    function hasLayoutGeometry(layout = state.layout) {
      if (!layout) return false;
      if ((layout?.rows?.length || 0) > 0) return true;
      return !!(
        layout?.meta?.virtualRows
        && Number.isFinite(layout?.meta?.lineCount)
        && layout.meta.lineCount > 0
        && Number.isFinite(layout?.bounds?.width)
        && Number.isFinite(layout?.bounds?.height)
      );
    }

    function getFernScaleStages() {
      return CONFIG.FERN_TEXTURE.progressiveScales;
    }

    function getFernScaleForStageIndex(stageIndex) {
      const stages = getFernScaleStages();
      const safeIndex = clamp(stageIndex, 0, stages.length - 1);
      return stages[safeIndex] || CONFIG.FERN_TEXTURE.scale;
    }

    function getGlTextureMaxSizeHint() {
      if (state.runtimeLimits.glTextureMaxSize != null) return state.runtimeLimits.glTextureMaxSize;

      let detected = CONFIG.FERN_TEXTURE.maxSize;
      try {
        const probeCanvas = document.createElement('canvas');
        const gl = probeCanvas.getContext('webgl') || probeCanvas.getContext('experimental-webgl');
        const maxTextureSize = gl?.getParameter?.(gl.MAX_TEXTURE_SIZE);
        if (Number.isFinite(maxTextureSize) && maxTextureSize > 0) {
          detected = Math.min(detected, maxTextureSize);
        }
      } catch (error) {
        detected = CONFIG.FERN_TEXTURE.maxSize;
      }

      state.runtimeLimits.glTextureMaxSize = clamp(Math.floor(detected), 2048, CONFIG.FERN_TEXTURE.maxSize);
      return state.runtimeLimits.glTextureMaxSize;
    }

    function getEffectiveFernTextureMaxSize() {
      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      const deviceMemory = navigator.deviceMemory || 0;
      const glLimit = getGlTextureMaxSizeHint();
      const isMobileLike = viewport.width <= 820;

      let safeLimit = CONFIG.FERN_TEXTURE.maxSize;
      if (isMobileLike) {
        if (deviceMemory >= 8 && dpr < 3) safeLimit = 8192;
        else if (deviceMemory >= 4 || dpr < 2.5) safeLimit = 6144;
        else safeLimit = 4096;
      } else if (deviceMemory && deviceMemory <= 4) {
        safeLimit = 8192;
      }

      return clamp(Math.min(CONFIG.FERN_TEXTURE.maxSize, glLimit, safeLimit), 2048, CONFIG.FERN_TEXTURE.maxSize);
    }

    function getSafeFernTextureMaxSize() {
      const safeMaxSize = getEffectiveFernTextureMaxSize();
      return clamp(
        Math.floor(safeMaxSize * CONFIG.FERN_TEXTURE.safetyHeadroom),
        2048,
        safeMaxSize
      );
    }

    function getHardFernTextureMaxSize() {
      return clamp(
        Math.min(CONFIG.FERN_TEXTURE.maxSize, getGlTextureMaxSizeHint()),
        2048,
        CONFIG.FERN_TEXTURE.maxSize
      );
    }

    function getRenderableTextureScaleLimit(textureConfig, layout, maxSize = textureConfig.maxSize) {
      const boundsWidth = Math.max(layout.bounds.width, 1);
      const boundsHeight = Math.max(layout.bounds.height, 1);
      const paddingX = Math.max(8, Math.ceil(state.baseCharWidth * 3));
      const paddingY = Math.max(8, Math.ceil(state.lineHeight * 2));

      return Math.max(Math.min(
        (maxSize - paddingX * 2) / boundsWidth,
        (maxSize - paddingY * 2) / boundsHeight
      ), 0.000001);
    }

    function getActualFernStageIndexFromScale(scale) {
      const stages = getFernScaleStages();
      let bestIndex = 0;
      for (let stageIndex = 0; stageIndex < stages.length; stageIndex += 1) {
        if (stages[stageIndex] <= scale + 0.000001) bestIndex = stageIndex;
      }
      return bestIndex;
    }

    function getBestFernStageIndex(layout) {
      const maxRenderableScale = getRenderableTextureScaleLimit(
        CONFIG.FERN_TEXTURE,
        layout,
        getSafeFernTextureMaxSize()
      );
      return getActualFernStageIndexFromScale(maxRenderableScale);
    }

    function getSafeFernTargetScale(layout) {
      const maxRenderableScale = getRenderableTextureScaleLimit(
        CONFIG.FERN_TEXTURE,
        layout,
        getSafeFernTextureMaxSize()
      );
      return Math.max(maxRenderableScale, 0.000001);
    }

    function getBestFernTargetScale(layout) {
      const maxRenderableScale = getRenderableTextureScaleLimit(
        CONFIG.FERN_TEXTURE,
        layout,
        getHardFernTextureMaxSize()
      );
      return Math.max(maxRenderableScale, 0.000001);
    }

    function getEstimatedFitScaleForLayout(layout, normalizeScale = getNormalizeScaleForLayout(layout), { initialCircleViewportFraction = null } = {}) {
	      const viewport = getPreferredScaleViewportMetrics();
      const fitWidth = Math.max(layout.bounds.width * normalizeScale, 1);
      const fitHeight = Math.max(layout.bounds.height * normalizeScale, 1);

      if (layout?.meta?.radius && initialCircleViewportFraction != null) {
        const targetDiameterPx = Math.max(Math.min(viewport.width, viewport.height) * initialCircleViewportFraction, 1);
        return clamp(targetDiameterPx / Math.max(fitWidth, fitHeight), CONFIG.ZOOM.min, CONFIG.ZOOM.max);
      }

      const fitScaleX = viewport.width * CONFIG.SHAPES.fitMargin / fitWidth;
      const fitScaleY = viewport.height * CONFIG.SHAPES.fitMargin / fitHeight;
      return clamp(Math.min(fitScaleX, fitScaleY), CONFIG.ZOOM.min, CONFIG.ZOOM.max);
    }

    function getEstimatedScreenFontSizeForLayout(layout, { fitView = false, initialCircleViewportFraction = null } = {}) {
      const normalizeScale = getNormalizeScaleForLayout(layout);
      const effectiveScale = fitView || !hasLayoutGeometry(state.layout)
        ? getEstimatedFitScaleForLayout(layout, normalizeScale, { initialCircleViewportFraction }) * normalizeScale
        : getEffectiveScale();
      return state.baseFontSize * effectiveScale;
    }

	    function getViewportResponsiveScaleBaseOptions() {
	      return {
	        initialCircleViewportFraction: state.shape.type === 'circle'
	          ? (state.viewportResponsiveScale.circleViewportFraction ?? CONFIG.SHAPES.initialCircleViewportFraction)
	          : null
	      };
	    }

	    function getViewportResponsiveBaseFitScale() {
	      if (!hasLayoutGeometry(state.layout)) return null;
	      return getEstimatedFitScaleForLayout(
	        state.layout,
	        state.normalizeScale,
	        getViewportResponsiveScaleBaseOptions()
	      );
	    }

	    function syncViewportResponsiveScaleState({ initialCircleViewportFraction = undefined } = {}) {
	      if (state.shape.type === 'circle') {
	        if (initialCircleViewportFraction !== undefined && initialCircleViewportFraction != null) {
	          state.viewportResponsiveScale.circleViewportFraction = initialCircleViewportFraction;
	        } else if (state.viewportResponsiveScale.circleViewportFraction == null) {
	          state.viewportResponsiveScale.circleViewportFraction = CONFIG.SHAPES.initialCircleViewportFraction;
	        }
	      } else {
	        state.viewportResponsiveScale.circleViewportFraction = null;
	      }

	      const baseFitScale = getViewportResponsiveBaseFitScale();
	      if (!Number.isFinite(baseFitScale) || baseFitScale <= 0 || !Number.isFinite(state.scale) || state.scale <= 0) {
	        state.viewportResponsiveScale.zoomMultiplier = 1;
	        return false;
	      }

	      state.viewportResponsiveScale.zoomMultiplier = Math.max(state.scale / baseFitScale, 0.000001);
	      return true;
	    }

	    function applyViewportResponsiveScaleOnResize() {
	      if (!state.textData || !hasLayoutGeometry(state.layout)) return false;
	      const baseFitScale = getViewportResponsiveBaseFitScale();
	      if (!Number.isFinite(baseFitScale) || baseFitScale <= 0) return false;
	      const zoomMultiplier = Math.max(state.viewportResponsiveScale.zoomMultiplier || 1, 0.000001);
	      state.scale = clamp(baseFitScale * zoomMultiplier, CONFIG.ZOOM.min, CONFIG.ZOOM.max);
	      return true;
	    }

    function getInitialFernStageIndex(layout, { fitView = false, initialCircleViewportFraction = null } = {}) {
      const screenFontSize = getEstimatedScreenFontSizeForLayout(layout, { fitView, initialCircleViewportFraction });
      const thresholds = CONFIG.FERN_TEXTURE.initialScreenFontThresholds;
      let stageIndex = thresholds.findIndex(threshold => screenFontSize <= threshold);
      if (stageIndex === -1) stageIndex = getFernScaleStages().length - 1;

      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      if (viewport.width <= 768 || dpr >= 2.5) {
        stageIndex = Math.min(stageIndex, getFernScaleStages().length - 2);
      }

      return clamp(stageIndex, 0, getFernScaleStages().length - 1);
    }

    function isPreparedRenderActive(prepared) {
      return state.activePreparedRender === prepared;
    }

    function getShapeRenderCacheKey() {
      const lineWidthPart = state.shape.type === 'line'
        ? `:${Math.round(state.shape.lineWidthChars)}`
        : '';

      return [
        state.documentCacheKey,
        state.shape.type,
        lineWidthPart,
        `fernSafe:${Math.round(getSafeFernTextureMaxSize())}`,
        `fernHard:${Math.round(getHardFernTextureMaxSize())}`,
        state.baseFontSize,
        state.baseCharWidth.toFixed(4),
        state.lineHeight.toFixed(4)
      ].join('|');
    }

    function createEmptyTextureState(textureConfig = CONFIG.FERN_TEXTURE) {
      return {
        canvas: null,
        width: 0,
        height: 0,
        padding: 0,
        scaleX: textureConfig.scale,
        scaleY: textureConfig.scale
      };
    }

    function createEmptyLayoutState() {
      return {
        rows: [],
        bounds: { minX: -1, maxX: 1, minY: -1, maxY: 1, width: 2, height: 2 },
        center: { x: 0, y: 0 },
        maxLineWidth: 0,
        worldSpan: 2,
        meta: {}
      };
    }

    function createPreparedShapeRender(layout) {
      return {
        layout,
        fernTexture: createEmptyTextureState(CONFIG.FERN_TEXTURE),
        fernPromise: null,
        initialFernStageIndex: 0,
        bestFernStageIndex: 0,
        safeFernTargetScale: CONFIG.FERN_TEXTURE.scale,
        bestFernTargetScale: CONFIG.FERN_TEXTURE.scale,
        fernStageIndex: -1,
        fernPendingStageIndex: -1
      };
    }

    function shouldForceNahForLayout() {
      return false;
    }

    function getFullTextNahReferenceScale(qualityBoost = 1) {
      const dpr = window.devicePixelRatio || 1;
      const targetScreenFont = Math.max(state.blendTuning.fernToNahEnd || CONFIG.BLEND.fernToNahEnd, 0.1);
      const baseFontSize = Math.max(state.baseFontSize || CONFIG.TARGET_FONT_SIZE, 0.000001);
      return Math.max((targetScreenFont / baseFontSize) * dpr * Math.max(qualityBoost, 1), 0.000001);
    }

    function getVirtualLineRowAt(layout, rowIndex) {
      const charsPerLine = Math.max(layout?.meta?.charsPerLine || 1, 1);
      const lineCount = Math.max(layout?.meta?.lineCount || 0, 0);
      if (rowIndex < 0 || rowIndex >= lineCount) return null;

      const startIndex = rowIndex * charsPerLine;
      const charCount = Math.min(charsPerLine, Math.max(state.textData.length - startIndex, 0));
      if (charCount <= 0) return null;

      return {
        x: 0,
        y: (layout?.meta?.topY || 0) + rowIndex * state.lineHeight,
        startIndex,
        charCount
      };
    }

    function resizeLineWidthGhostCanvas() {
      const viewport = getViewportMetrics();
      const dpr = window.devicePixelRatio || 1;
      const width = Math.max(1, Math.round(viewport.width * dpr));
      const height = Math.max(1, Math.round(viewport.height * dpr));

      if (elements.lineWidthGhost.width !== width || elements.lineWidthGhost.height !== height) {
        elements.lineWidthGhost.width = width;
        elements.lineWidthGhost.height = height;
        elements.lineWidthGhost.style.width = `${viewport.width}px`;
        elements.lineWidthGhost.style.height = `${viewport.height}px`;
      }

      const ctx = elements.lineWidthGhostCtx;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { ctx, width: viewport.width, height: viewport.height };
    }

    function clearLineWidthGhostCanvas() {
      const { ctx, width, height } = resizeLineWidthGhostCanvas();
      ctx.clearRect(0, 0, width, height);
    }

    function applyPreparedShapeRender(prepared, { fitView = false, viewTransition = null, initialCircleViewportFraction = null } = {}) {
      state.activePreparedRender = prepared;
      if (fitView) {
        state.layout = prepared.layout;
        updateNormalizeScale();
      } else if (viewTransition?.mode === 'circleFootprint' && state.shape.type === 'circle') {
        preserveCircleFootprint(prepared.layout, viewTransition);
      } else {
        preserveScreenTypography(prepared.layout);
      }
      resetNahTexture();
      state.textures.fern = cloneTextureState(prepared.fernTexture);

      initFernLayer();
      hideNahOverlay();
      clearPresenceLayer();
      if (!state.textures.fern.canvas) hideFernOverlay();
      state.renderMode = 'fern';

      if (prepared.layout.meta?.forceNah) {
        state.lineWidthPreview.active = false;
        state.lineWidthPreview.bridging = !(state.renderWhisper.kind === 'load' && state.renderWhisper.pendingLoadId);
        if (state.lineWidthPreview.bridging) {
          updateLineWidthPreviewGhost({ bridge: true });
        } else {
          clearLineWidthGhostCanvas();
          elements.lineWidthGhost.style.display = 'none';
          elements.lineWidthGhost.style.opacity = '0';
        }
      } else {
        clearLineWidthPreview({ keepOverlay: true });
      }

      if (fitView) fitShapeInView({ initialCircleViewportFraction });
      updateDocumentStatsReadout();
      applyTransform();
      updateLoadWhisperCommitState();
      maybeFinishLoadWhisper();
    }

    function applyPreparedFernTexture(prepared) {
      state.textures.fern = cloneTextureState(prepared.fernTexture);
      initFernLayer();
      if (!state.textures.fern.canvas) hideFernOverlay();
      updateDocumentStatsReadout();
      applyTransform();
      updateLoadWhisperCommitState();
    }

    async function prepareShapeRender({ guard = null, fitView = false, initialCircleViewportFraction = null } = {}) {
      const layout = await buildShapeLayout({ guard });
      if (!layout) return null;
      layout.meta = {
        ...(layout.meta || {}),
        forceNah: shouldForceNahForLayout(layout)
      };
      const prepared = createPreparedShapeRender(layout);
      prepared.safeFernTargetScale = getSafeFernTargetScale(layout);
      prepared.bestFernTargetScale = getBestFernTargetScale(layout);
      prepared.bestFernStageIndex = getActualFernStageIndexFromScale(prepared.safeFernTargetScale);
      prepared.initialFernStageIndex = getInitialFernStageIndex(layout, { fitView, initialCircleViewportFraction });
      prepared.layout.meta.fullTextFern = !prepared.layout.meta.forceNah
        && prepared.safeFernTargetScale >= getFullTextNahReferenceScale() - 0.000001;
      if (layout.meta.forceNah) {
        return prepared;
      }

      if (!prepared.layout.meta.forceNah) {
        const fernTexture = await renderFernTexture({
          layout,
          guard,
          targetScale: prepared.safeFernTargetScale
        });
        if (!fernTexture) return null;
        prepared.fernTexture = fernTexture;
        prepared.fernStageIndex = fernTexture.stageIndex ?? prepared.bestFernStageIndex;
      }

      return prepared;
    }

    async function ensurePreparedFernTexture(prepared, { guard = null, targetStageIndex = null, targetScale = null } = {}) {
      if (prepared.layout.meta?.forceNah) {
        return prepared.fernTexture;
      }
      const desiredTargetScale = clamp(
        Math.min(
          targetScale ?? (targetStageIndex == null
            ? prepared.safeFernTargetScale
            : getFernScaleForStageIndex(targetStageIndex)),
          prepared.safeFernTargetScale
        ),
        0.000001,
        prepared.safeFernTargetScale
      );

      if (hasTextureCanvas(prepared.fernTexture) && Math.min(prepared.fernTexture.scaleX, prepared.fernTexture.scaleY) >= desiredTargetScale - 0.000001) {
        return prepared.fernTexture;
      }

      if (!prepared.fernPromise) {
        prepared.fernPendingStageIndex = getActualFernStageIndexFromScale(desiredTargetScale);
        prepared.fernPromise = renderFernTexture({
          layout: prepared.layout,
          guard,
          targetScale: desiredTargetScale
        })
          .then(texture => {
            if (texture && (!guard || guard())) {
              prepared.fernTexture = texture;
              prepared.fernStageIndex = texture.stageIndex ?? getActualFernStageIndexFromScale(desiredTargetScale);
            }
            return texture;
          })
          .finally(() => {
            prepared.fernPromise = null;
            prepared.fernPendingStageIndex = -1;
          });
      } else if (prepared.fernPendingStageIndex < getActualFernStageIndexFromScale(desiredTargetScale)) {
        return prepared.fernPromise.then(() => ensurePreparedFernTexture(prepared, { guard, targetScale: desiredTargetScale }));
      }

      return prepared.fernPromise;
    }

    function clearLineWidthPreview({ keepOverlay = false } = {}) {
      if (state.lineWidthPreview.commitTimeout) {
        clearTimeout(state.lineWidthPreview.commitTimeout);
        state.lineWidthPreview.commitTimeout = null;
      }
      if (state.lineWidthPreview.frameRequest) {
        cancelAnimationFrame(state.lineWidthPreview.frameRequest);
        state.lineWidthPreview.frameRequest = 0;
      }
      state.lineWidthPreview.active = false;
      state.lineWidthPreview.bridging = false;
      clearLineWidthGhostCanvas();
      elements.lineWidthGhost.style.display = 'none';
      elements.lineWidthGhost.style.opacity = '0';
      if (!keepOverlay) hideNahOverlay();
    }

    function cancelLineWidthCommit() {
      if (!state.lineWidthPreview.commitTimeout) return;
      clearTimeout(state.lineWidthPreview.commitTimeout);
      state.lineWidthPreview.commitTimeout = null;
    }

    function updateLineWidthReadout() {
      normalizeLineWidthCharsState();
      shapePanel?.setSliderConfig('lineWidthChars', {
        min: CONFIG.SHAPES.minLineWidthChars,
        max: getLineWidthCharLimit()
      });
      shapePanel?.set('lineWidthChars', state.shape.lineWidthChars);
    }

    function applyLineShapeDefaultWidth() {
      state.shape.lineWidthChars = getDefaultLineWidthChars();
      updateLineWidthReadout();
    }

    function getFernCoveragePercent(scale) {
      const referenceScale = getFullTextNahReferenceScale();
      const percent = (Math.max(scale || 0, 0) / referenceScale) * 100;
      return clamp(percent, 0, 100);
    }

    function formatCoveragePercent(scale) {
      const percent = getFernCoveragePercent(scale);
      if (percent >= 99.5) return '100%';
      if (percent >= 10) return `${Math.round(percent)}%`;
      return `${percent.toFixed(1)}%`;
    }

    function getActiveFernScale() {
      return Math.min(state.textures.fern?.scaleX || 0, state.textures.fern?.scaleY || 0);
    }

    function getCurrentDocumentCharCount() {
      const count = state.documentMeta?.charCount || state.textData.length || 0;
      return Number.isFinite(count) ? count : 0;
    }

    function formatDocumentCharCount(count) {
      return Math.max(0, Number(count) || 0).toLocaleString('de-DE');
    }

    function createRandomSeed() {
      if (window.crypto?.getRandomValues) {
        const buffer = new Uint32Array(1);
        window.crypto.getRandomValues(buffer);
        return (buffer[0] || Date.now()) >>> 0;
      }

      return ((Math.random() * 0x100000000) ^ Date.now()) >>> 0;
    }

    function isRemixModeEnabled() {
      return !!state.remix.enabled;
    }

    function getActiveKarussellDocumentEntry() {
      return getCurrentKarussellBibleEntry() || null;
    }

    function getDirectDocumentEntryForCurrentUi(recipe = getRemixRecipe()) {
      const activeEntry = getActiveKarussellDocumentEntry();
      if (!activeEntry) return null;
      if (isDropBibleTriggerEntry(activeEntry)) return activeEntry;
      if (!isRemixModeEnabled() && !isLiveRemixPreviewEntry(activeEntry)) return activeEntry;
      return doesBibleEntryRepresentRecipe(activeEntry, recipe) ? activeEntry : null;
    }

    function getActiveDocumentSelectionKey() {
      if (isRemixModeEnabled()) {
        const currentEntry = getCurrentKarussellBibleEntry();
        if (isDropBibleTriggerEntry(currentEntry)) {
          return `single:${currentEntry.file}`;
        }
        const directEntry = getDirectDocumentEntryForCurrentUi();
        if (directEntry && !isLiveRemixPreviewEntry(directEntry)) {
          return `single:${directEntry.file}`;
        }
        return `remix:${getRemixRecipeKey()}`;
      }

      const currentFile = getCurrentKarussellBibleEntry()?.file || '';
      return currentFile ? `single:${currentFile}` : '';
    }

    function isCurrentBibleStatsReady() {
      const expectedSelectionKey = getActiveDocumentSelectionKey();
      const loadedSelectionKey = state.documentSelectionKey || '';

      if (!expectedSelectionKey || !loadedSelectionKey) return false;
      if (expectedSelectionKey !== loadedSelectionKey) return false;
      if (!hasLayoutGeometry(state.layout)) return false;

      const { pendingLoadId, committedLoadId } = state.renderWhisper;
      if (pendingLoadId && committedLoadId !== pendingLoadId) return false;

      return true;
    }

    function hasNahTextDisplayed() {
      const nahOpacity = parseFloat(elements.nahCanvas?.style.opacity || '0');
      return isNahOverlayReady()
        && nahOpacity > 0.001;
    }

    function shouldPreferNahView(screenFontSize = state.baseFontSize * getEffectiveScale()) {
      const blendProfile = getActiveBlendProfile(screenFontSize);
      return !state.layout?.meta?.fullTextFern
        && (blendProfile.shouldForceNah || screenFontSize >= blendProfile.thresholds.fernToNahStart);
    }

    function isCurrentViewTextReady() {
      if (!state.textData || !hasLayoutGeometry(state.layout)) return false;
      if (shouldPreferNahView()) return hasNahTextDisplayed();
      return hasTextureCanvas(state.textures.fern);
    }

    function updateLoadWhisperCommitState(loadId = state.renderWhisper.pendingLoadId || currentLoadId) {
      if (state.renderWhisper.pendingLoadId !== loadId || state.renderWhisper.kind !== 'load') return false;
      if (state.layoutBuildRevision < (state.renderWhisper.requiredLayoutRevision || 0)) {
        state.renderWhisper.committedLoadId = 0;
        return false;
      }
      state.renderWhisper.committedLoadId = isCurrentViewTextReady() ? loadId : 0;
      return state.renderWhisper.committedLoadId === loadId;
    }

    function updateDocumentStatsReadout() {
      const statsReady = isCurrentBibleStatsReady();
      if (shapePanelEls.charCountStatus) {
        shapePanelEls.charCountStatus.textContent = statsReady
          ? formatDocumentCharCount(getCurrentDocumentCharCount())
          : '–';
      }
    }

    function maybeFinishLoadWhisper(loadId = state.renderWhisper.pendingLoadId || currentLoadId) {
      if (state.renderWhisper.pendingLoadId !== loadId || state.renderWhisper.kind !== 'load') return;
      if (state.renderWhisper.committedLoadId !== loadId) return;
      if (state.renderWhisper.revealFrame) return;

      state.renderWhisper.revealFrame = requestAnimationFrame(() => {
        state.renderWhisper.revealFrame = requestAnimationFrame(() => {
          state.renderWhisper.revealFrame = 0;
          if (state.renderWhisper.pendingLoadId !== loadId || state.renderWhisper.kind !== 'load') return;
          if (state.renderWhisper.committedLoadId !== loadId) return;
          rememberStableCircleFootprint(captureCircleFootprintReference(), { force: true });
          clearRenderWhisper({ kind: 'load' });
        });
      });
    }

    function getAbsoluteFocusWorld() {
      const normalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      return {
        x: state.focusWorld.x / normalizeScale,
        y: state.focusWorld.y / normalizeScale
      };
    }

    function preserveScreenTypography(layout) {
      const prevNormalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      const prevEffectiveScale = getEffectiveScale();
      const focusWorldX = state.focusWorld.x / prevNormalizeScale;
      const focusWorldY = state.focusWorld.y / prevNormalizeScale;

      state.layout = layout;
      updateNormalizeScale();
      state.scale = clamp(
        prevEffectiveScale / Math.max(state.normalizeScale, 0.000001),
        CONFIG.ZOOM.min,
        CONFIG.ZOOM.max
      );
      syncViewportResponsiveScaleState();
      state.focusWorld = {
        x: focusWorldX * state.normalizeScale,
        y: focusWorldY * state.normalizeScale
      };
    }

    function captureCircleFootprintReference() {
      if (
        state.shape.type !== 'circle'
        || !state.textData
        || !state.layout?.rows?.length
        || !Number.isFinite(state.layout?.meta?.radius)
        || !state.layout?.bounds?.width
      ) return null;
      const viewport = getViewportMetrics();
      const metrics = getShapeScreenMetrics();
      return {
        mode: 'circleFootprint',
        diameterPx: Math.max(metrics.widthPx, metrics.heightPx, 1),
        centerOffsetX: metrics.centerX - viewport.localCenterX,
        centerOffsetY: metrics.centerY - viewport.localCenterY,
        anchorX: metrics.centerX,
        anchorY: metrics.centerY
      };
    }

    function cloneCircleFootprint(reference) {
      if (!reference) return null;
      return {
        ...reference,
        mode: 'circleFootprint',
        diameterPx: Math.max(reference.diameterPx || 0, 1)
      };
    }

    function rememberStableCircleFootprint(reference = captureCircleFootprintReference(), { force = false } = {}) {
      if (!reference || state.shape.type !== 'circle') return;
      if (!force && state.renderWhisper.pendingLoadId) return;
      state.stableCircleFootprint = cloneCircleFootprint(reference);
    }

    function freezeCircleFootprintTransition() {
      if (state.shape.type !== 'circle') {
        state.carryOverCircleFootprint = null;
        return null;
      }

      const liveReference = captureCircleFootprintReference();
      const reference = liveReference
        || state.carryOverCircleFootprint
        || state.stableCircleFootprint
        || getFallbackDropBibleReference();

      state.carryOverCircleFootprint = cloneCircleFootprint(reference);
      return cloneCircleFootprint(state.carryOverCircleFootprint);
    }

    function getPreferredCircleFootprintReference() {
      if (state.shape.type !== 'circle') return null;

      const liveReference = captureCircleFootprintReference();
      if (liveReference) return liveReference;

      if (state.carryOverCircleFootprint) {
        return cloneCircleFootprint(state.carryOverCircleFootprint);
      }

      return state.stableCircleFootprint
        ? cloneCircleFootprint(state.stableCircleFootprint)
        : null;
    }

    function getInitialCircleFootprintReference() {
	      const scaleViewport = getPreferredScaleViewportMetrics();
	      const placementViewport = getPreferredPlacementViewportMetrics();
      const fraction = CONFIG.SHAPES.initialCircleViewportFraction;
	      const diameterPx = Math.max(Math.min(scaleViewport.width, scaleViewport.height) * fraction, 120);
      return {
        mode: 'circleFootprint',
        syntheticInitial: true,
        diameterPx,
        centerOffsetX: 0,
        centerOffsetY: 0,
	        anchorX: placementViewport.localCenterX,
	        anchorY: placementViewport.localCenterY
      };
    }

    function getFallbackDropBibleReference() {
      return getInitialCircleFootprintReference();
    }

    function createDropBiblePlaceholder(reference = getPreferredCircleFootprintReference()) {
      const normalizedReference = cloneCircleFootprint(reference) || getFallbackDropBibleReference();
      const normalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      const sceneScale = Math.max(state.scale || 1, 0.000001);
      const effectiveScale = Math.max(getEffectiveScale(), 0.000001);
      const normalizedCenterX = state.focusWorld.x + (normalizedReference.centerOffsetX || 0) / sceneScale;
      const normalizedCenterY = state.focusWorld.y + (normalizedReference.centerOffsetY || 0) / sceneScale;

      return {
        centerWorldX: normalizedCenterX / normalizeScale,
        centerWorldY: normalizedCenterY / normalizeScale,
        worldDiameter: Math.max(normalizedReference.diameterPx / effectiveScale, 1),
        reference: normalizedReference
      };
    }

    function updateDropBibleOverlayTransform() {
      if (!elements.dropBibleOverlay || !state.dropBiblePlaceholder) return;

      const viewport = getViewportMetrics();
      const normalizeScale = Math.max(state.normalizeScale || 1, 0.000001);
      const effectiveScale = getEffectiveScale();
      const diameterPx = Math.max(state.dropBiblePlaceholder.worldDiameter * effectiveScale, 1);
      const centerX = viewport.localCenterX + (state.dropBiblePlaceholder.centerWorldX * normalizeScale - state.focusWorld.x) * state.scale;
      const centerY = viewport.localCenterY + (state.dropBiblePlaceholder.centerWorldY * normalizeScale - state.focusWorld.y) * state.scale;

      elements.dropBibleOverlay.style.left = `${centerX}px`;
