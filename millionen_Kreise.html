<!-- millionen_Kreise.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concentric Circles with Zoom</title>
    <link href="/meta.css" rel="stylesheet">
    <script src="/meta.js" defer></script>

    <style>

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color); /* Setzt den Hintergrund */
        }
        canvas {
            display: block;
        }
        #tooltip {
            position: absolute;
            padding: 5px 10px;
            border-radius: 4px;
            pointer-events: none;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 14px;
            display: none;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <canvas id="circleCanvas"></canvas>
    <div id="tooltip"></div>
    <script>
        // Funktion zum Abrufen der CSS-Variable
        function getCSSVariable(variable) {
            const value = getComputedStyle(document.body).getPropertyValue(variable).trim();
            console.log(`CSS Variable ${variable}: ${value}`); // Debugging
            return value;
        }

        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        let circles = [];
        let zoomLevel = 1;
        let offsetX = 0;
        let offsetY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawCircles();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawCircles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circles = [];
            let initialRadius = 1;
            let spacingFactor = 1.01;
            let lineWidth = 0.6;
            let numberOfCircles = 100000;
            const textColor = getCSSVariable('--text-color');

            // Überprüfe, ob textColor definiert ist
            if (!textColor) {
                console.error("CSS Variable '--text-color' ist nicht definiert.");
                return;
            }

            ctx.strokeStyle = textColor;
            ctx.lineWidth = lineWidth;

            let radius = initialRadius;
            for (let i = 0; i < numberOfCircles; i++) {
                // Berechne den maximalen Radius basierend auf der Zoomstufe und Canvasgröße
                if (radius * zoomLevel > Math.sqrt(Math.pow(canvas.width, 2) + Math.pow(canvas.height, 2)) / 2) {
                    break;
                }
                ctx.beginPath();
                ctx.arc(canvas.width / 2 + offsetX, canvas.height / 2 + offsetY, radius * zoomLevel, 0, Math.PI * 2);
                ctx.stroke();
                circles.push({ radius: radius, index: i + 1 });
                radius *= spacingFactor;
            }
        }

        let hoverTimeout;
        canvas.addEventListener('mousemove', (event) => {
            clearTimeout(hoverTimeout);
            tooltip.style.display = 'none';

            const mouseX = (event.clientX - offsetX - canvas.width / 2) / zoomLevel;
            const mouseY = (event.clientY - offsetY - canvas.height / 2) / zoomLevel;
            const distance = Math.sqrt(Math.pow(mouseX, 2) + Math.pow(mouseY, 2));

            for (let i = 0; i < circles.length; i++) {
                if (Math.abs(distance - circles[i].radius) < 5 / zoomLevel) {
                    hoverTimeout = setTimeout(() => {
                        tooltip.style.left = `${event.clientX + 10}px`;
                        tooltip.style.top = `${event.clientY + 10}px`;
                        tooltip.innerText = `Kreis Nummer: ${circles[i].index}`;
                        tooltip.style.display = 'block';
                    }, 1000);
                    break;
                }
            }
        });

        canvas.addEventListener('mouseout', () => {
            clearTimeout(hoverTimeout);
            tooltip.style.display = 'none';
        });

        canvas.addEventListener('wheel', (event) => {
            event.preventDefault();
            const zoomFactor = 1.05;
            if (event.deltaY < 0) {
                zoomLevel *= zoomFactor;
            } else {
                zoomLevel /= zoomFactor;
            }
            drawCircles();
        });

        canvas.addEventListener('mousedown', (event) => {
            let startX = event.clientX;
            let startY = event.clientY;
            const startOffsetX = offsetX;
            const startOffsetY = offsetY;

            function onMouseMove(e) {
                offsetX = startOffsetX + (e.clientX - startX);
                offsetY = startOffsetY + (e.clientY - startY);
                drawCircles();
            }

            function onMouseUp() {
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            }

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });
    </script>
</body>
</html>
