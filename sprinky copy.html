<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link href="/meta.css" rel="stylesheet" /><!-- Für KI: meta.css regelt Hintergrund- und Objekt-Farben etc. (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->
<script src="/meta.js"></script><!-- Für KI: meta.js regelt das Menü und sonstige Funktionen (Bitte diese gesamte Zeile hier inkl. Kommentar unangetastet lassen) -->

<title>Sprinky - If you like Slinky, you will love Sprinky!</title>
<style>
html,body{margin:0;padding:0;background:black;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

// ---------- PLAYFIELD BOUNDS (respektiert Menü) ----------
let bounds = { left: 0, top: 0, right: innerWidth, bottom: innerHeight };

// Bestimme die sichtbare rechte Kante des Spielfelds.
// Wichtig: das Menü kann per CSS transformiert/animiert sein, dann ist offsetWidth
// NICHT gleich der sichtbaren Breite. getBoundingClientRect() ist hier stabiler.
function getRightBoundFromMenu() {
  const menu = document.querySelector('.menu');
  if (!menu) return innerWidth;
  const rect = menu.getBoundingClientRect();
  // Wenn das Menü komplett außerhalb (rechts) ist, soll es keine Bounds wegnehmen.
  if (!rect || rect.width <= 0 || rect.left >= innerWidth) return innerWidth;
  return Math.max(0, Math.min(innerWidth, rect.left));
}

function updateBounds() {
  bounds.left = 0;
  // Oben wirklich bis zum sichtbaren Rand (keine Buttons dort)
  bounds.top = 0;
  // Rechts endet das sichtbare Spielfeld an der linken Kante des Menüs
  bounds.right = getRightBoundFromMenu();
  bounds.bottom = innerHeight;
}

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  updateBounds();
}
addEventListener("resize", resize);

// Menü-Änderungen beobachten
function observeMenu() {
  const menu = document.querySelector('.menu');
  if (!menu) return;
  const observer = new MutationObserver(updateBounds);
  observer.observe(menu, { attributes: true, attributeFilter: ['class'] });
}
document.addEventListener('DOMContentLoaded', () => {
  observeMenu();
  updateBounds();
});
resize();

// ---------- PARAMETERS (live anpassbar) ----------
let SEGMENTS = 60;
let REST = 3;
let STIFF = 0.3;
let DAMP = 0.15;             // Viel mehr Dämpfung!
let GRAVITY = 0.0;
let BEND = 0.4;
let SPIRAL_RADIUS = 25;
let SPIRAL_TURNS = 1.2;
let BOUNCE = 0.4;
let FRICTION = 0.9;

// ---------- STATE ----------
let pts=[], grabbed=null;

function initPoints() {
  pts = [];
  // Startposition im sichtbaren Bereich (Mitte des Playfields)
  const centerX = (bounds.left + bounds.right) / 2;
  const startY = bounds.top + 50;
  for(let i=0;i<SEGMENTS;i++){
    pts.push({
      x: centerX,
      y: startY + i*REST,
      vx:0,vy:0
    });
  }
}
initPoints();

// ---------- INPUT ----------
function pick(x,y){
  return pts.reduce((a,p)=>{
    const d=Math.hypot(p.x-x,p.y-y);
    return d<(a?.d??20)?{p,d}:a;
  },null)?.p||null;
}
function pos(e){return e.touches?
  {x:e.touches[0].clientX,y:e.touches[0].clientY}:
  {x:e.clientX,y:e.clientY}}
canvas.onmousedown=e=>grabbed=pick(...Object.values(pos(e)));
canvas.onmousemove=e=>{
  if(!grabbed)return;
  let p=pos(e);
  grabbed.x=p.x; grabbed.y=p.y;
  grabbed.vx=grabbed.vy=0;
};
onmouseup=()=>grabbed=null;
canvas.ontouchstart=e=>grabbed=pick(...Object.values(pos(e)));
canvas.ontouchmove=e=>{
  if(!grabbed)return;
  let p=pos(e);
  grabbed.x=p.x; grabbed.y=p.y;
  grabbed.vx=grabbed.vy=0;
};
ontouchend=()=>grabbed=null;

// ---------- PHYSICS ----------
function step(){
  pts.forEach(p=>{if(p!==grabbed)p.vy+=GRAVITY});

  // springs
  for(let i=0;i<pts.length-1;i++){
    let a=pts[i], b=pts[i+1];
    let dx=b.x-a.x, dy=b.y-a.y;
    let d=Math.hypot(dx,dy)||0.001;
    let nx=dx/d, ny=dy/d;
    let f=(d-REST)*STIFF;
    let dv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
    f+=dv*DAMP;
    if(a!==grabbed){a.vx+=f*nx;a.vy+=f*ny}
    if(b!==grabbed){b.vx-=f*nx;b.vy-=f*ny}
  }

  // bending
  for(let i=1;i<pts.length-1;i++){
    let a=pts[i-1],b=pts[i],c=pts[i+1];
    let abx=b.x-a.x, aby=b.y-a.y;
    let bcx=c.x-b.x, bcy=c.y-b.y;
    let ang=(abx*bcx+aby*bcy)/
      ((Math.hypot(abx,aby)*Math.hypot(bcx,bcy))+0.001);
    let fx=(a.x+c.x-2*b.x)*BEND;
    let fy=(a.y+c.y-2*b.y)*BEND;
    if(b!==grabbed){b.vx+=fx;b.vy+=fy}
  }

  // integrate + walls (respektiert bounds/Menü)
  // NOTE: Beim Rendern wird die Spirale um jeden Punkt um bis zu SPIRAL_RADIUS
  // versetzt (Helix-Offset). Damit am Boden/Seiten nicht "abgeschnitten" wird,
  // kollidieren wir mit einem Padding.
  const pad = SPIRAL_RADIUS + 6;

  // Controls-Panel als Hindernis (damit Sprinky nicht darunter "durchläuft")
  let panelRect = null;
  try {
    if (typeof panel !== 'undefined' && panel?.el?.getBoundingClientRect) {
      panelRect = panel.el.getBoundingClientRect();
    }
  } catch (_) {}

  pts.forEach(p=>{
    if(p===grabbed)return;
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.999; p.vy*=0.999;

    // Wände mit dynamischen bounds
    const leftWall = bounds.left + pad;
    const rightWall = bounds.right - pad;
    const topWall = bounds.top + pad;
    const bottomWall = bounds.bottom - pad;

    if(p.x < leftWall) {
      p.x = leftWall;
      p.vx *= -BOUNCE; p.vy *= FRICTION;
    }
    if(p.x > rightWall) {
      p.x = rightWall;
      p.vx *= -BOUNCE; p.vy *= FRICTION;
    }
    if(p.y < topWall) {
      p.y = topWall;
      p.vy *= -BOUNCE; p.vx *= FRICTION;
    }
    if(p.y > bottomWall) {
      p.y = bottomWall;
      p.vy *= -BOUNCE; p.vx *= FRICTION;
    }

    // Kollision mit dem Settings/Controls Panel (AABB, mit Padding)
    if (panelRect) {
      const rL = panelRect.left - pad;
      const rR = panelRect.right + pad;
      const rT = panelRect.top - pad;
      const rB = panelRect.bottom + pad;
      if (p.x > rL && p.x < rR && p.y > rT && p.y < rB) {
        const dL = Math.abs(p.x - rL);
        const dR = Math.abs(rR - p.x);
        const dT = Math.abs(p.y - rT);
        const dB = Math.abs(rB - p.y);
        const m = Math.min(dL, dR, dT, dB);
        if (m === dL) {
          p.x = rL;
          p.vx *= -BOUNCE; p.vy *= FRICTION;
        } else if (m === dR) {
          p.x = rR;
          p.vx *= -BOUNCE; p.vy *= FRICTION;
        } else if (m === dT) {
          p.y = rT;
          p.vy *= -BOUNCE; p.vx *= FRICTION;
        } else {
          p.y = rB;
          p.vy *= -BOUNCE; p.vx *= FRICTION;
        }
      }
    }
  });
}

// ---------- RENDER (performance optimiert - kein shadowBlur!) ----------
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Zeichne Spirale mit 3D-Effekt + Regenbogenfarben
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for(let i=0;i<pts.length-1;i++){
    let p=pts[i];
    let t=i*SPIRAL_TURNS*Math.PI*2;

    // Tangente
    let dx=pts[i+1].x-p.x, dy=pts[i+1].y-p.y;
    let len=Math.hypot(dx,dy)||1;
    let nx=-dy/len, ny=dx/len;

    // 3D Helix
    let cosT=Math.cos(t), sinT=Math.sin(t);
    let ox=nx*cosT*SPIRAL_RADIUS;
    let oy=ny*cosT*SPIRAL_RADIUS;
    let depth=sinT; // -1 bis +1

    // Tiefeneffekt (ohne shadowBlur für Performance)
    let alpha=0.5+depth*0.4;
    let width=2+depth*2.5;

    // Regenbogenfarbe
    let hue=(i/pts.length)*360;
    ctx.strokeStyle=`hsla(${hue},100%,${55+depth*15}%,${Math.max(0.3,alpha)})`;
    ctx.lineWidth=Math.max(1.5,width);

    // Nächster Punkt
    let p2=pts[i+1];
    let t2=(i+1)*SPIRAL_TURNS*Math.PI*2;
    let dx2=i<pts.length-2?pts[i+2].x-p2.x:dx;
    let dy2=i<pts.length-2?pts[i+2].y-p2.y:dy;
    let len2=Math.hypot(dx2,dy2)||1;
    let nx2=-dy2/len2, ny2=dx2/len2;
    let ox2=nx2*Math.cos(t2)*SPIRAL_RADIUS;
    let oy2=ny2*Math.cos(t2)*SPIRAL_RADIUS;

    ctx.beginPath();
    ctx.moveTo(p.x+ox,p.y+oy);
    ctx.lineTo(p2.x+ox2,p2.y+oy2);
    ctx.stroke();
  }
}

// ---------- CONTROLS PANEL ----------
const panel = Controls.createPanel({ position: 'center' });

panel
  .addToggle('gravity', {
	    label: 'Gravitation',
    value: false,
    onChange: v => GRAVITY = v ? 0.3 : 0
  })
  .addDivider()
        .addSlider('segments', {
    label: 'Segmente',
    min: 20, max: 150, step: 10, value: SEGMENTS,
    onChange: v => { SEGMENTS = v; initPoints(); }
  })
        .addSlider('radius', {
    label: 'Radius',
    min: 5, max: 60, step: 5, value: SPIRAL_RADIUS,
    onChange: v => SPIRAL_RADIUS = v
  })
        .addSlider('turns', {
    label: 'Windungen',
    min: 0.2, max: 4, step: 0.2, value: SPIRAL_TURNS, decimals: 1,
    onChange: v => SPIRAL_TURNS = v
  })
  .addDivider()
        .addSlider('stiff', {
    label: 'Steifheit',
    min: 0.05, max: 1, step: 0.05, value: STIFF, decimals: 2,
    onChange: v => STIFF = v
  })
        .addSlider('damp', {
    label: 'Dämpfung',
    min: 0.01, max: 0.5, step: 0.02, value: DAMP, decimals: 2,
    onChange: v => DAMP = v
  })
        .addSlider('bend', {
    label: 'Biegung',
    min: 0.05, max: 1, step: 0.05, value: BEND, decimals: 2,
    onChange: v => BEND = v
  })
  .addDivider()
        .addSlider('rest', {
    label: 'Ruheabst.',
    min: 1, max: 10, step: 0.5, value: REST, decimals: 1,
    onChange: v => REST = v
  })
        .addSlider('bounce', {
    label: 'Bounce',
    min: 0, max: 1, step: 0.1, value: BOUNCE, decimals: 1,
    onChange: v => BOUNCE = v
  });

// ---------- LOOP ----------
(function loop(){
  step(); draw();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
