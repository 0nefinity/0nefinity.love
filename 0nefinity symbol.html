<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Drehendes Dreieck mit unbewegten Symbolen</title>
    <style>
        /* Container zentrieren */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: black;
        }

        /* Animation für die rotierende Gruppe */
        @keyframes rotateTriangle {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Animation für die gegenteilige Rotation der Symbole */
        @keyframes counterRotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(-360deg);
            }
        }

        /* Rotierende Gruppe */
        .rotating-group {
            animation: rotateTriangle 5s linear infinite;
            transform-origin: 50% 50%; /* Mittelpunkt des SVG */
            transform-box: fill-box; /* Bezug auf das SVG-Element */
            /* Skalierung hinzufügen, um Platz zu schaffen */
            transform: scale(0.9);
        }

        /* Symbole mit gegentransformierter Animation */
        .symbol {
            font-size: 36px; /* Schriftgröße reduziert */
            font-family: Arial, sans-serif;
            fill: white;
            text-anchor: middle;
            dominant-baseline: middle;
            animation: counterRotate 5s linear infinite;
            transform-origin: 50% 50%; /* Mittelpunkt der Symbole */
            transform-box: fill-box; /* Bezug auf das SVG-Element */
        }
    </style>
</head>
<body>

<svg width="300" height="300" viewBox="0 0 300 300">
    <!-- Gruppe, die rotiert -->
    <g class="rotating-group">
        <!-- Symbol 0 -->
        <text class="symbol" x="150" y="50">0</text>
        <!-- Symbol 1 -->
        <text class="symbol" x="236.6" y="200">1</text>
        <!-- Symbol ∞ -->
        <text class="symbol" x="63.4" y="200">∞</text>
    </g>
</svg>

</body>
</html>
