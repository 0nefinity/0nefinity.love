<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konzentrische Kreise mit Zoom</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
        }
        canvas {
            display: block;
        }
        #tooltip {
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px;
            border-radius: 3px;
            font-size: 12px;
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="circleCanvas"></canvas>
    <div id="tooltip"></div>
    <script>
        const canvas = document.getElementById('circleCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        let circles = [];
        let zoomLevel = 1;
        let offsetX = 0;
        let offsetY = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            drawCircles();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function drawCircles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            circles = [];
            let initialRadius = 1;
            let spacingFactor = 1.01;
            let lineWidth = 0.6;
            let numberOfCircles = 100000;

            ctx.strokeStyle = 'white';
            ctx.lineWidth = lineWidth;

            let radius = initialRadius;
            for (let i = 0; i < numberOfCircles; i++) {
                // Wenn der Kreis außerhalb des sichtbaren Bereichs liegt, wird er nicht gezeichnet
                if ((radius * zoomLevel) > (Math.sqrt(Math.pow(canvas.width, 2) + Math.pow(canvas.height, 2)) / 2 + Math.max(Math.abs(offsetX), Math.abs(offsetY)))) {
                    break;
                }
                ctx.beginPath();
                ctx.arc(canvas.width / 2 + offsetX, canvas.height / 2 + offsetY, radius * zoomLevel, 0, Math.PI * 2);
                ctx.stroke();
                circles.push({ radius: radius, index: i + 1 });
                radius *= spacingFactor;
            }
        }

        let hoverTimeout;
        canvas.addEventListener('mousemove', (event) => {
            clearTimeout(hoverTimeout);
            tooltip.style.display = 'none';

            const mouseX = (event.clientX - offsetX - canvas.width / 2) / zoomLevel;
            const mouseY = (event.clientY - offsetY - canvas.height / 2) / zoomLevel;
            const distance = Math.sqrt(Math.pow(mouseX, 2) + Math.pow(mouseY, 2));

            for (let i = 0; i < circles.length; i++) {
                if (Math.abs(distance - circles[i].radius) < 5 / zoomLevel) {
                    hoverTimeout = setTimeout(() => {
                        tooltip.style.left = `${event.clientX + 10}px`;
                        tooltip.style.top = `${event.clientY + 10}px`;
                        tooltip.innerText = `Kreis Nummer: ${circles[i].index}`;
                        tooltip.style.display = 'block';
                    }, 1000);
                    break;
                }
            }
        });

        canvas.addEventListener('mouseout', () => {
            clearTimeout(hoverTimeout);
            tooltip.style.display = 'none';
        });

        canvas.addEventListener('wheel', (event) => {
            event.preventDefault();
            const zoomFactor = 1.05;
            if (event.deltaY < 0) {
                zoomLevel *= zoomFactor;
            } else {
                zoomLevel /= zoomFactor;
            }
            drawCircles();
        });

        canvas.addEventListener('mousedown', (event) => {
            let startX = event.clientX;
            let startY = event.clientY;
            const startOffsetX = offsetX;
            const startOffsetY = offsetY;

            function onMouseMove(e) {
                offsetX = startOffsetX + (e.clientX - startX);
                offsetY = startOffsetY + (e.clientY - startY);
                drawCircles();
            }

            function onMouseUp() {
                window.removeEventListener('mousemove', onMouseMove);
                window.removeEventListener('mouseup', onMouseUp);
            }

            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        });
    </script>
</body>
</html>
