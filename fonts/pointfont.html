<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Punktbasierter Textgenerator</title>
    <style>
        /* Basisstile für Body und HTML, um volle Höhe und Breite zu nutzen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            box-sizing: border-box;
            overflow-x: hidden; /* Verhindert horizontales Scrollen */
        }

        /* Stil für die Steuerungselemente */
        .controls {
            position: fixed; /* Fixiert die Steuerleiste oben */
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px 20px;
            background-color: #111;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            z-index: 1000; /* Sicherstellt, dass die Steuerleiste immer oben bleibt */
            flex-wrap: wrap; /* Ermöglicht Zeilenumbrüche bei kleinen Bildschirmen */
        }
        .controls label {
            margin-right: 10px;
            white-space: nowrap;
        }
        .controls input, .controls select {
            margin-right: 20px;
            padding: 5px;
            border: none;
            border-radius: 4px;
            background-color: #333;
            color: white;
            width: 150px;
            font-size: 14px;
        }
        .controls button {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            background-color: #555;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }
        .controls button:hover {
            background-color: #666;
        }

        /* Container für Canvas */
        .canvas-container {
            position: relative;
            width: 100%;
            height: calc(100% - 60px); /* Abzug der Steuerleistenhöhe */
            margin-top: 60px; /* Platz für die fixierte Steuerleiste */
            overflow: hidden;
        }

        /* Canvas-Stil ohne Rahmen und volle Größe */
        canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Unsichtbares, aber selektierbares Text-Overlay */
        .text-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: transparent; /* Unsichtbar */
            z-index: 2;
            user-select: text;
            pointer-events: none; /* Ermöglicht Interaktion mit dem Canvas */
            font: bold 150px Arial;
            text-align: center;
            line-height: 150px;
        }

        /* Responsive Anpassung für kleinere Bildschirme */
        @media (max-width: 800px) {
            .text-overlay {
                font-size: 80px;
                line-height: 80px;
            }
            .controls input, .controls select {
                width: 120px;
                margin-bottom: 10px;
            }
            .controls label {
                margin-right: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="controls">
        <label for="textInput">Text:</label>
        <input type="text" id="textInput" value="0 ≡ 1 ≡ ∞ ">
        
        <label for="pointCount">Punktanzahl pro Zeichen:</label>
        <input type="number" id="pointCount" value="100" min="0" max="1000" step="1">
        
        <label for="pointSize">Punktgröße:</label>
        <input type="number" id="pointSize" value="1" min="0" max="1000" step="0.1">
        
        <label for="fontSelect">Schriftart:</label>
        <select id="fontSelect">
            <option value="Arial">Arial</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Courier New">Courier New</option>
            <option value="Verdana" selected>Verdana</option>
            <option value="Georgia">Georgia</option>
            <option value="Tahoma">Tahoma</option>
            <option value="Impact">Impact</option>
            <!-- Weitere Schriftarten können hier hinzugefügt werden -->
        </select>
    </div>
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
        <div id="textOverlay" class="text-overlay"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const textInput = document.getElementById('textInput');
        const pointCountInput = document.getElementById('pointCount');
        const pointSizeInput = document.getElementById('pointSize');
        const fontSelect = document.getElementById('fontSelect');
        const textOverlay = document.getElementById('textOverlay');

        // Offscreen-Canvas für präzises Zeichnen und Pixelabfrage mit willReadFrequently
        const offscreenCanvas = document.createElement('canvas');
        const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

        // Funktion zur Anpassung der Canvas-Größe an den Container
        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
            offscreenCanvas.width = canvas.width;
            offscreenCanvas.height = canvas.height;
            renderPoints();
        }

        // Event Listener für Fenstergrößenänderungen
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function renderPoints() {
            const text = textInput.value;
            const pointCount = parseInt(pointCountInput.value);
            const pointSize = parseFloat(pointSizeInput.value);
            const font = fontSelect.value;

            // Set Schriftgröße dynamisch basierend auf Canvas-Höhe
            const fontSize = Math.min(300, canvas.height * 0.5); // Max 300px oder 50% der Canvas-Höhe
            const fontStyle = `bold ${fontSize}px ${font}`;
            ctx.font = fontStyle;
            offscreenCtx.font = fontStyle;

            // Aktualisiere das unsichtbare Text-Overlay
            textOverlay.textContent = text;
            textOverlay.style.font = `bold ${fontSize}px ${font}`;
            textOverlay.style.lineHeight = `${fontSize}px`;

            // Berechne Textbreite und Position
            const textMetrics = ctx.measureText(text);
            const totalTextWidth = textMetrics.width;
            const startX = (canvas.width - totalTextWidth) / 2;
            const startY = (canvas.height + fontSize) / 2 - fontSize * 0.2; // Anpassung für bessere Vertikale

            // Zeichne jedes Zeichen einzeln auf das Offscreen-Canvas
            let currentX = startX;
            const charData = []; // Array zur Speicherung von Pixel-Daten pro Zeichen

            offscreenCtx.clearRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
            offscreenCtx.fillStyle = 'white';
            offscreenCtx.textBaseline = 'top';

            // Zeichnen jedes Zeichens und Erfassen der Pixel-Daten
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                const charMetrics = offscreenCtx.measureText(char);
                const charWidth = charMetrics.width;

                offscreenCtx.fillText(char, currentX, startY - fontSize * 0.1); // Leichte Anpassung der Y-Position

                // Erfasse die Pixel-Daten für das aktuelle Zeichen
                const charImageData = offscreenCtx.getImageData(
                    Math.floor(currentX),
                    Math.floor(startY - fontSize * 0.1),
                    Math.ceil(charWidth),
                    Math.ceil(fontSize * 1.2)
                );
                const pixels = getWhitePixels(charImageData, Math.floor(currentX), Math.floor(startY - fontSize * 0.1));
                charData.push({
                    char: char,
                    pixels: pixels
                });

                currentX += charWidth;
            }

            // Zeichne die Punkte auf das Haupt-Canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';

            charData.forEach(data => {
                const pointsPerChar = pointCount; // Punktanzahl pro Zeichen
                const shuffledPixels = shuffleArray(data.pixels);
                const selectedPoints = shuffledPixels.slice(0, Math.min(pointsPerChar, shuffledPixels.length));

                selectedPoints.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, pointSize, 0, Math.PI * 2);
                    ctx.fill();
                });
            });
        }

        // Funktion zum Extrahieren weißer Pixel aus ImageData
        function getWhitePixels(imageData, offsetX, offsetY) {
            const data = imageData.data;
            const width = imageData.width;
            const height = imageData.height;
            const pixels = [];

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const alpha = data[index + 3];
                    const red = data[index];
                    const green = data[index + 1];
                    const blue = data[index + 2];
                    if (alpha > 128 && red > 200 && green > 200 && blue > 200) {
                        pixels.push({x: x + offsetX, y: y + offsetY});
                    }
                }
            }

            return pixels;
        }

        // Funktion zum zufälligen Mischen eines Arrays (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Debouncing für Eingaben
        let debounceTimeout;
        function debounceRender() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(renderPoints, 300); // 300ms Verzögerung
        }

        // Event Listener für Eingabefelder mit Debouncing
        textInput.addEventListener('input', debounceRender);
        pointCountInput.addEventListener('input', debounceRender);
        pointSizeInput.addEventListener('input', debounceRender);
        fontSelect.addEventListener('change', debounceRender);

        // Initiale Darstellung
        renderPoints();
    </script>
</body>
</html>
